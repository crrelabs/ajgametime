<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { min-height: 100vh; display: flex; flex-direction: column; align-items: center; font-family: -apple-system, sans-serif; background: #1a0a2e; color: #e2e8f0; overflow: hidden; user-select: none; }
#header { width: 100%; padding: 0.75rem 1.5rem; display: flex; justify-content: space-between; align-items: center; z-index: 10; position: fixed; top: 0; }
#header a { color: #64748b; text-decoration: none; font-size: 0.85rem; }
#header a:hover { color: #e2e8f0; }
#hud { display: flex; gap: 1.5rem; align-items: center; }
.stat { text-align: center; }
.stat-val { font-size: 1.5rem; font-weight: 800; }
.stat-label { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.1em; color: #64748b; }
#scoreVal { color: #fbbf24; }
#highVal { color: #a78bfa; }
#coinsVal { color: #fbbf24; }
canvas { display: block; touch-action: none; }

#startScreen {
  position: fixed; inset: 0; background: rgba(26,10,46,0.95);
  display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 30;
}
#startScreen.hidden { display: none; }
#startScreen h1 { font-size: 2.5rem; margin-bottom: 0.5rem; }
#startScreen .emoji { font-size: 5rem; margin-bottom: 1rem; }
#startScreen p { color: #94a3b8; margin-bottom: 0.5rem; font-size: 0.95rem; text-align: center; max-width: 320px; }
.controls-hint { color: #64748b !important; font-size: 0.8rem !important; margin-top: 0.5rem; }
button.play-btn {
  margin-top: 1.5rem; padding: 1rem 2.5rem; font-size: 1.1rem; font-weight: 700;
  background: linear-gradient(135deg, #22c55e, #16a34a); color: white;
  border: none; border-radius: 12px; cursor: pointer; transition: 0.2s;
}
button.play-btn:hover { transform: scale(1.05); filter: brightness(1.1); }

#lb-overlay{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:100;background:rgba(0,0,0,0.92)}
#lb-overlay h2{font-family:sans-serif;font-size:28px;color:#f59e0b;margin-bottom:12px;font-weight:900}
#lb-list{width:min(340px,90vw);max-height:50vh;overflow-y:auto}
.lb-row{display:flex;justify-content:space-between;padding:8px 14px;border-bottom:1px solid rgba(255,255,255,0.08);color:#e2e8f0;font-size:14px;font-weight:600}
.lb-row:nth-child(1) .lb-rank{color:#fbbf24}.lb-row:nth-child(2) .lb-rank{color:#94a3b8}.lb-row:nth-child(3) .lb-rank{color:#b45309}
.lb-rank{width:30px;color:#64748b}.lb-name{flex:1;margin:0 8px}.lb-score{color:#22d3ee}
#lb-close-btn{pointer-events:auto;margin-top:16px;padding:10px 30px;font-size:16px;font-weight:700;color:#fff;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:10px;cursor:pointer}
#lb-show-btn{pointer-events:auto;padding:8px 20px;font-size:14px;font-weight:700;color:#fff;background:linear-gradient(135deg,#f59e0b,#ef4444);border:none;border-radius:8px;cursor:pointer;margin-top:8px}
#death-screen{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:90;background:rgba(26,10,46,0.97)}
#death-screen h1{font-size:2.5rem;margin-bottom:0.5rem;color:#e2e8f0}
#death-score{font-size:3rem;font-weight:900;color:#fbbf24;margin-bottom:8px}
#death-coins{color:#fbbf24;font-size:1.1rem;font-weight:700;margin-bottom:12px}
#death-screen input{padding:10px 16px;font-size:16px;border-radius:8px;border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.1);color:#fff;text-align:center;width:200px;margin-bottom:12px}
#death-screen button{margin:4px;padding:10px 24px;font-size:14px;font-weight:700;border:none;border-radius:10px;cursor:pointer;color:#fff}
#death-submit{background:linear-gradient(135deg,#22c55e,#16a34a)}
#death-retry{background:linear-gradient(135deg,#3b82f6,#8b5cf6)}
#death-lb{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2) !important}
.death-btn{background:linear-gradient(135deg,#a855f7,#ec4899);margin:4px;padding:10px 24px;font-size:14px;font-weight:700;border:none;border-radius:10px;cursor:pointer;color:#fff}

/* Shop */
#shop-screen{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;z-index:95;background:rgba(26,10,46,0.98);overflow-y:auto;padding:20px 10px}
#shop-screen h2{font-size:1.8rem;margin-bottom:4px;color:#fbbf24}
#shop-coins{color:#fbbf24;font-size:1.1rem;font-weight:700;margin-bottom:12px}
.shop-tabs{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;justify-content:center}
.shop-tab{padding:8px 16px;font-weight:700;border-radius:8px;border:2px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.05);color:#fff;cursor:pointer;font-size:13px}
.shop-tab.active{background:linear-gradient(135deg,#f59e0b,#ef4444);border-color:transparent}
.shop-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:10px;width:min(500px,95vw);margin-bottom:16px}
.shop-card{background:rgba(255,255,255,0.08);border-radius:12px;padding:12px 8px;text-align:center;cursor:pointer;border:2px solid transparent;transition:0.2s}
.shop-card:hover{background:rgba(255,255,255,0.15)}
.shop-card.selected{border-color:#22c55e;background:rgba(34,197,94,0.15)}
.shop-card.locked{opacity:0.5}
.shop-card .item-emoji{font-size:2rem;margin-bottom:4px}
.shop-card .item-name{font-size:0.75rem;font-weight:700;color:#e2e8f0;margin-bottom:2px}
.shop-card .item-cost{font-size:0.7rem;color:#fbbf24}
.shop-card .item-owned{font-size:0.7rem;color:#22c55e}
#shop-close{margin-top:12px;padding:10px 30px;font-size:16px;font-weight:700;color:#fff;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:10px;cursor:pointer;margin-bottom:30px}

/* Mobile controls */
#mobileControls { display: none; position: fixed; bottom: 20px; z-index: 20; }
.d-pad { display: grid; grid-template-columns: 60px 60px 60px; grid-template-rows: 60px 60px 60px; gap: 4px; }
.d-btn { width: 60px; height: 60px; border-radius: 12px; border: none; background: rgba(255,255,255,0.15); color: white; font-size: 1.5rem; cursor: pointer; display: flex; align-items: center; justify-content: center; -webkit-tap-highlight-color: transparent; }
.d-btn:active { background: rgba(255,255,255,0.3); }
.d-blank { width: 60px; height: 60px; }
#pauseBtn{position:fixed;bottom:16px;right:108px;z-index:20;width:44px;height:44px;border-radius:50%;border:2px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.08);color:#e2e8f0;font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
#pauseOverlay{position:fixed;inset:0;display:none;align-items:center;justify-content:center;z-index:80;background:rgba(0,0,0,0.8)}
#pauseOverlay h1{font-size:3rem;color:#fbbf24}
#settingsBtn{position:fixed;bottom:10px;right:64px;z-index:20;width:44px;height:44px;border-radius:50%;border:none;background:rgba(255,255,255,0.15);color:#fff;font-size:1.3rem;cursor:pointer}
#settingsOverlay{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:110;background:rgba(0,0,0,0.92)}
#settingsOverlay h2{font-size:24px;color:#fbbf24;margin-bottom:16px;font-weight:900}
.vol-row{display:flex;align-items:center;gap:12px;margin-bottom:14px;width:min(300px,80vw)}
.vol-label{font-size:14px;font-weight:700;width:70px;color:#e2e8f0}
.vol-slider{flex:1;-webkit-appearance:none;height:8px;border-radius:4px;background:rgba(255,255,255,0.15);outline:none}
.vol-slider::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:#fbbf24;cursor:pointer}
.vol-val{font-size:13px;font-weight:700;color:#fbbf24;width:35px;text-align:right}
#settingsClose{margin-top:16px;padding:10px 30px;font-size:16px;font-weight:700;color:#fff;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:10px;cursor:pointer}
#music-btn{position:fixed;bottom:10px;right:10px;z-index:20;width:44px;height:44px;border-radius:50%;border:none;background:rgba(255,255,255,0.15);color:#fff;font-size:1.3rem;cursor:pointer}

@media (pointer: coarse) { #mobileControls { display: block; } }
</style>
</head>
<body>

<div id="header">
  <a href="index.html">← AJ GameTime</a>
  <div id="hud">
    <div class="stat"><div class="stat-val" id="scoreVal">0</div><div class="stat-label">Score</div></div>
    <div class="stat"><div class="stat-val" id="coinsVal">0</div><div class="stat-label">🪙</div></div>
    <div class="stat"><div class="stat-val" id="highVal">0</div><div class="stat-label">Best</div></div>
  </div>
</div>

<div id="startScreen">
  <div class="emoji">🐔</div>
  <h1>Crossy Road</h1>
  <p>Hop across roads, rivers, and train tracks. Don't get squished!</p>
  <p id="start-coins" style="color:#fbbf24;font-weight:700">🪙 0</p>
  <p class="controls-hint">Arrow keys / WASD / Swipe to move</p>
  <button class="play-btn" id="startBtn">🐔 Let's Go!</button>
  <button id="lb-show-btn" style="margin-top:12px">🏆 Leaderboard</button>
  <button id="shop-show-btn" style="margin-top:8px;padding:8px 20px;font-size:14px;font-weight:700;color:#fff;background:linear-gradient(135deg,#a855f7,#ec4899);border:none;border-radius:8px;cursor:pointer">🛍️ Shop</button>
</div>

<canvas id="game"></canvas>

<div id="lb-overlay"><h2>🏆 Leaderboard</h2><div id="lb-list"></div><button id="lb-close-btn">Close</button></div>

<div id="death-screen">
  <h1>💀 Game Over!</h1>
  <div id="death-score">Score: 0</div>
  <div id="death-coins">🪙 0</div>
  <p style="color:#94a3b8;font-size:14px;margin-bottom:12px">Enter your name:</p>
  <input type="text" id="death-name" placeholder="Your name" maxlength="16" autocomplete="off">
  <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center">
    <button id="death-submit">📤 Submit Score</button>
    <button id="death-lb">🏆 Leaderboard</button>
    <button id="death-retry">🐔 Try Again</button>
    <button class="death-btn" id="death-shop">🛍️ Shop</button>
  </div>
</div>

<div id="shop-screen">
  <h2>🛍️ Shop</h2>
  <div id="shop-coins">🪙 0</div>
  <div class="shop-tabs">
    <button class="shop-tab active" data-tab="skins">🐔 Characters</button>
    <button class="shop-tab" data-tab="bgs">🎨 Worlds</button>
    <button class="shop-tab" data-tab="accs">🎩 Accessories</button>
    <button class="shop-tab" data-tab="efx">✨ Effects</button>
    <button class="shop-tab" data-tab="explo">💥 Deaths</button>
  </div>
  <div class="shop-grid" id="grid-skins"></div>
  <div class="shop-grid" id="grid-bgs" style="display:none"></div>
  <div class="shop-grid" id="grid-accs" style="display:none"></div>
  <div class="shop-grid" id="grid-efx" style="display:none"></div>
  <div class="shop-grid" id="grid-explo" style="display:none"></div>
  <button id="shop-close">Close</button>
</div>

<div id="mobileControls">
  <div class="d-pad">
    <div class="d-blank"></div>
    <button class="d-btn" data-dir="up">⬆️</button>
    <div class="d-blank"></div>
    <button class="d-btn" data-dir="left">⬅️</button>
    <div class="d-blank"></div>
    <button class="d-btn" data-dir="right">➡️</button>
    <div class="d-blank"></div>
    <button class="d-btn" data-dir="down">⬇️</button>
    <div class="d-blank"></div>
  </div>
</div>

<button id="pauseBtn" onclick="togglePause()">⏸️</button>
<div id="pauseOverlay" onclick="togglePause()"><h1>⏸️ Paused</h1></div>
<button id="settingsBtn">⚙️</button>
<div id="settingsOverlay">
<h2>⚙️ Settings</h2>
<div class="vol-row"><span class="vol-label">🎵 Music</span><input type="range" class="vol-slider" id="musicVol" min="0" max="100" value="50"><span class="vol-val" id="musicVolVal">50%</span></div>
<div class="vol-row"><span class="vol-label">🔊 SFX</span><input type="range" class="vol-slider" id="sfxVol" min="0" max="100" value="70"><span class="vol-val" id="sfxVolVal">70%</span></div>
<button id="settingsClose">Close</button>
</div>
<button id="music-btn">🔊</button>

  localStorage.setItem('cr_efx', JSON.stringify(ownedEfx));
  localStorage.setItem('cr_active_efx', activeEfx);
  localStorage.setItem('cr_explo', JSON.stringify(ownedExplo));
  localStorage.setItem('cr_active_explo', activeExplo);
}

function getSkin() { return SKINS.find(s => s.id === activeSkin) || SKINS[0]; }
function getBg() { return BACKGROUNDS.find(b => b.id === activeBg) || BACKGROUNDS[0]; }
function getAcc() { return ACCESSORIES.find(a => a.id === activeAcc) || ACCESSORIES[0]; }
function getEfx() { return EFFECTS.find(e => e.id === activeEfx) || EFFECTS[0]; }
function getExplo() { return EXPLOSIONS.find(e => e.id === activeExplo) || EXPLOSIONS[0]; }

function updateCoinDisplays() {
  document.getElementById('start-coins').textContent = '🪙 ' + totalCoins;
  document.getElementById('shop-coins').textContent = '🪙 ' + totalCoins;

}
updateCoinDisplays();

// === CANVAS SETUP ===
var canvas = document.getElementById('game');
var ctx = canvas.getContext('2d');
var scoreEl = document.getElementById('scoreVal');
var highEl = document.getElementById('highVal');
var coinsEl = document.getElementById('coinsVal');
var startScreen = document.getElementById('startScreen');

var W, H, TILE, COLS, VISIBLE_ROWS;
var highScore = parseInt(localStorage.getItem('crossy_high') || '0');
highEl.textContent = highScore;

function resize() {
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W; canvas.height = H;
  TILE = Math.floor(Math.min(W / 11, H / 15));
  COLS = Math.floor(W / TILE);
  VISIBLE_ROWS = Math.ceil(H / TILE) + 4;
}
resize();
window.addEventListener('resize', resize);

// === GAME STATE ===
var player, rows, score, sessionCoins, gameRunning, cameraY, deathType;
var hopAnim = { active: false, fromX: 0, fromY: 0, toX: 0, toY: 0, t: 0 };
var particles = [];
var trailParticles = [];
var nightMode=false,rushHour=false,rushTimer=0;

function generateRow(index) {
  if (index === 0) return { type: 'grass', items: [], coins: generateCoins(), trees: [] };
  var diff = Math.min(index / 50, 1);
  var rand = Math.random();
  var type;
  if (rand < 0.35) type = 'road';
  else if (rand < 0.55) type = 'river';
  else if (rand < 0.65 && index > 5) type = 'train';
  else type = 'grass';
  var row = { type: type, items: [], coins: generateCoins(), trees: [] };

  if (type === 'road') {
    var speed = (1 + Math.random() * 2 + diff * 2) * (Math.random() < 0.5 ? 1 : -1);
    var gap = Math.max(3, 6 - Math.floor(diff * 3));
    var vehicles = ['🚗','🚙','🚕','🚌','🚎','🏎️','🚒','🚐'];
    var vehicle = vehicles[Math.floor(Math.random() * vehicles.length)];
    var count = Math.floor(COLS / gap) + 1;
    for (var i = 0; i < count; i++) {
      row.items.push({ x: i * gap * TILE + Math.random() * TILE * 2, speed: speed, emoji: vehicle, w: (vehicle === '🚌' || vehicle === '🚎') ? 2 : 1.4 });
    }
  } else if (type === 'river') {
    var speed2 = (0.5 + Math.random() * 1.5) * (Math.random() < 0.5 ? 1 : -1);
    var count2 = Math.floor(COLS / 4) + 2;
    for (var j = 0; j < count2; j++) {
      row.items.push({ x: j * 5 * TILE + Math.random() * TILE, speed: speed2, len: 2 + Math.floor(Math.random() * 2), emoji: '🪵' });
    }
  } else if (type === 'train') {
    row.trainTimer = 0; row.trainActive = false;
    row.trainDir = Math.random() < 0.5 ? 1 : -1;
    row.trainX = row.trainDir > 0 ? -(COLS + 10) * TILE : (COLS + 10) * TILE;
    row.trainInterval = 180 + Math.floor(Math.random() * 120);
    row.warningTimer = 0;
  } else if (type === 'grass') {
    var tc = Math.floor(Math.random() * 3);
    for (var k = 0; k < tc; k++) row.trees.push(Math.floor(Math.random() * COLS));
  }
  return row;
}

function generateCoins() {
  var c = [];
  // 30% chance of 1 coin, 10% chance of bonus lane (3 coins in a row)
  if(Math.random()<0.1){var start=Math.floor(Math.random()*(COLS-4))+1;c.push(start,start+1,start+2)}
  else if (Math.random() < 0.3) c.push(Math.floor(Math.random() * (COLS - 2)) + 1);
  return c;
}

function init() {
  score = 0; sessionCoins = 0; deathType = '';
  gameRunning = true; particles = []; trailParticles = [];
  nightMode=false;rushHour=false;rushTimer=0;
  player = { col: Math.floor(COLS / 2), row: 0, onLog: null };
  cameraY = 0; hopAnim.active = false;
  rows = {};
  for (var i = -5; i < VISIBLE_ROWS + 10; i++) rows[i] = generateRow(Math.max(0, i));
  rows[0] = { type: 'grass', items: [], coins: [], trees: [] };
  rows[1] = { type: 'grass', items: [], coins: [], trees: [] };
  scoreEl.textContent = 0; coinsEl.textContent = totalCoins;
}

function getRow(index) {
  if (!rows[index]) rows[index] = generateRow(index);
  return rows[index];
}

function tryMove(dx, dy) {
  if (!gameRunning || hopAnim.active) return;
  var newCol = player.col + dx;
  var newRow = player.row + dy;
  if (newCol < 0 || newCol >= COLS) return;
  var targetRow = getRow(newRow);
  if (targetRow.type === 'grass' && targetRow.trees.includes(Math.round(newCol))) return;

  hopAnim.active = true;
  hopAnim.fromX = player.col; hopAnim.fromY = player.row;
  hopAnim.toX = newCol; hopAnim.toY = newRow; hopAnim.t = 0;
  player.col = newCol; player.row = newRow; player.onLog = null;

  // Trail particles
  var efx = getEfx();
  if (efx.colors) {
    for (var i = 0; i < 4; i++) {
      trailParticles.push({
        x: hopAnim.fromX * TILE + TILE / 2, y: 0, row: hopAnim.fromY,
        vx: (Math.random() - 0.5) * 2, vy: (Math.random() - 0.5) * 2,
        life: 20 + Math.random() * 15, maxLife: 35,
        color: efx.colors[Math.floor(Math.random() * efx.colors.length)],
        size: 2 + Math.random() * 3
      });
    }
  }

  // Play hop sound
  playHop();

  if (newRow > score) {
    score = newRow; scoreEl.textContent = score;
    // Night mode after 25
    if(score>=25&&!nightMode){nightMode=true}
    // Rush hour every 15 rows
    if(score>0&&score%15===0&&!rushHour){rushHour=true;rushTimer=180}
    if (score > highScore) { highScore = score; highEl.textContent = highScore; localStorage.setItem('crossy_high', highScore.toString()); }
  }
  var roundedCol = Math.round(newCol);
  var ci = targetRow.coins.indexOf(roundedCol);
  if (ci !== -1) {
    targetRow.coins.splice(ci, 1);
    sessionCoins++; totalCoins++;
    coinsEl.textContent = totalCoins;
    saveShop(); updateCoinDisplays();
    playCoin();
  }
}

function spawnDeathParticles() {
  var ex = getExplo().id;
  var count = ex === 'nuke' ? 40 : ex === 'portal' ? 30 : 20;
  var px = player.col * TILE + TILE / 2;
  var py = H - (player.row - cameraY) * TILE - TILE / 2;
  for (var i = 0; i < count; i++) {
    var ang = (i / count) * Math.PI * 2;
    var spd = 2 + Math.random() * 6;
    var p = { x: px, y: py, life: 25 + Math.random() * 20, maxLife: 45, size: 3 + Math.random() * 4, screen: true };
    if (ex === 'fireworks') { p.vx = Math.cos(ang)*spd*1.5; p.vy = Math.sin(ang)*spd*1.5; p.color = ['#ff0000','#ffd700','#00ff00','#00bfff','#ff00ff','#ff8c00'][i%6]; }
    else if (ex === 'confetti') { p.vx = (Math.random()-0.5)*8; p.vy = -2-Math.random()*4; p.color = ['#ff0000','#ff9800','#ffeb3b','#4caf50','#2196f3','#9c27b0'][i%6]; }
    else if (ex === 'hearts') { p.vx = (Math.random()-0.5)*6; p.vy = -1-Math.random()*5; p.color = ['#ff69b4','#ff1493','#ff4081','#e91e63'][i%4]; }
    else if (ex === 'skull') { p.vx = Math.cos(ang)*spd; p.vy = Math.sin(ang)*spd; p.color = ['#1a1a1a','#4a4a4a','#9e9e9e','#fff'][i%4]; }
    else if (ex === 'nuke') { var ring=i<20; p.vx=ring?Math.cos(ang)*8:(Math.random()-0.5)*12; p.vy=ring?Math.sin(ang)*8:(Math.random()-0.5)*12; p.color=['#ff4500','#ff8c00','#ffd700','#fff'][i%4]; p.size=ring?5:3; }
    else if (ex === 'glitch') { p.vx=(Math.random()-0.5)*10; p.vy=(Math.random()-0.5)*10; p.color=['#00ff00','#ff00ff','#00ffff','#ffff00'][i%4]; p.size=5; }
    else if (ex === 'feathers') { p.vx=(Math.random()-0.5)*4; p.vy=-1+Math.random()*2; p.color=['#fff','#e0e0e0','#a5d6a7'][i%3]; p.life=40; p.maxLife=40; }
    else if (ex === 'ice') { p.vx=Math.cos(ang)*spd*1.2; p.vy=Math.sin(ang)*spd*1.2; p.color=['#e0f7fa','#b2ebf2','#80deea','#fff'][i%4]; }
    else if (ex === 'lava') { p.vx=(Math.random()-0.5)*6; p.vy=-3-Math.random()*5; p.color=['#ff4500','#ff6600','#ff8c00','#ffd600'][i%4]; }
    else if (ex === 'portal') { p.vx=Math.cos(ang+i*0.3)*(2+i*0.2); p.vy=Math.sin(ang+i*0.3)*(2+i*0.2); p.color=['#7c4dff','#e040fb','#536dfe'][i%3]; }
    else if (ex === 'pixel') { p.vx=Math.cos(ang)*spd; p.vy=Math.sin(ang)*spd; p.color=['#4caf50','#8bc34a','#ff9800','#fff'][i%4]; p.size=5; }
    else { p.vx=(Math.random()-0.5)*8; p.vy=(Math.random()-0.5)*8; p.color=['#fbbf24','#ef4444','#22c55e','#fff'][i%4]; }
    particles.push(p);
  }
}

function die(msg) {
  gameRunning = false; deathType = msg;
  spawnDeathParticles();
  playCrash();
  canvas.style.pointerEvents = 'none';
  setTimeout(function() { _showDeathScreen(score); }, 600);
}

function update() {
var paused=false;
function togglePause(){if(!gameRunning)return;paused=!paused;document.getElementById('pauseBtn').textContent=paused?'▶️':'⏸️';document.getElementById('pauseOverlay').style.display=paused?'flex':'none'}
  if(paused)return;
  if (!gameRunning) {
    // Still update particles when dead
    for (var pi = particles.length - 1; pi >= 0; pi--) {
      var pp = particles[pi];
      pp.x += pp.vx; pp.y += pp.vy; pp.life--;
      if (pp.life <= 0) particles.splice(pi, 1);
    }
    return;
  }

  // Rush hour timer
  if(rushHour){rushTimer--;if(rushTimer<=0)rushHour=false}

  if (hopAnim.active) {
    hopAnim.t += 0.15;
    if (hopAnim.t >= 1) { hopAnim.active = false; hopAnim.t = 1; }
  }

  var targetCam = player.row - 4;
  cameraY += (targetCam - cameraY) * 0.1;

  for (var i = Math.floor(cameraY) - 2; i < Math.floor(cameraY) + VISIBLE_ROWS + 5; i++) getRow(i);

  for (var ri = Math.floor(cameraY) - 2; ri < Math.floor(cameraY) + VISIBLE_ROWS + 5; ri++) {
    var row = getRow(ri);
    if (row.type === 'road' || row.type === 'river') {
      for (var ii = 0; ii < row.items.length; ii++) {
        var item = row.items[ii];
        var rushMult=rushHour&&row.type==='road'?2.5:1;
        item.x += item.speed*rushMult;
        if (item.speed > 0 && item.x > (COLS + 4) * TILE) item.x = -4 * TILE;
        if (item.speed < 0 && item.x < -4 * TILE) item.x = (COLS + 4) * TILE;
      }
    }
    if (row.type === 'train') {
      row.trainTimer++;
      if (row.trainTimer > row.trainInterval - 60 && !row.trainActive) row.warningTimer++;
      if (row.trainTimer >= row.trainInterval) {
        row.trainActive = true;
        row.trainX += row.trainDir * 12;
        if ((row.trainDir > 0 && row.trainX > (COLS + 2) * TILE) || (row.trainDir < 0 && row.trainX + 8 * TILE < -2 * TILE)) {
          row.trainActive = false; row.trainTimer = 0; row.warningTimer = 0;
          row.trainDir = Math.random() < 0.5 ? 1 : -1;
          row.trainX = row.trainDir > 0 ? -(COLS + 10) * TILE : (COLS + 10) * TILE;
        }
      }
    }
  }

  // Collisions
  if (!hopAnim.active) {
    var currentRow = getRow(player.row);
    if (currentRow.type === 'river') {
      var onLog = false;
      for (var li = 0; li < currentRow.items.length; li++) {
        var log = currentRow.items[li];
        var logL = log.x, logR = log.x + log.len * TILE;
        var ppx = player.col * TILE + TILE / 2;
        if (ppx >= logL && ppx <= logR) {
          onLog = true; player.onLog = log;
          player.col += log.speed / TILE;
          if (player.col < -1 || player.col >= COLS + 1) die('🌊 Swept away!');
          break;
        }
      }
      if (!onLog) die('🌊 Fell in the river!');
    }
    if (currentRow.type === 'road') {
      var cpx = player.col * TILE;
      for (var ci = 0; ci < currentRow.items.length; ci++) {
        var car = currentRow.items[ci];
        if (cpx + TILE * 0.7 > car.x && cpx + TILE * 0.3 < car.x + car.w * TILE) { die('🚗 Squished!'); break; }
      }
    }
    if (currentRow.type === 'train' && currentRow.trainActive) {
      var tpx = player.col * TILE + TILE / 2;
      var tl = currentRow.trainX, tr = currentRow.trainX + 8 * TILE;
      if (tpx > Math.min(tl, tr) && tpx < Math.max(tl, tr)) die('🚂 Hit by a train!');
    }
  }

  // Update particles
  for (var pi2 = particles.length - 1; pi2 >= 0; pi2--) {
    var p2 = particles[pi2];
    p2.x += p2.vx; p2.y += p2.vy; p2.life--;
    if (p2.life <= 0) particles.splice(pi2, 1);
  }
  for (var ti = trailParticles.length - 1; ti >= 0; ti--) {
    var tp = trailParticles[ti];
    tp.x += tp.vx; tp.life--;
    if (tp.life <= 0) trailParticles.splice(ti, 1);
  }
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  var bg = getBg();

  // Background fill
  ctx.fillStyle = bg.road1;
  ctx.fillRect(0, 0, W, H);

  // Stars/snow/effects for background
  if (bg.stars) {
    ctx.fillStyle = '#fff';
    for (var si = 0; si < 60; si++) {
      var sx = (si * 137.5 + Date.now() * 0.002) % W;
      var sy = (si * 97.3) % H;
      ctx.globalAlpha = 0.3 + 0.5 * Math.sin(Date.now() * 0.003 + si);
      ctx.fillRect(sx, sy, 2, 2);
    }
    ctx.globalAlpha = 1;
  }
  if (bg.snowfall) {
    ctx.fillStyle = '#fff';
    for (var fi = 0; fi < 40; fi++) {
      var fx = (fi * 83.7 + Date.now() * 0.02) % W;
      var fy = (fi * 51.3 + Date.now() * 0.03) % H;
      ctx.globalAlpha = 0.5;
      ctx.beginPath(); ctx.arc(fx, fy, 2, 0, Math.PI * 2); ctx.fill();
    }
    ctx.globalAlpha = 1;
  }
  if (bg.lava) {
    for (var lvi = 0; lvi < 15; lvi++) {
      var lvx = (lvi * 113.7 + Date.now() * 0.01) % W;
      var lvy = H - 20 + Math.sin(Date.now() * 0.005 + lvi) * 10;
      ctx.fillStyle = 'rgba(255,69,0,0.3)';
      ctx.beginPath(); ctx.arc(lvx, lvy, 5 + Math.sin(Date.now() * 0.01 + lvi) * 3, 0, Math.PI * 2); ctx.fill();
    }
  }

  var startRow = Math.floor(cameraY) - 2;
  var endRow = Math.floor(cameraY) + VISIBLE_ROWS + 2;

  for (var i = startRow; i <= endRow; i++) {
    var row = getRow(i);
    var screenY = H - (i - cameraY) * TILE - TILE;

    if (row.type === 'grass') ctx.fillStyle = i % 2 === 0 ? bg.grass1 : bg.grass2;
    else if (row.type === 'road') ctx.fillStyle = i % 2 === 0 ? bg.road1 : bg.road2;
    else if (row.type === 'river') ctx.fillStyle = i % 2 === 0 ? bg.river1 : bg.river2;
    else if (row.type === 'train') ctx.fillStyle = bg.train;
    ctx.fillRect(0, screenY, W, TILE + 1);

    if (row.type === 'road') {
      ctx.strokeStyle = bg.dash; ctx.lineWidth = 2;
      ctx.setLineDash([TILE * 0.4, TILE * 0.4]);
      ctx.beginPath(); ctx.moveTo(0, screenY + TILE / 2); ctx.lineTo(W, screenY + TILE / 2); ctx.stroke();
      ctx.setLineDash([]);
    }

    if (row.type === 'train') {
      ctx.strokeStyle = '#44403c'; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.moveTo(0, screenY + TILE * 0.3); ctx.lineTo(W, screenY + TILE * 0.3);
      ctx.moveTo(0, screenY + TILE * 0.7); ctx.lineTo(W, screenY + TILE * 0.7); ctx.stroke();
      for (var t = 0; t < W; t += TILE * 0.6) { ctx.fillStyle = bg.train; ctx.fillRect(t, screenY + TILE * 0.2, TILE * 0.15, TILE * 0.6); }
      if (row.warningTimer > 0 && !row.trainActive) {
        var flash = Math.floor(row.warningTimer / 6) % 2 === 0;
        ctx.fillStyle = flash ? 'rgba(239,68,68,0.4)' : 'rgba(239,68,68,0.15)';
        ctx.fillRect(0, screenY, W, TILE);
        ctx.fillStyle = flash ? '#fbbf24' : '#ef4444';
        ctx.fillRect(0, screenY, 6, TILE); ctx.fillRect(W - 6, screenY, 6, TILE);
        ctx.font = (TILE * 0.7) + 'px sans-serif'; ctx.textAlign = 'center';
        ctx.fillText(flash ? '🔴' : '⚠️', TILE * 0.8, screenY + TILE * 0.7);
        ctx.fillText(flash ? '🔴' : '⚠️', W - TILE * 0.8, screenY + TILE * 0.7);
        ctx.fillStyle = '#ef4444'; ctx.font = 'bold ' + (TILE * 0.35) + 'px sans-serif';
        ctx.fillText('⚡ TRAIN ⚡', W / 2, screenY + TILE * 0.45);
      }
      if (row.trainActive) {
        ctx.fillStyle = '#1e293b'; ctx.fillRect(row.trainX - 4, screenY + TILE * 0.05, 8 * TILE + 8, TILE * 0.9);
        ctx.strokeStyle = '#ef4444'; ctx.lineWidth = 3;
        ctx.strokeRect(row.trainX - 4, screenY + TILE * 0.05, 8 * TILE + 8, TILE * 0.9);
        var trainE = ['🚂','🚃','🚃','🚃','🚃','🚃','🚃','🚃'];
        ctx.font = (TILE * 1.1) + 'px sans-serif'; ctx.textAlign = 'center';
        for (var te = 0; te < 8; te++) ctx.fillText(trainE[te], row.trainX + te * TILE + TILE / 2, screenY + TILE * 0.85);
      }
    }

    if (row.trees) {
      ctx.font = (TILE * 0.85) + 'px sans-serif'; ctx.textAlign = 'center';
      for (var ti2 = 0; ti2 < row.trees.length; ti2++) ctx.fillText('🌳', row.trees[ti2] * TILE + TILE / 2, screenY + TILE * 0.8);
    }

    if (row.type === 'road') {
      ctx.font = (TILE * 0.8) + 'px sans-serif'; ctx.textAlign = 'center';
      for (var ci2 = 0; ci2 < row.items.length; ci2++) {
        var car = row.items[ci2];
        ctx.save();
        if (car.speed < 0) { ctx.translate(car.x + car.w * TILE / 2, screenY + TILE * 0.75); ctx.scale(-1, 1); ctx.fillText(car.emoji, 0, 0); }
        else ctx.fillText(car.emoji, car.x + car.w * TILE / 2, screenY + TILE * 0.75);
        ctx.restore();
      }
    }

    if (row.type === 'river') {
      for (var li2 = 0; li2 < row.items.length; li2++) {
        var log2 = row.items[li2];
        ctx.fillStyle = '#92400e';
        ctx.beginPath(); ctx.roundRect(log2.x, screenY + TILE * 0.15, log2.len * TILE, TILE * 0.7, TILE * 0.15); ctx.fill();
        ctx.strokeStyle = '#78350f'; ctx.lineWidth = 1;
        for (var g = 0; g < log2.len; g++) { ctx.beginPath(); ctx.arc(log2.x + g * TILE + TILE / 2, screenY + TILE * 0.5, TILE * 0.12, 0, Math.PI * 2); ctx.stroke(); }
      }
    }

    if (row.coins) {
      ctx.font = (TILE * 0.5) + 'px sans-serif'; ctx.textAlign = 'center';
      for (var ci3 = 0; ci3 < row.coins.length; ci3++) ctx.fillText('🪙', row.coins[ci3] * TILE + TILE / 2, screenY + TILE * 0.55);
    }
  }

  // Draw trail particles
  for (var tpi = 0; tpi < trailParticles.length; tpi++) {
    var tp2 = trailParticles[tpi];
    var tsy = H - (tp2.row - cameraY) * TILE - TILE / 2;
    ctx.globalAlpha = tp2.life / tp2.maxLife;
    ctx.fillStyle = tp2.color;
    ctx.beginPath(); ctx.arc(tp2.x, tsy, tp2.size, 0, Math.PI * 2); ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Draw player
  var px, py;
  if (hopAnim.active) {
    var t2 = hopAnim.t;
    var eased = t2 < 0.5 ? 2 * t2 * t2 : -1 + (4 - 2 * t2) * t2;
    px = (hopAnim.fromX + (hopAnim.toX - hopAnim.fromX) * eased) * TILE;
    var fromSY = H - (hopAnim.fromY - cameraY) * TILE - TILE;
    var toSY = H - (hopAnim.toY - cameraY) * TILE - TILE;
    py = fromSY + (toSY - fromSY) * eased;
    py -= Math.sin(eased * Math.PI) * TILE * 0.4;
  } else {
    px = player.col * TILE;
    py = H - (player.row - cameraY) * TILE - TILE;
  }

  playerDrawX=px+TILE/2;playerDrawY=py+TILE/2;
  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.beginPath(); ctx.ellipse(px + TILE / 2, py + TILE * 0.9, TILE * 0.35, TILE * 0.1, 0, 0, Math.PI * 2); ctx.fill();

  // Neon glow
  if (bg.glow) {
    ctx.shadowColor = '#39ff14'; ctx.shadowBlur = 15;
  }

  // Character
  ctx.save();
  ctx.globalAlpha = 1;
  ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;
  ctx.globalCompositeOperation = 'source-over';
  var skin = getSkin();
  var charSize = Math.round(TILE * 1.0);
  var charX = Math.round(px + TILE / 2);
  var charY = Math.round(py + TILE * 0.5);
  ctx.font = charSize + 'px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillStyle = '#000';
  ctx.fillText(skin.emoji, charX, charY);
  ctx.restore();

  // Accessory
  var acc = getAcc();
  if (acc.emoji) {
    ctx.globalAlpha = 1;
    ctx.font = (TILE * 0.45) + 'px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(acc.emoji, px + TILE / 2, py + TILE * (acc.dy || -0.1));
  }

  ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;

  // Draw death particles (screen-space)
  for (var dpi = 0; dpi < particles.length; dpi++) {
    var dp = particles[dpi];
    ctx.globalAlpha = dp.life / dp.maxLife;
    ctx.fillStyle = dp.color;
    ctx.beginPath(); ctx.arc(dp.x, dp.y, dp.size, 0, Math.PI * 2); ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Night mode: dark overlay with flashlight circle around player
  if(nightMode&&gameRunning){
    var px=playerDrawX,py=playerDrawY;
    ctx.save();
    ctx.globalCompositeOperation='source-over';
    ctx.fillStyle='rgba(0,0,0,0.85)';
    ctx.beginPath();ctx.rect(0,0,W,H);
    ctx.arc(px,py,TILE*3.5,0,Math.PI*2,true);// cut out circle
    ctx.fill();
    // Soft glow edge
    var grd=ctx.createRadialGradient(px,py,TILE*2.5,px,py,TILE*4);
    grd.addColorStop(0,'rgba(0,0,0,0)');grd.addColorStop(1,'rgba(0,0,0,0.6)');
    ctx.fillStyle=grd;ctx.beginPath();ctx.arc(px,py,TILE*4,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }
  // Rush hour warning
  if(rushHour){ctx.fillStyle='rgba(239,68,68,0.15)';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#ef4444';ctx.font='bold 16px sans-serif';ctx.textAlign='center';ctx.fillText('⚠️ RUSH HOUR! ⚠️',W/2,TILE*1.5)}
}

var playerDrawX=0,playerDrawY=0; // set in draw for night mode

function loop() { update(); draw(); requestAnimationFrame(loop); }

// === INPUT ===
document.addEventListener('keydown', function(e) {
  if (!gameRunning) return;
  switch (e.key) {
    case 'ArrowUp': case 'w': case 'W': tryMove(0, 1); break;
    case 'ArrowDown': case 's': case 'S': tryMove(0, -1); break;
    case 'ArrowLeft': case 'a': case 'A': tryMove(-1, 0); break;
    case 'ArrowRight': case 'd': case 'D': tryMove(1, 0); break;
  }
});

var touchStartX, touchStartY;
canvas.addEventListener('touchstart', function(e) { var t = e.touches[0]; touchStartX = t.clientX; touchStartY = t.clientY; });
canvas.addEventListener('touchend', function(e) {
  if (!gameRunning) return;
  var t = e.changedTouches[0];
  var dx = t.clientX - touchStartX, dy = t.clientY - touchStartY;
  if (Math.abs(dx) < 10 && Math.abs(dy) < 10) tryMove(0, 1);
  else if (Math.abs(dx) > Math.abs(dy)) tryMove(dx > 0 ? 1 : -1, 0);
  else tryMove(0, dy < 0 ? 1 : -1);
});

document.querySelectorAll('.d-btn').forEach(function(btn) {

    e.preventDefault(); if (!gameRunning) return;
    switch (btn.dataset.dir) {
      case 'up': tryMove(0, 1); break; case 'down': tryMove(0, -1); break;
      case 'left': tryMove(-1, 0); break; case 'right': tryMove(1, 0); break;
    }
  });
});

// === AUDIO ===
var _crMusicVol=parseInt(localStorage.getItem('cr_musicVol')||'50')/100;
var _crSfxVol=parseInt(localStorage.getItem('cr_sfxVol')||'70')/100;
var crSfxGain=null,crMusicGainNode=null;
var audioCtx = null;
var musicNodes = [];
var musicOn = true;
var musicPlaying = false;

function getAudio() { if (!audioCtx) { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); crSfxGain=audioCtx.createGain();crSfxGain.gain.value=_crSfxVol;crSfxGain.connect(audioCtx.destination);crMusicGainNode=audioCtx.createGain();crMusicGainNode.gain.value=_crMusicVol;crMusicGainNode.connect(audioCtx.destination); } return audioCtx; }

function playHop() {
  try {
    var a = getAudio(), o = a.createOscillator(), g = a.createGain();
    o.type = 'sine'; o.frequency.value = 600;
    o.frequency.exponentialRampToValueAtTime(900, a.currentTime + 0.05);
    g.gain.value = 0.08; g.gain.exponentialRampToValueAtTime(0.001, a.currentTime + 0.1);
    o.connect(g); g.connect(crSfxGain||a.destination); o.start(); o.stop(a.currentTime + 0.1);
  } catch(e) {}
}

function playCoin() {
  try {
    var a = getAudio(), o = a.createOscillator(), g = a.createGain();
    o.type = 'sine'; o.frequency.value = 800;
    o.frequency.exponentialRampToValueAtTime(1200, a.currentTime + 0.1);
    g.gain.value = 0.12; g.gain.exponentialRampToValueAtTime(0.001, a.currentTime + 0.2);
    o.connect(g); g.connect(crSfxGain||a.destination); o.start(); o.stop(a.currentTime + 0.2);
  } catch(e) {}
}

function playCrash() {
  try {
    var a = getAudio(), buf = a.createBufferSource(), b = a.createBuffer(1, a.sampleRate * 0.3, a.sampleRate);
    var d = b.getChannelData(0);
    for (var i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / d.length);
    buf.buffer = b; var g = a.createGain(); g.gain.value = 0.15;
    buf.connect(g); g.connect(crSfxGain||a.destination); buf.start();
  } catch(e) {}
}

function startMusic() {
  if (!musicOn || musicPlaying) return;
  try {
    var a = getAudio();
    var bgId = activeBg;
    // Different music per world
    var notes, tempo, wave;
    if (bgId === 'space') { notes = [261,329,392,523,392,329,261,196]; tempo = 0.5; wave = 'sine'; }
    else if (bgId === 'volcano') { notes = [196,220,261,294,261,220,196,165]; tempo = 0.25; wave = 'sawtooth'; }
    else if (bgId === 'snow') { notes = [523,494,440,392,440,494,523,587]; tempo = 0.45; wave = 'sine'; }
    else if (bgId === 'candy') { notes = [523,587,659,698,784,698,659,587]; tempo = 0.3; wave = 'triangle'; }
    else if (bgId === 'neon') { notes = [330,349,392,440,494,440,392,349]; tempo = 0.2; wave = 'square'; }
    else if (bgId === 'night') { notes = [261,294,330,392,440,392,330,294]; tempo = 0.6; wave = 'sine'; }
    else if (bgId === 'desert') { notes = [261,293,329,349,392,349,329,293]; tempo = 0.35; wave = 'triangle'; }
    else { notes = [392,440,494,523,587,523,494,440]; tempo = 0.3; wave = 'triangle'; }

    var noteIdx = 0;
    function playNote() {
      if (!musicPlaying || !musicOn) return;
      var o = a.createOscillator(), g = a.createGain();
      o.type = wave; o.frequency.value = notes[noteIdx % notes.length];
      g.gain.value = 0.04;
      g.gain.exponentialRampToValueAtTime(0.001, a.currentTime + tempo * 0.9);
      o.connect(g); g.connect(crMusicGainNode||a.destination);
      o.start(); o.stop(a.currentTime + tempo * 0.9);
      musicNodes.push(o);
      noteIdx++;
      musicNodes._timeout = setTimeout(playNote, tempo * 1000);
    }
    musicPlaying = true;
    playNote();

    // Bass drone
    var bass = a.createOscillator(), bg2 = a.createGain();
    bass.type = 'sine'; bass.frequency.value = notes[0] / 2;
    bg2.gain.value = 0.025;
    bass.connect(bg2); bg2.connect(crMusicGainNode||a.destination); bass.start();
    musicNodes.push(bass); musicNodes._bass = bass; musicNodes._bassGain = bg2;
  } catch(e) {}
}

function stopMusic() {
  musicPlaying = false;
  if (musicNodes._timeout) clearTimeout(musicNodes._timeout);
  if (musicNodes._bass) try { musicNodes._bass.stop(); } catch(e) {}
  musicNodes.forEach(function(n) { try { n.stop(); } catch(e) {} });
  musicNodes = [];
}

document.getElementById('music-btn').addEventListener('click', function() {
  musicOn = !musicOn;
  this.textContent = musicOn ? '🔊' : '🔇';
  if (musicOn && gameRunning) startMusic();
  else stopMusic();
});

// === SHOP ===
var shopOpenedFromDeath = false;

function openShop() {
  document.getElementById('shop-screen').style.display = 'flex';
  updateCoinDisplays();
  renderGrid('skins'); renderGrid('bgs'); renderGrid('accs'); renderGrid('efx'); renderGrid('explo');
}

function renderGrid(tab) {
  var grid = document.getElementById('grid-' + tab);
  grid.innerHTML = '';
  var items, owned, active;
  if (tab === 'skins') { items = SKINS; owned = ownedSkins; active = activeSkin; }
  else if (tab === 'bgs') { items = BACKGROUNDS; owned = ownedBgs; active = activeBg; }
  else if (tab === 'accs') { items = ACCESSORIES; owned = ownedAccs; active = activeAcc; }
  else if (tab === 'efx') { items = EFFECTS; owned = ownedEfx; active = activeEfx; }
  else if (tab === 'explo') { items = EXPLOSIONS; owned = ownedExplo; active = activeExplo; }

  items.forEach(function(item) {
    var isOwned = owned.includes(item.id);
    var isActive = active === item.id;
    var canBuy = totalCoins >= item.cost;
    var card = document.createElement('div');
    card.className = 'shop-card' + (isActive ? ' selected' : '') + (!isOwned && !canBuy ? ' locked' : '');

    var em = document.createElement('div'); em.className = 'item-emoji';
    em.textContent = item.emoji || (item.colors ? '✨' : '🎨');
    card.appendChild(em);

    var nm = document.createElement('div'); nm.className = 'item-name'; nm.textContent = item.name;
    card.appendChild(nm);

    if (isActive) { var st = document.createElement('div'); st.className = 'item-owned'; st.textContent = '✅ Active'; card.appendChild(st); }
    else if (isOwned) { var st2 = document.createElement('div'); st2.className = 'item-owned'; st2.textContent = '✓ Owned'; card.appendChild(st2); }
    else { var ct = document.createElement('div'); ct.className = 'item-cost'; ct.textContent = '🪙 ' + item.cost; card.appendChild(ct); }

    card.addEventListener('click', function() {
      if (isOwned) {
        if (tab === 'skins') activeSkin = item.id;
        else if (tab === 'bgs') { activeBg = item.id; stopMusic(); startMusic(); }
        else if (tab === 'accs') activeAcc = item.id;
        else if (tab === 'efx') activeEfx = item.id;
        else if (tab === 'explo') activeExplo = item.id;
        saveShop(); renderGrid(tab);
      } else if (totalCoins >= item.cost) {
        totalCoins -= item.cost; owned.push(item.id);
        if (tab === 'skins') { activeSkin = item.id; ownedSkins = owned; }
        else if (tab === 'bgs') { activeBg = item.id; ownedBgs = owned; stopMusic(); startMusic(); }
        else if (tab === 'accs') { activeAcc = item.id; ownedAccs = owned; }
        else if (tab === 'efx') { activeEfx = item.id; ownedEfx = owned; }
        else if (tab === 'explo') { activeExplo = item.id; ownedExplo = owned; }
        saveShop(); updateCoinDisplays(); renderGrid(tab);
      }
    });
    grid.appendChild(card);
  });
}
