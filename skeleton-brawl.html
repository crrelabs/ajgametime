<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Skeleton Brawl — AJ GameTime</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Lilita+One&family=Nunito:wght@600;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;touch-action:none;font-family:'Nunito',sans-serif;user-select:none}
canvas{display:block}
#ui{position:absolute;top:0;left:0;width:100%;pointer-events:none;z-index:10}
#hud{display:flex;justify-content:space-between;align-items:flex-start;padding:12px 16px}
#hud .col{display:flex;flex-direction:column;gap:4px}
.bar-wrap{width:140px;height:16px;background:rgba(0,0,0,0.6);border-radius:8px;border:1px solid rgba(255,255,255,0.2);overflow:hidden}
.bar{height:100%;border-radius:8px;transition:width 0.3s}
.hp-bar{background:linear-gradient(90deg,#ef4444,#f97316)}
.enemy-bar{background:linear-gradient(90deg,#a855f7,#ec4899)}
.label{color:#fff;font-size:11px;font-weight:700;text-shadow:1px 1px 2px #000}
#score-display{color:#f59e0b;font-family:'Lilita One',cursive;font-size:18px;text-shadow:0 0 10px rgba(245,158,11,0.5)}
#wave-display{color:#22d3ee;font-size:13px;font-weight:700;text-shadow:1px 1px 2px #000}
#controls{position:absolute;bottom:0;left:0;width:100%;display:flex;justify-content:space-between;align-items:flex-end;padding:10px 12px;pointer-events:none;z-index:10}
.ctrl-group{display:flex;gap:8px;pointer-events:auto}
.btn{width:64px;height:64px;border-radius:50%;border:2px solid rgba(255,255,255,0.3);display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:800;color:#fff;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:transform 0.1s,box-shadow 0.1s}
.btn:active{transform:scale(0.9)}
.btn-left{background:rgba(59,130,246,0.5)}
.btn-right{background:rgba(59,130,246,0.5)}
.btn-punch{background:rgba(239,68,68,0.6);box-shadow:0 0 15px rgba(239,68,68,0.3)}
.btn-kick{background:rgba(249,115,22,0.6);box-shadow:0 0 15px rgba(249,115,22,0.3)}
.btn-block{background:rgba(34,197,94,0.5);width:56px;height:56px;font-size:18px}
#overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20;background:rgba(0,0,0,0.85)}
#overlay h1{font-family:'Lilita One',cursive;font-size:clamp(28px,6vw,52px);background:linear-gradient(135deg,#f59e0b,#ef4444);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px}
#overlay h2{color:#22d3ee;font-family:'Lilita One',cursive;font-size:clamp(16px,3vw,24px);margin-bottom:20px}
#overlay p{color:#94a3b8;font-size:14px;max-width:320px;text-align:center;line-height:1.5;margin-bottom:20px}
#play-btn{pointer-events:auto;padding:14px 40px;font-family:'Lilita One',cursive;font-size:22px;color:#fff;background:linear-gradient(135deg,#7c3aed,#ec4899);border:none;border-radius:12px;cursor:pointer;box-shadow:0 4px 20px rgba(124,58,237,0.4)}
#play-btn:hover{transform:scale(1.05)}
#lb-btn{pointer-events:auto;padding:10px 28px;font-family:'Lilita One',cursive;font-size:16px;color:#fff;background:linear-gradient(135deg,#f59e0b,#ef4444);border:none;border-radius:10px;cursor:pointer;margin-top:10px}
#back{position:absolute;top:12px;left:12px;color:#64748b;text-decoration:none;font-size:13px;font-weight:700;z-index:30}
#back:hover{color:#94a3b8}
#leaderboard{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:25;background:rgba(0,0,0,0.92)}
#leaderboard h2{font-family:'Lilita One',cursive;font-size:28px;color:#f59e0b;margin-bottom:12px}
#lb-list{width:min(340px,90vw);max-height:50vh;overflow-y:auto}
.lb-row{display:flex;justify-content:space-between;padding:8px 14px;border-bottom:1px solid rgba(255,255,255,0.08);color:#e2e8f0;font-size:14px;font-weight:600}
.lb-row:nth-child(1) .lb-rank{color:#fbbf24}.lb-row:nth-child(2) .lb-rank{color:#94a3b8}.lb-row:nth-child(3) .lb-rank{color:#b45309}
.lb-rank{width:30px;color:#64748b}.lb-name{flex:1;margin:0 8px}.lb-score{color:#22d3ee}.lb-wave{color:#a855f7;font-size:12px;margin-left:6px}
#lb-close{pointer-events:auto;margin-top:16px;padding:10px 30px;font-family:'Lilita One',cursive;font-size:16px;color:#fff;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:10px;cursor:pointer}
#name-modal{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:26;background:rgba(0,0,0,0.9)}
#name-modal h2{font-family:'Lilita One',cursive;font-size:24px;color:#f59e0b;margin-bottom:6px}
#name-modal p{color:#94a3b8;font-size:14px;margin-bottom:14px}
#name-input{width:220px;padding:10px 14px;font-size:18px;font-family:'Nunito',sans-serif;font-weight:700;border:2px solid #7c3aed;border-radius:10px;background:#1a1a2e;color:#fff;text-align:center;outline:none}
#name-submit{pointer-events:auto;margin-top:12px;padding:10px 30px;font-family:'Lilita One',cursive;font-size:18px;color:#fff;background:linear-gradient(135deg,#7c3aed,#ec4899);border:none;border-radius:10px;cursor:pointer}
#name-skip{pointer-events:auto;margin-top:8px;color:#64748b;background:none;border:none;font-size:13px;cursor:pointer;font-family:'Nunito',sans-serif}
#hit-flash{position:absolute;inset:0;background:rgba(239,68,68,0.15);pointer-events:none;z-index:5;opacity:0;transition:opacity 0.1s}
#ko-text{position:absolute;top:30%;left:50%;transform:translate(-50%,-50%);font-family:'Lilita One',cursive;font-size:64px;color:#f59e0b;text-shadow:0 0 30px rgba(245,158,11,0.6);z-index:15;display:none}
@media(min-width:600px){.btn{width:72px;height:72px;font-size:28px}.btn-block{width:62px;height:62px}}
</style>
</head>
<body>
<a id="back" href="index.html">← Back</a>

<canvas id="game"></canvas>

<div id="hit-flash"></div>
<div id="ko-text">K.O.!</div>

<div id="ui">
  <div id="hud">
    <div class="col">
      <span class="label">⚔️ You</span>
      <div class="bar-wrap"><div class="bar hp-bar" id="hp-bar" style="width:100%"></div></div>
    </div>
    <div class="col" style="align-items:center">
      <div id="score-display">Score: 0</div>
      <div id="wave-display">Wave 1</div>
    </div>
    <div class="col" style="align-items:flex-end">
      <span class="label">💀 Skeleton</span>
      <div class="bar-wrap"><div class="bar enemy-bar" id="enemy-bar" style="width:100%"></div></div>
    </div>
  </div>
</div>

<div id="controls">
  <div class="ctrl-group">
    <div class="btn btn-left" data-action="left">◀</div>
    <div class="btn btn-right" data-action="right">▶</div>
  </div>
  <div class="ctrl-group">
    <div class="btn btn-block" data-action="block">🛡</div>
    <div class="btn btn-kick" data-action="kick">🦵</div>
    <div class="btn btn-punch" data-action="punch">👊</div>
  </div>
</div>

<div id="overlay">
  <h1>☠️ Skeleton Brawl</h1>
  <h2>Ghost Pirate Ship</h2>
  <p>Fight waves of pirate skeletons on a haunted ghost ship! Punch and kick your way through the undead crew!</p>
  <button id="play-btn">⚔️ Fight!</button>
  <button id="lb-btn" onclick="showLeaderboard()">🏆 Leaderboard</button>
</div>

<div id="leaderboard">
  <h2>🏆 Leaderboard</h2>
  <div id="lb-list"></div>
  <button id="lb-close" onclick="document.getElementById('leaderboard').style.display='none'">Close</button>
</div>

<div id="name-modal">
  <h2>New High Score!</h2>
  <p id="name-score-text">Score: 0 · Wave 1</p>
  <input type="text" id="name-input" placeholder="Your name" maxlength="16" autocomplete="off">
  <button id="name-submit">Submit Score</button>
  <button id="name-skip">Skip</button>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const playBtn = document.getElementById('play-btn');
const hpBar = document.getElementById('hp-bar');
const enemyBar = document.getElementById('enemy-bar');
const scoreDisplay = document.getElementById('score-display');
const waveDisplay = document.getElementById('wave-display');
const hitFlash = document.getElementById('hit-flash');
const koText = document.getElementById('ko-text');

let W, H, ground;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  ground = H * 0.78;
}
resize();
window.addEventListener('resize', resize);

let playing = false, score = 0, wave = 1, combo = 0, shakeTimer = 0;
let particles = [], stars = [], shipLanterns = [], enemiesDefeated = 0;

for (let i = 0; i < 60; i++) {
  stars.push({ x: Math.random(), y: Math.random() * 0.4, s: 0.5 + Math.random() * 2, twinkle: Math.random() * Math.PI * 2 });
}
for (let i = 0; i < 5; i++) {
  shipLanterns.push({ x: 0.15 + i * 0.18, y: 0.3 + Math.random() * 0.1, flicker: Math.random() * Math.PI * 2 });
}

const player = {
  x: 0, w: 50, h: 90, hp: 100, maxHp: 100, speed: 4,
  attacking: false, attackType: '', attackTimer: 0,
  blocking: false, hurtTimer: 0, facing: 1, moving: 0, bobTimer: 0, alive: true
};

let enemy = null;
function spawnEnemy() {
  const side = Math.random() > 0.5 ? 1 : -1;
  enemy = {
    x: side > 0 ? W + 40 : -40, w: 48, h: 88,
    hp: 30 + wave * 15, maxHp: 30 + wave * 15,
    speed: 1.2 + wave * 0.2,
    attackTimer: 0, attackCooldown: 80 - Math.min(wave * 5, 40),
    attacking: false, hurtTimer: 0, facing: 0,
    bobTimer: Math.random() * 100, type: Math.floor(Math.random() * 3),
    alive: true, deathTimer: 0
  };
}

function resetGame() {
  score = 0; wave = 1; combo = 0; enemiesDefeated = 0;
  player.hp = player.maxHp = 100;
  player.x = W * 0.35;
  player.alive = true; player.attacking = false; player.blocking = false; player.hurtTimer = 0;
  particles = [];
  spawnEnemy();
  updateHUD();
}

const actions = { left: false, right: false, punch: false, kick: false, block: false };
let actionQueue = [];

document.addEventListener('keydown', e => {
  if (!playing) return;
  if (e.key === 'ArrowLeft' || e.key === 'a') actions.left = true;
  if (e.key === 'ArrowRight' || e.key === 'd') actions.right = true;
  if (e.key === 'z' || e.key === 'j') actionQueue.push('punch');
  if (e.key === 'x' || e.key === 'k') actionQueue.push('kick');
  if (e.key === 'c' || e.key === 'l') actions.block = true;
});
document.addEventListener('keyup', e => {
  if (e.key === 'ArrowLeft' || e.key === 'a') actions.left = false;
  if (e.key === 'ArrowRight' || e.key === 'd') actions.right = false;
  if (e.key === 'c' || e.key === 'l') actions.block = false;
});

document.querySelectorAll('.btn').forEach(btn => {
  const act = btn.dataset.action;
  const down = e => { e.preventDefault(); if (act === 'punch' || act === 'kick') actionQueue.push(act); else actions[act] = true; };
  const up = e => { e.preventDefault(); if (act !== 'punch' && act !== 'kick') actions[act] = false; };
  btn.addEventListener('touchstart', down, { passive: false });
  btn.addEventListener('touchend', up, { passive: false });
  btn.addEventListener('touchcancel', up, { passive: false });
  btn.addEventListener('mousedown', down);
  btn.addEventListener('mouseup', up);
});

function updateHUD() {
  hpBar.style.width = Math.max(0, player.hp / player.maxHp * 100) + '%';
  if (enemy) enemyBar.style.width = Math.max(0, enemy.hp / enemy.maxHp * 100) + '%';
  scoreDisplay.textContent = 'Score: ' + score;
  waveDisplay.textContent = 'Wave ' + wave;
}

function addParticles(x, y, color, count, speed) {
  for (let i = 0; i < count; i++) {
    particles.push({ x, y, vx: (Math.random() - 0.5) * speed, vy: -Math.random() * speed * 0.8 - 1,
      life: 30 + Math.random() * 20, maxLife: 50, color, size: 2 + Math.random() * 4 });
  }
}

function addBoneParticles(x, y) {
  const bones = ['💀', '🦴', '☠️'];
  for (let i = 0; i < 4; i++) {
    particles.push({ x, y: y - 20, vx: (Math.random() - 0.5) * 6, vy: -Math.random() * 8 - 2,
      life: 50, maxLife: 50, emoji: bones[Math.floor(Math.random() * bones.length)],
      size: 16 + Math.random() * 10, gravity: true });
  }
}

function drawShip(time) {
  const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
  skyGrad.addColorStop(0, '#050510'); skyGrad.addColorStop(0.4, '#0a0a20');
  skyGrad.addColorStop(0.7, '#0d1525'); skyGrad.addColorStop(1, '#0a1628');
  ctx.fillStyle = skyGrad; ctx.fillRect(0, 0, W, H);

  stars.forEach(s => {
    ctx.globalAlpha = (0.3 + 0.7 * Math.abs(Math.sin(time * 0.001 + s.twinkle))) * 0.8;
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(s.x * W, s.y * H, s.s, 0, Math.PI * 2); ctx.fill();
  });
  ctx.globalAlpha = 1;

  // Moon
  ctx.fillStyle = '#e2e8b0'; ctx.shadowColor = '#e2e8b0'; ctx.shadowBlur = 40;
  ctx.beginPath(); ctx.arc(W * 0.82, H * 0.12, 30, 0, Math.PI * 2); ctx.fill();
  ctx.shadowBlur = 0;
  ctx.fillStyle = 'rgba(0,0,0,0.1)';
  ctx.beginPath(); ctx.arc(W * 0.82 - 8, H * 0.12 - 5, 6, 0, Math.PI * 2); ctx.fill();

  // Ocean
  const seaGrad = ctx.createLinearGradient(0, ground, 0, H);
  seaGrad.addColorStop(0, '#0a1e3d'); seaGrad.addColorStop(1, '#050d1a');
  ctx.fillStyle = seaGrad; ctx.fillRect(0, ground + 15, W, H);

  ctx.strokeStyle = 'rgba(100,180,255,0.1)'; ctx.lineWidth = 2;
  for (let w = 0; w < 3; w++) {
    ctx.beginPath();
    for (let x = 0; x < W; x += 5) {
      const y = ground + 20 + w * 18 + Math.sin(x * 0.015 + time * 0.002 + w) * 4;
      x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.stroke();
  }

  // Hull
  ctx.fillStyle = '#1a0e08';
  ctx.beginPath();
  ctx.moveTo(W * 0.02, ground); ctx.lineTo(W * 0.98, ground);
  ctx.lineTo(W * 0.88, ground + 60); ctx.lineTo(W * 0.12, ground + 60);
  ctx.closePath(); ctx.fill();

  ctx.strokeStyle = 'rgba(80,50,20,0.3)'; ctx.lineWidth = 1;
  for (let i = 0; i < 4; i++) {
    ctx.beginPath(); ctx.moveTo(W * 0.05, ground + 10 + i * 12); ctx.lineTo(W * 0.95, ground + 10 + i * 12); ctx.stroke();
  }

  // Deck
  const deckGrad = ctx.createLinearGradient(0, ground - 8, 0, ground);
  deckGrad.addColorStop(0, '#2a1a0e'); deckGrad.addColorStop(1, '#1a0e08');
  ctx.fillStyle = deckGrad; ctx.fillRect(W * 0.02, ground - 8, W * 0.96, 8);

  ctx.strokeStyle = 'rgba(60,35,15,0.4)';
  for (let i = 0; i < 12; i++) {
    const px = W * 0.08 + i * (W * 0.84 / 12);
    ctx.beginPath(); ctx.moveTo(px, ground - 8); ctx.lineTo(px, ground); ctx.stroke();
  }

  // Railing
  ctx.strokeStyle = '#3d2815'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(W * 0.04, ground - 40); ctx.lineTo(W * 0.96, ground - 40); ctx.stroke();
  for (let i = 0; i < 8; i++) {
    const px = W * 0.06 + i * (W * 0.88 / 7);
    ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(px, ground - 8); ctx.lineTo(px, ground - 40); ctx.stroke();
  }

  // Mast
  ctx.fillStyle = '#2a1a0e'; ctx.fillRect(W * 0.48, ground - 250, 8, 250);
  ctx.fillStyle = '#1a0e08'; ctx.fillRect(W * 0.44, ground - 250, 30, 6);

  // Torn sails
  ctx.globalAlpha = 0.15; ctx.fillStyle = '#8b8070';
  ctx.beginPath();
  ctx.moveTo(W * 0.49, ground - 240);
  ctx.quadraticCurveTo(W * 0.58 + Math.sin(time * 0.001) * 5, ground - 180, W * 0.49, ground - 120);
  ctx.closePath(); ctx.fill();
  ctx.globalAlpha = 0.1;
  ctx.beginPath();
  ctx.moveTo(W * 0.49, ground - 200);
  ctx.quadraticCurveTo(W * 0.38 - Math.sin(time * 0.0012) * 4, ground - 150, W * 0.49, ground - 100);
  ctx.closePath(); ctx.fill();
  ctx.globalAlpha = 1;

  // Jolly roger
  const flagWave = Math.sin(time * 0.003) * 3;
  ctx.fillStyle = '#111';
  ctx.beginPath();
  ctx.moveTo(W * 0.49, ground - 250); ctx.lineTo(W * 0.49 + 35, ground - 245 + flagWave);
  ctx.lineTo(W * 0.49 + 35, ground - 225 + flagWave); ctx.lineTo(W * 0.49, ground - 230);
  ctx.closePath(); ctx.fill();
  ctx.font = '12px serif'; ctx.fillStyle = '#ddd';
  ctx.fillText('☠', W * 0.49 + 10, ground - 233 + flagWave);

  // Lanterns
  shipLanterns.forEach(l => {
    const lx = l.x * W, ly = l.y * H + ground * 0.15;
    const flicker = 0.5 + 0.5 * Math.sin(time * 0.005 + l.flicker);
    ctx.shadowColor = `rgba(255,160,50,${flicker * 0.6})`; ctx.shadowBlur = 15 + flicker * 10;
    ctx.fillStyle = `rgba(255,180,80,${0.6 + flicker * 0.4})`;
    ctx.beginPath(); ctx.arc(lx, ly, 3, 0, Math.PI * 2); ctx.fill();
    ctx.shadowBlur = 0;
  });

  // Ghost fog
  ctx.globalAlpha = 0.04 + 0.02 * Math.sin(time * 0.001);
  ctx.fillStyle = '#2dd4bf'; ctx.fillRect(0, ground - 30, W, 30);
  ctx.globalAlpha = 1;
}

function drawCharacter(x, y, char, time) {
  const bob = Math.sin(char.bobTimer * 0.08) * 3;
  const hurt = char.hurtTimer > 0;
  const isPlayer = char === player;
  const facing = char.facing || 1;

  ctx.save();
  ctx.translate(x, y + bob);
  if (hurt && Math.floor(char.hurtTimer / 3) % 2 === 0) ctx.globalAlpha = 0.5;

  if (isPlayer) {
    const legSpread = char.moving ? Math.sin(char.bobTimer * 0.15) * 8 : 0;
    const kicking = char.attacking && char.attackType === 'kick' && char.attackTimer > 5;
    const punching = char.attacking && char.attackType === 'punch' && char.attackTimer > 5;

    // Legs
    ctx.fillStyle = '#1e3a5f';
    if (kicking) {
      ctx.fillRect(-8, 30, 10, 35);
      ctx.save(); ctx.translate(6, 35); ctx.rotate(facing * 1.2);
      ctx.fillRect(0, 0, 10, 40); ctx.restore();
    } else {
      ctx.fillRect(-8 - legSpread, 30, 10, 38);
      ctx.fillRect(2 + legSpread, 30, 10, 38);
    }
    // Boots
    ctx.fillStyle = '#3d2815';
    if (kicking) { ctx.fillRect(-8, 63, 12, 7); }
    else { ctx.fillRect(-10 - legSpread, 64, 14, 7); ctx.fillRect(0 + legSpread, 64, 14, 7); }

    // Body
    ctx.fillStyle = '#7c2d12'; ctx.fillRect(-14, -5, 28, 38);
    // Belt
    ctx.fillStyle = '#92400e'; ctx.fillRect(-14, 25, 28, 5);
    ctx.fillStyle = '#fbbf24'; ctx.fillRect(-3, 25, 6, 5);

    // Arms
    ctx.fillStyle = '#7c2d12';
    if (punching) {
      ctx.fillRect(-20, 0, 8, 24);
      ctx.save(); ctx.translate(facing > 0 ? 14 : -22, 5);
      ctx.fillRect(0, 0, facing * 30, 10);
      ctx.fillStyle = '#d4a574'; ctx.fillRect(facing > 0 ? 26 : -8, -2, 10, 14);
      ctx.restore();
    } else if (char.blocking) {
      ctx.fillRect(-20, 0, 8, 20); ctx.fillRect(12, 0, 8, 20);
      ctx.fillStyle = '#d4a574'; ctx.fillRect(-6, -2, 12, 10);
    } else {
      ctx.fillRect(-20, 0, 8, 24); ctx.fillRect(12, 0, 8, 24);
      ctx.fillStyle = '#d4a574'; ctx.fillRect(-20, 20, 8, 8); ctx.fillRect(12, 20, 8, 8);
    }

    // Head
    ctx.fillStyle = '#d4a574'; ctx.fillRect(-10, -30, 20, 24);
    // Bandana
    ctx.fillStyle = '#dc2626'; ctx.fillRect(-12, -32, 24, 8); ctx.fillRect(-14, -28, 4, 12);
    // Eyes
    ctx.fillStyle = '#000';
    ctx.fillRect(facing > 0 ? 2 : -8, -24, 3, 4);
    ctx.fillRect(facing > 0 ? -6 : 0, -24, 3, 4);
    // Mouth
    ctx.fillRect(-4, -14, 8, 2);
  } else {
    // SKELETON
    const legSpread = Math.sin(char.bobTimer * 0.1) * 4;
    const attacking = char.attacking && char.attackTimer > 5;
    const skType = char.type || 0;

    // Legs
    ctx.fillStyle = '#d4c9a8';
    ctx.fillRect(-7 - legSpread, 32, 6, 36); ctx.fillRect(3 + legSpread, 32, 6, 36);
    ctx.fillStyle = '#c4b898';
    ctx.beginPath(); ctx.arc(-4 - legSpread, 50, 4, 0, Math.PI * 2); ctx.arc(6 + legSpread, 50, 4, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#d4c9a8';
    ctx.fillRect(-10 - legSpread, 65, 12, 5); ctx.fillRect(0 + legSpread, 65, 12, 5);

    // Ribcage
    ctx.fillStyle = '#d4c9a8';
    ctx.fillRect(-12, 0, 24, 5); ctx.fillRect(-11, 8, 22, 4);
    ctx.fillRect(-10, 15, 20, 4); ctx.fillRect(-9, 22, 18, 4);
    ctx.fillRect(-2, -2, 4, 35);

    // Arms
    ctx.fillStyle = '#d4c9a8';
    if (attacking) {
      ctx.fillRect(-18, 2, 6, 22);
      ctx.save(); ctx.translate(facing > 0 ? 12 : -18, 5);
      ctx.fillRect(0, 0, facing * 28, 6);
      if (skType === 0) {
        ctx.fillStyle = '#9ca3af'; ctx.fillRect(facing > 0 ? 24 : -10, -8, 4, 22);
        ctx.fillStyle = '#6b7280'; ctx.fillRect(facing > 0 ? 22 : -8, -10, 8, 4);
      }
      ctx.restore();
    } else {
      ctx.fillRect(-18, 2, 6, 24); ctx.fillRect(12, 2, 6, 24);
      if (skType === 0) { ctx.fillStyle = '#9ca3af'; ctx.fillRect(13, 22, 3, 20); }
    }

    // Skull
    ctx.fillStyle = '#e8e0d0';
    ctx.beginPath(); ctx.ellipse(0, -18, 13, 16, 0, 0, Math.PI * 2); ctx.fill();
    // Eye sockets
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.ellipse(-5, -20, 4, 5, 0, 0, Math.PI * 2); ctx.ellipse(5, -20, 4, 5, 0, 0, Math.PI * 2); ctx.fill();
    // Glowing eyes
    const gc = skType === 0 ? '#ef4444' : skType === 1 ? '#22d3ee' : '#a855f7';
    ctx.fillStyle = gc; ctx.shadowColor = gc; ctx.shadowBlur = 8;
    ctx.beginPath(); ctx.arc(-5, -20, 2, 0, Math.PI * 2); ctx.arc(5, -20, 2, 0, Math.PI * 2); ctx.fill();
    ctx.shadowBlur = 0;
    // Nose
    ctx.fillStyle = '#000'; ctx.beginPath(); ctx.moveTo(-1, -13); ctx.lineTo(1, -13); ctx.lineTo(0, -10); ctx.closePath(); ctx.fill();
    // Teeth
    ctx.fillStyle = '#d4c9a8';
    for (let t = -6; t < 7; t += 3) ctx.fillRect(t, -8, 2, 4);

    // Hat / eye patch
    if (skType === 0) {
      ctx.fillStyle = '#1a1a2e';
      ctx.beginPath(); ctx.ellipse(0, -32, 20, 6, 0, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.moveTo(-14, -32); ctx.quadraticCurveTo(0, -55, 14, -32); ctx.fill();
      ctx.fillStyle = '#d4d4d4'; ctx.font = '10px serif'; ctx.fillText('☠', -5, -38);
    } else if (skType === 1) {
      ctx.fillStyle = '#111'; ctx.fillRect(-8, -23, 10, 8);
      ctx.strokeStyle = '#111'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(-3, -23); ctx.lineTo(10, -32); ctx.stroke();
    }
  }

  ctx.restore();
  ctx.globalAlpha = 1;
}

function update() {
  if (!playing || !player.alive) return;
  player.bobTimer++;

  if (actionQueue.length > 0 && !player.attacking) {
    const act = actionQueue.shift();
    player.attacking = true; player.attackType = act; player.attackTimer = 15;
  }
  actionQueue = [];

  player.moving = 0;
  if (actions.left) { player.x -= player.speed; player.facing = -1; player.moving = 1; }
  if (actions.right) { player.x += player.speed; player.facing = 1; player.moving = 1; }
  player.x = Math.max(30, Math.min(W - 30, player.x));
  player.blocking = actions.block && !player.attacking;

  if (player.attacking) {
    player.attackTimer--;
    if (player.attackTimer <= 0) { player.attacking = false; player.attackType = ''; }
    if (player.attackTimer === 10 && enemy && enemy.alive) {
      const range = player.attackType === 'kick' ? 65 : 50;
      const dx = (enemy.x - player.x) * player.facing;
      if (dx > 0 && dx < range && Math.abs(enemy.x - player.x) < range) {
        const dmg = player.attackType === 'kick' ? 12 + wave : 8 + Math.floor(wave / 2);
        enemy.hp -= dmg + combo * 2;
        enemy.hurtTimer = 12; combo++; shakeTimer = 6;
        addParticles(enemy.x, ground - 40, '#fbbf24', 6, 4);
        if (enemy.hp <= 0) {
          enemy.alive = false; enemy.deathTimer = 40;
          score += 100 * wave + combo * 10;
          addBoneParticles(enemy.x, ground);
          addParticles(enemy.x, ground - 30, '#a855f7', 12, 6);
          koText.style.display = 'block';
          setTimeout(() => koText.style.display = 'none', 800);
          enemiesDefeated++;
          if (enemiesDefeated % 3 === 0) { wave++; player.hp = Math.min(player.maxHp, player.hp + 20); }
          setTimeout(spawnEnemy, 1500);
        }
      } else { combo = 0; }
    }
  }
  if (player.hurtTimer > 0) player.hurtTimer--;

  if (enemy && enemy.alive) {
    enemy.bobTimer++;
    const dist = Math.abs(enemy.x - player.x);
    enemy.facing = enemy.x > player.x ? -1 : 1;
    if (dist > 55) enemy.x += enemy.speed * enemy.facing;
    enemy.attackTimer++;
    if (enemy.attackTimer >= enemy.attackCooldown && dist < 60) {
      enemy.attacking = true; enemy.attackTimer = 0;
      setTimeout(() => {
        if (!enemy || !enemy.alive) return;
        enemy.attacking = false;
        if (Math.abs(enemy.x - player.x) < 60) {
          if (player.blocking) {
            addParticles(player.x, ground - 30, '#22c55e', 4, 3); shakeTimer = 3;
          } else {
            player.hp -= 8 + wave * 2; player.hurtTimer = 12; combo = 0; shakeTimer = 5;
            hitFlash.style.opacity = '1'; setTimeout(() => hitFlash.style.opacity = '0', 100);
            addParticles(player.x, ground - 40, '#ef4444', 5, 3);
            if (player.hp <= 0) { player.hp = 0; player.alive = false; gameOver(); }
          }
        }
      }, 300);
    }
    if (enemy.hurtTimer > 0) enemy.hurtTimer--;
  }
  if (enemy && !enemy.alive) enemy.deathTimer--;

  particles = particles.filter(p => {
    p.x += p.vx; p.y += p.vy;
    if (p.gravity) p.vy += 0.3; else p.vy += 0.05;
    p.life--; return p.life > 0;
  });
  if (shakeTimer > 0) shakeTimer--;
  updateHUD();
}

function draw(time) {
  ctx.save();
  if (shakeTimer > 0) ctx.translate((Math.random() - 0.5) * shakeTimer * 2, (Math.random() - 0.5) * shakeTimer * 2);
  drawShip(time);

  if (enemy && (enemy.alive || enemy.deathTimer > 0)) {
    ctx.globalAlpha = enemy.alive ? 1 : enemy.deathTimer / 40;
    drawCharacter(enemy.x, ground - 70, enemy, time);
    ctx.globalAlpha = 1;
  }
  if (player.alive) drawCharacter(player.x, ground - 70, player, time);

  particles.forEach(p => {
    ctx.globalAlpha = p.life / p.maxLife;
    if (p.emoji) { ctx.font = p.size + 'px serif'; ctx.fillText(p.emoji, p.x, p.y); }
    else { ctx.fillStyle = p.color; ctx.fillRect(p.x, p.y, p.size, p.size); }
  });
  ctx.globalAlpha = 1;

  if (combo > 1) {
    ctx.font = 'bold 20px Nunito'; ctx.fillStyle = '#fbbf24';
    ctx.shadowColor = '#f59e0b'; ctx.shadowBlur = 10; ctx.textAlign = 'center';
    ctx.fillText(combo + 'x Combo!', player.x, ground - 110);
    ctx.shadowBlur = 0; ctx.textAlign = 'start';
  }
  ctx.restore();
}

function gameOver() {
  playing = false;
  setTimeout(() => {
    overlay.querySelector('h1').textContent = '☠️ Defeated!';
    overlay.querySelector('h2').textContent = 'Score: ' + score + ' · Wave ' + wave;
    overlay.querySelector('p').textContent = 'The skeleton pirates got you! Try again?';
    playBtn.textContent = '⚔️ Try Again';
    overlay.style.display = 'flex';
  }, 1000);
}

});

  try {

      headers: { 'apikey': SUPA_KEY, 'Authorization': 'Bearer ' + SUPA_KEY }
