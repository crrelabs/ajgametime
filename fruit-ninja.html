.stat { text-align: center; }

#scoreVal { color: #fbbf24; }

canvas { display: block; cursor: crosshair; touch-action: none; }

#startScreen h1 { font-size: 2.5rem; margin-bottom: 0.5rem; }

button.play-btn { margin-top: 1rem; padding: 0.8rem 2rem; font-size: 1rem; font-weight: 700; background: linear-gradient(135deg, #ef4444, #f97316); color: white; border: none; border-radius: 12px; cursor: pointer; transition: 0.2s; }
button.play-btn:hover { transform: scale(1.05); }
.menu-btn{padding:8px 20px;font-size:14px;font-weight:700;color:#fff;border:none;border-radius:8px;cursor:pointer;margin-top:8px}

.lb-rank{width:30px;color:#64748b}.lb-name{flex:1;margin:0 8px}.lb-score{color:#22d3ee}
#lb-close-btn{margin-top:16px;padding:10px 30px;font-size:16px;font-weight:700;color:#fff;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:10px;cursor:pointer}

#death-screen{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:90;background:rgba(10,10,18,0.97)}

<body>

<div id="header">
  <a href="index.html">← AJ GameTime</a>
  <div id="hud">
    <div class="stat"><div class="stat-val" id="scoreVal">0</div><div class="stat-label">Score</div></div>

<div id="startScreen">

  <h1>Fruit Ninja</h1>
  <p>Swipe to slice fruit! Avoid the bombs 💣. Get combos for bonus points. 3 strikes and you're out!</p>
  <p id="start-coins" style="color:#fbbf24;font-weight:700">🪙 0</p>

  <button class="menu-btn" id="lb-show-btn" style="background:linear-gradient(135deg,#f59e0b,#ef4444)">🏆 Leaderboard</button>

<canvas id="game"></canvas>
<button id="musicBtn">🔊</button>

<div id="lb-overlay"><h2>🏆 Leaderboard</h2><div id="lb-list"></div><button id="lb-close-btn">Close</button></div>

<div id="death-screen">

    <button id="death-lb">🏆 Leaderboard</button>
    <button id="death-retry">🔪 Try Again</button>
    <button id="death-shop" style="background:linear-gradient(135deg,#a855f7,#ec4899)">🛍️ Shop</button>
  </div>
</div>

<div id="shop-screen">

  <div id="shop-coins-display">🪙 0</div>
  <div class="shop-tabs">
    <button class="shop-tab active" data-tab="blades">🔪 Blades</button>
    <button class="shop-tab" data-tab="dojos">🏯 Dojos</button>
    <button class="shop-tab" data-tab="accs">🎩 Accessories</button>

function saveShop() {
  localStorage.setItem('fn_coins', totalCoins);

function getDojo() { return DOJOS.find(function(d){return d.id===activeDojo;}) || DOJOS[0]; }
function getAcc() { return ACCESSORIES.find(function(a){return a.id===activeAcc;}) || ACCESSORIES[0]; }
function getTrail() { return TRAILS.find(function(t){return t.id===activeTrail;}) || TRAILS[0]; }
function getExplo() { return EXPLOSIONS.find(function(e){return e.id===activeExplo;}) || EXPLOSIONS[0]; }

function updateCoinDisplays() {
  document.getElementById('start-coins').textContent = '🪙 ' + totalCoins;

  document.getElementById('death-coins').textContent = '🪙 ' + totalCoins;

}

// === AUDIO ===
var AudioCtx = window.AudioContext || window.webkitAudioContext;
var audioCtx = null;
var musicPlaying = false;
var musicGain = null;
var musicInterval = null;
var droneOsc = null;
var droneOsc2 = null;

function initAudio() { if (audioCtx) return; audioCtx = new AudioCtx(); musicGain = audioCtx.createGain(); musicGain.gain.value = 0.35; musicGain.connect(audioCtx.destination); }

function playNote(freq, dur, type, vol) {
  if (!audioCtx) return;
  type = type || 'sine'; vol = vol || 0.1;
  var osc = audioCtx.createOscillator(), g = audioCtx.createGain();
  osc.type = type; osc.frequency.value = freq;
  g.gain.setValueAtTime(vol, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  osc.connect(g); g.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + dur);
}

  'neon': { notes:[[330,0.2],[392,0.2],[440,0.3],[523,0.2],[587,0.3],[523,0.2],[440,0.3],[392,0.2],[330,0.4],[0,0.2]], drone:165, wave:'square' },
};

function startMusic() {
  if (musicPlaying) return;
  initAudio();
  musicPlaying = true;
  var m = MELODIES[activeDojo] || MELODIES['default'];

  droneOsc = audioCtx.createOscillator();
  var dg = audioCtx.createGain();
  droneOsc.type = 'sine'; droneOsc.frequency.value = m.drone;
  dg.gain.value = 0.08; droneOsc.connect(dg); dg.connect(musicGain); droneOsc.start();

  droneOsc2 = audioCtx.createOscillator();
  var dg2 = audioCtx.createGain();
  droneOsc2.type = 'sine'; droneOsc2.frequency.value = m.drone * 1.5;
  dg2.gain.value = 0.04; droneOsc2.connect(dg2); dg2.connect(musicGain); droneOsc2.start();

  var noteIdx = 0;
  function playNext() {
    if (!musicPlaying) return;
    var n = m.notes[noteIdx % m.notes.length];
    if (n[0] > 0) {
      var o = audioCtx.createOscillator(), o2 = audioCtx.createOscillator(), g = audioCtx.createGain();
      o.type = m.wave; o.frequency.value = n[0];
      o2.type = 'sine'; o2.frequency.value = n[0] * 2;
      g.gain.setValueAtTime(0.12, audioCtx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + n[1] * 0.85);
      o.connect(g); o2.connect(g); g.connect(musicGain); o.start(); o2.start();
      o.stop(audioCtx.currentTime + n[1]); o2.stop(audioCtx.currentTime + n[1]);
    }
    noteIdx++;
    musicInterval = setTimeout(playNext, n[1] * 1000);
  }
  playNext();
  document.getElementById('musicBtn').textContent = '🔊';
}

function stopMusic() {
  musicPlaying = false;
  if (musicInterval) clearTimeout(musicInterval);
  try { if (droneOsc) droneOsc.stop(); } catch(e) {}
  try { if (droneOsc2) droneOsc2.stop(); } catch(e) {}
  droneOsc = null; droneOsc2 = null;
  document.getElementById('musicBtn').textContent = '🔇';
}

document.getElementById('musicBtn').addEventListener('click', function() { if (musicPlaying) stopMusic(); else startMusic(); });

var canvas = document.getElementById('game');
var ctx = canvas.getContext('2d');
var W, H;
function resize() { W = window.innerWidth; H = window.innerHeight; canvas.width = W; canvas.height = H; }
resize(); window.addEventListener('resize', resize);

var FRUITS = [
  { emoji:'🍉', points:1, size:1.0, color:'#22c55e' },
  { emoji:'🍊', points:1, size:0.85, color:'#f97316' },
  { emoji:'🍎', points:1, size:0.85, color:'#ef4444' },
  { emoji:'🍋', points:1, size:0.8, color:'#fbbf24' },

  { emoji:'🍍', points:2, size:1.0, color:'#fbbf24' },
  { emoji:'🥝', points:2, size:0.75, color:'#65a30d' },
  { emoji:'🫐', points:3, size:0.7, color:'#6366f1' },
];

var fruits, sliceTrail, particles, textPops, score, sessionCoins, combo, bestCombo, strikes, gameRunning;
var spawnTimer, spawnRate, difficulty;
var trailParticles = [];
var highScore = parseInt(localStorage.getItem('fn_high') || '0');

function init() {
  fruits = []; sliceTrail = []; particles = []; textPops = []; trailParticles = [];
  score = 0; sessionCoins = 0; combo = 0; bestCombo = 0; strikes = 0;
  gameRunning = true; spawnTimer = 0; spawnRate = 60; difficulty = 0;
  updateHUD();
}

function updateHUD() {
  document.getElementById('scoreVal').textContent = score;
  document.getElementById('comboVal').textContent = combo > 1 ? combo + 'x' : '';
  document.getElementById('livesVal').textContent = '❌'.repeat(strikes) + '⬜'.repeat(Math.max(0, 3 - strikes));
}

function spawnFruit() {
  var isBomb = Math.random() < 0.1 + difficulty * 0.05;
  var fruitDef = isBomb ? null : FRUITS[Math.floor(Math.random() * FRUITS.length)];
  var baseSize = 50 + (fruitDef ? fruitDef.size * 20 : 0);
  fruits.push({
    x: 80 + Math.random() * (W - 160), y: H + 30,
    vx: (Math.random() - 0.5) * 4, vy: -(12 + Math.random() * 6 + difficulty * 2),
    gravity: 0.25, radius: baseSize / 2,
    emoji: isBomb ? '💣' : fruitDef.emoji,
    points: isBomb ? -1 : fruitDef.points,
    color: isBomb ? '#1f2937' : fruitDef.color,
    isBomb: isBomb, sliced: false,
    rotation: Math.random() * Math.PI * 2,
    rotSpeed: (Math.random() - 0.5) * 0.1,
    missed: false,
    coinValue: isBomb ? 0 : (fruitDef.points >= 2 ? 2 : 1),
  });
}

function update() {
  // Always update particles (for death explosions)
  for (var pi = particles.length - 1; pi >= 0; pi--) {
    var p = particles[pi]; p.x += p.vx; p.y += p.vy; p.vy += 0.15; p.life--;
    if (p.life <= 0) particles.splice(pi, 1);
  }
  for (var tri = trailParticles.length - 1; tri >= 0; tri--) {
    var tp = trailParticles[tri]; tp.x += tp.vx; tp.y += tp.vy; tp.life--;
    if (tp.life <= 0) trailParticles.splice(tri, 1);
  }
  for (var ti = textPops.length - 1; ti >= 0; ti--) {
    textPops[ti].y -= 1.5; textPops[ti].life--;
    if (textPops[ti].life <= 0) textPops.splice(ti, 1);
  }
  if (!gameRunning) return;
  difficulty = Math.min(score / 50, 1.5);
  spawnTimer--;
  if (spawnTimer <= 0) {
    var count = 1 + Math.floor(Math.random() * (2 + difficulty));
    for (var i = 0; i < count; i++) (function(i2){ setTimeout(function(){ spawnFruit(); }, i2 * 100); })(i);
    spawnRate = Math.max(25, 60 - difficulty * 15);
    spawnTimer = spawnRate + Math.floor(Math.random() * 20);
  }

  for (var fi = fruits.length - 1; fi >= 0; fi--) {
    var f = fruits[fi];
    f.x += f.vx; f.vy += f.gravity; f.y += f.vy; f.rotation += f.rotSpeed;
    if (f.y > H + 60 && !f.sliced) {
      if (!f.isBomb && !f.missed) {
        f.missed = true; strikes++; playMissSound(); updateHUD();
        if (strikes >= 3) { spawnDeathParticles(W/2, H/2); gameRunning = false; setTimeout(gameOver, 1000); return; }
      }
      fruits.splice(fi, 1);
    }
    if (f.sliced && f.y > H + 100) fruits.splice(fi, 1);
  }

  // Particles updated at top of update()
  for (var si = sliceTrail.length - 1; si >= 0; si--) {
    sliceTrail[si].life--;
    if (sliceTrail[si].life <= 0) sliceTrail.splice(si, 1);
  }
}

function draw() {
  var dojo = getDojo();
  ctx.fillStyle = dojo.bg1; ctx.fillRect(0, 0, W, H);

  // Dojo effects
  if (dojo.stars) {
    ctx.fillStyle = '#fff';
    for (var si = 0; si < 60; si++) {
      var sx = (si * 137.5 + Date.now() * 0.002) % W;
      var sy = (si * 97.3) % H;
      ctx.globalAlpha = 0.3 + 0.5 * Math.sin(Date.now() * 0.003 + si);
      ctx.fillRect(sx, sy, 2, 2);
    }
    ctx.globalAlpha = 1;
  }
  if (dojo.snowfall) {
    ctx.fillStyle = '#fff';
    for (var sfi = 0; sfi < 40; sfi++) {
      ctx.globalAlpha = 0.4;
      ctx.beginPath(); ctx.arc((sfi*83.7+Date.now()*0.02)%W, (sfi*51.3+Date.now()*0.03)%H, 2, 0, Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha = 1;
  }
  if (dojo.petals) {
    for (var pi = 0; pi < 20; pi++) {
      ctx.globalAlpha = 0.4;
      ctx.fillStyle = ['#fda4af','#fb7185','#f9a8d4'][pi%3];
      ctx.beginPath(); ctx.arc((pi*107.3+Date.now()*0.015)%W, (pi*71.3+Date.now()*0.025)%H, 3+Math.sin(Date.now()*0.003+pi)*2, 0, Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha = 1;
  }
  if (dojo.lava) {
    for (var lvi = 0; lvi < 12; lvi++) {
      ctx.fillStyle = 'rgba(255,69,0,0.3)';
      ctx.beginPath(); ctx.arc((lvi*113.7+Date.now()*0.01)%W, H-20+Math.sin(Date.now()*0.005+lvi)*10, 5, 0, Math.PI*2); ctx.fill();
    }
  }
  if (dojo.bubbles) {
    ctx.fillStyle = 'rgba(100,200,255,0.2)';
    for (var bi = 0; bi < 15; bi++) {
      ctx.beginPath(); ctx.arc((bi*89.3)%W, (H-(bi*67.3+Date.now()*0.02)%H), 4+Math.sin(Date.now()*0.004+bi)*2, 0, Math.PI*2); ctx.fill();
    }
  }
  if (dojo.bamboo) {
    ctx.fillStyle = 'rgba(34,100,34,0.15)';
    for (var bai = 0; bai < 8; bai++) { ctx.fillRect(bai*(W/8)+10, 0, 6, H); }
  }
  if (dojo.neon) {
    ctx.strokeStyle = 'rgba(57,255,20,0.1)'; ctx.lineWidth = 1;
    for (var ni = 0; ni < 10; ni++) { ctx.beginPath(); ctx.moveTo(0, ni*H/10); ctx.lineTo(W, ni*H/10); ctx.stroke(); }
  }

  // Bottom board
  var grad = ctx.createLinearGradient(0, H-80, 0, H);
  grad.addColorStop(0, 'transparent'); grad.addColorStop(1, dojo.bg2);
  ctx.fillStyle = grad; ctx.fillRect(0, H-80, W, 80);

  // Slice trail
  var blade = getBlade();
  if (sliceTrail.length > 1) {
    ctx.lineWidth = blade.width;
    ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    if (blade.color === 'rainbow') {
      var rc = ['#ef4444','#f97316','#fbbf24','#22c55e','#3b82f6','#8b5cf6'];
      ctx.strokeStyle = rc[Math.floor(Date.now()/100) % rc.length];
    } else {
      ctx.strokeStyle = blade.color;
    }
    ctx.shadowColor = blade.color === 'rainbow' ? '#fff' : blade.color;
    ctx.shadowBlur = 12;
    ctx.beginPath(); ctx.moveTo(sliceTrail[0].x, sliceTrail[0].y);
    for (var sti = 1; sti < sliceTrail.length; sti++) {
      ctx.globalAlpha = sliceTrail[sti].life / 15;
      ctx.lineTo(sliceTrail[sti].x, sliceTrail[sti].y);
    }
    ctx.stroke(); ctx.globalAlpha = 1; ctx.shadowBlur = 0;
  }

  // Trail particles
  for (var tpi = 0; tpi < trailParticles.length; tpi++) {
    var tp = trailParticles[tpi];
    ctx.globalAlpha = tp.life / tp.maxLife;
    ctx.fillStyle = tp.color;
    ctx.beginPath(); ctx.arc(tp.x, tp.y, tp.size, 0, Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Accessory (drawn in corner)
  var acc = getAcc();
  if (acc.emoji) {
    ctx.font = '30px sans-serif'; ctx.textAlign = 'left';
    ctx.fillText(acc.emoji, 10, H - 20);
  }

  // Fruits
  for (var fdi = 0; fdi < fruits.length; fdi++) {
    var f = fruits[fdi];
    ctx.save(); ctx.translate(f.x, f.y); ctx.rotate(f.rotation);
    if (f.sliced) ctx.globalAlpha = 0.5;
    ctx.font = (f.radius*2)+'px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(f.emoji, 0, 0); ctx.restore();
  }

  // Particles
  for (var pdi = 0; pdi < particles.length; pdi++) {
    var pd = particles[pdi];
    ctx.globalAlpha = pd.life / 30;
    ctx.fillStyle = pd.color;
    ctx.beginPath(); ctx.arc(pd.x, pd.y, pd.size, 0, Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Text pops
  for (var tdi = 0; tdi < textPops.length; tdi++) {
    var td = textPops[tdi];
    ctx.globalAlpha = td.life / 40;
    ctx.fillStyle = td.color;
    ctx.font = 'bold '+td.size+'px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(td.text, td.x, td.y);
  }
  ctx.globalAlpha = 1;
}

function spawnDeathParticles(x, y) {
  var ex = getExplo().id;
  var count = ex === 'nuke' ? 40 : 20;
  for (var i = 0; i < count; i++) {
    var ang = (i/count)*Math.PI*2, spd = 2+Math.random()*6;
    var p = { x:x, y:y, life:25+Math.random()*20, size:3+Math.random()*4 };
    if (ex==='fireworks'){p.vx=Math.cos(ang)*spd*1.5;p.vy=Math.sin(ang)*spd*1.5;p.color=['#ff0000','#ffd700','#00ff00','#00bfff','#ff00ff'][i%5];}
    else if(ex==='confetti'){p.vx=(Math.random()-0.5)*8;p.vy=-2-Math.random()*4;p.color=['#ff0000','#ff9800','#ffeb3b','#4caf50','#2196f3'][i%5];}
    else if(ex==='hearts'){p.vx=(Math.random()-0.5)*6;p.vy=-1-Math.random()*5;p.color=['#ff69b4','#ff1493','#e91e63'][i%3];}
    else if(ex==='skull'){p.vx=Math.cos(ang)*spd;p.vy=Math.sin(ang)*spd;p.color=['#1a1a1a','#4a4a4a','#fff'][i%3];}
    else if(ex==='nuke'){p.vx=(i<20?Math.cos(ang)*8:(Math.random()-0.5)*12);p.vy=(i<20?Math.sin(ang)*8:(Math.random()-0.5)*12);p.color=['#ff4500','#ff8c00','#ffd700'][i%3];}
    else if(ex==='glitch'){p.vx=(Math.random()-0.5)*10;p.vy=(Math.random()-0.5)*10;p.color=['#00ff00','#ff00ff','#00ffff'][i%3];p.size=5;}
    else if(ex==='petals'){p.vx=(Math.random()-0.5)*4;p.vy=-1+Math.random()*2;p.color=['#fda4af','#fb7185','#f9a8d4'][i%3];p.life=40;}
    else if(ex==='ice'){p.vx=Math.cos(ang)*spd*1.2;p.vy=Math.sin(ang)*spd*1.2;p.color=['#e0f7fa','#b2ebf2','#fff'][i%3];}
    else if(ex==='lava'){p.vx=(Math.random()-0.5)*6;p.vy=-3-Math.random()*5;p.color=['#ff4500','#ff6600','#ffd600'][i%3];}
    else if(ex==='portal'){p.vx=Math.cos(ang+i*0.3)*(2+i*0.2);p.vy=Math.sin(ang+i*0.3)*(2+i*0.2);p.color=['#7c4dff','#e040fb','#536dfe'][i%3];}
    else if(ex==='pixel'){p.vx=Math.cos(ang)*spd;p.vy=Math.sin(ang)*spd;p.color=['#4caf50','#8bc34a','#ff9800'][i%3];p.size=5;}
    else{p.vx=(Math.random()-0.5)*8;p.vy=(Math.random()-0.5)*8;p.color=['#fbbf24','#ef4444','#22c55e'][i%3];}
    particles.push(p);
  }
}

function sliceFruit(f) {
  if (f.sliced) return;
  f.sliced = true;
  if (f.isBomb) {
    playBombSound();
    spawnDeathParticles(f.x, f.y);
    textPops.push({x:f.x, y:f.y, text:'💥 BOOM!', color:'#ef4444', size:40, life:50});
    gameRunning = false; setTimeout(gameOver, 1000); return;
  }
  playSliceSound();

  // Juice particles
  for (var i = 0; i < 8; i++) {
    particles.push({ x:f.x, y:f.y, vx:(Math.random()-0.5)*8, vy:(Math.random()-0.5)*8-2, life:30, color:f.color, size:2+Math.random()*4 });
  }

  // Trail effect particles
  var trail = getTrail();
  if (trail.colors) {
    for (var ti = 0; ti < 5; ti++) {
      trailParticles.push({ x:f.x, y:f.y, vx:(Math.random()-0.5)*3, vy:(Math.random()-0.5)*3, life:20+Math.random()*10, maxLife:30, color:trail.colors[Math.floor(Math.random()*trail.colors.length)], size:2+Math.random()*3 });
    }
  }

  combo++;
  if (combo > bestCombo) bestCombo = combo;
  var points = f.points * (combo > 1 ? combo : 1);
  score += points;

  // Coins from slicing
  totalCoins += f.coinValue;
  sessionCoins += f.coinValue;
  saveShop(); updateCoinDisplays();

  if (score > highScore) { highScore = score; localStorage.setItem('fn_high', highScore.toString()); document.getElementById('bestVal').textContent = highScore; }

  var popText = '+' + points, popColor = '#fbbf24', popSize = 24;
  if (combo >= 3) { popText = combo + 'x COMBO! +' + points; popColor = '#f97316'; popSize = 30; playComboSound(combo); }
  if (combo >= 5) { popText = '🔥 ' + combo + 'x! +' + points; popColor = '#ef4444'; popSize = 36; }
  textPops.push({x:f.x, y:f.y-30, text:popText, color:popColor, size:popSize, life:40});
  updateHUD();
}

var comboResetTimer = null;
function resetComboTimer() {
  if (comboResetTimer) clearTimeout(comboResetTimer);
  comboResetTimer = setTimeout(function() { combo = 0; updateHUD(); }, 800);
}

function gameOver() {
  gameRunning = false;
  canvas.style.pointerEvents = 'none';
  stopMusic();
  document.getElementById('death-score').textContent = score;
  document.getElementById('death-best-combo').textContent = 'Best Combo: ' + bestCombo + 'x';
  updateCoinDisplays();
  document.getElementById('death-name').value = localStorage.getItem('ajgt_name') || '';
  document.getElementById('death-screen').style.display = 'flex';
}

var isSlicing = false, lastSliceX = 0, lastSliceY = 0;
function startSlice(x, y) { isSlicing = true; lastSliceX = x; lastSliceY = y; sliceTrail = [{x:x,y:y,life:15}]; }
function moveSlice(x, y) {
  if (!isSlicing || !gameRunning) return;
  sliceTrail.push({x:x,y:y,life:15});
  if (sliceTrail.length > 20) sliceTrail.shift();
  var dx = x-lastSliceX, dy = y-lastSliceY, speed = Math.sqrt(dx*dx+dy*dy);
  if (speed > 5) {
    for (var i = 0; i < fruits.length; i++) {
      var f = fruits[i];
      if (f.sliced) continue;
      if (Math.sqrt((f.x-x)*(f.x-x)+(f.y-y)*(f.y-y)) < f.radius+15) { sliceFruit(f); resetComboTimer(); }
    }
  }
  lastSliceX = x; lastSliceY = y;
}
function endSlice() { isSlicing = false; }

canvas.addEventListener('mousedown', function(e) { startSlice(e.clientX, e.clientY); });
canvas.addEventListener('mousemove', function(e) { moveSlice(e.clientX, e.clientY); });
canvas.addEventListener('mouseup', endSlice);
canvas.addEventListener('mouseleave', endSlice);
canvas.addEventListener('touchstart', function(e) { e.preventDefault(); startSlice(e.touches[0].clientX, e.touches[0].clientY); });
canvas.addEventListener('touchmove', function(e) { e.preventDefault(); moveSlice(e.touches[0].clientX, e.touches[0].clientY); });
canvas.addEventListener('touchend', function(e) { e.preventDefault(); endSlice(); });

function loop() { update(); draw(); requestAnimationFrame(loop); }

  document.getElementById('shop-screen').style.display = 'flex';
  updateCoinDisplays();
  renderGrid('blades'); renderGrid('dojos'); renderGrid('accs'); renderGrid('trails'); renderGrid('explo');
}

function renderGrid(tab) {
  var grid = document.getElementById('grid-' + tab);
  grid.innerHTML = '';
  var items, owned, active;
  if (tab==='blades'){items=BLADES;owned=ownedBlades;active=activeBlade;}
  else if(tab==='dojos'){items=DOJOS;owned=ownedDojos;active=activeDojo;}
  else if(tab==='accs'){items=ACCESSORIES;owned=ownedAccs;active=activeAcc;}
  else if(tab==='trails'){items=TRAILS;owned=ownedTrails;active=activeTrail;}
  else if(tab==='explo'){items=EXPLOSIONS;owned=ownedExplo;active=activeExplo;}

  items.forEach(function(item) {
    var isOwned = owned.includes(item.id);
    var isActive = active === item.id;
    var canBuy = totalCoins >= item.cost;
    var card = document.createElement('div');
    card.className = 'shop-card' + (isActive ? ' selected' : '') + (!isOwned && !canBuy ? ' locked' : '');
    var em = document.createElement('div'); em.className = 'item-emoji';
    em.textContent = item.emoji || (item.colors ? '✨' : '🎨');
    card.appendChild(em);
    var nm = document.createElement('div'); nm.className = 'item-name'; nm.textContent = item.name;
    card.appendChild(nm);
    if (isActive) { var st = document.createElement('div'); st.className = 'item-owned'; st.textContent = '✅ Active'; card.appendChild(st); }
    else if (isOwned) { var st2 = document.createElement('div'); st2.className = 'item-owned'; st2.textContent = '✓ Owned'; card.appendChild(st2); }
    else { var ct = document.createElement('div'); ct.className = 'item-cost'; ct.textContent = '🪙 ' + item.cost; card.appendChild(ct); }

    card.addEventListener('click', function() {
      if (isOwned) {
        if(tab==='blades')activeBlade=item.id;
        else if(tab==='dojos'){activeDojo=item.id;stopMusic();startMusic();}
        else if(tab==='accs')activeAcc=item.id;
        else if(tab==='trails')activeTrail=item.id;
        else if(tab==='explo')activeExplo=item.id;
        saveShop(); renderGrid(tab);
      } else if (totalCoins >= item.cost) {
        totalCoins -= item.cost; owned.push(item.id);
        if(tab==='blades'){activeBlade=item.id;ownedBlades=owned;}
        else if(tab==='dojos'){activeDojo=item.id;ownedDojos=owned;stopMusic();startMusic();}
        else if(tab==='accs'){activeAcc=item.id;ownedAccs=owned;}
        else if(tab==='trails'){activeTrail=item.id;ownedTrails=owned;}
        else if(tab==='explo'){activeExplo=item.id;ownedExplo=owned;}
        saveShop(); updateCoinDisplays(); renderGrid(tab);
      }
    });
    grid.appendChild(card);
  });
}

document.querySelectorAll('.shop-tab').forEach(function(tab) {
  tab.addEventListener('click', function() {
    document.querySelectorAll('.shop-tab').forEach(function(t){t.classList.remove('active');});
    tab.classList.add('active');
    var which = tab.dataset.tab;
    ['blades','dojos','accs','trails','explo'].forEach(function(id){
      document.getElementById('grid-'+id).style.display = id===which ? '' : 'none';
    });
  });
});

document.getElementById('shop-close').addEventListener('click', function() {
  document.getElementById('shop-screen').style.display = 'none';
  if (shopOpenedFromDeath) document.getElementById('death-screen').style.display = 'flex';
});
document.getElementById('shop-show-btn').addEventListener('click', function() { shopOpenedFromDeath = false; openShop(); });
document.getElementById('death-shop').addEventListener('click', function() {
  shopOpenedFromDeath = true;
  document.getElementById('death-screen').style.display = 'none';
  openShop();
});
</script>
</body>
</html>
