<script>
// === AUDIO ENGINE (Web Audio API) ===
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
let musicPlaying = false;
let musicGain = null;
let musicInterval = null;

function initAudio() {
  if (audioCtx) return;
  audioCtx = new AudioCtx();
  musicGain = audioCtx.createGain();
  musicGain.gain.value = 0.35;
  musicGain.connect(audioCtx.destination);
}

function playNote(freq, dur, type='sine', vol=0.1) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  g.gain.setValueAtTime(vol, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  osc.connect(g);
  g.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + dur);
}

function playSliceSound() {
  playNote(800 + Math.random() * 400, 0.1, 'sawtooth', 0.08);
  playNote(1200 + Math.random() * 300, 0.05, 'sine', 0.05);
}

function playBombSound() {
  playNote(100, 0.4, 'sawtooth', 0.2);
  playNote(60, 0.6, 'square', 0.15);
}

function playComboSound(combo) {
  const base = 400 + combo * 80;
  for (let i = 0; i < Math.min(combo, 5); i++) {
    setTimeout(() => playNote(base + i * 100, 0.15, 'sine', 0.08), i * 60);
  }
}

function playMissSound() {
  playNote(200, 0.3, 'square', 0.1);
  playNote(150, 0.4, 'sawtooth', 0.08);
}

// Background music - Japanese pentatonic dojo style
// Notes: C D E G A (pentatonic) in different octaves for that zen feel
const MELODY = [
  // Phrase 1 - slow contemplative
  [262, 0.5], [294, 0.3], [330, 0.6], [0, 0.2],
  [392, 0.4], [330, 0.3], [294, 0.7], [0, 0.3],
  [440, 0.5], [392, 0.3], [330, 0.4], [294, 0.6], [0, 0.2],
  [262, 0.8], [0, 0.4],
  // Phrase 2 - rising tension
  [392, 0.3], [440, 0.3], [523, 0.5], [440, 0.3],
  [392, 0.6], [0, 0.2], [330, 0.3], [392, 0.4], [440, 0.7],
  [0, 0.3],
  // Phrase 3 - descending resolve
  [523, 0.4], [440, 0.3], [392, 0.5], [0, 0.15],
  [330, 0.3], [294, 0.4], [262, 0.8], [0, 0.4],
  // Phrase 4 - low drone section
  [196, 0.6], [220, 0.4], [262, 0.5], [220, 0.3],
  [196, 0.8], [0, 0.5],
  [262, 0.3], [330, 0.3], [392, 0.6], [330, 0.4],
  [262, 0.7], [0, 0.4],
];

let droneOsc = null;
let droneGain = null;

function startMusic() {
  if (musicPlaying) return;
  initAudio();
  musicPlaying = true;
  
  // Low drone for atmosphere
  droneOsc = audioCtx.createOscillator();
  droneGain = audioCtx.createGain();
  droneOsc.type = 'sine';
  droneOsc.frequency.value = 131; // Low C
  droneGain.gain.value = 0.08;
  droneOsc.connect(droneGain);
  droneGain.connect(musicGain);
  droneOsc.start();
  
  // Second drone a fifth up
  const drone2 = audioCtx.createOscillator();
  const drone2g = audioCtx.createGain();
  drone2.type = 'sine';
  drone2.frequency.value = 196; // G
  drone2g.gain.value = 0.04;
  drone2.connect(drone2g);
  drone2g.connect(musicGain);
  drone2.start();
  
  let noteIdx = 0;
  function playNext() {
    if (!musicPlaying) return;
    const [freq, dur] = MELODY[noteIdx % MELODY.length];
    if (freq > 0) {
      // Koto-like pluck sound
      const osc = audioCtx.createOscillator();
      const osc2 = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      osc.type = 'triangle';
      osc.frequency.value = freq;
      osc2.type = 'sine';
      osc2.frequency.value = freq * 2; // Octave harmonic
      g.gain.setValueAtTime(0.12, audioCtx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur * 0.85);
      osc.connect(g);
      osc2.connect(g);
      g.connect(musicGain);
      osc.start();
      osc2.start();
      osc.stop(audioCtx.currentTime + dur);
      osc2.stop(audioCtx.currentTime + dur);
    }
    noteIdx++;
    musicInterval = setTimeout(playNext, dur * 1000);
  }
  playNext();
  document.getElementById('musicBtn').textContent = '🔊';
}

function stopMusic() {
  musicPlaying = false;
  if (musicInterval) clearTimeout(musicInterval);
  try { if (droneOsc) droneOsc.stop(); } catch(e) {}
  droneOsc = null;
  document.getElementById('musicBtn').textContent = '🔇';
}

document.getElementById('musicBtn').addEventListener('click', () => {
  if (musicPlaying) stopMusic();
  else startMusic();
});

// === GAME ===
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

let W, H;
function resize() {
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W;
  canvas.height = H;
}
resize();
window.addEventListener('resize', resize);

const FRUITS = [
  { emoji: '🍉', points: 1, size: 1.0, color: '#22c55e' },
  { emoji: '🍊', points: 1, size: 0.85, color: '#f97316' },
  { emoji: '🍎', points: 1, size: 0.85, color: '#ef4444' },
  { emoji: '🍋', points: 1, size: 0.8, color: '#fbbf24' },
  { emoji: '🍇', points: 2, size: 0.9, color: '#7c3aed' },
  { emoji: '🍑', points: 1, size: 0.85, color: '#fb923c' },
  { emoji: '🍌', points: 1, size: 0.9, color: '#fbbf24' },
  { emoji: '🍍', points: 2, size: 1.0, color: '#fbbf24' },
  { emoji: '🥝', points: 2, size: 0.75, color: '#65a30d' },
  { emoji: '🫐', points: 3, size: 0.7, color: '#6366f1' },
];

let fruits, sliceTrail, particles, textPops, score, combo, bestCombo, strikes, gameRunning;
let spawnTimer, spawnRate, difficulty;
let highScore = parseInt(localStorage.getItem('fn_high') || '0');
document.getElementById('bestVal').textContent = highScore;

function init() {
  fruits = [];
  sliceTrail = [];
  particles = [];
  textPops = [];
  score = 0;
  combo = 0;
  bestCombo = 0;
  strikes = 0;
  gameRunning = true;
  spawnTimer = 0;
  spawnRate = 60;
  difficulty = 0;
  updateHUD();
}

function updateHUD() {
  document.getElementById('scoreVal').textContent = score;
  document.getElementById('comboVal').textContent = combo > 1 ? combo + 'x' : '';
  const xs = '❌'.repeat(strikes) + '⬜'.repeat(Math.max(0, 3 - strikes));
  document.getElementById('livesVal').textContent = xs;
}

function spawnFruit() {
  const isBomb = Math.random() < 0.1 + difficulty * 0.05;
  const fruitDef = isBomb ? null : FRUITS[Math.floor(Math.random() * FRUITS.length)];
  const baseSize = 50 + (fruitDef ? fruitDef.size * 20 : 0);
  
  const x = 80 + Math.random() * (W - 160);
  const vx = (Math.random() - 0.5) * 4;
  const vy = -(12 + Math.random() * 6 + difficulty * 2);
  
  fruits.push({
    x, y: H + 30,
    vx, vy,
    gravity: 0.25,
    radius: baseSize / 2,
    emoji: isBomb ? '💣' : fruitDef.emoji,
    points: isBomb ? -1 : fruitDef.points,
    color: isBomb ? '#1f2937' : fruitDef.color,
    isBomb,
    sliced: false,
    rotation: Math.random() * Math.PI * 2,
    rotSpeed: (Math.random() - 0.5) * 0.1,
    missed: false,
  });
}

function update() {
  if (!gameRunning) return;
  
  difficulty = Math.min(score / 50, 1.5);
  
  // Spawn
  spawnTimer--;
  if (spawnTimer <= 0) {
    const count = 1 + Math.floor(Math.random() * (2 + difficulty));
    for (let i = 0; i < count; i++) {
      setTimeout(() => spawnFruit(), i * 100);
    }
    spawnRate = Math.max(25, 60 - difficulty * 15);
    spawnTimer = spawnRate + Math.floor(Math.random() * 20);
  }
  
  // Combo timer — reset if no slice in a while
  
  // Update fruits
  for (let i = fruits.length - 1; i >= 0; i--) {
    const f = fruits[i];
    f.x += f.vx;
    f.vy += f.gravity;
    f.y += f.vy;
    f.rotation += f.rotSpeed;
    
    // Off screen bottom — missed
    if (f.y > H + 60 && !f.sliced) {
      if (!f.isBomb && !f.missed) {
        f.missed = true;
        strikes++;
        playMissSound();
        updateHUD();
        if (strikes >= 3) {
          gameOver();
          return;
        }
      }
      fruits.splice(i, 1);
    }
    
    // Remove sliced fruits that fell
    if (f.sliced && f.y > H + 100) {
      fruits.splice(i, 1);
    }
  }
  
  // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.15;
    p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }
  
  // Text pops
  for (let i = textPops.length - 1; i >= 0; i--) {
    const t = textPops[i];
    t.y -= 1.5;
    t.life--;
    if (t.life <= 0) textPops.splice(i, 1);
  }
  
  // Slice trail fade
  for (let i = sliceTrail.length - 1; i >= 0; i--) {
    sliceTrail[i].life--;
    if (sliceTrail[i].life <= 0) sliceTrail.splice(i, 1);
  }
}

function draw() {
  // Background - dark with subtle gradient
  ctx.fillStyle = '#0a0a12';
  ctx.fillRect(0, 0, W, H);
  
  // Wooden board texture at bottom
  const grad = ctx.createLinearGradient(0, H - 80, 0, H);
  grad.addColorStop(0, 'transparent');
  grad.addColorStop(1, 'rgba(92,64,32,0.3)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, H - 80, W, 80);
  
  // Slice trail
  if (sliceTrail.length > 1) {
    ctx.strokeStyle = 'rgba(255,255,255,0.6)';
    ctx.lineWidth = 3;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.shadowColor = '#fff';
    ctx.shadowBlur = 10;
    ctx.beginPath();
    ctx.moveTo(sliceTrail[0].x, sliceTrail[0].y);
    for (let i = 1; i < sliceTrail.length; i++) {
      const alpha = sliceTrail[i].life / 15;
      ctx.globalAlpha = alpha;
      ctx.lineTo(sliceTrail[i].x, sliceTrail[i].y);
    }
    ctx.stroke();
    ctx.globalAlpha = 1;
    ctx.shadowBlur = 0;
  }
  
  // Fruits
  for (const f of fruits) {
    ctx.save();
    ctx.translate(f.x, f.y);
    ctx.rotate(f.rotation);
    
    if (f.sliced) {
      ctx.globalAlpha = 0.5;
    }
    
    const fontSize = f.radius * 2;
    ctx.font = `${fontSize}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(f.emoji, 0, 0);
    
    ctx.restore();
  }
  
  // Particles
  for (const p of particles) {
    ctx.globalAlpha = p.life / 30;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  
  // Text pops
  for (const t of textPops) {
    ctx.globalAlpha = t.life / 40;
    ctx.fillStyle = t.color;
    ctx.font = `bold ${t.size}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText(t.text, t.x, t.y);
  }
  ctx.globalAlpha = 1;
}

function sliceFruit(f) {
  if (f.sliced) return;
  f.sliced = true;
  
  if (f.isBomb) {
    // Bomb! Game over
    playBombSound();
    // Explosion particles
    for (let i = 0; i < 20; i++) {
      particles.push({
        x: f.x, y: f.y,
        vx: (Math.random() - 0.5) * 12,
        vy: (Math.random() - 0.5) * 12,
        life: 40,
        color: Math.random() < 0.5 ? '#ef4444' : '#fbbf24',
        size: 3 + Math.random() * 5,
      });
    }
    textPops.push({ x: f.x, y: f.y, text: '💥 BOOM!', color: '#ef4444', size: 40, life: 50 });
    gameOver();
    return;
  }
  
  playSliceSound();
  
  // Juice particles
  for (let i = 0; i < 8; i++) {
    particles.push({
      x: f.x, y: f.y,
      vx: (Math.random() - 0.5) * 8,
      vy: (Math.random() - 0.5) * 8 - 2,
      life: 30,
      color: f.color,
      size: 2 + Math.random() * 4,
    });
  }
  
  // Score
  combo++;
  if (combo > bestCombo) bestCombo = combo;
  const points = f.points * (combo > 1 ? combo : 1);
  score += points;
  
  if (score > highScore) {
    highScore = score;
    localStorage.setItem('fn_high', highScore.toString());
    document.getElementById('bestVal').textContent = highScore;
  }
  
  // Text pop
  let popText = '+' + points;
  let popColor = '#fbbf24';
  let popSize = 24;
  if (combo >= 3) {
    popText = combo + 'x COMBO! +' + points;
    popColor = '#f97316';
    popSize = 30;
    playComboSound(combo);
  }
  if (combo >= 5) {
    popText = '🔥 ' + combo + 'x! +' + points;
    popColor = '#ef4444';
    popSize = 36;
  }
  textPops.push({ x: f.x, y: f.y - 30, text: popText, color: popColor, size: popSize, life: 40 });
  
  updateHUD();
}

// Combo reset timer
let comboResetTimer = null;
function resetComboTimer() {
  if (comboResetTimer) clearTimeout(comboResetTimer);
  comboResetTimer = setTimeout(() => {
    combo = 0;
    updateHUD();
  }, 800);
}

function gameOver() {
  gameRunning = false;
  canvas.style.pointerEvents = 'none';
  stopMusic();
  document.getElementById('death-score').textContent = score;
  document.getElementById('death-best-combo').textContent = 'Best Combo: ' + bestCombo + 'x';
  document.getElementById('death-name').value = localStorage.getItem('ajgt_name') || '';
  document.getElementById('death-screen').style.display = 'flex';
}

// === SWIPE / SLICE INPUT ===
let isSlicing = false;
let lastSliceX = 0, lastSliceY = 0;

function startSlice(x, y) {
  isSlicing = true;
  lastSliceX = x;
  lastSliceY = y;
  sliceTrail = [];
  sliceTrail.push({ x, y, life: 15 });
}

function moveSlice(x, y) {
  if (!isSlicing || !gameRunning) return;
  
  sliceTrail.push({ x, y, life: 15 });
  if (sliceTrail.length > 20) sliceTrail.shift();
  
  // Check fruit hits
  const dx = x - lastSliceX;
  const dy = y - lastSliceY;
  const speed = Math.sqrt(dx * dx + dy * dy);
  
  if (speed > 5) { // Must be a swipe, not a tap
    for (const f of fruits) {
      if (f.sliced) continue;
      const dist = Math.sqrt((f.x - x) ** 2 + (f.y - y) ** 2);
      if (dist < f.radius + 15) {
        sliceFruit(f);
        resetComboTimer();
      }
    }
  }
  
  lastSliceX = x;
  lastSliceY = y;
}

function endSlice() {
  isSlicing = false;
}

// Mouse
canvas.addEventListener('mousedown', e => startSlice(e.clientX, e.clientY));
canvas.addEventListener('mousemove', e => moveSlice(e.clientX, e.clientY));
canvas.addEventListener('mouseup', endSlice);
canvas.addEventListener('mouseleave', endSlice);

// Touch
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.touches[0];
  startSlice(t.clientX, t.clientY);
});
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const t = e.touches[0];
  moveSlice(t.clientX, t.clientY);
});
canvas.addEventListener('touchend', e => {
  e.preventDefault();
  endSlice();
});

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

// Start
document.getElementById('startBtn').addEventListener('click', () => {
  document.getElementById('startScreen').classList.add('hidden');
  initAudio();
  startMusic();
  init();
  loop();
});
