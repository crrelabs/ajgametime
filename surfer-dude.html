<script>
// === CANVAS SETUP ===
var canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d');
var W,H;
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight}
window.addEventListener('resize',resize);resize();

// === AUDIO ===
var audioCtx,musicGain,sfxGain,musicNode;
function initAudio(){
  if(audioCtx)return;
  audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  musicGain=audioCtx.createGain();sfxGain=audioCtx.createGain();
  musicGain.connect(audioCtx.destination);sfxGain.connect(audioCtx.destination);
  musicGain.gain.value=parseFloat(localStorage.getItem('sd_musicVol')||'0.5');
  sfxGain.gain.value=parseFloat(localStorage.getItem('sd_sfxVol')||'0.7');
  document.getElementById('musicVol').value=Math.round(musicGain.gain.value*100);
  document.getElementById('musicVolVal').textContent=Math.round(musicGain.gain.value*100);
  document.getElementById('sfxVol').value=Math.round(sfxGain.gain.value*100);
  document.getElementById('sfxVolVal').textContent=Math.round(sfxGain.gain.value*100);
}
function setMusicVol(v){if(!audioCtx)initAudio();musicGain.gain.value=v/100;localStorage.setItem('sd_musicVol',v/100);document.getElementById('musicVolVal').textContent=v}
function setSfxVol(v){if(!audioCtx)initAudio();sfxGain.gain.value=v/100;localStorage.setItem('sd_sfxVol',v/100);document.getElementById('sfxVolVal').textContent=v}
var musicOn=true;
function toggleMusic(){musicOn=!musicOn;document.getElementById('musicBtn').textContent=musicOn?'🔊':'🔇';if(musicOn)startMusic();else stopMusic()}
function toggleSettings(){var o=document.getElementById('settingsOverlay');o.style.display=o.style.display==='flex'?'none':'flex'}

function playNote(freq,dur,type,vol){
  if(!audioCtx)return;var o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.type=type||'sine';o.frequency.value=freq;g.gain.value=(vol||0.1);
  o.connect(g);g.connect(sfxGain);o.start();g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);o.stop(audioCtx.currentTime+dur);
}
function sfxCoin(){playNote(880,0.1,'sine',0.15);setTimeout(function(){playNote(1100,0.15,'sine',0.12)},60)}
function sfxTrick(){playNote(600,0.08,'square',0.1);playNote(800,0.08,'square',0.08);setTimeout(function(){playNote(1000,0.12,'square',0.1)},80)}
function sfxCrash(){playNote(100,0.3,'sawtooth',0.2);playNote(80,0.4,'square',0.15)}
function sfxCombo(){playNote(440,0.1,'sine',0.12);setTimeout(function(){playNote(660,0.1,'sine',0.12)},50);setTimeout(function(){playNote(880,0.15,'sine',0.15)},100)}

var musicPlaying=false;
function startMusic(){
  if(!audioCtx||!musicOn||musicPlaying)return;musicPlaying=true;
  function playLoop(){
    if(!musicPlaying||!musicOn)return;
    var notes=[261,329,392,523,392,329,261,196];
    var t=audioCtx.currentTime;
    for(var i=0;i<notes.length;i++){
      var o=audioCtx.createOscillator(),g=audioCtx.createGain();
      o.type='triangle';o.frequency.value=notes[i];g.gain.value=0.06;
      o.connect(g);g.connect(musicGain);o.start(t+i*0.4);
      g.gain.exponentialRampToValueAtTime(0.001,t+i*0.4+0.35);o.stop(t+i*0.4+0.38);
    }
    // Bass
    var bassNotes=[130,130,164,196];
    for(var j=0;j<bassNotes.length;j++){
      var ob=audioCtx.createOscillator(),gb=audioCtx.createGain();
      ob.type='sine';ob.frequency.value=bassNotes[j];gb.gain.value=0.08;
      ob.connect(gb);gb.connect(musicGain);ob.start(t+j*0.8);
      gb.gain.exponentialRampToValueAtTime(0.001,t+j*0.8+0.7);ob.stop(t+j*0.8+0.75);
    }
    musicNode=setTimeout(playLoop,notes.length*400);
  }
  playLoop();
}
function stopMusic(){musicPlaying=false;if(musicNode)clearTimeout(musicNode)}

// === LEADERBOARD ===

function submitScore(){
  var name=document.getElementById('death-name').value.trim()||'Anonymous';
  localStorage.setItem('ajgt_name',name);
  fetch(_LB_URL,{method:'POST',headers:{'Content-Type':'application/json','apikey':_LB_KEY,'Authorization':'Bearer '+_LB_KEY,'Prefer':'return=minimal'},
    body:JSON.stringify({player_name:name,score:score,game:_LB_GAME})}).then(function(){showLeaderboard()}).catch(function(){});

function showLeaderboard(){
  fetch(_LB_URL+'?game=eq.'+_LB_GAME+'&order=score.desc&limit=20',{headers:{'apikey':_LB_KEY,'Authorization':'Bearer '+_LB_KEY}})
  .then(function(r){return r.json()}).then(function(data){
    var list=document.getElementById('lb-list');list.innerHTML='';

      var row=document.createElement('div');row.className='lb-row';
      row.innerHTML='<span class="lb-rank">#'+(i+1)+'</span><span class="lb-name">'+d.player_name+'</span><span class="lb-score">'+d.score+'</span>';
      list.appendChild(row);

}

];

var totalCoins=parseInt(localStorage.getItem('sd_coins')||'0');
var ownedBoards=JSON.parse(localStorage.getItem('sd_boards')||'["classic"]');
var ownedSuits=JSON.parse(localStorage.getItem('sd_suits')||'["blue"]');
var ownedTrails=JSON.parse(localStorage.getItem('sd_trails')||'["none"]');
var ownedWaves=JSON.parse(localStorage.getItem('sd_waves')||'["ocean"]');
var ownedExplo=JSON.parse(localStorage.getItem('sd_explo')||'["splash"]');
var activeBoard=localStorage.getItem('sd_active_board')||'classic';
var activeSuit=localStorage.getItem('sd_active_suit')||'blue';
var activeTrail=localStorage.getItem('sd_active_trail')||'none';
var activeWave=localStorage.getItem('sd_active_wave')||'ocean';
var activeExplo=localStorage.getItem('sd_active_explo')||'splash';

function saveShop(){
  localStorage.setItem('sd_coins',totalCoins);
  localStorage.setItem('sd_boards',JSON.stringify(ownedBoards));
  localStorage.setItem('sd_suits',JSON.stringify(ownedSuits));
  localStorage.setItem('sd_trails',JSON.stringify(ownedTrails));
  localStorage.setItem('sd_waves',JSON.stringify(ownedWaves));
  localStorage.setItem('sd_explo',JSON.stringify(ownedExplo));
  localStorage.setItem('sd_active_board',activeBoard);
  localStorage.setItem('sd_active_suit',activeSuit);
  localStorage.setItem('sd_active_trail',activeTrail);
  localStorage.setItem('sd_active_wave',activeWave);
  localStorage.setItem('sd_active_explo',activeExplo);
}
function updateCoinDisplays(){document.getElementById('coinsVal').textContent=totalCoins;document.getElementById('shop-coins').textContent='🪙 '+totalCoins}

function getBoard(){return BOARDS.find(function(b){return b.id===activeBoard})||BOARDS[0]}
function getSuit(){return WETSUITS.find(function(s){return s.id===activeSuit})||WETSUITS[0]}
function getTrail(){return TRAILS.find(function(t){return t.id===activeTrail})||TRAILS[0]}
function getWave(){return WAVES.find(function(w){return w.id===activeWave})||WAVES[0]}
function getExplo(){return EXPLOSIONS.find(function(e){return e.id===activeExplo})||EXPLOSIONS[0]}

var currentShopTab='boards';
function openShop(){document.getElementById('shop-screen').style.display='flex';shopTab('boards');updateCoinDisplays()}
function closeShop(){document.getElementById('shop-screen').style.display='none'}
function shopTab(tab){
  currentShopTab=tab;
  document.querySelectorAll('.shop-tab').forEach(function(t){t.classList.remove('active')});
  document.querySelectorAll('.shop-tab').forEach(function(t){if(t.textContent.toLowerCase().includes(tab.slice(0,4)))t.classList.add('active')});
  renderShop();
}
function renderShop(){
  var grid=document.getElementById('shop-grid');grid.innerHTML='';
  var items,owned,active;
  if(currentShopTab==='boards'){items=BOARDS;owned=ownedBoards;active=activeBoard}
  else if(currentShopTab==='wetsuits'){items=WETSUITS;owned=ownedSuits;active=activeSuit}
  else if(currentShopTab==='trails'){items=TRAILS;owned=ownedTrails;active=activeTrail}
  else if(currentShopTab==='waves'){items=WAVES;owned=ownedWaves;active=activeWave}
  else{items=EXPLOSIONS;owned=ownedExplo;active=activeExplo}
  items.forEach(function(item){
    var own=owned.includes(item.id),sel=active===item.id,canBuy=totalCoins>=item.cost;
    var card=document.createElement('div');card.className='skin-card'+(sel?' selected':'')+(!own&&!canBuy?' locked':'');
    var em=document.createElement('div');em.style.fontSize='28px';em.textContent=item.emoji;card.appendChild(em);
    var nm=document.createElement('div');nm.className='skin-name';nm.textContent=item.name;card.appendChild(nm);
    if(sel){var t=document.createElement('div');t.className='skin-owned';t.textContent='✅ Active';card.appendChild(t)}
    else if(own){var t=document.createElement('div');t.className='skin-owned';t.textContent='✓ Owned';card.appendChild(t)}
    else{var t=document.createElement('div');t.className='skin-cost';t.textContent='🪙 '+item.cost;card.appendChild(t)}
    card.addEventListener('click',function(){
      if(own){
        if(currentShopTab==='boards')activeBoard=item.id;
        else if(currentShopTab==='wetsuits')activeSuit=item.id;
        else if(currentShopTab==='trails')activeTrail=item.id;
        else if(currentShopTab==='waves')activeWave=item.id;
        else activeExplo=item.id;
        saveShop();renderShop();
      }else if(canBuy&&totalCoins>=item.cost){
        totalCoins-=item.cost;owned.push(item.id);
        if(currentShopTab==='boards'){activeBoard=item.id;ownedBoards=owned}
        else if(currentShopTab==='wetsuits'){activeSuit=item.id;ownedSuits=owned}
        else if(currentShopTab==='trails'){activeTrail=item.id;ownedTrails=owned}
        else if(currentShopTab==='waves'){activeWave=item.id;ownedWaves=owned}
        else{activeExplo=item.id;ownedExplo=owned}
        saveShop();updateCoinDisplays();renderShop();
      }
    });
    grid.appendChild(card);
  });
}

// === GAME STATE ===
var score,sessionCoins,combo,bestCombo,gameRunning,frame;
var surfer={x:0,y:0,vy:0,lane:2,targetLane:2,trickTimer:0,trickType:0};
var obstacles=[],coins=[],particles=[],textPops=[],trailParticles=[];
var speed,spawnTimer,difficulty;
var highScore=parseInt(localStorage.getItem('sd_high')||'0');
document.getElementById('bestVal').textContent=highScore;

var LANE_COUNT=5;
function laneY(lane){return H*0.25+lane*(H*0.5/(LANE_COUNT-1))}

function init(){
  score=0;sessionCoins=0;combo=0;bestCombo=0;frame=0;
  gameRunning=true;speed=3;spawnTimer=0;difficulty=0;
  surfer.lane=2;surfer.targetLane=2;surfer.x=W*0.2;surfer.y=laneY(2);surfer.vy=0;surfer.trickTimer=0;
  obstacles=[];coins=[];particles=[];textPops=[];trailParticles=[];
  updateHUD();
}

function updateHUD(){
  document.getElementById('scoreVal').textContent=score;
  document.getElementById('comboVal').textContent=combo>1?combo+'x':'';
}

function startGame(){
  initAudio();startMusic();
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('death-screen').style.display='none';
  canvas.style.pointerEvents='auto';
  // Show mobile controls
  if('ontouchstart' in window||navigator.maxTouchPoints>0){document.getElementById('controls').style.display='flex'}
  init();
}
function retry(){startGame()}

function moveUp(){if(!gameRunning)return;surfer.targetLane=Math.max(0,surfer.targetLane-1)}
function moveDown(){if(!gameRunning)return;surfer.targetLane=Math.min(LANE_COUNT-1,surfer.targetLane+1)}
function doTrick(){
  if(!gameRunning||surfer.trickTimer>0)return;
  surfer.trickTimer=30;surfer.trickType=1+Math.floor(Math.random()*3);
  var pts=10*Math.max(1,combo);
  score+=pts;combo++;
  if(combo>bestCombo)bestCombo=combo;
  sfxTrick();
  if(combo>=3)sfxCombo();
  var trickNames=['','🤸 Kickflip!','🌀 360 Spin!','🦘 Air Grab!'];
  textPops.push({x:surfer.x,y:surfer.y-40,text:trickNames[surfer.trickType]+' +'+pts,color:combo>=5?'#ef4444':combo>=3?'#f97316':'#fbbf24',size:combo>=5?28:combo>=3?24:20,life:40});
  updateHUD();
}

function spawnObstacle(){
  var lane=Math.floor(Math.random()*LANE_COUNT);
  var types=['🪨','🦈','🐙','🪸','🧊','🐳'];
  var type=types[Math.floor(Math.random()*types.length)];
  obstacles.push({x:W+50,y:laneY(lane),lane:lane,type:type,w:40,h:40});
}
function spawnCoin(){
  var lane=Math.floor(Math.random()*LANE_COUNT);
  coins.push({x:W+50,y:laneY(lane),lane:lane});
}

var comboTimer=0;
function update(){
  // Particles always
  for(var pi=particles.length-1;pi>=0;pi--){var p=particles[pi];p.x+=p.vx;p.y+=p.vy;p.life--;if(p.life<=0)particles.splice(pi,1)}
  for(var ti=trailParticles.length-1;ti>=0;ti--){var tp=trailParticles[ti];tp.x+=tp.vx;tp.y+=tp.vy;tp.life-=tp.decay;if(tp.life<=0)trailParticles.splice(ti,1)}
  for(var xi=textPops.length-1;xi>=0;xi--){textPops[xi].y-=1.2;textPops[xi].life--;if(textPops[xi].life<=0)textPops.splice(xi,1)}
  if(!gameRunning)return;
  frame++;

  // Difficulty
  difficulty=Math.min(score/500,2);
  speed=3+difficulty*2;

  // Move surfer toward target lane
  var targetY=laneY(surfer.targetLane);
  surfer.y+=(targetY-surfer.y)*0.15;
  surfer.lane=surfer.targetLane;

  // Trick timer
  if(surfer.trickTimer>0)surfer.trickTimer--;

  // Combo reset
  comboTimer++;
  if(comboTimer>120&&combo>0){combo=0;comboTimer=0;updateHUD()}

  // Spawn
  spawnTimer++;
  var spawnRate=Math.max(30,70-difficulty*15);
  if(spawnTimer>=spawnRate){
    spawnTimer=0;
    if(Math.random()<0.7)spawnObstacle();
    if(Math.random()<0.4)spawnCoin();
    // Extra obstacles at high difficulty
    if(difficulty>1&&Math.random()<0.3)spawnObstacle();
  }

  // Score ticks
  if(frame%10===0){score++;updateHUD();if(score>highScore){highScore=score;localStorage.setItem('sd_high',highScore.toString());document.getElementById('bestVal').textContent=highScore}}

  // Move obstacles
  for(var oi=obstacles.length-1;oi>=0;oi--){
    var ob=obstacles[oi];ob.x-=speed;
    if(ob.x<-60){obstacles.splice(oi,1);continue}
    // Collision
    if(Math.abs(ob.x-surfer.x)<30&&Math.abs(ob.y-surfer.y)<28&&surfer.trickTimer===0){
      die();return;
    }
  }

  // Move coins
  for(var ci=coins.length-1;ci>=0;ci--){
    var c=coins[ci];c.x-=speed;
    if(c.x<-30){coins.splice(ci,1);continue}
    if(Math.abs(c.x-surfer.x)<30&&Math.abs(c.y-surfer.y)<28){
      coins.splice(ci,1);
      sessionCoins++;totalCoins++;saveShop();updateCoinDisplays();sfxCoin();
      comboTimer=0;
      textPops.push({x:c.x,y:c.y-20,text:'+1 🪙',color:'#fbbf24',size:18,life:30});
    }
  }

  // Trail particles
  var trail=getTrail();
  if(trail.colors&&frame%3===0){
    trailParticles.push({x:surfer.x-20,y:surfer.y+Math.random()*10-5,vx:-1-Math.random(),vy:(Math.random()-0.5)*0.5,
      life:1,decay:0.04,size:2+Math.random()*3,color:trail.colors[Math.floor(Math.random()*trail.colors.length)]});
  }
}

function die(){
  gameRunning=false;sfxCrash();stopMusic();
  canvas.style.pointerEvents='none';
  // Death particles
  var explo=getExplo();
  for(var i=0;i<25;i++){
    var ang=Math.random()*Math.PI*2,spd=2+Math.random()*6;
    particles.push({x:surfer.x,y:surfer.y,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,life:30+Math.random()*20,
      color:explo.colors[i%explo.colors.length],size:3+Math.random()*4});
  }
  setTimeout(function(){
    document.getElementById('death-score').textContent=score;
    document.getElementById('death-combo').textContent='Best Combo: '+bestCombo+'x';
    document.getElementById('death-coins').textContent='+'+sessionCoins+' 🪙';
    document.getElementById('death-name').value=localStorage.getItem('ajgt_name')||'';
    document.getElementById('death-screen').style.display='flex';
  },600);
}

function draw(){
  var wave=getWave();
  // Sky gradient
  var skyGrad=ctx.createLinearGradient(0,0,0,H*0.4);
  skyGrad.addColorStop(0,wave.sky1);skyGrad.addColorStop(1,wave.sky2);
  ctx.fillStyle=skyGrad;ctx.fillRect(0,0,W,H*0.4);

  // Water gradient
  var waterGrad=ctx.createLinearGradient(0,H*0.3,0,H);
  waterGrad.addColorStop(0,wave.water1);waterGrad.addColorStop(1,wave.water2);
  ctx.fillStyle=waterGrad;ctx.fillRect(0,H*0.3,W,H*0.7);

  // Wave lines
  ctx.strokeStyle='rgba(255,255,255,0.08)';ctx.lineWidth=2;
  for(var wi=0;wi<8;wi++){
    ctx.beginPath();
    var wy=H*0.3+wi*(H*0.08);
    for(var wx=0;wx<W+20;wx+=20){
      var waveY=wy+Math.sin((wx+frame*speed*0.5+wi*50)*0.02)*8;
      if(wx===0)ctx.moveTo(wx,waveY);else ctx.lineTo(wx,waveY);
    }
    ctx.stroke();
  }

  // Lane indicators
  ctx.strokeStyle='rgba(255,255,255,0.05)';ctx.lineWidth=1;
  for(var li=0;li<LANE_COUNT;li++){
    var ly=laneY(li);ctx.beginPath();ctx.moveTo(0,ly);ctx.lineTo(W,ly);ctx.stroke();
  }

  // Trail particles
  for(var ti=0;ti<trailParticles.length;ti++){
    var tp=trailParticles[ti];ctx.globalAlpha=tp.life;
    ctx.fillStyle=tp.color;ctx.beginPath();ctx.arc(tp.x,tp.y,tp.size,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;

  // Coins
  ctx.font='24px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
  for(var ci=0;ci<coins.length;ci++){
    var c=coins[ci];
    ctx.fillText('🪙',c.x,c.y+Math.sin(frame*0.08+ci)*4);
  }

  // Obstacles
  ctx.font='32px sans-serif';
  for(var oi=0;oi<obstacles.length;oi++){
    var ob=obstacles[oi];
    ctx.fillText(ob.type,ob.x,ob.y);
  }

  // Surfer
  var board=getBoard(),suit=getSuit();
  var sx=surfer.x,sy=surfer.y;
  // Board
  ctx.save();ctx.translate(sx,sy);
  if(surfer.trickTimer>0){
    var trickAngle=(30-surfer.trickTimer)/30*Math.PI*2*surfer.trickType;
    ctx.rotate(trickAngle);
    // Trick glow
    ctx.strokeStyle='rgba(251,191,36,0.4)';ctx.lineWidth=3;ctx.beginPath();ctx.arc(0,0,25,0,Math.PI*2);ctx.stroke();
  }
  // Board shape
  ctx.fillStyle=board.color==='rainbow'?'#06b6d4':board.color;
  ctx.beginPath();ctx.ellipse(0,8,22,6,0,0,Math.PI*2);ctx.fill();
  // Surfer body
  ctx.fillStyle=suit.color;
  ctx.beginPath();ctx.arc(0,-4,10,0,Math.PI*2);ctx.fill();
  // Head
  ctx.fillStyle='#fcd34d';
  ctx.beginPath();ctx.arc(0,-16,7,0,Math.PI*2);ctx.fill();
  // Eyes
  ctx.fillStyle='#1f2937';
  ctx.beginPath();ctx.arc(-3,-17,1.5,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(3,-17,1.5,0,Math.PI*2);ctx.fill();
  ctx.restore();

  // Death particles
  for(var pi=0;pi<particles.length;pi++){
    var p=particles[pi];ctx.globalAlpha=p.life/40;
    ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;

  // Text pops
  for(var xi=0;xi<textPops.length;xi++){
    var tp=textPops[xi];ctx.globalAlpha=tp.life/40;
    ctx.fillStyle=tp.color;ctx.font='bold '+tp.size+'px sans-serif';ctx.textAlign='center';
    ctx.fillText(tp.text,tp.x,tp.y);
  }
  ctx.globalAlpha=1;

  // Combo display
  if(combo>=3&&gameRunning){
    ctx.fillStyle=combo>=5?'rgba(239,68,68,0.15)':'rgba(249,115,22,0.1)';
    ctx.fillRect(0,0,W,H);
    ctx.fillStyle=combo>=5?'#ef4444':'#f97316';ctx.font='bold 14px sans-serif';ctx.textAlign='center';
    ctx.fillText('🔥 '+combo+'x COMBO!',W/2,50);
  }
}

function loop(){update();draw();requestAnimationFrame(loop)}

// === INPUT ===
document.addEventListener('keydown',function(e){
  if(e.key==='ArrowUp'||e.key==='w')moveUp();
  else if(e.key==='ArrowDown'||e.key==='s')moveDown();
  else if(e.key===' '||e.key==='ArrowRight')doTrick();
});

// Touch swipe
var touchStartY=0;
canvas.addEventListener('touchstart',function(e){touchStartY=e.touches[0].clientY;e.preventDefault()},{passive:false});
canvas.addEventListener('touchend',function(e){
  var dy=e.changedTouches[0].clientY-touchStartY;
  if(Math.abs(dy)<20)doTrick();
  else if(dy<-30)moveUp();
  else if(dy>30)moveDown();
  e.preventDefault();
},{passive:false});
canvas.addEventListener('click',function(){if(!gameRunning)return;doTrick()});

updateCoinDisplays();
document.getElementById('bestVal').textContent=highScore;
loop();
</script>
</body>
</html>
