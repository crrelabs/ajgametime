<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Space Blasters — AJ GameTime</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Lilita+One&family=Nunito:wght@600;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;touch-action:none;font-family:'Nunito',sans-serif;user-select:none;-webkit-user-select:none}
canvas{display:block}
#hud{position:absolute;top:0;left:0;width:100%;padding:8px 12px;display:flex;justify-content:space-between;pointer-events:none;z-index:10}
.hud-box{background:rgba(0,0,0,0.5);border-radius:10px;padding:5px 12px;color:#fff;font-weight:700;font-size:14px}
#score-hud{color:#fbbf24;font-family:'Lilita One',cursive;font-size:18px}
#wave-hud{color:#22d3ee;font-size:13px}
#lives-hud{color:#ef4444;font-size:16px}
#controls{position:absolute;bottom:8px;left:0;width:100%;display:flex;justify-content:space-between;align-items:flex-end;padding:0 10px;pointer-events:none;z-index:10}
.ctrl-side{pointer-events:auto;display:flex;gap:6px;align-items:center}
.btn{border-radius:50%;border:2px solid rgba(255,255,255,0.3);display:flex;align-items:center;justify-content:center;font-size:24px;color:#fff;cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation;width:60px;height:60px}
.btn:active{transform:scale(0.9)}
.btn-left{background:rgba(59,130,246,0.5)}
.btn-right{background:rgba(59,130,246,0.5)}
.btn-fire{background:rgba(239,68,68,0.6);box-shadow:0 0 15px rgba(239,68,68,0.3);width:68px;height:68px;font-size:28px}
#overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20;background:rgba(0,0,0,0.88)}
#overlay h1{font-family:'Lilita One',cursive;font-size:clamp(26px,7vw,50px);background:linear-gradient(135deg,#22d3ee,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px}
#overlay h2{color:#fbbf24;font-family:'Lilita One',cursive;font-size:clamp(13px,3vw,18px);margin-bottom:12px}
#overlay p{color:#94a3b8;font-size:13px;max-width:340px;text-align:center;line-height:1.6;margin-bottom:12px}
#play-btn{pointer-events:auto;padding:14px 44px;font-family:'Lilita One',cursive;font-size:22px;color:#fff;background:linear-gradient(135deg,#3b82f6,#a855f7);border:none;border-radius:14px;cursor:pointer;box-shadow:0 4px 24px rgba(59,130,246,0.4)}
#back{position:absolute;top:10px;left:10px;color:rgba(255,255,255,0.4);text-decoration:none;font-size:13px;font-weight:700;z-index:30}
#lb-show-btn{pointer-events:auto;padding:8px 20px;font-size:14px;font-weight:700;color:#fff;background:linear-gradient(135deg,#f59e0b,#ef4444);border:none;border-radius:8px;cursor:pointer;margin-top:8px}
#lb-overlay{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:100;background:rgba(0,0,0,0.92)}
#lb-overlay h2{font-size:28px;color:#f59e0b;margin-bottom:12px;font-weight:900}
#lb-list{width:min(340px,90vw);max-height:50vh;overflow-y:auto}
.lb-row{display:flex;justify-content:space-between;padding:8px 14px;border-bottom:1px solid rgba(255,255,255,0.08);color:#e2e8f0;font-size:14px;font-weight:600}
.lb-row:nth-child(1) .lb-rank{color:#fbbf24}.lb-row:nth-child(2) .lb-rank{color:#94a3b8}.lb-row:nth-child(3) .lb-rank{color:#b45309}
.lb-rank{width:30px;color:#64748b}.lb-name{flex:1;margin:0 8px}.lb-score{color:#22d3ee}
#lb-close-btn{pointer-events:auto;margin-top:16px;padding:10px 30px;font-size:16px;font-weight:700;color:#fff;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:10px;cursor:pointer}
#death-screen{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:200;background:rgba(0,0,0,0.92)}
#death-screen h1{font-family:'Lilita One',cursive;font-size:32px;color:#ef4444;margin-bottom:6px}
#death-score{color:#fbbf24;font-size:18px;font-weight:900;margin-bottom:14px}
#death-name{width:200px;padding:10px;font-size:16px;font-weight:700;border:2px solid #3b82f6;border-radius:10px;background:#0a0a2e;color:#fff;text-align:center;outline:none;margin-bottom:10px}
.death-btn{padding:12px 28px;font-family:'Lilita One',cursive;font-size:16px;color:#fff;border:none;border-radius:12px;cursor:pointer;margin:4px;pointer-events:auto}
#death-submit{background:linear-gradient(135deg,#3b82f6,#a855f7)}
#death-retry{background:linear-gradient(135deg,#f97316,#ef4444)}
#death-lb{background:linear-gradient(135deg,#f59e0b,#ef4444)}
</style>
</head>
<body>
<a id="back" href="index.html">← Back</a>
<canvas id="game"></canvas>

<div id="hud">
  <div>
    <div class="hud-box" id="score-hud">Score: 0</div>
    <div class="hud-box" id="wave-hud" style="margin-top:4px">Wave 1</div>
  </div>
  <div class="hud-box" id="lives-hud">❤️❤️❤️</div>
</div>

<div id="controls">
  <div class="ctrl-side">
    <div class="btn btn-left" data-action="left">◀</div>
    <div class="btn btn-right" data-action="right">▶</div>
  </div>
  <div class="ctrl-side">
    <div class="btn btn-fire" data-action="fire">🔥</div>
  </div>
</div>

<div id="overlay">
  <h1>🚀 Space Blasters</h1>
  <h2>Defend Earth!</h2>
  <p>Aliens are invading! Move left and right to dodge and shoot down the alien fleet before they reach you. Each wave gets harder!</p>
  <p style="color:#64748b;font-size:11px">◀▶ Move · 🔥 Shoot</p>
  <button id="play-btn">🚀 Launch!</button>
  <button id="lb-show-btn" onclick="_lbShow()">🏆 Leaderboard</button>
</div>

<div id="lb-overlay"><h2>🏆 Leaderboard</h2><div id="lb-list"></div><button id="lb-close-btn">Close</button></div>

<div id="death-screen">
  <h1>💥 Game Over!</h1>
  <div id="death-score">Score: 0</div>
  <p style="color:#94a3b8;font-size:14px;margin-bottom:12px">Enter your name:</p>
  <input type="text" id="death-name" placeholder="Your name" maxlength="16" autocomplete="off">
  <button class="death-btn" id="death-submit">📤 Submit Score</button>
  <button class="death-btn" id="death-retry">🚀 Try Again</button>
  <button class="death-btn" id="death-lb">🏆 Leaderboard</button>
</div>

<script>
const C=document.getElementById('game'),X=C.getContext('2d');
let W,H;function resize(){W=C.width=window.innerWidth;H=C.height=window.innerHeight;}resize();window.addEventListener('resize',resize);

let playing=false,score=0,lives=3,wave=1,frame=0;
let particles=[],stars=[];

// Stars background
for(let i=0;i<100;i++) stars.push({x:Math.random()*2000,y:Math.random()*2000,s:0.5+Math.random()*2,b:Math.random()});

// Player ship
const ship={x:0,y:0,w:32,h:24,speed:5,cooldown:0,invincible:0};

// Aliens
let aliens=[],alienBullets=[],playerBullets=[];
let alienDir=1,alienSpeed=0.5,alienDropTimer=0,alienShootTimer=0;
let powerups=[];

const ALIEN_TYPES=[
  {emoji:'👾',pts:10,hp:1,w:28,h:24,color:'#22c55e'},
  {emoji:'👽',pts:20,hp:1,w:28,h:24,color:'#3b82f6'},
  {emoji:'🛸',pts:30,hp:2,w:32,h:24,color:'#a855f7'},
  {emoji:'💀',pts:50,hp:3,w:30,h:26,color:'#ef4444'},
];

function spawnWave(){
  aliens=[];
  const rows=Math.min(5,2+Math.floor(wave/2));
  const cols=Math.min(10,6+Math.floor(wave/3));
  const spacing=38;
  const startX=(W-cols*spacing)/2+spacing/2;
  const startY=60;
  for(let r=0;r<rows;r++){
    const typeIdx=Math.min(r,ALIEN_TYPES.length-1);
    const t=ALIEN_TYPES[typeIdx];
    for(let c=0;c<cols;c++){
      aliens.push({
        x:startX+c*spacing,y:startY+r*40,
        baseX:startX+c*spacing,baseY:startY+r*40,
        w:t.w,h:t.h,hp:t.hp,maxHp:t.hp,
        emoji:t.emoji,pts:t.pts,color:t.color,
        bobTimer:Math.random()*Math.PI*2
      });
    }
  }
  alienDir=1;
  alienSpeed=0.5+wave*0.15;
  alienBullets=[];
  alienShootTimer=0;
  powerups=[];
}

// Input
const actions={};let fireHeld=false;
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft'||e.key==='a')actions.left=true;
  if(e.key==='ArrowRight'||e.key==='d')actions.right=true;
  if(e.key===' '||e.key==='f'){e.preventDefault();fireHeld=true;}
});
document.addEventListener('keyup',e=>{
  if(e.key==='ArrowLeft'||e.key==='a')actions.left=false;
  if(e.key==='ArrowRight'||e.key==='d')actions.right=false;
  if(e.key===' '||e.key==='f')fireHeld=false;
});

document.querySelectorAll('.btn').forEach(btn=>{
  const act=btn.dataset.action;
  const down=e=>{e.preventDefault();e.stopPropagation();if(act==='fire')fireHeld=true;else actions[act]=true;};
  const up=e=>{e.preventDefault();e.stopPropagation();if(act==='fire')fireHeld=false;else actions[act]=false;};
  btn.addEventListener('touchstart',down,{passive:false});
  btn.addEventListener('touchend',up,{passive:false});
  btn.addEventListener('touchcancel',up,{passive:false});
  btn.addEventListener('mousedown',down);btn.addEventListener('mouseup',up);btn.addEventListener('mouseleave',up);
});

function shoot(){
  if(ship.cooldown>0)return;
  ship.cooldown=12;
  playerBullets.push({x:ship.x,y:ship.y-ship.h/2,speed:8});
  addP(ship.x,ship.y-ship.h/2,'#22d3ee',4);
}

function addP(x,y,color,count){
  for(let i=0;i<count;i++)particles.push({x,y,vx:(Math.random()-0.5)*4,vy:(Math.random()-0.5)*4,life:15+Math.random()*10,maxLife:25,color,size:1.5+Math.random()*2.5});
}

function updateHUD(){
  document.getElementById('score-hud').textContent='Score: '+score;
  document.getElementById('wave-hud').textContent='🌊 Wave '+wave;
  let h='';for(let i=0;i<lives;i++)h+='❤️';
  document.getElementById('lives-hud').textContent=h||'💀';
}

function update(){
  if(!playing)return;
  frame++;

  // Ship movement
  if(actions.left)ship.x-=ship.speed;
  if(actions.right)ship.x+=ship.speed;
  ship.x=Math.max(ship.w/2+5,Math.min(W-ship.w/2-5,ship.x));
  if(ship.cooldown>0)ship.cooldown--;
  if(ship.invincible>0)ship.invincible--;
  if(fireHeld)shoot();

  // Player bullets
  for(let i=playerBullets.length-1;i>=0;i--){
    const b=playerBullets[i];
    b.y-=b.speed;
    if(b.y<-10){playerBullets.splice(i,1);continue;}
    // Hit aliens
    for(let j=aliens.length-1;j>=0;j--){
      const a=aliens[j];
      if(Math.abs(b.x-a.x)<a.w/2+3&&Math.abs(b.y-a.y)<a.h/2+3){
        a.hp--;
        playerBullets.splice(i,1);
        addP(a.x,a.y,a.color,6);
        if(a.hp<=0){
          score+=a.pts;
          addP(a.x,a.y,'#fbbf24',10);
          // Drop power-up chance
          if(Math.random()<0.12){
            const types=['rapid','shield','triple','bomb'];
            powerups.push({x:a.x,y:a.y,type:types[Math.floor(Math.random()*types.length)],vy:1.5,bob:0});
          }
          aliens.splice(j,1);
        }
        break;
      }
    }
  }

  // Alien movement
  let hitEdge=false;
  aliens.forEach(a=>{
    a.x+=alienDir*alienSpeed;
    a.bobTimer+=0.04;
    a.y=a.baseY+Math.sin(a.bobTimer)*3;
    if(a.x<a.w/2+10||a.x>W-a.w/2-10)hitEdge=true;
  });
  if(hitEdge){
    alienDir*=-1;
    aliens.forEach(a=>{a.baseY+=12;a.y=a.baseY;});
  }

  // Alien shooting
  alienShootTimer++;
  const shootRate=Math.max(20,60-wave*3);
  if(alienShootTimer>=shootRate&&aliens.length>0){
    alienShootTimer=0;
    // Bottom aliens shoot
    const shooters={};
    aliens.forEach(a=>{
      const col=Math.round(a.x/40);
      if(!shooters[col]||a.y>shooters[col].y)shooters[col]=a;
    });
    const candidates=Object.values(shooters);
    if(candidates.length>0){
      const shooter=candidates[Math.floor(Math.random()*candidates.length)];
      alienBullets.push({x:shooter.x,y:shooter.y+shooter.h/2,speed:3+wave*0.3});
    }
  }

  // Alien bullets
  for(let i=alienBullets.length-1;i>=0;i--){
    const b=alienBullets[i];
    b.y+=b.speed;
    if(b.y>H+10){alienBullets.splice(i,1);continue;}
    // Hit ship
    if(ship.invincible<=0&&Math.abs(b.x-ship.x)<ship.w/2+3&&Math.abs(b.y-ship.y)<ship.h/2+5){
      alienBullets.splice(i,1);
      hitShip();
    }
  }

  // Aliens reach ship level
  aliens.forEach(a=>{
    if(a.baseY+a.h/2>ship.y-20&&ship.invincible<=0){
      hitShip();
    }
  });

  // Power-ups
  for(let i=powerups.length-1;i>=0;i--){
    const pu=powerups[i];
    pu.y+=pu.vy;pu.bob+=0.08;
    if(pu.y>H+20){powerups.splice(i,1);continue;}
    if(Math.abs(pu.x-ship.x)<20&&Math.abs(pu.y-ship.y)<20){
      powerups.splice(i,1);
      if(pu.type==='rapid'){ship.cooldown=0;ship.speed=8;setTimeout(()=>ship.speed=5,4000);addP(ship.x,ship.y,'#22d3ee',10);}
      else if(pu.type==='shield'){ship.invincible=180;addP(ship.x,ship.y,'#3b82f6',10);}
      else if(pu.type==='triple'){for(let a=-1;a<=1;a++)playerBullets.push({x:ship.x+a*12,y:ship.y-15,speed:8});addP(ship.x,ship.y,'#fbbf24',8);}
      else if(pu.type==='bomb'){aliens.forEach(a=>{score+=a.pts;addP(a.x,a.y,'#ef4444',6);});aliens=[];addP(ship.x,ship.y,'#ef4444',20);}
    }
  }

  // Wave complete
  if(aliens.length===0){
    wave++;
    score+=wave*50;
    spawnWave();
  }

  // Particles
  particles=particles.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.life--;return p.life>0;});

  // Stars twinkle
  stars.forEach(s=>s.b+=0.02);

  updateHUD();
}

function hitShip(){
  if(ship.invincible>0)return;
  lives--;
  ship.invincible=120;
  addP(ship.x,ship.y,'#ef4444',15);
  if(lives<=0)gameOver();
}

function draw(){
  X.fillStyle='#000';
  X.fillRect(0,0,W,H);

  // Stars
  stars.forEach(s=>{
    const sx=s.x%W,sy=s.y%H;
    X.globalAlpha=0.3+Math.sin(s.b)*0.3;
    X.fillStyle='#fff';
    X.fillRect(sx,sy,s.s,s.s);
  });
  X.globalAlpha=1;

  // Aliens
  aliens.forEach(a=>{
    X.font=(a.w-4)+'px sans-serif';
    X.textAlign='center';
    // Damage flash
    if(a.hp<a.maxHp){X.globalAlpha=0.5+Math.sin(frame*0.3)*0.3;}
    X.fillText(a.emoji,a.x,a.y+a.h/4);
    // HP bar for tough aliens
    if(a.maxHp>1){
      X.fillStyle='rgba(255,0,0,0.4)';
      X.fillRect(a.x-a.w/2,a.y-a.h/2-6,a.w,3);
      X.fillStyle=a.color;
      X.fillRect(a.x-a.w/2,a.y-a.h/2-6,a.w*(a.hp/a.maxHp),3);
    }
    X.globalAlpha=1;
  });

  // Player bullets
  playerBullets.forEach(b=>{
    X.fillStyle='#22d3ee';
    X.shadowColor='#22d3ee';X.shadowBlur=8;
    X.fillRect(b.x-2,b.y-6,4,12);
    X.shadowBlur=0;
  });

  // Alien bullets
  alienBullets.forEach(b=>{
    X.fillStyle='#ef4444';
    X.shadowColor='#ef4444';X.shadowBlur=6;
    X.fillRect(b.x-2,b.y-4,4,8);
    X.shadowBlur=0;
  });

  // Power-ups
  powerups.forEach(pu=>{
    const bob=Math.sin(pu.bob)*4;
    const emojis={rapid:'⚡',shield:'🛡️',triple:'🔱',bomb:'💣'};
    X.fillStyle='rgba(251,191,36,0.15)';
    X.beginPath();X.arc(pu.x,pu.y+bob,14,0,Math.PI*2);X.fill();
    X.font='18px sans-serif';X.textAlign='center';
    X.fillText(emojis[pu.type]||'?',pu.x,pu.y+bob+6);
  });

  // Ship
  if(ship.invincible<=0||Math.floor(ship.invincible/3)%2===0){
    X.save();
    X.translate(ship.x,ship.y);
    // Engine glow
    X.fillStyle='rgba(59,130,246,0.3)';
    X.beginPath();X.arc(0,ship.h/2+4,8+Math.sin(frame*0.3)*3,0,Math.PI*2);X.fill();
    // Body
    X.fillStyle='#3b82f6';
    X.beginPath();
    X.moveTo(0,-ship.h/2);
    X.lineTo(ship.w/2,ship.h/2);
    X.lineTo(ship.w/3,ship.h/3);
    X.lineTo(-ship.w/3,ship.h/3);
    X.lineTo(-ship.w/2,ship.h/2);
    X.closePath();
    X.fill();
    // Cockpit
    X.fillStyle='#22d3ee';
    X.beginPath();X.arc(0,-2,6,0,Math.PI*2);X.fill();
    // Wings detail
    X.fillStyle='#2563eb';
    X.beginPath();X.moveTo(-ship.w/2,ship.h/2);X.lineTo(-ship.w/2-6,ship.h/2+4);X.lineTo(-ship.w/3,ship.h/3);X.fill();
    X.beginPath();X.moveTo(ship.w/2,ship.h/2);X.lineTo(ship.w/2+6,ship.h/2+4);X.lineTo(ship.w/3,ship.h/3);X.fill();
    // Engine flames
    X.fillStyle='#f97316';
    const flicker=Math.random()*4;
    X.fillRect(-4,ship.h/3,3,6+flicker);
    X.fillRect(1,ship.h/3,3,8+flicker);
    X.fillStyle='#fbbf24';
    X.fillRect(-3,ship.h/3,2,4+flicker);
    X.fillRect(2,ship.h/3,2,5+flicker);
    // Shield
    if(ship.invincible>60){
      X.strokeStyle='rgba(59,130,246,0.4)';
      X.lineWidth=2;
      X.beginPath();X.arc(0,0,ship.w/2+8,0,Math.PI*2);X.stroke();
    }
    X.restore();
  }

  // Particles
  particles.forEach(p=>{
    X.globalAlpha=p.life/p.maxLife;
    X.fillStyle=p.color;
    X.beginPath();X.arc(p.x,p.y,p.size,0,Math.PI*2);X.fill();
  });
  X.globalAlpha=1;

  X.textAlign='start';
}

function gameOver(){
  playing=false;
  document.getElementById('death-score').textContent='Score: '+score+' · Wave '+wave;
  document.getElementById('death-name').value=localStorage.getItem('ajgt_name')||'';
  document.getElementById('death-screen').style.display='flex';
}

function resetGame(){
  score=0;lives=3;wave=1;frame=0;
  ship.x=W/2;ship.y=H-110;ship.speed=5;ship.cooldown=0;ship.invincible=0;
  playerBullets=[];alienBullets=[];particles=[];powerups=[];
  spawnWave();updateHUD();
}

document.getElementById('play-btn').addEventListener('click',()=>{
  document.getElementById('overlay').style.display='none';
  playing=true;resetGame();
});

function loop(){update();draw();requestAnimationFrame(loop);}loop();

const _LB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFkdWRncmZ4d2lsZHp3cGN2eWlsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyOTkzODUsImV4cCI6MjA4Nzg3NTM4NX0.-JYXn5r9QUjxbpwckwDMSvCm8w1xRXOp5lP2TWNOC_E';
const _LB_GAME='space-blasters';
async function _lbFetch(){try{const r=await fetch(_LB_URL+'/rest/v1/ajgametime_leaderboard?game=eq.'+_LB_GAME+'&order=score.desc&limit=10',{headers:{'apikey':_LB_KEY,'Authorization':'Bearer '+_LB_KEY}});return await r.json();}catch(e){return[];}}
async function _lbSubmit(name,sc){try{await fetch(_LB_URL+'/rest/v1/ajgametime_leaderboard',{method:'POST',headers:{'apikey':_LB_KEY,'Authorization':'Bearer '+_LB_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify({game:_LB_GAME,player_name:name,score:sc,wave:wave})});}catch(e){}}
async function _lbShow(){const lb=document.getElementById('lb-overlay');const list=document.getElementById('lb-list');list.innerHTML='<div style="color:#64748b;text-align:center;padding:20px">Loading...</div>';lb.style.display='flex';const data=await _lbFetch();if(!data.length){list.innerHTML='<div style="color:#64748b;text-align:center;padding:20px">No scores yet!</div>';return;}list.innerHTML=data.map((d,i)=>'<div class="lb-row"><span class="lb-rank">#'+(i+1)+'</span><span class="lb-name">'+d.player_name+'</span><span class="lb-score">'+d.score+'</span></div>').join('');}
document.getElementById('lb-close-btn').addEventListener('click',()=>{document.getElementById('lb-overlay').style.display='none';});
document.getElementById('death-submit').addEventListener('click',async function(){var n=document.getElementById('death-name').value.trim()||'Anonymous';localStorage.setItem('ajgt_name',n);await _lbSubmit(n,score);this.textContent='✅ Done!';this.disabled=true;});
document.getElementById('death-retry').addEventListener('click',function(){document.getElementById('death-screen').style.display='none';document.getElementById('death-submit').textContent='📤 Submit Score';document.getElementById('death-submit').disabled=false;playing=true;resetGame();});
document.getElementById('death-lb').addEventListener('click',function(){_lbShow();});
document.getElementById('death-name').addEventListener('keydown',function(e){if(e.key==='Enter')document.getElementById('death-submit').click();});
</script>
