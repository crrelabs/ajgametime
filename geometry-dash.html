<script>
// === AUDIO ===
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
let musicPlaying = false;
let musicInterval = null;
let musicGain = null;
let bassBeat = null;

function initAudio() {
  if (audioCtx) return;
  audioCtx = new AudioCtx();
  musicGain = audioCtx.createGain();
  musicGain.gain.value = 0.3;
  musicGain.connect(audioCtx.destination);
}

function playNote(freq, dur, type='square', vol=0.1) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  g.gain.setValueAtTime(vol, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  osc.connect(g);
  g.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + dur);
}

function playJump() { playNote(600, 0.1, 'square', 0.08); playNote(800, 0.08, 'sine', 0.05); }
function playCrash() { playNote(100, 0.5, 'sawtooth', 0.2); playNote(80, 0.6, 'square', 0.15); }
function playOrb() { playNote(1000, 0.15, 'sine', 0.1); playNote(1200, 0.1, 'sine', 0.08); }

// EDM-style beat music
const BPM = 140;
const BEAT_MS = 60000 / BPM;
const BASS_NOTES = [130.8, 146.8, 164.8, 130.8, 146.8, 174.6, 164.8, 130.8];
const LEAD_NOTES = [523, 587, 659, 523, 698, 659, 587, 523, 784, 659, 587, 523, 698, 587, 523, 494];

function startMusic() {
  if (musicPlaying) return;
  initAudio();
  musicPlaying = true;
  let beatIdx = 0;
  
  function tick() {
    if (!musicPlaying) return;
    const t = audioCtx.currentTime;
    
    // Kick drum
    if (beatIdx % 4 === 0) {
      const osc = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(150, t);
      osc.frequency.exponentialRampToValueAtTime(30, t + 0.1);
      g.gain.setValueAtTime(0.25, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
      osc.connect(g); g.connect(musicGain);
      osc.start(t); osc.stop(t + 0.15);
    }
    
    // Hi-hat
    if (beatIdx % 2 === 0) {
      const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.05, audioCtx.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * 0.3;
      const src = audioCtx.createBufferSource();
      const g = audioCtx.createGain();
      src.buffer = buf;
      g.gain.setValueAtTime(0.08, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.05);
      src.connect(g); g.connect(musicGain);
      src.start(t);
    }
    
    // Snare on 2 and 4
    if (beatIdx % 8 === 4) {
      const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.1, audioCtx.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (audioCtx.sampleRate * 0.03));
      const src = audioCtx.createBufferSource();
      const g = audioCtx.createGain();
      src.buffer = buf;
      g.gain.value = 0.12;
      src.connect(g); g.connect(musicGain);
      src.start(t);
    }
    
    // Bass line
    if (beatIdx % 4 === 0) {
      const osc = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      osc.type = 'sawtooth';
      osc.frequency.value = BASS_NOTES[Math.floor(beatIdx / 4) % BASS_NOTES.length];
      g.gain.setValueAtTime(0.1, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + BEAT_MS * 3 / 1000);
      osc.connect(g); g.connect(musicGain);
      osc.start(t); osc.stop(t + BEAT_MS * 3 / 1000);
    }
    
    // Lead synth
    if (beatIdx % 2 === 0) {
      const osc = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      osc.type = 'square';
      osc.frequency.value = LEAD_NOTES[Math.floor(beatIdx / 2) % LEAD_NOTES.length];
      g.gain.setValueAtTime(0.04, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + BEAT_MS / 1000);
      osc.connect(g); g.connect(musicGain);
      osc.start(t); osc.stop(t + BEAT_MS / 1000);
    }
    
    beatIdx++;
    musicInterval = setTimeout(tick, BEAT_MS / 2);
  }
  tick();
  document.getElementById('musicBtn').textContent = '🔊';
}

function stopMusic() {
  musicPlaying = false;
  if (musicInterval) clearTimeout(musicInterval);
  document.getElementById('musicBtn').textContent = '🔇';
}

document.getElementById('musicBtn').addEventListener('click', () => {
  if (musicPlaying) stopMusic(); else startMusic();
});

// === GAME ===
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W;
  canvas.height = H;
}
resize();
window.addEventListener('resize', resize);

const GROUND_Y_PCT = 0.75;
const PLAYER_SIZE = 30;
const GRAVITY = 0.7;
const JUMP_FORCE = -13;
const SPEED = 6;

// Level generation
const LEVEL_LENGTH = 3000; // in game units
let level = [];
let player, camera, gameRunning, attempt, bestPct, particles, bgStars;
let orbs = [];

function generateLevel() {
  level = [];
  orbs = [];
  let x = 500;
  const groundY = H * GROUND_Y_PCT;
  
  while (x < LEVEL_LENGTH) {
    const r = Math.random();
    const gap = 120 + Math.random() * 80;
    
    if (r < 0.3) {
      // Single spike
      level.push({ type: 'spike', x, y: groundY, w: 30, h: 30 });
      x += gap;
    } else if (r < 0.5) {
      // Double spike
      level.push({ type: 'spike', x, y: groundY, w: 30, h: 30 });
      level.push({ type: 'spike', x: x + 35, y: groundY, w: 30, h: 30 });
      x += gap + 50;
    } else if (r < 0.65) {
      // Triple spike
      for (let i = 0; i < 3; i++) {
        level.push({ type: 'spike', x: x + i * 35, y: groundY, w: 30, h: 30 });
      }
      x += gap + 90;
    } else if (r < 0.78) {
      // Gap (pit)
      const gapW = 80 + Math.random() * 60;
      level.push({ type: 'gap', x, w: gapW });
      x += gapW + gap;
    } else if (r < 0.88) {
      // Block obstacle
      const bh = 40 + Math.random() * 30;
      level.push({ type: 'block', x, y: groundY - bh, w: 40, h: bh });
      // Spike on top
      level.push({ type: 'spike', x: x + 5, y: groundY - bh, w: 30, h: 30 });
      x += gap + 40;
    } else {
      // Jump orb (yellow ring in air)
      orbs.push({ x: x + 20, y: groundY - 100 - Math.random() * 60, r: 15, collected: false });
      level.push({ type: 'spike', x: x + 80, y: groundY, w: 30, h: 30 });
      x += gap + 60;
    }
  }
  
  // End portal
  level.push({ type: 'portal', x: LEVEL_LENGTH, y: groundY - 60, w: 40, h: 60 });
}

function generateStars() {
  bgStars = [];
  for (let i = 0; i < 80; i++) {
    bgStars.push({
      x: Math.random() * LEVEL_LENGTH * 1.5,
      y: Math.random() * H * 0.7,
      size: 0.5 + Math.random() * 2,
      speed: 0.1 + Math.random() * 0.3,
      bright: 0.3 + Math.random() * 0.7,
    });
  }
}

function init() {
  const groundY = H * GROUND_Y_PCT;
  player = {
    x: 100,
    y: groundY - PLAYER_SIZE,
    vy: 0,
    onGround: true,
    dead: false,
    rotation: 0,
    won: false,
  };
  camera = 0;
  gameRunning = true;
  particles = [];
  generateLevel();
  generateStars();
  updateHUD();
}

attempt = 1;
bestPct = parseInt(localStorage.getItem('gd_best') || '0');
document.getElementById('bestVal').textContent = bestPct + '%';

function updateHUD() {
  const pct = Math.min(100, Math.floor((player.x / LEVEL_LENGTH) * 100));
  document.getElementById('scoreVal').textContent = pct + '%';
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('attVal').textContent = attempt;
  if (pct > bestPct) {
    bestPct = pct;
    localStorage.setItem('gd_best', bestPct.toString());
    document.getElementById('bestVal').textContent = bestPct + '%';
  }
}

let jumpBuffered = false;
let jumpBufferTimer = 0;

function jump() {
  if (!gameRunning || player.dead || player.won) return;
  if (player.onGround) {
    player.vy = JUMP_FORCE;
    player.onGround = false;
    jumpBuffered = false;
    playJump();
  } else {
    // Buffer the jump for when we land
    jumpBuffered = true;
    jumpBufferTimer = 10; // frames to remember the input
  }
}

function update() {
  if (!gameRunning || player.dead || player.won) return;
  
  const groundY = H * GROUND_Y_PCT;
  
  // Move forward
  player.x += SPEED;
  
  // Gravity
  player.vy += GRAVITY;
  player.y += player.vy;
  
  // Rotation (visual spin while jumping)
  if (!player.onGround) {
    player.rotation += 0.08;
  } else {
    // Snap to nearest 90 degrees
    player.rotation = Math.round(player.rotation / (Math.PI / 2)) * (Math.PI / 2);
  }
  
  // Check if on ground or over gap
  let overGap = false;
  for (const ob of level) {
    if (ob.type === 'gap' && player.x + PLAYER_SIZE > ob.x && player.x < ob.x + ob.w) {
      overGap = true;
      break;
    }
  }
  
  if (!overGap && player.y >= groundY - PLAYER_SIZE) {
    player.y = groundY - PLAYER_SIZE;
    player.vy = 0;
    player.onGround = true;
    // Check jump buffer - instant jump on landing
    if (jumpBuffered && jumpBufferTimer > 0) {
      player.vy = JUMP_FORCE;
      player.onGround = false;
      jumpBuffered = false;
      playJump();
    }
  } else if (overGap && player.y >= groundY - PLAYER_SIZE) {
    player.onGround = false;
  }
  
  // Tick jump buffer
  if (jumpBufferTimer > 0) jumpBufferTimer--;
  if (jumpBufferTimer <= 0) jumpBuffered = false;
  
  // Fall into pit
  if (player.y > H + 50) {
    die();
    return;
  }
  
  // Collision with obstacles
  const px = player.x;
  const py = player.y;
  const ps = PLAYER_SIZE;
  
  for (const ob of level) {
    if (ob.type === 'spike') {
      // Triangle collision (simplified as center point check)
      const sx = ob.x;
      const sy = ob.y;
      const sw = ob.w;
      const sh = ob.h;
      // Spike tip is at (sx + sw/2, sy - sh)
      // Check box overlap first, then triangle
      if (px + ps > sx && px < sx + sw && py + ps > sy - sh && py < sy) {
        const cx = px + ps / 2;
        const cy = py + ps / 2;
        // Simple triangle test
        if (cx > sx + 4 && cx < sx + sw - 4 && cy > sy - sh + 8) {
          die();
          return;
        }
      }
    }
    
    if (ob.type === 'block') {
      if (px + ps > ob.x && px < ob.x + ob.w && py + ps > ob.y && py < ob.y + ob.h) {
        // If coming from above, land on it
        if (player.vy > 0 && py + ps - player.vy <= ob.y) {
          player.y = ob.y - ps;
          player.vy = 0;
          player.onGround = true;
          if (jumpBuffered && jumpBufferTimer > 0) {
            player.vy = JUMP_FORCE;
            player.onGround = false;
            jumpBuffered = false;
            playJump();
          }
        } else {
          die();
          return;
        }
      }
    }
    
    if (ob.type === 'portal') {
      if (px + ps > ob.x && px < ob.x + ob.w) {
        win();
        return;
      }
    }
  }
  
  // Orb collection
  for (const orb of orbs) {
    if (orb.collected) continue;
    const dx = (px + ps / 2) - orb.x;
    const dy = (py + ps / 2) - orb.y;
    if (Math.sqrt(dx * dx + dy * dy) < orb.r + ps / 2) {
      orb.collected = true;
      // Orb gives a boost jump
      player.vy = JUMP_FORCE * 1.2;
      player.onGround = false;
      playOrb();
      for (let i = 0; i < 8; i++) {
        particles.push({
          x: orb.x, y: orb.y,
          vx: (Math.random() - 0.5) * 6,
          vy: (Math.random() - 0.5) * 6,
          life: 25, color: '#fbbf24', size: 3,
        });
      }
    }
  }
  
  // Camera
  camera = player.x - W * 0.3;
  
  // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }
  
  // Trail particles
  if (Math.random() < 0.5) {
    particles.push({
      x: player.x + PLAYER_SIZE / 2,
      y: player.y + PLAYER_SIZE,
      vx: -1 - Math.random(),
      vy: (Math.random() - 0.5) * 0.5,
      life: 15,
      color: player.onGround ? '#06b6d4' : '#a78bfa',
      size: 2 + Math.random() * 2,
    });
  }
  
  updateHUD();
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  const groundY = H * GROUND_Y_PCT;
  
  // Background gradient
  const bgGrad = ctx.createLinearGradient(0, 0, 0, H);
  bgGrad.addColorStop(0, '#0a0a2e');
  bgGrad.addColorStop(0.5, '#1a0a3e');
  bgGrad.addColorStop(1, '#0a0a1a');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, W, H);
  
  // Stars (parallax)
  for (const s of bgStars) {
    const sx = s.x - camera * s.speed;
    const screenX = ((sx % W) + W) % W;
    ctx.globalAlpha = s.bright * 0.6;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(screenX, s.y, s.size, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  
  // Ground
  ctx.fillStyle = '#1a1a3e';
  ctx.fillRect(0, groundY, W, H - groundY);
  
  // Ground line glow
  ctx.strokeStyle = '#06b6d4';
  ctx.lineWidth = 2;
  ctx.shadowColor = '#06b6d4';
  ctx.shadowBlur = 10;
  ctx.beginPath();
  ctx.moveTo(0, groundY);
  ctx.lineTo(W, groundY);
  ctx.stroke();
  ctx.shadowBlur = 0;
  
  // Draw gaps in ground
  for (const ob of level) {
    if (ob.type === 'gap') {
      const gx = ob.x - camera;
      ctx.fillStyle = '#050510';
      ctx.fillRect(gx, groundY, ob.w, H - groundY + 10);
      // Danger stripes
      ctx.strokeStyle = '#ef4444';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(gx, groundY); ctx.lineTo(gx, groundY + 20);
      ctx.moveTo(gx + ob.w, groundY); ctx.lineTo(gx + ob.w, groundY + 20);
      ctx.stroke();
    }
  }
  
  // Draw obstacles
  for (const ob of level) {
    const ox = ob.x - camera;
    if (ox < -100 || ox > W + 100) continue;
    
    if (ob.type === 'spike') {
      // Neon spike triangle
      ctx.fillStyle = '#ef4444';
      ctx.shadowColor = '#ef4444';
      ctx.shadowBlur = 8;
      ctx.beginPath();
      ctx.moveTo(ox, ob.y);
      ctx.lineTo(ox + ob.w, ob.y);
      ctx.lineTo(ox + ob.w / 2, ob.y - ob.h);
      ctx.closePath();
      ctx.fill();
      ctx.shadowBlur = 0;
    }
    
    if (ob.type === 'block') {
      ctx.fillStyle = '#2d2d5e';
      ctx.strokeStyle = '#a78bfa';
      ctx.lineWidth = 2;
      ctx.fillRect(ox, ob.y, ob.w, ob.h);
      ctx.strokeRect(ox, ob.y, ob.w, ob.h);
    }
    
    if (ob.type === 'portal') {
      // Glowing portal
      const px = ox + ob.w / 2;
      const py = ob.y + ob.h / 2;
      ctx.strokeStyle = '#22c55e';
      ctx.shadowColor = '#22c55e';
      ctx.shadowBlur = 20;
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(px, py, 25, 0, Math.PI * 2);
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(px, py, 15, 0, Math.PI * 2);
      ctx.stroke();
      ctx.shadowBlur = 0;
      ctx.font = '24px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('🏆', px, py + 8);
    }
  }
  
  // Orbs
  for (const orb of orbs) {
    if (orb.collected) continue;
    const ox = orb.x - camera;
    if (ox < -50 || ox > W + 50) continue;
    ctx.strokeStyle = '#fbbf24';
    ctx.shadowColor = '#fbbf24';
    ctx.shadowBlur = 12;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(ox, orb.y, orb.r, 0, Math.PI * 2);
    ctx.stroke();
    ctx.shadowBlur = 0;
    ctx.fillStyle = 'rgba(251,191,36,0.3)';
    ctx.fill();
  }
  
  // Player
  const px = player.x - camera;
  const py = player.y;
  ctx.save();
  ctx.translate(px + PLAYER_SIZE / 2, py + PLAYER_SIZE / 2);
  ctx.rotate(player.rotation);
  
  // Glow
  ctx.shadowColor = '#06b6d4';
  ctx.shadowBlur = 15;
  ctx.fillStyle = '#06b6d4';
  ctx.fillRect(-PLAYER_SIZE / 2, -PLAYER_SIZE / 2, PLAYER_SIZE, PLAYER_SIZE);
  ctx.shadowBlur = 0;
  
  // Inner
  ctx.fillStyle = '#0e7490';
  ctx.fillRect(-PLAYER_SIZE / 2 + 4, -PLAYER_SIZE / 2 + 4, PLAYER_SIZE - 8, PLAYER_SIZE - 8);
  
  // Icon
  ctx.fillStyle = '#fff';
  ctx.font = `${PLAYER_SIZE * 0.5}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('▶', 2, 0);
  
  ctx.restore();
  
  // Particles
  for (const p of particles) {
    ctx.globalAlpha = p.life / 25;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x - camera, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function die() {
  player.dead = true;
  gameRunning = false;
  playCrash();
  // Explosion
  for (let i = 0; i < 15; i++) {
    particles.push({
      x: player.x + PLAYER_SIZE / 2,
      y: player.y + PLAYER_SIZE / 2,
      vx: (Math.random() - 0.5) * 10,
      vy: (Math.random() - 0.5) * 10,
      life: 30,
      color: Math.random() < 0.5 ? '#06b6d4' : '#a78bfa',
      size: 3 + Math.random() * 4,
    });
  }
  
  canvas.style.pointerEvents = 'none';
  const pct = Math.min(100, Math.floor((player.x / LEVEL_LENGTH) * 100));
  setTimeout(() => {
    document.getElementById('death-score').textContent = pct + '%';
    document.getElementById('death-pct').textContent = 'Attempt ' + attempt;
    document.getElementById('death-name').value = localStorage.getItem('ajgt_name') || '';
    document.getElementById('death-screen').style.display = 'flex';
  }, 500);
}

function win() {
  player.won = true;
  gameRunning = false;
  playNote(523, 0.2, 'sine', 0.1);
  playNote(659, 0.2, 'sine', 0.1);
  setTimeout(() => playNote(784, 0.3, 'sine', 0.12), 200);
  setTimeout(() => playNote(1047, 0.5, 'sine', 0.15), 400);
  
  canvas.style.pointerEvents = 'none';
  setTimeout(() => {
    document.getElementById('death-screen').querySelector('h1').textContent = '🏆 Level Complete!';
    document.getElementById('death-score').textContent = '100%';
    document.getElementById('death-pct').textContent = 'Attempt ' + attempt;
    document.getElementById('death-name').value = localStorage.getItem('ajgt_name') || '';
    document.getElementById('death-screen').style.display = 'flex';
  }, 800);
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}
