<script>
var canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d');
var W,H;
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight}
window.addEventListener('resize',resize);resize();

var TABLE_PAD=20,RAIL=14;
var TX,TY,TW,TH,POCKET_R,BALL_R;
function calcTable(){
  var maxW=W-TABLE_PAD*2,maxH=H-80-TABLE_PAD*2;
  var ratio=1.8;
  if(maxW/maxH>ratio){TW=maxH*ratio;TH=maxH}else{TW=maxW;TH=maxW/ratio}
  TX=(W-TW)/2;TY=50+(H-50-TH)/2;
  BALL_R=Math.max(TW*0.022,10);
  POCKET_R=BALL_R*2.4;
}
calcTable();
window.addEventListener('resize',function(){resize();calcTable()});

function getPockets(){
  return[
    {x:TX+POCKET_R*0.5,y:TY+POCKET_R*0.5},
    {x:TX+TW/2,y:TY+POCKET_R*0.3},
    {x:TX+TW-POCKET_R*0.5,y:TY+POCKET_R*0.5},
    {x:TX+POCKET_R*0.5,y:TY+TH-POCKET_R*0.5},
    {x:TX+TW/2,y:TY+TH-POCKET_R*0.3},
    {x:TX+TW-POCKET_R*0.5,y:TY+TH-POCKET_R*0.5}
  ];
}

// Ball colors: 1-7 solids, 8 black, 9-15 stripes
var BALL_COLORS=['#fbbf24','#3b82f6','#ef4444','#7c3aed','#f97316','#22c55e','#92400e','#111','#fbbf24','#3b82f6','#ef4444','#7c3aed','#f97316','#22c55e','#92400e'];

// === AUDIO ===
var audioCtx,musicGain,sfxGain,musicNode;
function initAudio(){
  if(audioCtx)return;audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  musicGain=audioCtx.createGain();sfxGain=audioCtx.createGain();
  musicGain.connect(audioCtx.destination);sfxGain.connect(audioCtx.destination);
  musicGain.gain.value=parseFloat(localStorage.getItem('tp_musicVol')||'0.5');
  sfxGain.gain.value=parseFloat(localStorage.getItem('tp_sfxVol')||'0.7');
  document.getElementById('musicVol').value=Math.round(musicGain.gain.value*100);
  document.getElementById('musicVolVal').textContent=Math.round(musicGain.gain.value*100);
  document.getElementById('sfxVol').value=Math.round(sfxGain.gain.value*100);
  document.getElementById('sfxVolVal').textContent=Math.round(sfxGain.gain.value*100);
}
function setMusicVol(v){if(!audioCtx)initAudio();musicGain.gain.value=v/100;localStorage.setItem('tp_musicVol',v/100);document.getElementById('musicVolVal').textContent=v}
function setSfxVol(v){if(!audioCtx)initAudio();sfxGain.gain.value=v/100;localStorage.setItem('tp_sfxVol',v/100);document.getElementById('sfxVolVal').textContent=v}
var musicOn=true;
function toggleMusic(){musicOn=!musicOn;document.getElementById('musicBtn').textContent=musicOn?'🔊':'🔇';if(musicOn)startMusic();else stopMusic()}
function toggleSettings(){var o=document.getElementById('settingsOverlay');o.style.display=o.style.display==='flex'?'none':'flex'}
function playNote(f,d,t,v){if(!audioCtx)return;var o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type=t||'sine';o.frequency.value=f;g.gain.value=v||0.08;o.connect(g);g.connect(sfxGain);o.start();g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+d);o.stop(audioCtx.currentTime+d)}
function sfxHit(power){playNote(200+power*100,0.06,'triangle',0.1);playNote(400+power*50,0.04,'sine',0.06)}
function sfxPocket(){playNote(600,0.08,'sine',0.1);setTimeout(function(){playNote(800,0.1,'sine',0.08)},40)}
function sfxBounce(){playNote(300,0.04,'triangle',0.04)}
function sfxCollide(){playNote(250,0.05,'triangle',0.05)}
function sfxFoul(){playNote(150,0.3,'sine',0.1)}
function sfxWin(){playNote(523,0.1,'sine',0.1);setTimeout(function(){playNote(659,0.1,'sine',0.1)},80);setTimeout(function(){playNote(784,0.15,'sine',0.12)},160)}
function sfxLose(){playNote(200,0.3,'sine',0.12);setTimeout(function(){playNote(150,0.3,'sine',0.1)},150)}
var musicPlaying=false;
function startMusic(){
  if(!audioCtx||!musicOn||musicPlaying)return;musicPlaying=true;var bc=0;
  function beat(){
    if(!musicPlaying||!musicOn)return;var t=audioCtx.currentTime;
    var notes=[196,220,247,261,220,196,174,196];var bn=notes[bc%notes.length];
    var o1=audioCtx.createOscillator(),g1=audioCtx.createGain();o1.type='triangle';o1.frequency.value=bn;g1.gain.value=0.03;
    o1.connect(g1);g1.connect(musicGain);o1.start(t);g1.gain.exponentialRampToValueAtTime(0.001,t+0.4);o1.stop(t+0.45);
    var ob=audioCtx.createOscillator(),gb=audioCtx.createGain();ob.type='sine';ob.frequency.value=bn/2;gb.gain.value=0.05;
    ob.connect(gb);gb.connect(musicGain);ob.start(t);gb.gain.exponentialRampToValueAtTime(0.001,t+0.35);ob.stop(t+0.4);
    if(bc%2===0){var ok=audioCtx.createOscillator(),gk=audioCtx.createGain();ok.type='sine';ok.frequency.value=70;gk.gain.value=0.08;ok.connect(gk);gk.connect(musicGain);ok.start(t);ok.frequency.exponentialRampToValueAtTime(30,t+0.1);gk.gain.exponentialRampToValueAtTime(0.001,t+0.12);ok.stop(t+0.15)}
    bc++;musicNode=setTimeout(beat,450);
  }
  beat();
}
function stopMusic(){musicPlaying=false;if(musicNode)clearTimeout(musicNode)}

// === GAME STATE ===
// Difficulty: 0=easy, 1=medium, 2=hard, 3=pro
var npcDifficulty=1;
var DIFF_NAMES=['Easy 😴','Medium 😐','Hard 😈','Pro 💀'];
var DIFF_COLORS=['#22c55e','#f59e0b','#ef4444','#7c3aed'];
// accuracy: how much randomness to add (lower=better), thinkTime: frames, powerAccuracy
var DIFF_SETTINGS=[
  {accuracy:0.4,thinkTime:90,powerMult:0.7,missChance:0.3,scoreBonus:1},
  {accuracy:0.25,thinkTime:60,powerMult:0.85,missChance:0.15,scoreBonus:1.5},
  {accuracy:0.12,thinkTime:40,powerMult:0.95,missChance:0.05,scoreBonus:2},
  {accuracy:0.04,thinkTime:25,powerMult:1.0,missChance:0.01,scoreBonus:3},
];
var score,sessionCoins,gameRunning,frame;
var cueBall,balls,particles,textPops;
var aiming,aimStart,aimCurrent,shooting;
var FRICTION=0.985,MIN_SPEED=0.12;
// Turn system
var playerTurn; // true=player, false=NPC
var playerType; // 'solids' or 'stripes' or null (not yet assigned)
var npcType;
var typesAssigned;
var pocketedThisTurn; // balls pocketed during current shot
var foulThisTurn;
var firstBallHit; // first object ball the cue ball touches
var hitRail; // did any ball hit a rail after contact
var npcThinking,npcTimer;
var gameOver;
var ballInHand; // true = player can place cue ball anywhere
var placingBall; // true = currently dragging cue ball to place it
var typesPreShot; // were types assigned before current shot

function makeBall(x,y,num){
  return {x:x,y:y,vx:0,vy:0,r:BALL_R,num:num,color:num===0?'#fff':BALL_COLORS[num-1],solid:num>=1&&num<=7,stripe:num>=9&&num<=15,pocketed:false};
}

function rackBalls(){
  var bls=[];
  var startX=TX+TW*0.7,startY=TY+TH/2;
  var d=BALL_R*2.1;
  var order=[1,2,9,3,10,4,11,8,5,12,6,13,7,14,15];
  var bi=0;
  for(var row=0;row<5;row++){
    for(var col=0;col<=row;col++){
      var bx=startX+row*d*0.866;
      var by=startY+(col-row/2)*d;
      bls.push(makeBall(bx,by,order[bi]));
      bi++;
    }
  }
  return bls;
}

function initGame(){
  calcTable();
  cueBall={x:TX+TW*0.25,y:TY+TH/2,vx:0,vy:0,r:BALL_R,num:0,color:'#fff',pocketed:false};
  balls=rackBalls();
  aiming=false;shooting=false;
  playerTurn=true;playerType=null;npcType=null;typesAssigned=false;
  pocketedThisTurn=[];foulThisTurn=false;firstBallHit=-1;hitRail=false;
  npcThinking=false;npcTimer=0;gameOver=false;
  ballInHand=false;placingBall=false;
  showTurnBanner('Your break!','#22c55e');

}

function startGame(diff){if(diff!==undefined)npcDifficulty=diff;initAudio();startMusic();document.getElementById('startScreen').classList.add('hidden');document.getElementById('win-screen').style.display='none';canvas.style.pointerEvents='auto';score=0;sessionCoins=0;frame=0;gameRunning=true;initGame()}
function retry(){startGame()}

function allMoving(){
  if(cueBall&&!cueBall.pocketed&&(Math.abs(cueBall.vx)>MIN_SPEED||Math.abs(cueBall.vy)>MIN_SPEED))return true;
  for(var i=0;i<balls.length;i++){if(!balls[i].pocketed&&(Math.abs(balls[i].vx)>MIN_SPEED||Math.abs(balls[i].vy)>MIN_SPEED))return true}
  return false;
}

function shoot(power,dx,dy){
  if(!gameRunning||allMoving()||cueBall.pocketed||gameOver||ballInHand)return;
  var len=Math.sqrt(dx*dx+dy*dy);if(len===0)return;
  var p=Math.min(power,1)*14;
  cueBall.vx=-dx/len*p;
  cueBall.vy=-dy/len*p;
  sfxHit(power);
  shooting=true;
  pocketedThisTurn=[];foulThisTurn=false;firstBallHit=-1;hitRail=false;typesPreShot=typesAssigned;
  document.getElementById('power-bar').style.display='none';
}

// === NPC AI ===
function npcShoot(){
  if(!gameRunning||gameOver)return;
  var ds=DIFF_SETTINGS[npcDifficulty];
  npcThinking=true;npcTimer=ds.thinkTime;
}
function executeNpcShot(){
  npcThinking=false;
  // Find best target ball
  var targets=[];
  for(var i=0;i<balls.length;i++){
    var b=balls[i];if(b.pocketed)continue;
    if(b.num===8){
      // Only target 8 if all NPC balls pocketed
      var npcRemaining=countRemaining(npcType);
      if(npcRemaining===0)targets.push(b);
    }else if(!typesAssigned||
      (npcType==='solids'&&b.solid)||
      (npcType==='stripes'&&b.stripe)){
      targets.push(b);
    }
  }
  if(targets.length===0){
    // No valid targets, hit any ball
    for(var i=0;i<balls.length;i++){if(!balls[i].pocketed)targets.push(balls[i])}
  }
  if(targets.length===0)return;

  // Pick best shot: find ball+pocket combo with clearest path
  var bestScore=-1,bestDx=0,bestDy=0,bestPower=0.6;
  var pockets=getPockets();
  for(var ti=0;ti<targets.length;ti++){
    var tb=targets[ti];
    for(var pi=0;pi<pockets.length;pi++){
      var pk=pockets[pi];
      // Direction from ball to pocket
      var bpx=pk.x-tb.x,bpy=pk.y-tb.y;
      var bpLen=Math.sqrt(bpx*bpx+bpy*bpy);
      // Aim point: behind ball relative to pocket
      var aimX=tb.x-bpx/bpLen*BALL_R*2;
      var aimY=tb.y-bpy/bpLen*BALL_R*2;
      // Direction from cue to aim
      var cdx=aimX-cueBall.x,cdy=aimY-cueBall.y;
      var cLen=Math.sqrt(cdx*cdx+cdy*cdy);
      if(cLen<BALL_R*3)continue;
      // Check if path from cue to target is blocked by other balls
      var blocked=false;
      for(var bi=0;bi<balls.length;bi++){
        var ob=balls[bi];if(ob.pocketed||ob===tb)continue;
        // Point-to-line distance from ob to cue→aim line
        var ex=aimX-cueBall.x,ey=aimY-cueBall.y;
        var fx=ob.x-cueBall.x,fy=ob.y-cueBall.y;
        var t2=Math.max(0,Math.min(1,(fx*ex+fy*ey)/(ex*ex+ey*ey)));
        var cx2=cueBall.x+t2*ex-ob.x,cy2=cueBall.y+t2*ey-ob.y;
        if(Math.sqrt(cx2*cx2+cy2*cy2)<BALL_R*2.2){blocked=true;break}
      }
      // Score based on alignment and distance
      var dot=(cdx/cLen)*(bpx/bpLen)+(cdy/cLen)*(bpy/bpLen);
      var alignScore=Math.max(0,dot);
      var distScore=1-Math.min(cLen/(TW),1);
      var pocketDist=1-Math.min(bpLen/(TW*0.8),1);
      var sc=alignScore*0.5+distScore*0.2+pocketDist*0.3;
      if(blocked)sc*=0.1; // heavily penalize blocked shots
      // Add randomness based on difficulty
      var ds=DIFF_SETTINGS[npcDifficulty];
      sc*=(1-ds.accuracy)+Math.random()*ds.accuracy*2;
      if(sc>bestScore){bestScore=sc;bestDx=cdx;bestDy=cdy;bestPower=(0.3+sc*0.5)*ds.powerMult}
    }
  }
  if(bestScore<0){
    // Fallback: aim at nearest target ball
    var nearest=targets[0];var nd=Infinity;
    for(var ni=0;ni<targets.length;ni++){var dx3=targets[ni].x-cueBall.x,dy3=targets[ni].y-cueBall.y;var d3=dx3*dx3+dy3*dy3;if(d3<nd){nd=d3;nearest=targets[ni]}}
    bestDx=nearest.x-cueBall.x;bestDy=nearest.y-cueBall.y;bestPower=0.5;
  }
  pocketedThisTurn=[];foulThisTurn=false;firstBallHit=-1;hitRail=false;typesPreShot=typesAssigned;
  var ds2=DIFF_SETTINGS[npcDifficulty];
  // Intentional miss chance on easy/medium
  if(Math.random()<ds2.missChance){
    var ang=Math.random()*Math.PI*2;bestDx=Math.cos(ang)*100;bestDy=Math.sin(ang)*100;bestPower=0.3+Math.random()*0.3;
  }
  // Add aim jitter based on difficulty
  var jitter=ds2.accuracy*0.8;
  var len=Math.sqrt(bestDx*bestDx+bestDy*bestDy);
  var shotAngle=Math.atan2(bestDy,bestDx)+(Math.random()-0.5)*jitter;
  cueBall.vx=Math.cos(shotAngle)*bestPower*14;
  cueBall.vy=Math.sin(shotAngle)*bestPower*14;
  sfxHit(bestPower);
  shooting=true;
}

function countRemaining(type){
  if(!type)return 99;
  var c=0;
  for(var i=0;i<balls.length;i++){
    if(balls[i].pocketed||balls[i].num===8)continue;
    if(type==='solids'&&balls[i].solid)c++;
    if(type==='stripes'&&balls[i].stripe)c++;
  }
  return c;
}

function handleTurnEnd(){
  if(gameOver)return;
  var pocketedOwn=false,pocketedOpponent=false,pocketed8=false,scratch=false;
  var foul=false,foulReason='';

  for(var i=0;i<pocketedThisTurn.length;i++){
    var n=pocketedThisTurn[i];
    if(n===0){scratch=true;foul=true;foulReason='Scratch!';continue}
    if(n===8){pocketed8=true;continue}
    if(!typesAssigned){
      if(n>=1&&n<=7){
        if(playerTurn){playerType='solids';npcType='stripes'}else{npcType='solids';playerType='stripes'}
      }else{
        if(playerTurn){playerType='stripes';npcType='solids'}else{npcType='stripes';playerType='solids'}
      }
      typesAssigned=true;
      showTurnBanner(playerTurn?'You: '+(playerType==='solids'?'Solids ●':'Stripes ◐'):'NPC: '+(npcType==='solids'?'Solids ●':'Stripes ◐'),playerTurn?'#22c55e':'#ef4444');
    }
    var currentType=playerTurn?playerType:npcType;
    var isOwn=(currentType==='solids'&&n>=1&&n<=7)||(currentType==='stripes'&&n>=9&&n<=15);
    if(isOwn)pocketedOwn=true;else pocketedOpponent=true;
  }

  // Rule: must hit own ball first (only if types were assigned BEFORE this shot)
  if(typesPreShot&&!scratch&&firstBallHit>0&&!pocketed8){
    var shooterType=playerTurn?playerType:npcType;
    var hitOwn=(shooterType==='solids'&&firstBallHit>=1&&firstBallHit<=7)||(shooterType==='stripes'&&firstBallHit>=9&&firstBallHit<=15);
    var remaining=countRemaining(shooterType);
    if(!hitOwn&&!(remaining===0&&firstBallHit===8)){
      foul=true;foulReason='Wrong ball first!';
    }
  }

  // Rule: must hit something (only foul if cue ball didn't scratch)
  if(firstBallHit===-1&&!scratch&&pocketedThisTurn.length===0){
    foul=true;foulReason='No ball hit!';
  }

  // 8-ball pocketed
  if(pocketed8){
    var shooterType2=playerTurn?playerType:npcType;
    var remaining2=countRemaining(shooterType2);
    if(remaining2===0&&!foul){
      endGame(playerTurn);
    }else{
      endGame(!playerTurn);
    }
    return;
  }

  // Handle fouls — ball in hand for opponent
  if(foul){
    if(scratch){cueBall.pocketed=false}
    cueBall.vx=0;cueBall.vy=0;
    playerTurn=!playerTurn;
    showTurnBanner((foulReason||'Foul!')+' Ball in hand!','#ef4444');
    sfxFoul();
    textPops.push({x:W/2,y:H/2,text:'⚠️ '+(foulReason||'Foul!'),color:'#ef4444',size:24,life:50});
    if(playerTurn){
      // Player gets ball in hand
      ballInHand=true;
      cueBall.pocketed=false;
      cueBall.x=TX+TW*0.25;cueBall.y=TY+TH/2;
      textPops.push({x:W/2,y:H/2+30,text:'Tap to place cue ball',color:'#60a5fa',size:16,life:60});
    }else{
      // NPC gets ball in hand — place near best target
      cueBall.pocketed=false;
      cueBall.x=TX+TW*0.3;cueBall.y=TY+TH/2;
      ballInHand=false;
    }
  }else if(pocketedOwn&&!pocketedOpponent){
    showTurnBanner(playerTurn?'Nice! Go again!':'NPC goes again...', playerTurn?'#22c55e':'#ef4444');
  }else{
    playerTurn=!playerTurn;
    showTurnBanner(playerTurn?'Your turn!':'NPC\'s turn...', playerTurn?'#22c55e':'#ef4444');
  }

  // Score for player pocketing own balls (bonus for harder difficulty)
  var ds3=DIFF_SETTINGS[npcDifficulty];
  if(pocketedOwn){
    score+=Math.round(10*ds3.scoreBonus)*pocketedThisTurn.filter(function(n){return n!==0&&n!==8}).length;
    totalCoins+=pocketedThisTurn.filter(function(n){return n!==0&&n!==8}).length;
    sessionCoins+=pocketedThisTurn.filter(function(n){return n!==0&&n!==8}).length;
    saveShop();updateCoinDisplays();
  }
  updateHUD();

  // NPC turn
  if(!playerTurn&&!gameOver&&!ballInHand){
    setTimeout(function(){npcShoot()},800);
  }
}

function endGame(playerWins){
  gameOver=true;gameRunning=false;
  canvas.style.pointerEvents='none';
  if(playerWins){
    var winBonus=Math.round(50*DIFF_SETTINGS[npcDifficulty].scoreBonus);
    var coinBonus=Math.round(5*DIFF_SETTINGS[npcDifficulty].scoreBonus);
    sfxWin();score+=winBonus;totalCoins+=coinBonus;sessionCoins+=coinBonus;saveShop();updateCoinDisplays();
    document.getElementById('win-title').textContent='🏆 You Win!';
  }else{
    sfxLose();
    document.getElementById('win-title').textContent='😞 NPC Wins!';
  }
  stopMusic();
  setTimeout(function(){
    document.getElementById('win-score').textContent=score;
    document.getElementById('win-info').textContent=playerWins?'You cleared the table!':'Better luck next time!';
    document.getElementById('win-coins').textContent='+'+sessionCoins+' 🪙';
    document.getElementById('win-name').value=localStorage.getItem('ajgt_name')||'';
    document.getElementById('win-screen').style.display='flex';
  },600);
}

function update(){
  frame++;
  // Particles
  for(var pi=particles.length-1;pi>=0;pi--){var p=particles[pi];p.x+=p.vx;p.y+=p.vy;p.life--;if(p.life<=0)particles.splice(pi,1)}
  for(var xi=textPops.length-1;xi>=0;xi--){textPops[xi].y-=1;textPops[xi].life--;if(textPops[xi].life<=0)textPops.splice(xi,1)}
  if(!gameRunning||gameOver)return;

  // NPC thinking
  if(npcThinking){npcTimer--;if(npcTimer<=0)executeNpcShot();return}

  // Move balls
  var allBalls=[cueBall].concat(balls);
  for(var i=0;i<allBalls.length;i++){
    var b=allBalls[i];if(b.pocketed)continue;
    b.x+=b.vx;b.y+=b.vy;
    b.vx*=FRICTION;b.vy*=FRICTION;
    if(Math.abs(b.vx)<MIN_SPEED*0.3)b.vx=0;
    if(Math.abs(b.vy)<MIN_SPEED*0.3)b.vy=0;

    // Trail
    var trail=getTrail();
    if(trail.colors&&(Math.abs(b.vx)>1||Math.abs(b.vy)>1)){
      particles.push({x:b.x,y:b.y,vx:(Math.random()-0.5)*0.5,vy:(Math.random()-0.5)*0.5,life:12,color:trail.colors[Math.floor(Math.random()*trail.colors.length)],size:1.5+Math.random()});
    }

    // Walls
    var left=TX+RAIL+b.r,right=TX+TW-RAIL-b.r,top2=TY+RAIL+b.r,bot=TY+TH-RAIL-b.r;
    if(b.x<left){b.x=left;b.vx=-b.vx*0.75;sfxBounce();if(shooting)hitRail=true}
    if(b.x>right){b.x=right;b.vx=-b.vx*0.75;sfxBounce();if(shooting)hitRail=true}
    if(b.y<top2){b.y=top2;b.vy=-b.vy*0.75;sfxBounce();if(shooting)hitRail=true}
    if(b.y>bot){b.y=bot;b.vy=-b.vy*0.75;sfxBounce();if(shooting)hitRail=true}

    // Pockets
    var pockets=getPockets();
    for(var pi2=0;pi2<pockets.length;pi2++){
      var px=pockets[pi2].x,py=pockets[pi2].y;
      var dd=Math.sqrt((b.x-px)*(b.x-px)+(b.y-py)*(b.y-py));
      if(dd<POCKET_R*0.65){
        b.pocketed=true;b.vx=0;b.vy=0;
        sfxPocket();
        pocketedThisTurn.push(b.num);
        // Effects
        var fx=getEffect();
        if(fx.colors){for(var fi=0;fi<10;fi++){var ang=Math.random()*Math.PI*2,spd=2+Math.random()*3;particles.push({x:px,y:py,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,life:20,color:fx.colors[fi%fx.colors.length],size:2+Math.random()*2})}}
        if(b.num===0){
          textPops.push({x:W/2,y:TY-10,text:'Scratch! 😬',color:'#ef4444',size:22,life:40});
        }else{
          var label=b.num===8?'8-Ball!':b.solid?'Solid '+b.num:'Stripe '+b.num;
          textPops.push({x:px,y:py-15,text:label,color:'#22c55e',size:18,life:30});
        }
      }
    }
  }

  // Ball-ball collisions
  for(var i=0;i<allBalls.length;i++){
    for(var j=i+1;j<allBalls.length;j++){
      var a=allBalls[i],b2=allBalls[j];
      if(a.pocketed||b2.pocketed)continue;
      var cdx=b2.x-a.x,cdy=b2.y-a.y;
      var dist=Math.sqrt(cdx*cdx+cdy*cdy);
      if(dist<a.r+b2.r&&dist>0){
        sfxCollide();
        // Track first ball hit by cue ball
        if(shooting&&firstBallHit===-1){
          if(a===cueBall&&b2.num>0)firstBallHit=b2.num;
          if(b2===cueBall&&a.num>0)firstBallHit=a.num;
        }
        var nx=cdx/dist,ny=cdy/dist;
        var overlap=(a.r+b2.r)-dist;
        a.x-=nx*overlap/2;a.y-=ny*overlap/2;
        b2.x+=nx*overlap/2;b2.y+=ny*overlap/2;
        var dvx=a.vx-b2.vx,dvy=a.vy-b2.vy;
        var dvn=dvx*nx+dvy*ny;
        if(dvn>0){
          a.vx-=dvn*nx*0.95;a.vy-=dvn*ny*0.95;
          b2.vx+=dvn*nx*0.95;b2.vy+=dvn*ny*0.95;
        }
      }
    }
  }

  // Check if all stopped after a shot
  if(shooting&&!allMoving()){
    shooting=false;
    handleTurnEnd();
  }
}

function drawBall(b){
  if(b.pocketed)return;
  ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
  ctx.fillStyle=b.num===0?'#fff':b.color;ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,0.4)';ctx.lineWidth=1.5;ctx.stroke();

  // Stripe: white band across middle
  if(b.stripe){
    ctx.save();ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.clip();
    ctx.fillStyle='#fff';
    ctx.fillRect(b.x-b.r,b.y-b.r*0.4,b.r*2,b.r*0.8);
    ctx.restore();
  }

  // Number circle (all balls except cue)
  if(b.num>0){
    ctx.beginPath();ctx.arc(b.x,b.y,b.r*0.42,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();
    ctx.fillStyle='#000';ctx.font='bold '+Math.max(Math.round(b.r*0.6),7)+'px sans-serif';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(b.num,b.x,b.y+1);
  }

  // Shine
  ctx.beginPath();ctx.arc(b.x-b.r*0.3,b.y-b.r*0.3,b.r*0.18,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,0.4)';ctx.fill();
}

function draw(){
  ctx.fillStyle='#0a0a12';ctx.fillRect(0,0,W,H);
  var table=getTable();
  // Wood border
  ctx.fillStyle=table.wood;ctx.fillRect(TX-8,TY-8,TW+16,TH+16);
  // Rail
  ctx.fillStyle=table.rail;ctx.fillRect(TX,TY,TW,TH);
  // Felt
  ctx.fillStyle=table.felt;ctx.fillRect(TX+RAIL,TY+RAIL,TW-RAIL*2,TH-RAIL*2);

  // Pockets
  var pockets=getPockets();
  for(var pi=0;pi<pockets.length;pi++){
    ctx.beginPath();ctx.arc(pockets[pi].x,pockets[pi].y,POCKET_R,0,Math.PI*2);ctx.fillStyle='#000';ctx.fill();
    ctx.beginPath();ctx.arc(pockets[pi].x,pockets[pi].y,POCKET_R-2,0,Math.PI*2);ctx.fillStyle='#1a1a1a';ctx.fill();
  }

  // Draw all object balls then cue ball on top
  for(var bi=0;bi<balls.length;bi++)drawBall(balls[bi]);
  if(cueBall)drawBall(cueBall);

  // Aiming line & cue stick (player only)
  if(aiming&&aimStart&&aimCurrent&&!allMoving()&&playerTurn&&!npcThinking){
    var adx=aimCurrent.x-aimStart.x,ady=aimCurrent.y-aimStart.y;
    var power=Math.min(Math.sqrt(adx*adx+ady*ady)/150,1);
    var len=Math.sqrt(adx*adx+ady*ady);
    if(len>5){
      var nx=-adx/len,ny=-ady/len;
      ctx.setLineDash([4,6]);ctx.strokeStyle='rgba(255,255,255,0.4)';ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(cueBall.x,cueBall.y);ctx.lineTo(cueBall.x+nx*250,cueBall.y+ny*250);ctx.stroke();
      ctx.setLineDash([]);
      var cue=getCue();
      var stickStart=20+power*30;
      var sx=cueBall.x-nx*stickStart,sy=cueBall.y-ny*stickStart;
      var ex=sx-nx*100,ey=sy-ny*100;
      ctx.strokeStyle=cue.color==='rainbow'?'hsl('+(Date.now()/10%360)+',80%,50%)':cue.color;
      ctx.lineWidth=5;ctx.lineCap='round';
      ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(ex,ey);ctx.stroke();
      ctx.strokeStyle=cue.tip;ctx.lineWidth=3;
      ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(sx-nx*8,sy-ny*8);ctx.stroke();
    }
    document.getElementById('power-fill').style.height=(power*100)+'%';
  }

  // Ball in hand indicator
  if(ballInHand&&gameRunning){
    ctx.strokeStyle='rgba(96,165,250,0.6)';ctx.lineWidth=2;ctx.setLineDash([4,4]);
    ctx.beginPath();ctx.arc(cueBall.x,cueBall.y,cueBall.r+6,0,Math.PI*2);ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle='#60a5fa';ctx.font='bold 14px sans-serif';ctx.textAlign='center';
    ctx.fillText('👆 Tap to place cue ball',W/2,TY-10);
  }

  // NPC thinking indicator
  if(npcThinking){
    ctx.fillStyle='rgba(239,68,68,0.8)';ctx.font='bold 16px sans-serif';ctx.textAlign='center';
    ctx.fillText('🤖 NPC ('+DIFF_NAMES[npcDifficulty]+') thinking...',W/2,TY-10);
  }

  // Type indicators at bottom
  if(typesAssigned&&gameRunning){
    ctx.font='bold 12px sans-serif';ctx.textAlign='center';
    var py2=TY+TH+25;
    ctx.fillStyle='#22c55e';ctx.fillText('You: '+(playerType==='solids'?'● Solids (1-7)':'◐ Stripes (9-15)'),W/2-80,py2);
    ctx.fillStyle='#ef4444';ctx.fillText('NPC: '+(npcType==='solids'?'● Solids (1-7)':'◐ Stripes (9-15)'),W/2+80,py2);
  }

  // Particles
  for(var pi2=0;pi2<particles.length;pi2++){var p=particles[pi2];ctx.globalAlpha=p.life/20;ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.size||2,0,Math.PI*2);ctx.fill()}
  ctx.globalAlpha=1;
  // Text pops
  for(var xi=0;xi<textPops.length;xi++){var tp=textPops[xi];ctx.globalAlpha=tp.life/40;ctx.fillStyle=tp.color;ctx.font='bold '+tp.size+'px sans-serif';ctx.textAlign='center';ctx.fillText(tp.text,tp.x,tp.y)}
  ctx.globalAlpha=1;
}

function loop(){update();draw();requestAnimationFrame(loop)}

// Input
function getPos(e){if(e.touches)return{x:e.touches[0].clientX,y:e.touches[0].clientY};return{x:e.clientX,y:e.clientY}}
function onDown(e){
  if(!gameRunning||allMoving()||!playerTurn||npcThinking||gameOver)return;
  if(cueBall.pocketed)return;
  var pos=getPos(e);
  // Ball in hand — place cue ball
  if(ballInHand){
    var nx=pos.x,ny=pos.y;
    // Keep within table bounds
    var left=TX+RAIL+cueBall.r+2,right=TX+TW-RAIL-cueBall.r-2;
    var top3=TY+RAIL+cueBall.r+2,bot2=TY+TH-RAIL-cueBall.r-2;
    nx=Math.max(left,Math.min(right,nx));
    ny=Math.max(top3,Math.min(bot2,ny));
    // Check not overlapping another ball
    var overlap=false;
    for(var bi=0;bi<balls.length;bi++){
      if(balls[bi].pocketed)continue;
      var dd=Math.sqrt((nx-balls[bi].x)*(nx-balls[bi].x)+(ny-balls[bi].y)*(ny-balls[bi].y));
      if(dd<cueBall.r+balls[bi].r+2)overlap=true;
    }
    if(!overlap){
      cueBall.x=nx;cueBall.y=ny;
      ballInHand=false;placingBall=false;
      showTurnBanner('Cue ball placed! Shoot!','#22c55e');
    }
    return;
  }
  aiming=true;aimStart=pos;aimCurrent=pos;
  document.getElementById('power-bar').style.display='block';
}
function onMove(e){if(!aiming)return;e.preventDefault();aimCurrent=getPos(e)}
function onUp(e){
  if(!aiming)return;aiming=false;
  if(aimCurrent&&aimStart){
    var dx=aimCurrent.x-aimStart.x,dy=aimCurrent.y-aimStart.y;
    var power=Math.min(Math.sqrt(dx*dx+dy*dy)/150,1);
    if(power>0.05)shoot(power,dx,dy);
  }
  document.getElementById('power-bar').style.display='none';
}
canvas.addEventListener('mousedown',onDown);canvas.addEventListener('mousemove',onMove);canvas.addEventListener('mouseup',onUp);
canvas.addEventListener('touchstart',function(e){e.preventDefault();onDown(e)},{passive:false});
canvas.addEventListener('touchmove',function(e){e.preventDefault();onMove(e)},{passive:false});
canvas.addEventListener('touchend',function(e){onUp(e)});

particles=[];textPops=[];
cueBall={x:-100,y:-100,vx:0,vy:0,r:10,num:0,color:'#fff',pocketed:true};
balls=[];gameRunning=false;gameOver=false;score=0;sessionCoins=0;frame=0;
playerTurn=true;npcThinking=false;shooting=false;aiming=false;ballInHand=false;placingBall=false;firstBallHit=-1;hitRail=false;
updateCoinDisplays();
loop();
</script>
