<body>
<a id="back" href="index.html">← Back</a>
<canvas id="game"></canvas>

<div id="hud">
  <div class="hud-box" id="score-hud">0</div>
  <div class="hud-box" id="height-hud">0m</div>
</div>

<div id="controls">
  <div class="ctrl-side">
    <div class="btn btn-left" data-action="left">◀</div>
    <div class="btn btn-right" data-action="right">▶</div>
  </div>
  <div class="ctrl-side">
    <div class="btn btn-jump" data-action="jump">⬆</div>
  </div>
</div>

<div id="overlay">
  <h1>🌋 Lava Leap</h1>
  <h2>The floor is LAVA!</h2>
  <p>Jump from platform to platform as the lava rises! Collect coins ⭐ and power-ups. Don't fall in the lava or you're toast! 🔥</p>
  <p style="color:#64748b;font-size:12px">◀▶ Move · ⬆ Jump (tap again for double jump!)</p>
  <button id="play-btn">🌋 Jump!</button>
  <button id="lb-show-btn" onclick="_lbShow()">🏆 Leaderboard</button>
</div>

<div id="lb-overlay"><h2>🏆 Leaderboard</h2><div id="lb-list"></div><button id="lb-close-btn">Close</button></div>
<div id="name-modal"><h2>New Score!</h2><p id="nm-score-text">Score: 0</p><input type="text" id="name-input" placeholder="Your name" maxlength="16" autocomplete="off"><button id="name-submit">Submit Score</button><button id="name-skip">🏆 Skip & View Leaderboard</button></div>

<script>
const C = document.getElementById('game');
const X = C.getContext('2d');
let W, H;
function resize() { W = C.width = window.innerWidth; H = C.height = window.innerHeight; }
resize(); window.addEventListener('resize', resize);

let playing = false, score = 0, frame = 0, maxHeight = 0;
let particles = [];

// Player
const P = {
  x: 0, y: 0, vx: 0, vy: 0,
  w: 24, h: 28,
  onGround: false,
  jumps: 0, maxJumps: 2,
  speed: 5, jumpForce: -11,
  facing: 1, dead: false,
  walkFrame: 0
};

// World
const GRAVITY = 0.4;
let platforms = [];
let coins = [];
let powerups = [];
let lavaY = 0, lavaRiseSpeed = 0.3, baseLavaSpeed = 0.3;
let cameraY = 0;
let highestPlatY = 0;

const PLAT_TYPES = [
  { type: 'normal', color: '#6b7280', w: 70 },
  { type: 'wide', color: '#4b5563', w: 110 },
  { type: 'small', color: '#9ca3af', w: 45 },
  { type: 'moving', color: '#3b82f6', w: 65 },
  { type: 'crumble', color: '#92400e', w: 60 },
  { type: 'bounce', color: '#22c55e', w: 60 },
];

function generatePlatforms(fromY, toY) {
  let y = fromY;
  while (y > toY) {
    y -= 50 + Math.random() * 40;
    const typeIdx = Math.random() < 0.15 ? 3 : Math.random() < 0.1 ? 4 : Math.random() < 0.1 ? 5 : Math.random() < 0.3 ? 2 : Math.random() < 0.5 ? 1 : 0;
    const pt = PLAT_TYPES[typeIdx];
    const pw = pt.w + Math.random() * 20;
    const px = 20 + Math.random() * (W - 40 - pw);
    const plat = {
      x: px, y: y, w: pw, h: 10,
      type: pt.type, color: pt.color,
      moveDir: Math.random() > 0.5 ? 1 : -1,
      moveSpeed: 1 + Math.random(),
      crumbling: false, crumbleTimer: 0,
      bounced: false
    };
    platforms.push(plat);

    // Coin on some platforms
    if (Math.random() < 0.4) {
      coins.push({ x: px + pw / 2, y: y - 20, collected: false, bob: Math.random() * Math.PI * 2 });
    }

    // Rare power-up
    if (Math.random() < 0.08) {
      const types = ['shield', 'magnet', 'rocket'];
      powerups.push({
        x: px + pw / 2, y: y - 25,
        type: types[Math.floor(Math.random() * types.length)],
        collected: false, bob: Math.random() * Math.PI * 2
      });
    }
  }
  highestPlatY = toY;
}

function resetGame() {
  score = 0; frame = 0; maxHeight = 0;
  P.x = W / 2 - P.w / 2; P.y = H - 100;
  P.vx = 0; P.vy = 0; P.onGround = false; P.jumps = 0; P.dead = false;
  platforms = []; coins = []; powerups = []; particles = [];
  lavaY = H + 50; lavaRiseSpeed = baseLavaSpeed;
  cameraY = 0; highestPlatY = H;

  // Starting platform
  platforms.push({ x: W / 2 - 50, y: H - 60, w: 100, h: 10, type: 'normal', color: '#6b7280' });
  generatePlatforms(H - 100, -H);
  updateHUD();
}

// Input
const actions = {};
let jumpPressed = false;

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft' || e.key === 'a') actions.left = true;
  if (e.key === 'ArrowRight' || e.key === 'd') actions.right = true;
  if ((e.key === 'ArrowUp' || e.key === 'w' || e.key === ' ') && !jumpPressed) { jumpPressed = true; tryJump(); }
});
document.addEventListener('keyup', e => {
  if (e.key === 'ArrowLeft' || e.key === 'a') actions.left = false;
  if (e.key === 'ArrowRight' || e.key === 'd') actions.right = false;
  if (e.key === 'ArrowUp' || e.key === 'w' || e.key === ' ') jumpPressed = false;
});

document.querySelectorAll('.btn').forEach(btn => {
  const act = btn.dataset.action;
  const down = e => { e.preventDefault(); e.stopPropagation(); if (act === 'jump') tryJump(); else actions[act] = true; };
  const up = e => { e.preventDefault(); e.stopPropagation(); if (act !== 'jump') actions[act] = false; };
  btn.addEventListener('touchstart', down, { passive: false });
  btn.addEventListener('touchend', up, { passive: false });
  btn.addEventListener('touchcancel', up, { passive: false });
  btn.addEventListener('mousedown', down);
  btn.addEventListener('mouseup', up);
  btn.addEventListener('mouseleave', up);
});

function tryJump() {
  if (!playing || P.dead) return;
  if (P.jumps < P.maxJumps) {
    P.vy = P.jumpForce;
    P.jumps++;
    P.onGround = false;
    addParticles(P.x + P.w/2, P.y + P.h, '#fbbf24', 5, 3);
    if (P.jumps === 2) addParticles(P.x + P.w/2, P.y + P.h, '#a78bfa', 8, 4);
  }
}

function addParticles(x, y, color, count, speed) {
  for (let i = 0; i < count; i++) {
    particles.push({ x, y, vx: (Math.random()-0.5)*(speed||3), vy: -Math.random()*(speed||3),
      life: 20+Math.random()*15, maxLife: 35, color, size: 2+Math.random()*3 });
  }
}

function updateHUD() {
  document.getElementById('score-hud').textContent = '⭐ ' + score;
  document.getElementById('height-hud').textContent = Math.floor(maxHeight / 10) + 'm';
}

function update() {
  if (!playing || P.dead) return;
  frame++;

  // Movement
  if (actions.left) { P.vx = -P.speed; P.facing = -1; }
  else if (actions.right) { P.vx = P.speed; P.facing = 1; }
  else P.vx *= 0.7;

  // Physics
  P.vy += GRAVITY;
  P.x += P.vx;
  P.y += P.vy;

  // Wrap horizontally
  if (P.x + P.w < 0) P.x = W;
  if (P.x > W) P.x = -P.w;

  P.walkFrame += Math.abs(P.vx) * 0.1;

  // Platform collision (only when falling)
  P.onGround = false;
  if (P.vy >= 0) {
    for (const pl of platforms) {
      if (pl.crumbling && pl.crumbleTimer > 20) continue;
      const platX = pl.type === 'moving' ? pl.x + Math.sin(frame * 0.02 * (pl.moveSpeed || 1)) * 40 : pl.x;
      if (P.x + P.w > platX && P.x < platX + pl.w &&
          P.y + P.h >= pl.y && P.y + P.h <= pl.y + pl.h + P.vy + 2) {
        P.y = pl.y - P.h;
        if (pl.type === 'bounce') {
          P.vy = P.jumpForce * 1.5;
          addParticles(P.x + P.w/2, P.y + P.h, '#22c55e', 10, 5);
        } else {
          P.vy = 0;
          P.onGround = true;
          P.jumps = 0;
        }
        if (pl.type === 'crumble' && !pl.crumbling) {
          pl.crumbling = true;
          pl.crumbleTimer = 0;
        }
        // Move with platform
        if (pl.type === 'moving') {
          P.x += Math.cos(frame * 0.02 * (pl.moveSpeed || 1)) * 40 * 0.02 * (pl.moveSpeed || 1);
        }
      }
    }
  }

  // Crumbling platforms
  platforms.forEach(pl => {
    if (pl.crumbling) pl.crumbleTimer++;
  });

  // Camera follows player (smooth)
  const targetCam = P.y - H * 0.4;
  if (targetCam < cameraY) cameraY += (targetCam - cameraY) * 0.1;

  // Track height
  const height = (H - 60) - P.y;
  if (height > maxHeight) {
    maxHeight = height;
    score = Math.floor(maxHeight / 5);
  }

  // Generate more platforms above
  if (P.y < highestPlatY + H) {
    generatePlatforms(highestPlatY, highestPlatY - H * 2);
  }

  // Lava rises
  lavaRiseSpeed = baseLavaSpeed + maxHeight * 0.00005;
  lavaY -= lavaRiseSpeed;

  // Collect coins
  coins.forEach(c => {
    if (c.collected) return;
    c.bob += 0.06;
    const cy = c.y + Math.sin(c.bob) * 4;
    if (Math.abs(c.x - (P.x + P.w/2)) < 20 && Math.abs(cy - (P.y + P.h/2)) < 20) {
      c.collected = true;
      score += 25;
      addParticles(c.x, cy, '#fbbf24', 8, 4);
    }
  });

  // Collect power-ups
  powerups.forEach(pu => {
    if (pu.collected) return;
    pu.bob += 0.05;
    const py = pu.y + Math.sin(pu.bob) * 5;
    if (Math.abs(pu.x - (P.x + P.w/2)) < 22 && Math.abs(py - (P.y + P.h/2)) < 22) {
      pu.collected = true;
      if (pu.type === 'rocket') {
        P.vy = P.jumpForce * 3;
        addParticles(P.x + P.w/2, P.y + P.h, '#f97316', 20, 6);
      } else if (pu.type === 'shield') {
        score += 100;
        addParticles(pu.x, py, '#3b82f6', 12, 4);
      } else {
        score += 50;
        addParticles(pu.x, py, '#a855f7', 10, 4);
      }
    }
  });

  // Death: fall into lava or below screen
  if (P.y > lavaY - 10) {
    P.dead = true;
    addParticles(P.x + P.w/2, P.y, '#ef4444', 20, 6);
    setTimeout(gameOver, 800);
  }

  // Clean up off-screen stuff
  const cleanY = cameraY + H + 200;
  platforms = platforms.filter(p => p.y < cleanY);
  coins = coins.filter(c => c.y < cleanY || !c.collected);
  powerups = powerups.filter(p => p.y < cleanY || !p.collected);

  // Particles
  particles = particles.filter(p => { p.x += p.vx; p.y += p.vy; p.vy += 0.1; p.life--; return p.life > 0; });

  // Score from survival
  if (frame % 60 === 0) score += 5;

  updateHUD();
}

function draw() {
  // Background — dark cave/volcano
  const bgGrad = X.createLinearGradient(0, 0, 0, H);
  bgGrad.addColorStop(0, '#0a0a1a');
  bgGrad.addColorStop(0.5, '#1a0a0a');
  bgGrad.addColorStop(1, '#2a0a0a');
  X.fillStyle = bgGrad;
  X.fillRect(0, 0, W, H);

  // Background rocks
  X.fillStyle = 'rgba(60,30,30,0.3)';
  for (let i = 0; i < 8; i++) {
    const rx = (i * 127) % W;
    const ry = ((i * 211 - cameraY * 0.2) % (H + 100));
    X.beginPath();
    X.arc(rx, ry, 20 + (i * 7 % 30), 0, Math.PI * 2);
    X.fill();
  }

  X.save();
  X.translate(0, -cameraY);

  // Platforms
  platforms.forEach(pl => {
    if (pl.y < cameraY - 20 || pl.y > cameraY + H + 20) return;
    let px = pl.x;
    if (pl.type === 'moving') px += Math.sin(frame * 0.02 * (pl.moveSpeed || 1)) * 40;

    X.globalAlpha = pl.crumbling ? Math.max(0, 1 - pl.crumbleTimer / 30) : 1;

    // Platform shadow
    X.fillStyle = 'rgba(0,0,0,0.3)';
    X.fillRect(px + 2, pl.y + 3, pl.w, pl.h);

    // Platform body
    X.fillStyle = pl.color;
    X.fillRect(px, pl.y, pl.w, pl.h);

    // Top highlight
    X.fillStyle = 'rgba(255,255,255,0.15)';
    X.fillRect(px, pl.y, pl.w, 3);

    // Type indicators
    if (pl.type === 'bounce') {
      X.fillStyle = '#22c55e';
      X.fillRect(px + pl.w * 0.3, pl.y - 3, pl.w * 0.4, 3);
      // Springs
      X.strokeStyle = '#22c55e';
      X.lineWidth = 2;
      const springX = px + pl.w / 2;
      X.beginPath();
      X.moveTo(springX - 8, pl.y);
      X.lineTo(springX - 4, pl.y - 5);
      X.lineTo(springX + 4, pl.y - 2);
      X.lineTo(springX + 8, pl.y);
      X.stroke();
    }
    if (pl.type === 'moving') {
      X.fillStyle = 'rgba(59,130,246,0.3)';
      X.fillRect(px - 2, pl.y - 1, pl.w + 4, pl.h + 2);
    }
    if (pl.type === 'crumble' && pl.crumbling) {
      // Shake
      X.fillStyle = '#92400e';
      for (let c = 0; c < 3; c++) {
        X.fillRect(px + Math.random() * pl.w, pl.y + Math.random() * pl.h, 4, 4);
      }
    }

    X.globalAlpha = 1;
  });

  // Coins
  coins.forEach(c => {
    if (c.collected || c.y < cameraY - 30 || c.y > cameraY + H + 30) return;
    const by = Math.sin(c.bob) * 4;
    // Glow
    X.fillStyle = 'rgba(251,191,36,0.2)';
    X.beginPath();
    X.arc(c.x, c.y + by, 12, 0, Math.PI * 2);
    X.fill();
    // Star
    X.font = '18px sans-serif';
    X.textAlign = 'center';
    X.fillText('⭐', c.x, c.y + by + 6);
  });

  // Power-ups
  powerups.forEach(pu => {
    if (pu.collected || pu.y < cameraY - 30 || pu.y > cameraY + H + 30) return;
    const by = Math.sin(pu.bob) * 5;
    X.fillStyle = pu.type === 'rocket' ? 'rgba(249,115,22,0.2)' : pu.type === 'shield' ? 'rgba(59,130,246,0.2)' : 'rgba(168,85,247,0.2)';
    X.beginPath();
    X.arc(pu.x, pu.y + by, 14, 0, Math.PI * 2);
    X.fill();
    X.font = '20px sans-serif';
    X.textAlign = 'center';
    X.fillText(pu.type === 'rocket' ? '🚀' : pu.type === 'shield' ? '🛡️' : '🧲', pu.x, pu.y + by + 7);
  });

  // Player
  if (!P.dead) {
    X.save();
    X.translate(P.x + P.w / 2, P.y + P.h / 2);
    X.scale(P.facing, 1);

    // Shadow
    if (P.onGround) {
      X.fillStyle = 'rgba(0,0,0,0.2)';
      X.beginPath();
      X.ellipse(0, P.h / 2, P.w / 2, 4, 0, 0, Math.PI * 2);
      X.fill();
    }

    // Body
    X.fillStyle = '#ef4444';
    X.fillRect(-P.w/2, -P.h/2 + 6, P.w, P.h - 6);

    // Head
    X.fillStyle = '#fcd34d';
    X.beginPath();
    X.arc(0, -P.h/2 + 2, 10, 0, Math.PI * 2);
    X.fill();

    // Eyes
    X.fillStyle = '#111';
    X.beginPath();
    X.arc(3, -P.h/2, 2, 0, Math.PI * 2);
    X.fill();

    // Mouth (determined)
    X.strokeStyle = '#111';
    X.lineWidth = 1.5;
    X.beginPath();
    X.moveTo(1, -P.h/2 + 5);
    X.lineTo(6, -P.h/2 + 4);
    X.stroke();

    // Cape
    X.fillStyle = '#dc2626';
    X.beginPath();
    const capeWave = Math.sin(frame * 0.15) * 3;
    X.moveTo(-P.w/2, -P.h/2 + 8);
    X.quadraticCurveTo(-P.w/2 - 8, P.h/2 + capeWave, -P.w/2 - 3, P.h/2 + 5);
    X.lineTo(-P.w/2, -P.h/2 + 8);
    X.fill();

    // Legs
    X.fillStyle = '#1e3a5f';
    const legAnim = P.onGround ? Math.sin(P.walkFrame) * 4 : 3;
    X.fillRect(-6, P.h/2 - 6, 5, 8 + legAnim);
    X.fillRect(2, P.h/2 - 6, 5, 8 - legAnim);

    // Shoes
    X.fillStyle = '#333';
    X.fillRect(-7, P.h/2 + 1 + legAnim, 7, 4);
    X.fillRect(1, P.h/2 + 1 - legAnim, 7, 4);

    // Double jump sparkle
    if (P.jumps >= 2 && P.vy < 0) {
      X.globalAlpha = 0.6;
      X.font = '14px sans-serif';
      X.fillText('✨', -8, P.h/2 + 10);
      X.fillText('✨', 5, P.h/2 + 15);
      X.globalAlpha = 1;
    }

    X.restore();
  }

  // Particles
  particles.forEach(p => {
    X.globalAlpha = p.life / p.maxLife;
    X.fillStyle = p.color;
    X.beginPath();
    X.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    X.fill();
  });
  X.globalAlpha = 1;

  // Lava
  const lavaScreenY = lavaY;
  if (lavaScreenY < cameraY + H + 50) {
    const lavaGrad = X.createLinearGradient(0, lavaScreenY - 20, 0, lavaScreenY + 200);
    lavaGrad.addColorStop(0, 'rgba(255,100,0,0.8)');
    lavaGrad.addColorStop(0.3, 'rgba(255,50,0,0.9)');
    lavaGrad.addColorStop(1, 'rgba(200,20,0,1)');
    X.fillStyle = lavaGrad;
    X.fillRect(0, lavaScreenY, W, cameraY + H + 100 - lavaScreenY);

    // Lava surface bubbles
    X.fillStyle = 'rgba(255,200,50,0.6)';
    for (let i = 0; i < 8; i++) {
      const bx = (i * 97 + frame * 1.5) % (W + 20) - 10;
      const by = lavaScreenY + Math.sin(frame * 0.05 + i) * 5 - 3;
      X.beginPath();
      X.arc(bx, by, 3 + Math.sin(frame * 0.08 + i * 2) * 2, 0, Math.PI * 2);
      X.fill();
    }

    // Glow above lava
    X.fillStyle = 'rgba(255,80,0,0.1)';
    X.fillRect(0, lavaScreenY - 50, W, 50);
  }

  X.restore();

  // Lava warning when close
  const lavaDistScreen = (lavaY - P.y) - cameraY + cameraY;
  const dangerDist = P.y - lavaY;
  if (dangerDist < 150 && dangerDist > 0 && playing) {
    const intensity = 1 - dangerDist / 150;
    X.fillStyle = `rgba(255,0,0,${intensity * 0.1})`;
    X.fillRect(0, 0, W, H);
  }
}

function gameOver() {
  playing = false;
  _lbGameOver(score);
  const ov = document.getElementById('overlay');
  ov.querySelector('h1').textContent = '🔥 Burned!';
  ov.querySelector('h2').textContent = 'Score: ' + score + ' · ' + Math.floor(maxHeight / 10) + 'm high';
  ov.querySelector('p').textContent = 'The lava got you! Can you climb higher?';
  document.getElementById('play-btn').textContent = '🌋 Try Again';
  ov.style.display = 'flex';
}

document.getElementById('play-btn').addEventListener('click', () => {
  document.getElementById('overlay').style.display = 'none';
  playing = true;
  resetGame();
});

function loop() { update(); draw(); requestAnimationFrame(loop); }
