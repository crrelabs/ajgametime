<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taco Run — AJ GameTime</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { min-height: 100vh; display: flex; flex-direction: column; align-items: center; font-family: -apple-system, sans-serif; background: #1a0a2e; color: #e2e8f0; overflow: hidden; user-select: none; }
#header { width: 100%; padding: 0.75rem 1.5rem; display: flex; justify-content: space-between; align-items: center; z-index: 10; position: fixed; top: 0; }
#header a { color: #64748b; text-decoration: none; font-size: 0.85rem; }
#header a:hover { color: #e2e8f0; }
#hud { display: flex; gap: 1.5rem; align-items: center; }
.stat { text-align: center; }
.stat-val { font-size: 1.5rem; font-weight: 800; }
.stat-label { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.1em; color: #64748b; }
#pepperCount { color: #ef4444; }
#scoreVal { color: #fbbf24; }
#livesVal { color: #22c55e; }
canvas { display: block; touch-action: none; }

#startScreen, #gameOver {
  position: fixed; inset: 0; background: rgba(26,10,46,0.95);
  display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 30;
}
#startScreen.hidden, #gameOver.hidden { display: none; }
#startScreen h1, #gameOver h2 { font-size: 2.5rem; margin-bottom: 0.5rem; }
#startScreen .emoji, #gameOver .emoji { font-size: 5rem; margin-bottom: 1rem; }
#startScreen p, #gameOver p { color: #94a3b8; margin-bottom: 0.5rem; font-size: 0.95rem; text-align: center; max-width: 320px; }
.controls-hint { color: #64748b !important; font-size: 0.8rem !important; margin-top: 0.5rem; }
button.play-btn {
  margin-top: 1.5rem; padding: 1rem 2.5rem; font-size: 1.1rem; font-weight: 700;
  background: linear-gradient(135deg, #ef4444, #f97316); color: white;
  border: none; border-radius: 12px; cursor: pointer; transition: 0.2s;
}
button.play-btn:hover { transform: scale(1.05); filter: brightness(1.1); }
#finalScore { font-size: 3.5rem; font-weight: 900; color: #fbbf24; }
#finalPeppers { color: #ef4444; font-size: 1.2rem; font-weight: 700; }

/* Mobile controls */
#mobileControls {
  position: fixed; bottom: 20px; left: 0; right: 0; z-index: 20;
  display: none; justify-content: center; gap: 1rem; padding: 0 1rem;
}
.mobile-btn {
  width: 70px; height: 70px; border-radius: 50%; border: 3px solid rgba(255,255,255,0.2);
  background: rgba(255,255,255,0.08); backdrop-filter: blur(8px);
  font-size: 1.8rem; display: flex; align-items: center; justify-content: center;
  cursor: pointer; -webkit-tap-highlight-color: transparent;
}
.mobile-btn:active { background: rgba(255,255,255,0.2); transform: scale(0.9); }
.mobile-btn.jump { width: 90px; height: 90px; font-size: 2.2rem; }

@media (pointer: coarse), (max-width: 768px), (hover: none) {
  #mobileControls { display: flex !important; }
}
</style>
</head>
<body>

<div id="startScreen">
  <div class="emoji">🌮</div>
  <h1>Taco Run!</h1>
  <p>Run through the desert, collect peppers 🌶️ and dodge cacti 🌵! Don't get poked!</p>
  <p class="controls-hint">⬅️ ➡️ Arrow keys to move · Space to jump<br>On mobile: use on-screen buttons</p>
  <button class="play-btn" onclick="startGame()">Let's Go! 🌮</button>
</div>

<div id="gameOver" class="hidden">
  <div class="emoji">💀</div>
  <h2>Game Over!</h2>
  <div id="finalScore">0</div>
  <p id="finalPeppers">0 peppers collected</p>
  <p id="finalDist"></p>
  <button class="play-btn" onclick="startGame()">Try Again 🌮</button>
</div>

<div id="header">
  <a href="/">← AJ GameTime</a>
  <div id="hud">
    <div class="stat"><div class="stat-val" id="pepperCount">0 🌶️</div><div class="stat-label">Peppers</div></div>
    <div class="stat"><div class="stat-val" id="scoreVal">0</div><div class="stat-label">Score</div></div>
    <div class="stat"><div class="stat-val" id="livesVal">❤️❤️❤️</div><div class="stat-label">Lives</div></div>
  </div>
</div>

<canvas id="c"></canvas>

<div id="mobileControls">
  <div class="mobile-btn" id="btnLeft">⬅️</div>
  <div class="mobile-btn jump" id="btnJump">⬆️</div>
  <div class="mobile-btn" id="btnRight">➡️</div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
let gameRunning = false;
let animFrame;

// Game state
let taco, peppers, cacti, clouds, ground;
let score, pepperScore, lives, speed, distance;
let keys = { left: false, right: false, jump: false };
let lastSpawn, lastCactus;
let invincible, invincibleTimer;
let particles = [];

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

const GROUND_Y = () => H - 80;
const GRAVITY = 0.6;
const JUMP_FORCE = -13;

class Taco {
  constructor() {
    this.x = W * 0.2;
    this.y = GROUND_Y();
    this.w = 40;
    this.h = 40;
    this.vy = 0;
    this.onGround = true;
    this.frame = 0;
  }
  update() {
    // Horizontal movement
    if (keys.left) this.x -= 5;
    if (keys.right) this.x += 5;
    this.x = Math.max(20, Math.min(W - 60, this.x));

    // Jump
    if (keys.jump && this.onGround) {
      this.vy = JUMP_FORCE;
      this.onGround = false;
    }

    // Gravity
    this.vy += GRAVITY;
    this.y += this.vy;

    if (this.y >= GROUND_Y()) {
      this.y = GROUND_Y();
      this.vy = 0;
      this.onGround = true;
    }

    this.frame += 0.15;
  }
  draw() {
    ctx.save();
    ctx.translate(this.x, this.y);

    // Blink when invincible
    if (invincible && Math.floor(Date.now() / 100) % 2 === 0) {
      ctx.globalAlpha = 0.4;
    }

    // Bounce animation
    const bounce = this.onGround ? Math.sin(this.frame * 2) * 2 : 0;
    ctx.translate(0, bounce);

    // Taco body (shell)
    ctx.fillStyle = '#f59e0b';
    ctx.beginPath();
    ctx.ellipse(0, -15, 22, 18, 0, Math.PI, 0);
    ctx.fill();
    ctx.strokeStyle = '#d97706';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Filling
    ctx.fillStyle = '#22c55e'; // lettuce
    ctx.beginPath();
    ctx.ellipse(-8, -18, 8, 5, -0.3, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#ef4444'; // tomato
    ctx.beginPath();
    ctx.arc(5, -20, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#fbbf24'; // cheese
    ctx.beginPath();
    ctx.moveTo(-3, -15);
    ctx.lineTo(0, -25);
    ctx.lineTo(3, -15);
    ctx.fill();

    // Eyes
    ctx.fillStyle = 'white';
    ctx.beginPath();
    ctx.arc(-7, -10, 4, 0, Math.PI * 2);
    ctx.arc(7, -10, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#1a1a1a';
    ctx.beginPath();
    ctx.arc(-6, -10, 2, 0, Math.PI * 2);
    ctx.arc(8, -10, 2, 0, Math.PI * 2);
    ctx.fill();

    // Smile
    ctx.beginPath();
    ctx.arc(0, -6, 6, 0.1, Math.PI - 0.1);
    ctx.strokeStyle = '#92400e';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Legs (running animation)
    const legAngle = Math.sin(this.frame * 4) * 0.4;
    ctx.strokeStyle = '#d97706';
    ctx.lineWidth = 3;
    ctx.lineCap = 'round';
    // Left leg
    ctx.beginPath();
    ctx.moveTo(-8, 0);
    ctx.lineTo(-8 + Math.sin(legAngle) * 8, 12);
    ctx.stroke();
    // Right leg
    ctx.beginPath();
    ctx.moveTo(8, 0);
    ctx.lineTo(8 + Math.sin(-legAngle) * 8, 12);
    ctx.stroke();

    ctx.restore();
  }
  getBounds() {
    return { x: this.x - 15, y: this.y - 30, w: 30, h: 35 };
  }
}

class Pepper {
  constructor(x) {
    this.x = x;
    this.y = GROUND_Y() - 15 - Math.random() * 80;
    this.bobOffset = Math.random() * Math.PI * 2;
    this.collected = false;
    this.alpha = 1;
  }
  update() {
    this.x -= speed;
    this.bobOffset += 0.05;
  }
  draw() {
    if (this.collected) return;
    ctx.save();
    ctx.translate(this.x, this.y + Math.sin(this.bobOffset) * 5);

    // Glow
    ctx.shadowColor = '#ef4444';
    ctx.shadowBlur = 15;

    // Pepper body
    ctx.fillStyle = '#ef4444';
    ctx.beginPath();
    ctx.ellipse(0, 0, 8, 12, 0.15, 0, Math.PI * 2);
    ctx.fill();

    // Stem
    ctx.fillStyle = '#22c55e';
    ctx.fillRect(-3, -15, 6, 6);

    ctx.shadowBlur = 0;
    ctx.restore();
  }
  getBounds() {
    return { x: this.x - 10, y: this.y - 15, w: 20, h: 30 };
  }
}

class Cactus {
  constructor(x) {
    this.x = x;
    this.y = GROUND_Y();
    this.h = 40 + Math.random() * 30;
    this.type = Math.floor(Math.random() * 3);
  }
  update() {
    this.x -= speed;
  }
  draw() {
    ctx.save();
    ctx.translate(this.x, this.y);

    ctx.fillStyle = '#22c55e';
    ctx.strokeStyle = '#15803d';
    ctx.lineWidth = 2;

    // Main body
    ctx.beginPath();
    ctx.roundRect(-10, -this.h, 20, this.h, 8);
    ctx.fill();
    ctx.stroke();

    // Arms
    if (this.type >= 1) {
      ctx.beginPath();
      ctx.roundRect(-22, -this.h * 0.7, 14, 8, 4);
      ctx.fill();
      ctx.stroke();
      ctx.beginPath();
      ctx.roundRect(-22, -this.h * 0.7 - 15, 8, 18, 4);
      ctx.fill();
      ctx.stroke();
    }
    if (this.type >= 2) {
      ctx.beginPath();
      ctx.roundRect(8, -this.h * 0.5, 14, 8, 4);
      ctx.fill();
      ctx.stroke();
      ctx.beginPath();
      ctx.roundRect(14, -this.h * 0.5 - 12, 8, 15, 4);
      ctx.fill();
      ctx.stroke();
    }

    // Spines
    ctx.strokeStyle = '#86efac';
    ctx.lineWidth = 1;
    for (let i = 0; i < 5; i++) {
      const sy = -this.h + 10 + i * (this.h / 5);
      ctx.beginPath(); ctx.moveTo(-10, sy); ctx.lineTo(-15, sy - 3); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(10, sy); ctx.lineTo(15, sy - 3); ctx.stroke();
    }

    ctx.restore();
  }
  getBounds() {
    return { x: this.x - 12, y: this.y - this.h, w: 24, h: this.h };
  }
}

class Particle {
  constructor(x, y, color) {
    this.x = x; this.y = y;
    this.vx = (Math.random() - 0.5) * 6;
    this.vy = (Math.random() - 0.5) * 6 - 3;
    this.life = 1;
    this.color = color;
    this.size = 3 + Math.random() * 4;
  }
  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.vy += 0.15;
    this.life -= 0.025;
  }
  draw() {
    ctx.globalAlpha = this.life;
    ctx.fillStyle = this.color;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

function boxCollide(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

function spawnPepper() {
  peppers.push(new Pepper(W + Math.random() * 200));
}

function spawnCactus() {
  cacti.push(new Cactus(W + Math.random() * 100));
}

function drawBackground() {
  // Sky gradient (desert sunset)
  const grad = ctx.createLinearGradient(0, 0, 0, GROUND_Y());
  grad.addColorStop(0, '#1a0a2e');
  grad.addColorStop(0.4, '#2d1b4e');
  grad.addColorStop(0.7, '#6b2fa0');
  grad.addColorStop(1, '#f97316');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, GROUND_Y());

  // Stars
  ctx.fillStyle = 'white';
  for (let i = 0; i < 30; i++) {
    const sx = (i * 137.5 + distance * 0.02) % W;
    const sy = (i * 97.3) % (H * 0.4);
    ctx.globalAlpha = 0.3 + Math.sin(Date.now() / 1000 + i) * 0.2;
    ctx.beginPath();
    ctx.arc(sx, sy, 1, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Mountains (parallax)
  ctx.fillStyle = '#2d1b4e';
  ctx.beginPath();
  ctx.moveTo(0, GROUND_Y());
  for (let x = 0; x <= W; x += 60) {
    const mh = 60 + Math.sin((x + distance * 0.1) * 0.008) * 50 + Math.sin((x + distance * 0.1) * 0.015) * 30;
    ctx.lineTo(x, GROUND_Y() - mh);
  }
  ctx.lineTo(W, GROUND_Y());
  ctx.fill();

  // Ground
  ctx.fillStyle = '#d2691e';
  ctx.fillRect(0, GROUND_Y(), W, 80);

  // Ground texture
  ctx.fillStyle = '#b8560e';
  for (let i = 0; i < 20; i++) {
    const gx = ((i * 87 - distance * 0.5) % W + W) % W;
    ctx.fillRect(gx, GROUND_Y() + 5, 30, 3);
  }

  // Ground line
  ctx.strokeStyle = '#92400e';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, GROUND_Y());
  ctx.lineTo(W, GROUND_Y());
  ctx.stroke();
}

function updateHUD() {
  document.getElementById('pepperCount').textContent = pepperScore + ' 🌶️';
  document.getElementById('scoreVal').textContent = score;
  let hearts = '';
  for (let i = 0; i < lives; i++) hearts += '❤️';
  document.getElementById('livesVal').textContent = hearts || '💀';
}

function hit() {
  if (invincible) return;
  lives--;
  invincible = true;
  invincibleTimer = 90; // frames

  // Hit particles
  for (let i = 0; i < 15; i++) {
    particles.push(new Particle(taco.x, taco.y - 15, '#ef4444'));
  }

  if (lives <= 0) endGame();
  updateHUD();
}

function collectPepper(p) {
  p.collected = true;
  pepperScore++;
  score += 10;
  // Collect particles
  for (let i = 0; i < 10; i++) {
    particles.push(new Particle(p.x, p.y, ['#ef4444','#f97316','#fbbf24'][Math.floor(Math.random()*3)]));
  }
  updateHUD();
}

function loop() {
  if (!gameRunning) return;

  ctx.clearRect(0, 0, W, H);
  distance += speed;
  score = Math.floor(distance / 10) + pepperScore * 10;

  // Increase speed over time
  speed = 4 + distance / 3000;

  // Spawn
  if (distance - lastSpawn > 200 + Math.random() * 150) {
    spawnPepper();
    lastSpawn = distance;
  }
  if (distance - lastCactus > 300 + Math.random() * 250) {
    spawnCactus();
    lastCactus = distance;
  }

  // Invincibility timer
  if (invincible) {
    invincibleTimer--;
    if (invincibleTimer <= 0) invincible = false;
  }

  // Update
  taco.update();
  peppers.forEach(p => p.update());
  cacti.forEach(c => c.update());
  particles.forEach(p => p.update());
  particles = particles.filter(p => p.life > 0);

  // Collisions
  const tb = taco.getBounds();
  peppers.forEach(p => {
    if (!p.collected && boxCollide(tb, p.getBounds())) collectPepper(p);
  });
  cacti.forEach(c => {
    if (boxCollide(tb, c.getBounds())) hit();
  });

  // Cleanup offscreen
  peppers = peppers.filter(p => p.x > -50);
  cacti = cacti.filter(c => c.x > -50);

  // Draw
  drawBackground();
  cacti.forEach(c => c.draw());
  peppers.forEach(p => p.draw());
  taco.draw();
  particles.forEach(p => p.draw());

  updateHUD();
  animFrame = requestAnimationFrame(loop);
}

function startGame() {
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('gameOver').classList.add('hidden');

  taco = new Taco();
  peppers = [];
  cacti = [];
  particles = [];
  score = 0;
  pepperScore = 0;
  lives = 3;
  speed = 4;
  distance = 0;
  lastSpawn = 0;
  lastCactus = 0;
  invincible = false;
  invincibleTimer = 0;
  gameRunning = true;
  updateHUD();
  loop();
}

function endGame() {
  gameRunning = false;
  cancelAnimationFrame(animFrame);
  document.getElementById('finalScore').textContent = score;
  document.getElementById('finalPeppers').textContent = pepperScore + ' peppers collected';
  document.getElementById('finalDist').textContent = Math.floor(distance / 10) + 'm distance';
  document.getElementById('gameOver').classList.remove('hidden');
}

// Keyboard
window.addEventListener('keydown', e => {
  if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = true;
  if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = true;
  if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') { keys.jump = true; e.preventDefault(); }
});
window.addEventListener('keyup', e => {
  if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = false;
  if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = false;
  if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') keys.jump = false;
});

// Mobile controls
function bindMobile(id, key) {
  const el = document.getElementById(id);
  el.addEventListener('touchstart', e => { e.preventDefault(); keys[key] = true; }, { passive: false });
  el.addEventListener('touchend', e => { e.preventDefault(); keys[key] = false; }, { passive: false });
  el.addEventListener('mousedown', () => keys[key] = true);
  el.addEventListener('mouseup', () => keys[key] = false);
}
bindMobile('btnLeft', 'left');
bindMobile('btnRight', 'right');
bindMobile('btnJump', 'jump');

// Force show mobile controls on any touch device
if ('ontouchstart' in window || navigator.maxTouchPoints > 0) {
  document.getElementById('mobileControls').style.display = 'flex';
}
</script>
</body>
</html>
