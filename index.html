let currentFilter = 'all';
let currentSort = 'newest';

// Build unique categories for filter buttons
const categories = [...new Set(GAMES.map(g => g.category))].sort();

function init() {
  // Build filter buttons
  const filterContainer = document.getElementById('filterBtns');
  filterContainer.innerHTML = categories.map(cat =>
    `<button class="filter-btn" data-cat="${cat}" onclick="setFilter('${cat}')">${cat}</button>`
  ).join('');

  renderGames();

  // Search input
  document.getElementById('searchInput').addEventListener('input', renderGames);
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  renderGames();
}

function setFilter(cat) {
  currentFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.cat === cat));
  renderGames();
}

function setSort(sort) {
  currentSort = sort;
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.toggle('active', b.dataset.sort === sort));
  renderGames();
}

function renderGames() {
  const query = document.getElementById('searchInput').value.toLowerCase().trim();
  const clearBtn = document.getElementById('clearBtn');
  clearBtn.classList.toggle('visible', query.length > 0);

  // Filter
  let games = GAMES.filter(g => {
    if (currentFilter !== 'all' && g.category !== currentFilter) return false;
    if (query) {
      const haystack = (g.name + ' ' + g.desc + ' ' + g.category).toLowerCase();
      return haystack.includes(query);
    }
    return true;
  });

  // Sort
  if (currentSort === 'newest') games.sort((a, b) => b.added - a.added);
  else if (currentSort === 'oldest') games.sort((a, b) => a.added - b.added);
  else if (currentSort === 'az') games.sort((a, b) => a.name.localeCompare(b.name));
  else if (currentSort === 'za') games.sort((a, b) => b.name.localeCompare(a.name));

  // Update count
  document.getElementById('gameCount').textContent = `${games.length} game${games.length !== 1 ? 's' : ''}`;

  // Render
  const grid = document.getElementById('gamesGrid');
  grid.innerHTML = games.map(g => `
    <a href="${g.href}" class="game-card" data-id="${g.id}">
      <div class="card-preview" style="background: ${g.bg};">${g.emoji}</div>
      <div class="card-body">
        <h3>${g.name}</h3>
        <p>${g.desc}</p>
        <span class="card-tag" style="background: ${g.tagBg}; color: ${g.tagColor};">${g.category}</span>
      </div>
      <div class="play-btn" style="background: ${g.btnBg};">▶ Play Now</div>
    </a>
  `).join('');

  // No results
  document.getElementById('noResults').classList.toggle('visible', games.length === 0);
}

// Floating particles
const pContainer = document.getElementById('particles');
const colors = ['#7c3aed','#3b82f6','#06b6d4','#ec4899','#f97316','#22c55e'];
for (let i = 0; i < 20; i++) {
  const p = document.createElement('div');
  p.className = 'particle';
  p.style.left = Math.random() * 100 + '%';
  p.style.background = colors[Math.floor(Math.random() * colors.length)];
  p.style.animationDuration = (8 + Math.random() * 12) + 's';
  p.style.animationDelay = Math.random() * 10 + 's';
  p.style.width = p.style.height = (3 + Math.random() * 4) + 'px';
  pContainer.appendChild(p);
}

init();
</script>
