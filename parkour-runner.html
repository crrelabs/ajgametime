// === GAME ===
var canvas=document.getElementById('game'),ctx=canvas.getContext('2d'),W,H;
function resize(){W=window.innerWidth;H=window.innerHeight;canvas.width=W;canvas.height=H}
resize();window.addEventListener('resize',resize);

var GROUND_Y,PW=24,PH=36;
var player,platforms,enemies,coinItems,scrollSpeed,score,sessionCoins,level,combo,comboTimer;
var gameRunning,dead,distToLevel,levelDist,bgBuildings;
var particles=[],trailParticles=[],textPops=[],nukeFlash=0;
var highScore=parseInt(localStorage.getItem('pr_high')||'0');
var keys={};

function init(){
  GROUND_Y=H-60;
  player={x:W*0.15,y:GROUND_Y-PH,vy:0,onGround:true,jumping:false,doubleJumped:false,sliding:false,slideTimer:0,wallJumpTimer:0,invincible:0};
  platforms=[];enemies=[];coinItems=[];
  scrollSpeed=4;score=0;sessionCoins=0;level=1;combo=0;comboTimer=0;
  gameRunning=true;dead=false;distToLevel=0;levelDist=1500;nukeFlash=0;
  particles=[];trailParticles=[];textPops=[];
  bgBuildings=[];
  for(var bi=0;bi<20;bi++)bgBuildings.push({x:bi*120,w:40+Math.random()*60,h:80+Math.random()*150});
  // Initial platforms
  for(var pi=0;pi<8;pi++){
    var px=W*0.5+pi*250+Math.random()*100;
    var py=GROUND_Y-60-Math.random()*120;
    platforms.push({x:px,y:py,w:80+Math.random()*60,h:12});
  }
  updateHUD();
}

function updateHUD(){
  document.getElementById('scoreVal').textContent=score;
  document.getElementById('levelVal').textContent=level;
  document.getElementById('comboVal').textContent=combo>1?'x'+combo:'x1';
}

function jump(){
  if(dead)return;
  if(player.sliding){player.sliding=false;player.slideTimer=0}
  if(player.onGround){
    player.vy=-12;player.onGround=false;player.jumping=true;player.doubleJumped=false;sfxJump();
    combo++;comboTimer=60;sfxCombo();
  }else if(!player.doubleJumped){
    player.vy=-11;player.doubleJumped=true;sfxDouble();
    combo++;comboTimer=60;sfxCombo();
    // Double jump particles
    for(var i=0;i<6;i++)particles.push({x:player.x+PW/2,y:player.y+PH,vx:(Math.random()-0.5)*4,vy:1+Math.random()*2,life:15,color:'#fbbf24',size:3});
  }
}

function slide(){
  if(dead||!player.onGround||player.sliding)return;
  player.sliding=true;player.slideTimer=30;sfxSlide();
  combo++;comboTimer=60;sfxCombo();
}

function update(){
  // Always update particles
  for(var pi=particles.length-1;pi>=0;pi--){var p=particles[pi];p.x+=p.vx;p.y+=p.vy;p.vy+=0.12;p.life--;if(p.life<=0)particles.splice(pi,1)}
  for(var ti=trailParticles.length-1;ti>=0;ti--){var tp=trailParticles[ti];tp.x+=tp.vx;tp.y+=tp.vy;tp.life--;if(tp.life<=0)trailParticles.splice(ti,1)}
  for(var tpi=textPops.length-1;tpi>=0;tpi--){textPops[tpi].y-=1.5;textPops[tpi].life--;if(textPops[tpi].life<=0)textPops.splice(tpi,1)}
  if(nukeFlash>0)nukeFlash--;

  if(!gameRunning)return;

  var spd=scrollSpeed+level*0.5;

  // Combo timer
  if(comboTimer>0){comboTimer--;if(comboTimer<=0){if(combo>2){score+=combo*10;textPops.push({x:player.x,y:player.y-30,text:'COMBO x'+combo+' +'+combo*10,color:'#ef4444',size:22,life:35})}combo=0}}

  // Player physics
  player.vy+=0.6;player.y+=player.vy;

  // Sliding
  if(player.sliding){player.slideTimer--;if(player.slideTimer<=0)player.sliding=false}

  // Ground check
  if(player.y+PH>=GROUND_Y){player.y=GROUND_Y-PH;player.vy=0;player.onGround=true;player.jumping=false;player.doubleJumped=false}

  // Platform check
  if(player.vy>0){
    for(var pli=0;pli<platforms.length;pli++){
      var pl=platforms[pli];
      if(player.x+PW>pl.x&&player.x<pl.x+pl.w&&player.y+PH>=pl.y&&player.y+PH<=pl.y+pl.h+player.vy+2){
        player.y=pl.y-PH;player.vy=0;player.onGround=true;player.jumping=false;player.doubleJumped=false;break;
      }
    }
  }

  if(player.invincible>0)player.invincible--;

  // Trail particles
  var trail=getTrail();
  if(trail.colors){
    trailParticles.push({x:player.x,y:player.y+PH-4+(player.sliding?-8:0),vx:-1-Math.random()*2,vy:(Math.random()-0.5)*1.5,life:12+Math.random()*8,maxLife:20,color:trail.colors[Math.floor(Math.random()*trail.colors.length)],size:2+Math.random()*3});
  }

  // Score & distance
  score+=Math.ceil(spd*0.1*(combo>1?combo*0.5:1));
  distToLevel+=spd;
  if(distToLevel>=levelDist){
    level++;distToLevel=0;levelDist+=200;sfxLevel();
    totalCoins+=5;sessionCoins+=5;saveShop();updateCoinDisplays();
    var banner=document.getElementById('lvl-banner');banner.textContent='⭐ Level '+level+'!';banner.style.display='block';
    setTimeout(function(){banner.style.display='none'},2000);
  }

  // Scroll platforms
  for(var pli2=platforms.length-1;pli2>=0;pli2--){
    platforms[pli2].x-=spd;
    if(platforms[pli2].x+platforms[pli2].w<-50)platforms.splice(pli2,1);
  }
  // Spawn platforms
  var lastP=platforms[platforms.length-1];
  if(!lastP||lastP.x<W-150){
    var gap=150+Math.random()*100-level*5;gap=Math.max(100,gap);
    var pw=60+Math.random()*80;
    var py=GROUND_Y-60-Math.random()*Math.min(180,80+level*10);
    platforms.push({x:(lastP?lastP.x+lastP.w:W)+gap,y:py,w:pw,h:12});
  }

  // Scroll enemies
  for(var ei=enemies.length-1;ei>=0;ei--){
    var e=enemies[ei];e.x-=spd;
    if(e.type==='flying')e.y+=Math.sin(Date.now()*0.005+ei)*0.8;
    if(e.x<-50){enemies.splice(ei,1);continue}
    // Collision with player
    var ph=player.sliding?PH/2:PH;
    var py2=player.sliding?player.y+PH/2:player.y;
    if(player.invincible<=0&&player.x+PW>e.x+4&&player.x<e.x+e.w-4&&py2+ph>e.y+4&&py2<e.y+e.h-4){
      // Stomp check — if player falling and above enemy
      if(player.vy>0&&py2+ph<e.y+e.h*0.6){
        // Stomp!
        player.vy=-10;score+=50*(combo>1?combo:1);sfxStomp();
        combo++;comboTimer=60;
        for(var k=0;k<8;k++)particles.push({x:e.x+e.w/2,y:e.y,vx:(Math.random()-0.5)*6,vy:-2-Math.random()*3,life:20,color:e.color||'#ef4444',size:3+Math.random()*3});
        textPops.push({x:e.x,y:e.y-20,text:'STOMP! +'+50*(combo>1?combo:1),color:'#22c55e',size:20,life:30});
        totalCoins+=3;sessionCoins+=3;saveShop();updateCoinDisplays();
        enemies.splice(ei,1);continue;
      }else{
        takeDamage();
      }
    }
  }
  // Spawn enemies
  if(Math.random()<0.008+level*0.003){
    var types=['ground','flying','tall'];
    var type=types[Math.floor(Math.random()*types.length)];
    var ew,eh,ey,emoji,color;
    if(type==='ground'){ew=30;eh=30;ey=GROUND_Y-eh;emoji='👾';color='#ef4444'}
    else if(type==='flying'){ew=28;eh=28;ey=GROUND_Y-100-Math.random()*80;emoji='🦇';color='#8b5cf6'}
    else{ew=25;eh=50;ey=GROUND_Y-eh;emoji='🧟';color='#22c55e'}
    enemies.push({x:W+50,y:ey,w:ew,h:eh,type:type,emoji:emoji,color:color});
  }

  // Coins
  for(var ci=coinItems.length-1;ci>=0;ci--){
    coinItems[ci].x-=spd;
    if(coinItems[ci].x<-30){coinItems.splice(ci,1);continue}
    var c=coinItems[ci];
    var ph3=player.sliding?PH/2:PH;
    var py3=player.sliding?player.y+PH/2:player.y;
    if(player.x+PW>c.x-10&&player.x<c.x+10&&py3+ph3>c.y-10&&py3<c.y+10){
      totalCoins+=c.value;sessionCoins+=c.value;score+=c.value*5;sfxCoin();
      textPops.push({x:c.x,y:c.y-15,text:'+'+(c.value),color:'#fbbf24',size:18,life:20});
      coinItems.splice(ci,1);saveShop();updateCoinDisplays();
    }
  }
  // Spawn coins
  if(Math.random()<0.03){
    var cy=GROUND_Y-40-Math.random()*120;
    var isGem=Math.random()<0.12;
    coinItems.push({x:W+50,y:cy,emoji:isGem?'💎':'🪙',value:isGem?5:1});
  }

  // BG buildings scroll
  for(var bi=0;bi<bgBuildings.length;bi++){bgBuildings[bi].x-=spd*0.3;if(bgBuildings[bi].x+bgBuildings[bi].w<0){bgBuildings[bi].x=W+Math.random()*100;bgBuildings[bi].w=40+Math.random()*60;bgBuildings[bi].h=80+Math.random()*150}}

  // Fall off screen
  if(player.y>H+50)takeDamage();

  updateHUD();
}

function takeDamage(){
  sfxHit();die();
}

function spawnDeathParticles(){
  var ex=getExplo().id,count=ex==='nuke'?80:25;
  var hx=player.x+PW/2,hy=player.y+PH/2;
  if(ex==='nuke')nukeFlash=30;
  for(var i=0;i<count;i++){
    var ang=(i/count)*Math.PI*2,spd2=2+Math.random()*6;
    var p={x:hx,y:hy,life:30+Math.random()*20,size:3+Math.random()*4};
    if(ex==='fireworks'){p.vx=Math.cos(ang)*spd2*1.5;p.vy=Math.sin(ang)*spd2*1.5;p.color=['#ff0000','#ffd700','#00ff00','#00bfff','#ff00ff'][i%5]}
    else if(ex==='confetti'){p.vx=(Math.random()-0.5)*8;p.vy=-2-Math.random()*4;p.color=['#ff0000','#ff9800','#ffeb3b','#4caf50','#2196f3'][i%5]}
    else if(ex==='hearts'){p.vx=(Math.random()-0.5)*6;p.vy=-1-Math.random()*5;p.color=['#ff69b4','#ff1493','#e91e63'][i%3]}
    else if(ex==='skull'){p.vx=Math.cos(ang)*spd2;p.vy=Math.sin(ang)*spd2;p.color=['#1a1a1a','#4a4a4a','#fff'][i%3]}
    else if(ex==='nuke'){var ring=i<30;p.vx=ring?Math.cos(ang)*15:(Math.random()-0.5)*20;p.vy=ring?Math.sin(ang)*15:(Math.random()-0.5)*20;p.color=['#ff4500','#ff8c00','#ffd700','#fff'][i%4];p.size=ring?8+Math.random()*6:3+Math.random()*10;p.life=60}
    else if(ex==='glitch'){p.vx=(Math.random()-0.5)*10;p.vy=(Math.random()-0.5)*10;p.color=['#00ff00','#ff00ff','#00ffff'][i%3];p.size=5}
    else if(ex==='bones'){p.vx=(Math.random()-0.5)*6;p.vy=-2-Math.random()*4;p.color=['#f5f5dc','#d2b48c','#fff'][i%3];p.life=40}
    else if(ex==='ice'){p.vx=Math.cos(ang)*spd2*1.2;p.vy=Math.sin(ang)*spd2*1.2;p.color=['#e0f7fa','#b2ebf2','#fff'][i%3]}
    else if(ex==='lava'){p.vx=(Math.random()-0.5)*6;p.vy=-3-Math.random()*5;p.color=['#ff4500','#ff6600','#ffd600'][i%3]}
    else if(ex==='portal'){p.vx=Math.cos(ang+i*0.3)*(2+i*0.2);p.vy=Math.sin(ang+i*0.3)*(2+i*0.2);p.color=['#7c4dff','#e040fb','#536dfe'][i%3]}
    else if(ex==='pixel'){p.vx=Math.cos(ang)*spd2;p.vy=Math.sin(ang)*spd2;p.color=['#4caf50','#8bc34a','#ff9800'][i%3];p.size=5}
    else{p.vx=(Math.random()-0.5)*8;p.vy=(Math.random()-0.5)*8;p.color=['#fbbf24','#ef4444','#8b5cf6'][i%3]}
    particles.push(p);
  }
}

function die(){
  dead=true;gameRunning=false;spawnDeathParticles();
  canvas.style.pointerEvents='none';stopMusic();
  if(score>highScore){highScore=score;localStorage.setItem('pr_high',highScore)}
  setTimeout(gameOver,1200);
}

function gameOver(){
  document.getElementById('death-score').textContent=score;
  document.getElementById('death-level').textContent='Level: '+level;
  updateCoinDisplays();
  document.getElementById('death-name').value=localStorage.getItem('ajgt_name')||'';
  document.getElementById('death-screen').style.display='flex';
}

function draw(){
  var world=getWorld();
  var sky=ctx.createLinearGradient(0,0,0,H);sky.addColorStop(0,world.sky1);sky.addColorStop(1,world.sky2);
  ctx.fillStyle=sky;ctx.fillRect(0,0,W,H);

  // BG buildings
  ctx.fillStyle=world.buildCol;
  for(var bi=0;bi<bgBuildings.length;bi++){var b=bgBuildings[bi];ctx.fillRect(b.x,GROUND_Y-b.h,b.w,b.h);
    ctx.fillStyle='rgba(255,255,200,0.1)';for(var wi=0;wi<3;wi++)for(var wj=0;wj<Math.floor(b.h/30);wj++)ctx.fillRect(b.x+8+wi*12,GROUND_Y-b.h+10+wj*30,6,10);ctx.fillStyle=world.buildCol}

  // Ground
  ctx.fillStyle=world.ground;ctx.fillRect(0,GROUND_Y,W,H-GROUND_Y);
  ctx.fillStyle='rgba(255,255,255,0.05)';ctx.fillRect(0,GROUND_Y,W,3);

  // Platforms
  for(var pli=0;pli<platforms.length;pli++){
    var pl=platforms[pli];
    ctx.fillStyle=world.plat;
    ctx.beginPath();
    var pr=6;ctx.moveTo(pl.x+pr,pl.y);ctx.lineTo(pl.x+pl.w-pr,pl.y);ctx.quadraticCurveTo(pl.x+pl.w,pl.y,pl.x+pl.w,pl.y+pr);ctx.lineTo(pl.x+pl.w,pl.y+pl.h);ctx.lineTo(pl.x,pl.y+pl.h);ctx.lineTo(pl.x,pl.y+pr);ctx.quadraticCurveTo(pl.x,pl.y,pl.x+pr,pl.y);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.1)';ctx.fillRect(pl.x+2,pl.y,pl.w-4,3);
  }

  // Coins
  ctx.font='20px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
  for(var ci=0;ci<coinItems.length;ci++){var c=coinItems[ci];ctx.fillText(c.emoji,c.x,c.y+Math.sin(Date.now()*0.005+ci)*4)}

  // Enemies
  ctx.font='26px sans-serif';
  for(var ei=0;ei<enemies.length;ei++){var e=enemies[ei];ctx.fillText(e.emoji,e.x+e.w/2,e.y+e.h/2)}

  // Trail particles
  for(var tpi=0;tpi<trailParticles.length;tpi++){var tp=trailParticles[tpi];ctx.globalAlpha=tp.life/tp.maxLife;ctx.fillStyle=tp.color;ctx.shadowColor=tp.color;ctx.shadowBlur=6;ctx.beginPath();ctx.arc(tp.x,tp.y,tp.size,0,Math.PI*2);ctx.fill()}
  ctx.globalAlpha=1;ctx.shadowBlur=0;

  // Player
  ctx.save();
  var r=getRunner();
  ctx.globalAlpha=player.invincible>0?(Math.floor(player.invincible/4)%2===0?0.4:1):1;

  var px=player.x,py=player.y;
  if(player.sliding){
    // Sliding pose — lower and wider
    ctx.fillStyle=r.body;ctx.fillRect(px-4,py+PH-14,PW+8,14);
    ctx.fillStyle=r.head;ctx.beginPath();ctx.arc(px+PW-2,py+PH-14,8,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=r.shoes;ctx.fillRect(px-4,py+PH-4,12,4);ctx.fillRect(px+PW-4,py+PH-4,12,4);
  }else{
    // Body
    ctx.fillStyle=r.body;
    ctx.beginPath();var br=5;ctx.moveTo(px+br,py+12);ctx.lineTo(px+PW-br,py+12);ctx.quadraticCurveTo(px+PW,py+12,px+PW,py+12+br);ctx.lineTo(px+PW,py+PH-10);ctx.lineTo(px,py+PH-10);ctx.lineTo(px,py+12+br);ctx.quadraticCurveTo(px,py+12,px+br,py+12);ctx.fill();
    // Head
    ctx.fillStyle=r.head;ctx.beginPath();ctx.arc(px+PW/2,py+8,10,0,Math.PI*2);ctx.fill();
    // Eyes
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(px+PW/2+4,py+6,2.5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#000';ctx.beginPath();ctx.arc(px+PW/2+5,py+6,1.2,0,Math.PI*2);ctx.fill();
    // Legs — animated
    var legAnim=Math.sin(Date.now()*0.015)*6;
    ctx.fillStyle=r.legs;
    ctx.fillRect(px+4,py+PH-10,6,10+legAnim);
    ctx.fillRect(px+PW-10,py+PH-10,6,10-legAnim);
    // Shoes
    ctx.fillStyle=r.shoes;
    ctx.fillRect(px+2,py+PH+legAnim,10,4);
    ctx.fillRect(px+PW-12,py+PH-legAnim,10,4);
    // Accessory
    var acc=getAcc();
    if(acc.emoji){ctx.font='14px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(acc.emoji,px+PW/2,py-4)}
  }
  ctx.restore();

  // Particles
  for(var pdi=0;pdi<particles.length;pdi++){var pd=particles[pdi];ctx.globalAlpha=pd.life/30;ctx.fillStyle=pd.color;ctx.beginPath();ctx.arc(pd.x,pd.y,pd.size,0,Math.PI*2);ctx.fill()}
  ctx.globalAlpha=1;

  // Text pops
  for(var tdi=0;tdi<textPops.length;tdi++){var td=textPops[tdi];ctx.globalAlpha=td.life/30;ctx.fillStyle=td.color;ctx.font='bold '+td.size+'px sans-serif';ctx.textAlign='center';ctx.fillText(td.text,td.x,td.y)}
  ctx.globalAlpha=1;

  // Nuke flash
  if(nukeFlash>0){ctx.globalAlpha=nukeFlash/30;ctx.fillStyle=nukeFlash>20?'#fff':nukeFlash>10?'#ffd700':'#ff4500';ctx.fillRect(0,0,W,H);ctx.globalAlpha=1}
}

function loop(){update();draw();requestAnimationFrame(loop)}

async function _lbShow(){var lb=document.getElementById('lb-overlay'),list=document.getElementById('lb-list');list.innerHTML='<div style="color:#64748b;text-align:center;padding:20px">Loading...</div>';lb.style.display='flex';var data=await _lbFetch();if(!data.length){list.innerHTML='<div style="color:#64748b;text-align:center;padding:20px">No scores yet!</div>';return}list.innerHTML=data.map(function(d,i){return '<div class="lb-row"><span class="lb-rank">#'+(i+1)+'</span><span class="lb-name">'+d.player_name+'</span><span class="lb-score">'+d.score+'</span></div>'}).join('')}
document.getElementById('lb-close-btn').addEventListener('click',function(){document.getElementById('lb-overlay').style.display='none'});
document.getElementById('lb-show-btn').addEventListener('click',function(){_lbShow()});
document.getElementById('death-submit').addEventListener('click',async function(){var n=document.getElementById('death-name').value.trim()||'Anonymous';localStorage.setItem('ajgt_name',n);await _lbSubmit(n,score);this.textContent='✅ Done!';this.disabled=true});
document.getElementById('death-retry').addEventListener('click',function(){document.getElementById('death-screen').style.display='none';document.getElementById('death-submit').textContent='📤 Submit';document.getElementById('death-submit').disabled=false;canvas.style.pointerEvents='';startMusic();init()});
document.getElementById('death-lb').addEventListener('click',function(){_lbShow()});
document.getElementById('death-name').addEventListener('keydown',function(e){if(e.key==='Enter')document.getElementById('death-submit').click()});

// === SHOP ===
var shopOpenedFromDeath=false;
function openShop(){document.getElementById('shop-screen').style.display='flex';updateCoinDisplays();renderGrid('runners');renderGrid('worlds');renderGrid('accs');renderGrid('trails');renderGrid('explo')}
function renderGrid(tab){
  var grid=document.getElementById('grid-'+tab);grid.innerHTML='';
  var items,owned,active;
  if(tab==='runners'){items=RUNNERS;owned=ownedRunners;active=activeRunner}
  else if(tab==='worlds'){items=WORLDS;owned=ownedWorlds;active=activeWorld}
  else if(tab==='accs'){items=ACCESSORIES;owned=ownedAccs;active=activeAcc}
  else if(tab==='trails'){items=TRAILS;owned=ownedTrails;active=activeTrail}
  else if(tab==='explo'){items=EXPLOSIONS;owned=ownedExplo;active=activeExplo}
  items.forEach(function(item){
    var isOwned=owned.includes(item.id),isActive=active===item.id;
    var card=document.createElement('div');
    card.className='shop-card'+(isActive?' selected':'')+(!isOwned&&totalCoins<item.cost?' locked':'');
    var em=document.createElement('div');em.className='item-emoji';em.textContent=item.emoji||(item.colors?'✨':'🎨');card.appendChild(em);
    var nm=document.createElement('div');nm.className='item-name';nm.textContent=item.name;card.appendChild(nm);
    if(isActive){var st=document.createElement('div');st.className='item-owned';st.textContent='✅ Active';card.appendChild(st)}
    else if(isOwned){var st2=document.createElement('div');st2.className='item-owned';st2.textContent='✓ Owned';card.appendChild(st2)}
    else{var ct=document.createElement('div');ct.className='item-cost';ct.textContent='🪙 '+item.cost;card.appendChild(ct)}
    card.addEventListener('click',function(){
      if(isOwned){
        if(tab==='runners')activeRunner=item.id;
        else if(tab==='worlds'){activeWorld=item.id;stopMusic();startMusic()}
        else if(tab==='accs')activeAcc=item.id;
        else if(tab==='trails')activeTrail=item.id;
        else if(tab==='explo')activeExplo=item.id;
        saveShop();renderGrid(tab);
      }else if(totalCoins>=item.cost){
        totalCoins-=item.cost;owned.push(item.id);
        if(tab==='runners'){activeRunner=item.id;ownedRunners=owned}
        else if(tab==='worlds'){activeWorld=item.id;ownedWorlds=owned;stopMusic();startMusic()}
        else if(tab==='accs'){activeAcc=item.id;ownedAccs=owned}
        else if(tab==='trails'){activeTrail=item.id;ownedTrails=owned}
        else if(tab==='explo'){activeExplo=item.id;ownedExplo=owned}
        saveShop();updateCoinDisplays();renderGrid(tab);
      }
    });
    grid.appendChild(card);
  });
}
document.querySelectorAll('.shop-tab').forEach(function(tab){tab.addEventListener('click',function(){document.querySelectorAll('.shop-tab').forEach(function(t){t.classList.remove('active')});tab.classList.add('active');var which=tab.dataset.tab;['runners','worlds','accs','trails','explo'].forEach(function(id){document.getElementById('grid-'+id).style.display=id===which?'':'none'})})});
document.getElementById('shop-close').addEventListener('click',function(){document.getElementById('shop-screen').style.display='none';if(shopOpenedFromDeath)document.getElementById('death-screen').style.display='flex'});
document.getElementById('shop-show-btn').addEventListener('click',function(){shopOpenedFromDeath=false;openShop()});
document.getElementById('death-shop').addEventListener('click',function(){shopOpenedFromDeath=true;document.getElementById('death-screen').style.display='none';openShop()});
</script>
