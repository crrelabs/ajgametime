<title>Dragon Flight — AJ GameTime</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;display:flex;flex-direction:column;align-items:center;font-family:-apple-system,sans-serif;background:#0a0a12;color:#e2e8f0;overflow:hidden;user-select:none;-webkit-user-select:none}
#header{width:100%;padding:0.5rem 1rem;display:flex;justify-content:space-between;align-items:center;z-index:10;position:fixed;top:0;background:rgba(10,10,18,0.85)}
#header a{color:#64748b;text-decoration:none;font-size:0.85rem}
#header a:hover{color:#e2e8f0}
#hud{display:flex;gap:1.2rem;align-items:center}
.stat{text-align:center}.stat-val{font-size:1.3rem;font-weight:800}.stat-label{font-size:0.55rem;text-transform:uppercase;letter-spacing:0.1em;color:#64748b}
#scoreVal{color:#fbbf24}#coinsVal{color:#fbbf24}#distVal{color:#a78bfa}#livesVal{color:#ef4444}
canvas{display:block;touch-action:none}
#startScreen{position:fixed;inset:0;background:rgba(10,10,18,0.97);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:30}
#startScreen.hidden{display:none}
#startScreen h1{font-size:2.5rem;margin-bottom:0.5rem}
#startScreen .emoji{font-size:5rem;margin-bottom:1rem}
#startScreen p{color:#94a3b8;margin-bottom:0.5rem;font-size:0.9rem;text-align:center;max-width:340px}
button.play-btn{margin-top:1rem;padding:0.8rem 2rem;font-size:1rem;font-weight:700;background:linear-gradient(135deg,#ef4444,#f97316);color:white;border:none;border-radius:12px;cursor:pointer;transition:0.2s}
button.play-btn:hover{transform:scale(1.05)}
.menu-btn{padding:8px 20px;font-size:14px;font-weight:700;color:#fff;border:none;border-radius:8px;cursor:pointer;margin-top:8px}
#musicBtn{position:fixed;bottom:16px;right:16px;z-index:20;width:44px;height:44px;border-radius:50%;border:2px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.08);color:#e2e8f0;font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
#fireBtn{position:fixed;bottom:80px;right:16px;z-index:20;width:60px;height:60px;border-radius:50%;border:2px solid rgba(255,100,0,0.4);background:rgba(255,100,0,0.15);color:#e2e8f0;font-size:1.8rem;cursor:pointer;display:none;align-items:center;justify-content:center}
#lb-overlay{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:100;background:rgba(0,0,0,0.92)}
#lb-overlay h2{font-size:28px;color:#f59e0b;margin-bottom:12px;font-weight:900}
#lb-list{width:min(340px,90vw);max-height:50vh;overflow-y:auto}
.lb-row{display:flex;justify-content:space-between;padding:8px 14px;border-bottom:1px solid rgba(255,255,255,0.08);color:#e2e8f0;font-size:14px;font-weight:600}
.lb-row:nth-child(1) .lb-rank{color:#fbbf24}.lb-row:nth-child(2) .lb-rank{color:#94a3b8}.lb-row:nth-child(3) .lb-rank{color:#b45309}
.lb-rank{width:30px;color:#64748b}.lb-name{flex:1;margin:0 8px}.lb-score{color:#22d3ee}
#lb-close-btn{margin-top:16px;padding:10px 30px;font-size:16px;font-weight:700;color:#fff;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:10px;cursor:pointer}
#death-screen{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:90;background:rgba(10,10,18,0.97)}
#death-screen h1{font-size:2.5rem;margin-bottom:0.5rem;color:#e2e8f0}
#death-score{font-size:3rem;font-weight:900;color:#fbbf24;margin-bottom:4px}
#death-dist{font-size:1.1rem;color:#a78bfa;font-weight:700;margin-bottom:4px}
#death-coins{color:#fbbf24;font-size:1rem;font-weight:700;margin-bottom:12px}
#death-screen input{padding:10px 16px;font-size:16px;border-radius:8px;border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.1);color:#fff;text-align:center;width:200px;margin-bottom:12px}
#death-screen button{margin:4px;padding:10px 24px;font-size:14px;font-weight:700;border:none;border-radius:10px;cursor:pointer;color:#fff}
#death-submit{background:linear-gradient(135deg,#22c55e,#16a34a)}
#death-retry{background:linear-gradient(135deg,#3b82f6,#8b5cf6)}
#death-lb{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2)!important}
#shop-screen{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;z-index:95;background:rgba(10,10,18,0.98);overflow-y:auto;padding:20px 10px}
#shop-screen h2{font-size:1.8rem;margin-bottom:4px;color:#fbbf24}
#shop-coins-display{color:#fbbf24;font-size:1.1rem;font-weight:700;margin-bottom:12px}
.shop-tabs{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;justify-content:center}
.shop-tab{padding:8px 16px;font-weight:700;border-radius:8px;border:2px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.05);color:#fff;cursor:pointer;font-size:13px}
.shop-tab.active{background:linear-gradient(135deg,#f59e0b,#ef4444);border-color:transparent}
.shop-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:10px;width:min(500px,95vw);margin-bottom:16px}
.shop-card{background:rgba(255,255,255,0.08);border-radius:12px;padding:12px 8px;text-align:center;cursor:pointer;border:2px solid transparent;transition:0.2s}
.shop-card:hover{background:rgba(255,255,255,0.15)}
.shop-card.selected{border-color:#22c55e;background:rgba(34,197,94,0.15)}
.shop-card.locked{opacity:0.5}
.shop-card .item-emoji{font-size:2rem;margin-bottom:4px}
.shop-card .item-name{font-size:0.75rem;font-weight:700;color:#e2e8f0;margin-bottom:2px}
.shop-card .item-cost{font-size:0.7rem;color:#fbbf24}
.shop-card .item-owned{font-size:0.7rem;color:#22c55e}
#shop-close{margin-top:12px;padding:10px 30px;font-size:16px;font-weight:700;color:#fff;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:10px;cursor:pointer;margin-bottom:30px}
</style>
</head>
<body>
<div id="header">
  <a href="index.html">← AJ GameTime</a>
  <div id="hud">
    <div class="stat"><div class="stat-val" id="scoreVal">0</div><div class="stat-label">Score</div></div>
    <div class="stat"><div class="stat-val" id="coinsVal">0</div><div class="stat-label">🪙</div></div>
    <div class="stat"><div class="stat-val" id="distVal">0m</div><div class="stat-label">Dist</div></div>
    <div class="stat"><div class="stat-val" id="livesVal">❤️❤️❤️</div><div class="stat-label">Lives</div></div>
  </div>
</div>

<div id="startScreen">
  <div class="emoji">🐉</div>
  <h1>Dragon Flight</h1>
  <p>Fly through caves, breathe fire at enemies, collect treasure! Tap/click to flap. Fire button to attack! 🔥</p>
  <p id="start-coins" style="color:#fbbf24;font-weight:700">🪙 0</p>
  <button class="play-btn" id="startBtn">🐉 Fly!</button>
  <button class="menu-btn" id="lb-show-btn" style="background:linear-gradient(135deg,#f59e0b,#ef4444)">🏆 Leaderboard</button>
  <button class="menu-btn" id="shop-show-btn" style="background:linear-gradient(135deg,#a855f7,#ec4899)">🛍️ Shop</button>
</div>

<canvas id="game"></canvas>
<button id="musicBtn">🔊</button>
<button id="fireBtn">🔥</button>

<div id="lb-overlay"><h2>🏆 Leaderboard</h2><div id="lb-list"></div><button id="lb-close-btn">Close</button></div>

<div id="death-screen">
  <h1>🐉 Crashed!</h1>
  <div id="death-score">0</div>
  <div id="death-dist">Distance: 0m</div>
  <div id="death-coins">🪙 0</div>
  <input type="text" id="death-name" placeholder="Your name" maxlength="16" autocomplete="off">
  <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center">
    <button id="death-submit">📤 Submit</button>
    <button id="death-lb">🏆 Leaderboard</button>
    <button id="death-retry">🐉 Try Again</button>
    <button id="death-shop" style="background:linear-gradient(135deg,#a855f7,#ec4899)">🛍️ Shop</button>
  </div>
</div>

<div id="shop-screen">
  <h2>🛍️ Shop</h2>
  <div id="shop-coins-display">🪙 0</div>
  <div class="shop-tabs">
    <button class="shop-tab active" data-tab="dragons">🐉 Dragons</button>
    <button class="shop-tab" data-tab="worlds">🌍 Worlds</button>
    <button class="shop-tab" data-tab="accs">🎩 Accessories</button>
    <button class="shop-tab" data-tab="trails">✨ Trails</button>
    <button class="shop-tab" data-tab="explo">💥 Deaths</button>
  </div>
  <div class="shop-grid" id="grid-dragons"></div>
  <div class="shop-grid" id="grid-worlds" style="display:none"></div>
  <div class="shop-grid" id="grid-accs" style="display:none"></div>
  <div class="shop-grid" id="grid-trails" style="display:none"></div>
  <div class="shop-grid" id="grid-explo" style="display:none"></div>
  <button id="shop-close">Close</button>
</div>

<script>
// === SHOP DATA ===
var DRAGONS = [

  {id:'pink',name:'Fairy Dragon',cost:125,emoji:'🐉',body:'#ec4899',wing:'#db2777',belly:'#f9a8d4',fire:'#f472b6'},
  {id:'black',name:'Night Dragon',cost:175,emoji:'🐉',body:'#1e293b',wing:'#0f172a',belly:'#475569',fire:'#ef4444'},
  {id:'white',name:'Ghost Dragon',cost:200,emoji:'🐉',body:'#e2e8f0',wing:'#cbd5e1',belly:'#f8fafc',fire:'#a78bfa'},
  {id:'lava',name:'Lava Dragon',cost:250,emoji:'🐉',body:'#dc2626',wing:'#991b1b',belly:'#fbbf24',fire:'#ff4500'},
  {id:'storm',name:'Storm Dragon',cost:300,emoji:'🐉',body:'#6366f1',wing:'#4f46e5',belly:'#a5b4fc',fire:'#fbbf24'},
  {id:'crystal',name:'Crystal Dragon',cost:400,emoji:'🐉',body:'#67e8f9',wing:'#22d3ee',belly:'#ecfeff',fire:'#fff'},
  {id:'void',name:'Void Dragon',cost:750,emoji:'🐉',body:'#1e1b4b',wing:'#0c0a3e',belly:'#312e81',fire:'#7c3aed'},
  {id:'cosmic',name:'Cosmic Dragon',cost:1000,emoji:'🐉',body:'#818cf8',wing:'#6366f1',belly:'#c7d2fe',fire:'#f0abfc'},
];

var WORLDS = [
  {id:'cave',name:'Dark Cave',cost:0,sky1:'#0f172a',sky2:'#1e293b',ground:'#44403c',wall:'#292524'},
  {id:'volcano',name:'Volcano',cost:75,sky1:'#1a0505',sky2:'#450a0a',ground:'#7c2d12',wall:'#991b1b',lava:true},
  {id:'ice',name:'Ice Cavern',cost:100,sky1:'#0c4a6e',sky2:'#164e63',ground:'#67e8f9',wall:'#0e7490',snow:true},
  {id:'forest',name:'Enchanted Forest',cost:100,sky1:'#052e16',sky2:'#14532d',ground:'#15803d',wall:'#166534'},
  {id:'sky',name:'Sky Kingdom',cost:150,sky1:'#1e3a5f',sky2:'#60a5fa',ground:'#93c5fd',wall:'#3b82f6',clouds:true},
  {id:'nether',name:'Nether',cost:175,sky1:'#1a0000',sky2:'#3d0000',ground:'#dc2626',wall:'#7f1d1d',lava:true},
  {id:'crystal',name:'Crystal Caves',cost:200,sky1:'#1e1b4b',sky2:'#312e81',ground:'#818cf8',wall:'#6366f1',sparkle:true},
  {id:'space',name:'Outer Space',cost:300,sky1:'#020010',sky2:'#0a001a',ground:'#374151',wall:'#1f2937',stars:true},
];

var ACCESSORIES = [
  {id:'none',name:'None',cost:0,emoji:''},
  {id:'crown',name:'Crown',cost:75,emoji:'👑'},
  {id:'helmet',name:'Knight Helm',cost:100,emoji:'⛑️'},
  {id:'horns',name:'Devil Horns',cost:60,emoji:'😈'},
  {id:'halo',name:'Halo',cost:80,emoji:'😇'},
  {id:'wizard',name:'Wizard Hat',cost:125,emoji:'🧙'},
  {id:'pirate',name:'Pirate Hat',cost:90,emoji:'🏴‍☠️'},
  {id:'santa',name:'Santa Hat',cost:100,emoji:'🎅'},
  {id:'viking',name:'Viking Helm',cost:150,emoji:'⚔️'},
  {id:'alien',name:'Alien',cost:175,emoji:'👽'},
  {id:'robot',name:'Robot',cost:200,emoji:'🤖'},
];

var TRAILS = [
  {id:'none',name:'None',cost:0},
  {id:'fire',name:'Fire',cost:0,colors:['#ef4444','#f97316','#fbbf24']},
  {id:'sparkle',name:'Sparkle',cost:75,colors:['#fbbf24','#fff','#fde68a']},
  {id:'rainbow',name:'Rainbow',cost:125,colors:['#ef4444','#f97316','#fbbf24','#22c55e','#3b82f6','#8b5cf6']},
  {id:'ice',name:'Ice',cost:80,colors:['#bae6fd','#7dd3fc','#38bdf8']},
  {id:'poison',name:'Poison',cost:100,colors:['#22c55e','#86efac','#bbf7d0']},
  {id:'lightning',name:'Lightning',cost:125,colors:['#fbbf24','#a78bfa','#fff']},
  {id:'hearts',name:'Hearts',cost:90,colors:['#f43f5e','#ec4899','#f9a8d4']},
  {id:'stars',name:'Stars',cost:100,colors:['#fbbf24','#f59e0b','#fff']},
  {id:'smoke',name:'Smoke',cost:70,colors:['#6b7280','#9ca3af','#d1d5db']},
  {id:'galaxy',name:'Galaxy',cost:175,colors:['#7c3aed','#a78bfa','#c4b5fd','#fff']},
  {id:'plasma',name:'Plasma',cost:150,colors:['#a855f7','#ec4899','#f0abfc']},
];

var EXPLOSIONS = [
  {id:'default',name:'Classic',cost:0,emoji:'💥'},
  {id:'fireworks',name:'Fireworks',cost:80,emoji:'🎆'},
  {id:'confetti',name:'Confetti',cost:90,emoji:'🎊'},
  {id:'hearts',name:'Hearts',cost:100,emoji:'💕'},
  {id:'skull',name:'Skull Pop',cost:120,emoji:'💀'},
  {id:'nuke',name:'Nuke',cost:200,emoji:'☢️'},
  {id:'glitch',name:'Glitch',cost:150,emoji:'📺'},
  {id:'feathers',name:'Scales',cost:75,emoji:'🐉'},
  {id:'ice',name:'Ice Shatter',cost:130,emoji:'🧊'},
  {id:'lava',name:'Lava Burst',cost:175,emoji:'🌋'},
  {id:'portal',name:'Portal',cost:250,emoji:'🌀'},
  {id:'pixel',name:'Pixel Break',cost:110,emoji:'👾'},
];

// === PERSISTENT STATE ===
var totalCoins=parseInt(localStorage.getItem('df_coins')||'0');
var ownedDragons=JSON.parse(localStorage.getItem('df_dragons')||'["green"]');
var activeDragon=localStorage.getItem('df_active_dragon')||'green';
var ownedWorlds=JSON.parse(localStorage.getItem('df_worlds')||'["cave"]');
var activeWorld=localStorage.getItem('df_active_world')||'cave';
var ownedAccs=JSON.parse(localStorage.getItem('df_accs')||'["none"]');
var activeAcc=localStorage.getItem('df_active_acc')||'none';
var ownedTrails=JSON.parse(localStorage.getItem('df_trails')||'["none","fire"]');
var activeTrail=localStorage.getItem('df_active_trail')||'fire';
var ownedExplo=JSON.parse(localStorage.getItem('df_explo')||'["default"]');
var activeExplo=localStorage.getItem('df_active_explo')||'default';

function saveShop(){
  localStorage.setItem('df_coins',totalCoins);
  localStorage.setItem('df_dragons',JSON.stringify(ownedDragons));
  localStorage.setItem('df_active_dragon',activeDragon);
  localStorage.setItem('df_worlds',JSON.stringify(ownedWorlds));
  localStorage.setItem('df_active_world',activeWorld);
  localStorage.setItem('df_accs',JSON.stringify(ownedAccs));
  localStorage.setItem('df_active_acc',activeAcc);
  localStorage.setItem('df_trails',JSON.stringify(ownedTrails));
  localStorage.setItem('df_active_trail',activeTrail);
  localStorage.setItem('df_explo',JSON.stringify(ownedExplo));
  localStorage.setItem('df_active_explo',activeExplo);
}

function getDragon(){return DRAGONS.find(function(d){return d.id===activeDragon})||DRAGONS[0]}
function getWorld(){return WORLDS.find(function(w){return w.id===activeWorld})||WORLDS[0]}
function getAcc(){return ACCESSORIES.find(function(a){return a.id===activeAcc})||ACCESSORIES[0]}
function getTrail(){return TRAILS.find(function(t){return t.id===activeTrail})||TRAILS[0]}
function getExplo(){return EXPLOSIONS.find(function(e){return e.id===activeExplo})||EXPLOSIONS[0]}

function updateCoinDisplays(){
  document.getElementById('start-coins').textContent='🪙 '+totalCoins;
  document.getElementById('shop-coins-display').textContent='🪙 '+totalCoins;
  document.getElementById('death-coins').textContent='🪙 '+totalCoins;
  document.getElementById('coinsVal').textContent=totalCoins;
}
updateCoinDisplays();

// === AUDIO ===
var AudioCtx=window.AudioContext||window.webkitAudioContext;
var audioCtx=null,musicPlaying=false,musicGain=null,musicInterval=null,droneOsc=null,droneOsc2=null;
function initAudio(){if(audioCtx)return;audioCtx=new AudioCtx();musicGain=audioCtx.createGain();musicGain.gain.value=0.3;musicGain.connect(audioCtx.destination)}
function playNote(freq,dur,type,vol){if(!audioCtx)return;type=type||'sine';vol=vol||0.1;var o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type=type;o.frequency.value=freq;g.gain.setValueAtTime(vol,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+dur)}
function sfxFlap(){playNote(300,0.1,'triangle',0.08);playNote(400,0.08,'sine',0.05)}
function sfxFire(){playNote(150,0.3,'sawtooth',0.12);playNote(100,0.4,'square',0.08)}
function sfxCoin(){playNote(800,0.1,'sine',0.1);playNote(1200,0.1,'sine',0.08)}
function sfxHit(){playNote(100,0.3,'sawtooth',0.15);playNote(80,0.4,'square',0.1)}
function sfxKill(){playNote(600,0.15,'sine',0.1);playNote(900,0.1,'sine',0.08)}
function sfxCrash(){playNote(80,0.5,'sawtooth',0.2);playNote(60,0.7,'square',0.15)}

var MELODIES={
  'cave':{notes:[[196,0.5],[220,0.4],[262,0.6],[0,0.3],[220,0.5],[196,0.7],[0,0.3],[165,0.5],[196,0.4],[220,0.6],[0,0.4]],drone:98,wave:'triangle'},
  'volcano':{notes:[[147,0.3],[165,0.3],[196,0.4],[165,0.3],[147,0.5],[0,0.2],[131,0.4],[147,0.5],[0,0.3]],drone:73,wave:'sawtooth'},
  'ice':{notes:[[392,0.7],[440,0.5],[523,0.6],[0,0.4],[440,0.5],[392,0.7],[0,0.3],[330,0.6],[392,0.8],[0,0.4]],drone:196,wave:'sine'},
  'forest':{notes:[[330,0.5],[392,0.4],[440,0.5],[0,0.3],[523,0.4],[440,0.6],[392,0.4],[0,0.2],[330,0.7],[0,0.4]],drone:165,wave:'triangle'},
  'sky':{notes:[[523,0.6],[587,0.4],[659,0.5],[0,0.3],[784,0.4],[659,0.5],[587,0.4],[523,0.7],[0,0.4]],drone:262,wave:'sine'},
  'nether':{notes:[[131,0.4],[147,0.3],[165,0.5],[0,0.2],[147,0.3],[131,0.4],[110,0.6],[0,0.3]],drone:65,wave:'sawtooth'},
  'crystal':{notes:[[440,0.5],[523,0.4],[587,0.6],[0,0.3],[659,0.4],[587,0.5],[523,0.4],[440,0.7],[0,0.4]],drone:220,wave:'sine'},
  'space':{notes:[[262,0.8],[330,0.6],[392,0.8],[0,0.5],[440,0.7],[392,0.5],[330,0.8],[0,0.4],[262,1.0],[0,0.5]],drone:131,wave:'sine'},
};

function startMusic(){
  if(musicPlaying)return;initAudio();musicPlaying=true;
  var m=MELODIES[activeWorld]||MELODIES['cave'];
  droneOsc=audioCtx.createOscillator();var dg=audioCtx.createGain();droneOsc.type='sine';droneOsc.frequency.value=m.drone;dg.gain.value=0.06;droneOsc.connect(dg);dg.connect(musicGain);droneOsc.start();
  droneOsc2=audioCtx.createOscillator();var dg2=audioCtx.createGain();droneOsc2.type='sine';droneOsc2.frequency.value=m.drone*1.5;dg2.gain.value=0.03;droneOsc2.connect(dg2);dg2.connect(musicGain);droneOsc2.start();
  var idx=0;
  function next(){if(!musicPlaying)return;var n=m.notes[idx%m.notes.length];if(n[0]>0){var o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type=m.wave;o.frequency.value=n[0];g.gain.setValueAtTime(0.1,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.01,audioCtx.currentTime+n[1]*0.85);o.connect(g);g.connect(musicGain);o.start();o.stop(audioCtx.currentTime+n[1])}idx++;musicInterval=setTimeout(next,n[1]*1000)}
  next();document.getElementById('musicBtn').textContent='🔊';
}
function stopMusic(){musicPlaying=false;if(musicInterval)clearTimeout(musicInterval);try{if(droneOsc)droneOsc.stop()}catch(e){}try{if(droneOsc2)droneOsc2.stop()}catch(e){}droneOsc=null;droneOsc2=null;document.getElementById('musicBtn').textContent='🔇'}
document.getElementById('musicBtn').addEventListener('click',function(){if(musicPlaying)stopMusic();else startMusic()});

// === GAME ===
var canvas=document.getElementById('game');
var ctx=canvas.getContext('2d');
var W,H;
function resize(){W=window.innerWidth;H=window.innerHeight;canvas.width=W;canvas.height=H}
resize();window.addEventListener('resize',resize);

// Dragon
var dragon={x:0,y:0,vy:0,wingFrame:0,fireTimer:0,invincible:0};
var GRAVITY=0.35,FLAP=-7,SPEED=3;

// Game state
var walls=[],enemies=[],coins=[],fireballs=[],particles=[],trailParticles=[],textPops=[];
var score,sessionCoins,distance,lives,gameRunning,dead,nukeFlash=0;
var scrollX,spawnTimer,enemyTimer,coinTimer,difficulty;
var highScore=parseInt(localStorage.getItem('df_high')||'0');

function init(){
  dragon.x=W*0.2;dragon.y=H*0.4;dragon.vy=0;dragon.wingFrame=0;dragon.fireTimer=0;dragon.invincible=0;
  walls=[];enemies=[];coins=[];fireballs=[];particles=[];trailParticles=[];textPops=[];
  score=0;sessionCoins=0;distance=0;lives=3;gameRunning=true;dead=false;nukeFlash=0;
  scrollX=0;spawnTimer=0;enemyTimer=0;coinTimer=0;difficulty=0;
  // Generate initial walls
  var gapY=H*0.5,gapH=H*0.45;
  for(var wx=W;wx<W*3;wx+=120){
    gapY+=((Math.random()-0.5)*80);
    gapY=Math.max(80,Math.min(H-80-gapH,gapY));
    walls.push({x:wx,gapY:gapY,gapH:gapH,scored:false});
  }
  updateHUD();
}

function updateHUD(){
  document.getElementById('scoreVal').textContent=score;
  document.getElementById('distVal').textContent=Math.floor(distance)+'m';
  document.getElementById('livesVal').textContent='❤️'.repeat(lives)+'🖤'.repeat(Math.max(0,3-lives));
}

function flap(){if(dead)return;dragon.vy=FLAP;dragon.wingFrame=0;sfxFlap()}

function breathFire(){
  if(dead||dragon.fireTimer>0)return;
  dragon.fireTimer=20;
  var d=getDragon();
  fireballs.push({x:dragon.x+30,y:dragon.y,vx:8,vy:0,life:60,color:d.fire,size:8});
  sfxFire();
}

function spawnWall(){
  var last=walls[walls.length-1];
  var gapH=Math.max(H*0.28,H*0.45-difficulty*20);
  var gapY=last?last.gapY+((Math.random()-0.5)*100):H*0.4;
  gapY=Math.max(80,Math.min(H-80-gapH,gapY));
  walls.push({x:last?last.x+120+Math.random()*60:W+100,gapY:gapY,gapH:gapH,scored:false});
}

function spawnEnemy(){
  var ey=80+Math.random()*(H-160);
  var types=['bat','ghost','skull'];
  var type=types[Math.floor(Math.random()*types.length)];
  enemies.push({x:W+30,y:ey,vx:-2-Math.random()*2,vy:(Math.random()-0.5)*2,type:type,
    emoji:type==='bat'?'🦇':type==='ghost'?'👻':'💀',hp:type==='skull'?2:1,size:25});
}

function spawnCoin(){
  var cy=80+Math.random()*(H-160);
  var isGem=Math.random()<0.15;
  coins.push({x:W+30,y:cy,emoji:isGem?'💎':'🪙',value:isGem?5:1,size:18});
}

function update(){
  // Always update particles
  for(var pi=particles.length-1;pi>=0;pi--){var p=particles[pi];p.x+=p.vx;p.y+=p.vy;p.vy+=0.1;p.life--;if(p.life<=0)particles.splice(pi,1)}
  for(var ti=trailParticles.length-1;ti>=0;ti--){var tp=trailParticles[ti];tp.x+=tp.vx;tp.y+=tp.vy;tp.life--;if(tp.life<=0)trailParticles.splice(ti,1)}
  for(var tpi=textPops.length-1;tpi>=0;tpi--){textPops[tpi].y-=1.5;textPops[tpi].life--;if(textPops[tpi].life<=0)textPops.splice(tpi,1)}
  if(nukeFlash>0)nukeFlash--;

  if(!gameRunning)return;

  difficulty=Math.min(distance/500,2);
  SPEED=3+difficulty;

  // Dragon physics
  dragon.vy+=GRAVITY;dragon.y+=dragon.vy;
  dragon.wingFrame+=0.15;
  if(dragon.fireTimer>0)dragon.fireTimer--;
  if(dragon.invincible>0)dragon.invincible--;
  distance+=SPEED*0.05;
  scrollX+=SPEED;

  // Trail particles
  var trail=getTrail();
  if(trail.colors){
    trailParticles.push({x:dragon.x-10,y:dragon.y+Math.random()*10-5,vx:-1-Math.random(),vy:(Math.random()-0.5)*2,life:15+Math.random()*10,maxLife:25,color:trail.colors[Math.floor(Math.random()*trail.colors.length)],size:2+Math.random()*3});
  }

  // Ceiling/floor
  if(dragon.y<20){dragon.y=20;dragon.vy=0}
  if(dragon.y>H-40){takeDamage();dragon.y=H*0.4;dragon.vy=-3}

  // Walls
  for(var wi=walls.length-1;wi>=0;wi--){
    var w=walls[wi];w.x-=SPEED;
    if(w.x<-60){walls.splice(wi,1);continue}
    if(!w.scored&&w.x<dragon.x){w.scored=true;score+=10;updateHUD()}
    // Collision
    if(dragon.invincible<=0&&dragon.x+15>w.x&&dragon.x-15<w.x+30){
      if(dragon.y-12<w.gapY||dragon.y+12>w.gapY+w.gapH){takeDamage();dragon.invincible=60}
    }
  }
  // Spawn walls
  if(walls.length===0||walls[walls.length-1].x<W-100)spawnWall();

  // Enemies
  enemyTimer--;
  if(enemyTimer<=0){spawnEnemy();enemyTimer=90-difficulty*20+Math.random()*40}
  for(var ei=enemies.length-1;ei>=0;ei--){
    var e=enemies[ei];e.x+=e.vx;e.y+=e.vy;
    e.y+=Math.sin(Date.now()*0.005+ei)*0.5;
    if(e.x<-40){enemies.splice(ei,1);continue}
    // Dragon collision
    if(dragon.invincible<=0&&Math.abs(dragon.x-e.x)<25&&Math.abs(dragon.y-e.y)<25){
      takeDamage();dragon.invincible=60;enemies.splice(ei,1);continue}
  }

  // Fireballs
  for(var fi=fireballs.length-1;fi>=0;fi--){
    var f=fireballs[fi];f.x+=f.vx;f.life--;
    if(f.life<=0||f.x>W+30){fireballs.splice(fi,1);continue}
    // Hit enemies
    for(var ei2=enemies.length-1;ei2>=0;ei2--){
      if(Math.abs(f.x-enemies[ei2].x)<25&&Math.abs(f.y-enemies[ei2].y)<25){
        enemies[ei2].hp--;
        if(enemies[ei2].hp<=0){
          score+=25;totalCoins+=2;sessionCoins+=2;
          for(var k=0;k<6;k++)particles.push({x:enemies[ei2].x,y:enemies[ei2].y,vx:(Math.random()-0.5)*6,vy:(Math.random()-0.5)*6,life:20,color:['#ef4444','#f97316','#fbbf24'][k%3],size:3+Math.random()*3});
          textPops.push({x:enemies[ei2].x,y:enemies[ei2].y-20,text:'+25',color:'#ef4444',size:24,life:30});
          sfxKill();enemies.splice(ei2,1);
        }
        fireballs.splice(fi,1);saveShop();updateCoinDisplays();updateHUD();break;
      }
    }
  }

  // Coins
  coinTimer--;
  if(coinTimer<=0){spawnCoin();coinTimer=40+Math.random()*30}
  for(var ci=coins.length-1;ci>=0;ci--){
    var c=coins[ci];c.x-=SPEED;
    if(c.x<-30){coins.splice(ci,1);continue}
    if(Math.abs(dragon.x-c.x)<22&&Math.abs(dragon.y-c.y)<22){
      totalCoins+=c.value;sessionCoins+=c.value;score+=c.value*5;
      textPops.push({x:c.x,y:c.y-15,text:'+'+c.value,color:'#fbbf24',size:20,life:25});
      sfxCoin();coins.splice(ci,1);saveShop();updateCoinDisplays();updateHUD();
    }
  }
}

function takeDamage(){
  lives--;sfxHit();updateHUD();
  if(lives<=0){die();return}
  dragon.invincible=90;
  for(var i=0;i<8;i++)particles.push({x:dragon.x,y:dragon.y,vx:(Math.random()-0.5)*6,vy:(Math.random()-0.5)*6,life:20,color:'#ef4444',size:3});
}

function spawnDeathParticles(){
  var ex=getExplo().id;var count=ex==='nuke'?80:20;
  if(ex==='nuke')nukeFlash=30;
  for(var i=0;i<count;i++){
    var ang=(i/count)*Math.PI*2,spd=2+Math.random()*6;
    var p={x:dragon.x,y:dragon.y,life:30+Math.random()*20,size:3+Math.random()*4};
    if(ex==='fireworks'){p.vx=Math.cos(ang)*spd*1.5;p.vy=Math.sin(ang)*spd*1.5;p.color=['#ff0000','#ffd700','#00ff00','#00bfff','#ff00ff'][i%5]}
    else if(ex==='confetti'){p.vx=(Math.random()-0.5)*8;p.vy=-2-Math.random()*4;p.color=['#ff0000','#ff9800','#ffeb3b','#4caf50','#2196f3'][i%5]}
    else if(ex==='hearts'){p.vx=(Math.random()-0.5)*6;p.vy=-1-Math.random()*5;p.color=['#ff69b4','#ff1493','#e91e63'][i%3]}
    else if(ex==='skull'){p.vx=Math.cos(ang)*spd;p.vy=Math.sin(ang)*spd;p.color=['#1a1a1a','#4a4a4a','#fff'][i%3]}
    else if(ex==='nuke'){var ring=i<30;p.vx=ring?Math.cos(ang)*15:(Math.random()-0.5)*20;p.vy=ring?Math.sin(ang)*15:(Math.random()-0.5)*20;p.color=['#ff4500','#ff8c00','#ffd700','#fff'][i%4];p.size=ring?8+Math.random()*6:3+Math.random()*10;p.life=60}
    else if(ex==='glitch'){p.vx=(Math.random()-0.5)*10;p.vy=(Math.random()-0.5)*10;p.color=['#00ff00','#ff00ff','#00ffff'][i%3];p.size=5}
    else if(ex==='feathers'){p.vx=(Math.random()-0.5)*4;p.vy=-1+Math.random()*2;p.color=['#22c55e','#16a34a','#86efac'][i%3];p.life=40}
    else if(ex==='ice'){p.vx=Math.cos(ang)*spd*1.2;p.vy=Math.sin(ang)*spd*1.2;p.color=['#e0f7fa','#b2ebf2','#fff'][i%3]}
    else if(ex==='lava'){p.vx=(Math.random()-0.5)*6;p.vy=-3-Math.random()*5;p.color=['#ff4500','#ff6600','#ffd600'][i%3]}
    else if(ex==='portal'){p.vx=Math.cos(ang+i*0.3)*(2+i*0.2);p.vy=Math.sin(ang+i*0.3)*(2+i*0.2);p.color=['#7c4dff','#e040fb','#536dfe'][i%3]}
    else if(ex==='pixel'){p.vx=Math.cos(ang)*spd;p.vy=Math.sin(ang)*spd;p.color=['#4caf50','#8bc34a','#ff9800'][i%3];p.size=5}
    else{p.vx=(Math.random()-0.5)*8;p.vy=(Math.random()-0.5)*8;p.color=['#fbbf24','#ef4444','#22c55e'][i%3]}
    particles.push(p);
  }
}

function die(){
  dead=true;gameRunning=false;sfxCrash();
  spawnDeathParticles();canvas.style.pointerEvents='none';
  stopMusic();
  if(score>highScore){highScore=score;localStorage.setItem('df_high',highScore)}
  setTimeout(gameOver,1200);
}

function gameOver(){
  document.getElementById('death-score').textContent=score;
  document.getElementById('death-dist').textContent='Distance: '+Math.floor(distance)+'m';
  updateCoinDisplays();
  document.getElementById('death-name').value=localStorage.getItem('ajgt_name')||'';
  document.getElementById('death-screen').style.display='flex';
}

function draw(){
  var world=getWorld();
  // Sky gradient
  var sky=ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,world.sky1);sky.addColorStop(1,world.sky2);
  ctx.fillStyle=sky;ctx.fillRect(0,0,W,H);

  // World effects
  if(world.stars){ctx.fillStyle='#fff';for(var si=0;si<60;si++){ctx.globalAlpha=0.3+0.5*Math.sin(Date.now()*0.003+si);ctx.fillRect((si*137.5+Date.now()*0.002)%W,(si*97.3)%H,2,2)}ctx.globalAlpha=1}
  if(world.snow){ctx.fillStyle='#fff';for(var sni=0;sni<30;sni++){ctx.globalAlpha=0.4;ctx.beginPath();ctx.arc((sni*83.7+Date.now()*0.02)%W,(sni*51.3+Date.now()*0.03)%H,2,0,Math.PI*2);ctx.fill()}ctx.globalAlpha=1}
  if(world.lava){for(var lvi=0;lvi<12;lvi++){ctx.fillStyle='rgba(255,69,0,0.3)';ctx.beginPath();ctx.arc((lvi*113.7+Date.now()*0.01)%W,H-20+Math.sin(Date.now()*0.005+lvi)*10,5,0,Math.PI*2);ctx.fill()}}
  if(world.sparkle){for(var spi=0;spi<20;spi++){ctx.globalAlpha=0.3+0.4*Math.sin(Date.now()*0.005+spi);ctx.fillStyle=['#818cf8','#c4b5fd','#fff'][spi%3];ctx.beginPath();ctx.arc((spi*97.3+Date.now()*0.008)%W,(spi*67.3)%H,2,0,Math.PI*2);ctx.fill()}ctx.globalAlpha=1}
  if(world.clouds){ctx.fillStyle='rgba(255,255,255,0.1)';for(var cli=0;cli<8;cli++){ctx.beginPath();ctx.arc((cli*137.5+scrollX*0.1)%W+50,50+cli*40,30+cli*5,0,Math.PI*2);ctx.fill()}}

  // Walls
  ctx.fillStyle=world.wall;
  for(var wi=0;wi<walls.length;wi++){
    var w=walls[wi];
    ctx.fillRect(w.x,0,30,w.gapY);
    ctx.fillRect(w.x,w.gapY+w.gapH,30,H-w.gapY-w.gapH);
    // Wall highlights
    ctx.fillStyle='rgba(255,255,255,0.1)';
    ctx.fillRect(w.x,0,4,w.gapY);
    ctx.fillRect(w.x,w.gapY+w.gapH,4,H-w.gapY-w.gapH);
    ctx.fillStyle=world.wall;
  }

  // Coins
  ctx.globalAlpha=1;
  for(var ci=0;ci<coins.length;ci++){
    var c=coins[ci];
    ctx.font='24px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(c.emoji,c.x,c.y+Math.sin(Date.now()*0.005+ci)*5);
  }

  // Enemies
  for(var ei=0;ei<enemies.length;ei++){
    var e=enemies[ei];
    ctx.font='30px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(e.emoji,e.x,e.y);
  }

  // Fireballs
  for(var fi=0;fi<fireballs.length;fi++){
    var fb=fireballs[fi];
    ctx.fillStyle=fb.color;ctx.shadowColor=fb.color;ctx.shadowBlur=12;
    ctx.beginPath();ctx.arc(fb.x,fb.y,fb.size,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
    // Fire trail
    for(var ft=0;ft<3;ft++){
      ctx.globalAlpha=0.3-ft*0.1;
      ctx.fillStyle=fb.color;
      ctx.beginPath();ctx.arc(fb.x-ft*8,fb.y+(Math.random()-0.5)*4,fb.size-ft*2,0,Math.PI*2);ctx.fill();
    }
    ctx.globalAlpha=1;
  }

  // Trail particles
  for(var tpi=0;tpi<trailParticles.length;tpi++){
    var tp=trailParticles[tpi];
    ctx.globalAlpha=tp.life/tp.maxLife;ctx.fillStyle=tp.color;
    ctx.shadowColor=tp.color;ctx.shadowBlur=6;
    ctx.beginPath();ctx.arc(tp.x,tp.y,tp.size,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;ctx.shadowBlur=0;

  // Dragon
  ctx.save();
  ctx.globalAlpha=dragon.invincible>0?(Math.floor(dragon.invincible/4)%2===0?0.4:1):1;
  var d=getDragon();
  var wingY=Math.sin(dragon.wingFrame*3)*8;

  // Body
  ctx.fillStyle=d.body;
  ctx.beginPath();ctx.ellipse(dragon.x,dragon.y,20,14,0,0,Math.PI*2);ctx.fill();
  // Belly
  ctx.fillStyle=d.belly;
  ctx.beginPath();ctx.ellipse(dragon.x+5,dragon.y+3,12,8,0,0,Math.PI*2);ctx.fill();
  // Wing
  ctx.fillStyle=d.wing;
  ctx.beginPath();ctx.moveTo(dragon.x-5,dragon.y-5);
  ctx.quadraticCurveTo(dragon.x-15,dragon.y-25+wingY,dragon.x-25,dragon.y-10+wingY);
  ctx.quadraticCurveTo(dragon.x-15,dragon.y,dragon.x-5,dragon.y);ctx.fill();
  // Head
  ctx.fillStyle=d.body;
  ctx.beginPath();ctx.arc(dragon.x+18,dragon.y-5,9,0,Math.PI*2);ctx.fill();
  // Eye
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(dragon.x+21,dragon.y-7,3,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#000';ctx.beginPath();ctx.arc(dragon.x+22,dragon.y-7,1.5,0,Math.PI*2);ctx.fill();
  // Tail
  ctx.strokeStyle=d.body;ctx.lineWidth=4;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(dragon.x-18,dragon.y);
  ctx.quadraticCurveTo(dragon.x-30,dragon.y+5+Math.sin(Date.now()*0.01)*5,dragon.x-38,dragon.y-2);ctx.stroke();
  // Tail tip
  ctx.fillStyle=d.fire;
  ctx.beginPath();ctx.moveTo(dragon.x-38,dragon.y-2);ctx.lineTo(dragon.x-44,dragon.y-8);ctx.lineTo(dragon.x-42,dragon.y+4);ctx.fill();

  // Fire breathing animation
  if(dragon.fireTimer>10){
    ctx.fillStyle=d.fire;ctx.globalAlpha=0.7;
    for(var fbi=0;fbi<3;fbi++){
      ctx.beginPath();ctx.arc(dragon.x+28+fbi*8,dragon.y-5+(Math.random()-0.5)*6,6-fbi,0,Math.PI*2);ctx.fill();
    }
    ctx.globalAlpha=1;
  }

  // Accessory
  var acc=getAcc();
  if(acc.emoji){ctx.font='16px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(acc.emoji,dragon.x+18,dragon.y-20)}
  ctx.restore();

  // Particles
  for(var pdi=0;pdi<particles.length;pdi++){
    var pd=particles[pdi];ctx.globalAlpha=pd.life/30;ctx.fillStyle=pd.color;
    ctx.beginPath();ctx.arc(pd.x,pd.y,pd.size,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;

  // Text pops
  for(var tdi=0;tdi<textPops.length;tdi++){
    var td=textPops[tdi];ctx.globalAlpha=td.life/30;ctx.fillStyle=td.color;
    ctx.font='bold '+td.size+'px sans-serif';ctx.textAlign='center';ctx.fillText(td.text,td.x,td.y);
  }
  ctx.globalAlpha=1;

  // Nuke flash
  if(nukeFlash>0){ctx.globalAlpha=nukeFlash/30;ctx.fillStyle=nukeFlash>20?'#fff':nukeFlash>10?'#ffd700':'#ff4500';ctx.fillRect(0,0,W,H);ctx.globalAlpha=1}

  // Ground
  ctx.fillStyle=world.ground;ctx.fillRect(0,H-15,W,15);
}

function loop(){update();draw();requestAnimationFrame(loop)}

async function _lbSubmit(name,sc){try{await fetch(_LB_URL+'/rest/v1/ajgametime_leaderboard',{method:'POST',headers:{'apikey':_LB_KEY,'Authorization':'Bearer '+_LB_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify({game:_LB_GAME,player_name:name,score:sc,wave:Math.floor(distance)})})}catch(e){}}
async function _lbShow(){var lb=document.getElementById('lb-overlay');var list=document.getElementById('lb-list');list.innerHTML='<div style="color:#64748b;text-align:center;padding:20px">Loading...</div>';lb.style.display='flex';var data=await _lbFetch();if(!data.length){list.innerHTML='<div style="color:#64748b;text-align:center;padding:20px">No scores yet!</div>';return}list.innerHTML=data.map(function(d,i){return '<div class="lb-row"><span class="lb-rank">#'+(i+1)+'</span><span class="lb-name">'+d.player_name+'</span><span class="lb-score">'+d.score+'</span></div>'}).join('')}
document.getElementById('lb-close-btn').addEventListener('click',function(){document.getElementById('lb-overlay').style.display='none'});
document.getElementById('lb-show-btn').addEventListener('click',function(){_lbShow()});
document.getElementById('death-submit').addEventListener('click',async function(){var n=document.getElementById('death-name').value.trim()||'Anonymous';localStorage.setItem('ajgt_name',n);await _lbSubmit(n,score);this.textContent='✅ Done!';this.disabled=true});
document.getElementById('death-retry').addEventListener('click',function(){
  document.getElementById('death-screen').style.display='none';
  document.getElementById('death-submit').textContent='📤 Submit';document.getElementById('death-submit').disabled=false;
  canvas.style.pointerEvents='';startMusic();init();
});
document.getElementById('death-lb').addEventListener('click',function(){_lbShow()});
document.getElementById('death-name').addEventListener('keydown',function(e){if(e.key==='Enter')document.getElementById('death-submit').click()});

// === SHOP ===
var shopOpenedFromDeath=false;
function openShop(){document.getElementById('shop-screen').style.display='flex';updateCoinDisplays();renderGrid('dragons');renderGrid('worlds');renderGrid('accs');renderGrid('trails');renderGrid('explo')}

function renderGrid(tab){
  var grid=document.getElementById('grid-'+tab);grid.innerHTML='';
  var items,owned,active;
  if(tab==='dragons'){items=DRAGONS;owned=ownedDragons;active=activeDragon}
  else if(tab==='worlds'){items=WORLDS;owned=ownedWorlds;active=activeWorld}
  else if(tab==='accs'){items=ACCESSORIES;owned=ownedAccs;active=activeAcc}
  else if(tab==='trails'){items=TRAILS;owned=ownedTrails;active=activeTrail}
  else if(tab==='explo'){items=EXPLOSIONS;owned=ownedExplo;active=activeExplo}

  items.forEach(function(item){
    var isOwned=owned.includes(item.id),isActive=active===item.id;
    var card=document.createElement('div');
    card.className='shop-card'+(isActive?' selected':'')+(!isOwned&&totalCoins<item.cost?' locked':'');
    var em=document.createElement('div');em.className='item-emoji';em.textContent=item.emoji||(item.colors?'✨':'🎨');card.appendChild(em);
    var nm=document.createElement('div');nm.className='item-name';nm.textContent=item.name;card.appendChild(nm);
    if(isActive){var st=document.createElement('div');st.className='item-owned';st.textContent='✅ Active';card.appendChild(st)}
    else if(isOwned){var st2=document.createElement('div');st2.className='item-owned';st2.textContent='✓ Owned';card.appendChild(st2)}
    else{var ct=document.createElement('div');ct.className='item-cost';ct.textContent='🪙 '+item.cost;card.appendChild(ct)}
    card.addEventListener('click',function(){
      if(isOwned){
        if(tab==='dragons')activeDragon=item.id;
        else if(tab==='worlds'){activeWorld=item.id;stopMusic();startMusic()}
        else if(tab==='accs')activeAcc=item.id;
        else if(tab==='trails')activeTrail=item.id;
        else if(tab==='explo')activeExplo=item.id;
        saveShop();renderGrid(tab);
      }else if(totalCoins>=item.cost){
        totalCoins-=item.cost;owned.push(item.id);
        if(tab==='dragons'){activeDragon=item.id;ownedDragons=owned}
        else if(tab==='worlds'){activeWorld=item.id;ownedWorlds=owned;stopMusic();startMusic()}
        else if(tab==='accs'){activeAcc=item.id;ownedAccs=owned}
        else if(tab==='trails'){activeTrail=item.id;ownedTrails=owned}
        else if(tab==='explo'){activeExplo=item.id;ownedExplo=owned}
        saveShop();updateCoinDisplays();renderGrid(tab);
      }
    });
    grid.appendChild(card);
  });
}

document.querySelectorAll('.shop-tab').forEach(function(tab){
  tab.addEventListener('click',function(){
    document.querySelectorAll('.shop-tab').forEach(function(t){t.classList.remove('active')});
    tab.classList.add('active');var which=tab.dataset.tab;
    ['dragons','worlds','accs','trails','explo'].forEach(function(id){document.getElementById('grid-'+id).style.display=id===which?'':'none'});
  });
});
document.getElementById('shop-close').addEventListener('click',function(){document.getElementById('shop-screen').style.display='none';if(shopOpenedFromDeath)document.getElementById('death-screen').style.display='flex'});
document.getElementById('shop-show-btn').addEventListener('click',function(){shopOpenedFromDeath=false;openShop()});
document.getElementById('death-shop').addEventListener('click',function(){shopOpenedFromDeath=true;document.getElementById('death-screen').style.display='none';openShop()});
</script>
</body>
</html>
