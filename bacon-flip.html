<title>Bacon Flip — AJ GameTime</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; height: 100%; overflow: hidden;
  font-family: 'Segoe UI', -apple-system, sans-serif;
  background: #1a0a2e; color: #e2e8f0;
  user-select: none; -webkit-user-select: none;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}

#gameArea {
  position: fixed; inset: 0;
  background: linear-gradient(180deg, #1a0a2e 0%, #2d1b4e 50%, #1e293b 100%);
  overflow: hidden;
}

/* Ground */
#ground {
  position: absolute; bottom: 0; left: 0; right: 0; height: 40px;
  background: #1e293b; border-top: 2px solid #334155;
}

#header {
  position: absolute; top: 0; left: 0; right: 0;
  padding: 12px 16px; display: flex; justify-content: space-between; align-items: center;
  z-index: 50;
}
#header a { color: #64748b; text-decoration: none; font-size: 0.85rem; }
#header a:hover { color: #e2e8f0; }
#hud { display: flex; gap: 20px; align-items: center; }
.stat { text-align: center; }
.stat-val { font-size: 1.5rem; font-weight: 800; }
.stat-label { font-size: 0.55rem; text-transform: uppercase; letter-spacing: 0.1em; color: #64748b; }
#levelVal { color: #fbbf24; }
#scoreVal { color: #f97316; }
#streakVal { color: #ef4444; }

/* Bacon */
#bacon {
  position: absolute; z-index: 10;
  font-size: 50px; line-height: 1;
  transition: none;
  filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5));
}

/* Target */
#target {
  position: absolute; z-index: 5;
  text-align: center;
  filter: drop-shadow(0 4px 12px rgba(0,0,0,0.4));
}
#targetEmoji {
  font-size: 60px; line-height: 1; display: block;
}
#targetName {
  font-size: 11px; color: #64748b; margin-top: 4px;
}
#targetPlatform {
  position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%);
  width: 100px; height: 12px; border-radius: 6px;
  background: rgba(100,116,139,0.3); border: 1px solid rgba(148,163,184,0.3);
}

/* Tap hint */
#tapHint {
  position: absolute; z-index: 15;
  text-align: center; color: #94a3b8;
  font-size: 16px; font-weight: 600;
  animation: pulse 1.5s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 0.5; transform: translate(-50%, -50%) scale(1); }
  50% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
}

/* Guide line */
#guideLine {
  position: absolute; z-index: 3;
  border-left: 2px dashed rgba(251,191,36,0.2);
  pointer-events: none;
}

/* Overlays */
.overlay {
  position: fixed; inset: 0; z-index: 100;
  background: rgba(26,10,46,0.95);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
}
.overlay.hidden { display: none; }
.overlay .emoji { font-size: 80px; margin-bottom: 16px; }
.overlay h1, .overlay h2 { font-size: 2.2rem; margin-bottom: 8px; }
.overlay p { color: #94a3b8; margin-bottom: 6px; font-size: 0.95rem; text-align: center; max-width: 320px; }
.overlay .hint { color: #64748b; font-size: 0.8rem; margin-top: 8px; }
.play-btn {
  margin-top: 20px; padding: 14px 36px; font-size: 1.1rem; font-weight: 700;
  background: linear-gradient(135deg, #ef4444, #f97316); color: white;
  border: none; border-radius: 12px; cursor: pointer;
  transition: transform 0.2s, filter 0.2s;
  -webkit-appearance: none;
}
.play-btn:hover { transform: scale(1.05); filter: brightness(1.1); }
.play-btn:active { transform: scale(0.98); }

/* Floating text */
#floatText {
  position: fixed; top: 35%; left: 50%; transform: translate(-50%,-50%);
  font-size: 2.5rem; font-weight: 900; color: #fbbf24;
  text-shadow: 0 0 30px rgba(251,191,36,0.6), 0 0 60px rgba(251,191,36,0.3);
  z-index: 80; pointer-events: none;
  opacity: 0; transition: opacity 0.3s;
}
#floatText.show { opacity: 1; }

#operaText {
  position: fixed; bottom: 20%; left: 50%; transform: translateX(-50%);
  font-size: 1rem; color: #c084fc; font-style: italic;
  z-index: 80; pointer-events: none;
  opacity: 0; transition: opacity 0.5s;
}
#operaText.show { opacity: 1; }

/* Particles */
.particle {
  position: absolute; border-radius: 50%; z-index: 20; pointer-events: none;
}

<body>

<div id="gameArea">
  <div id="ground"></div>
  
  <div id="header">
    <a href="index.html">← AJ GameTime</a>
    <div id="hud">
      <div class="stat"><div class="stat-val" id="levelVal">1</div><div class="stat-label">Level</div></div>
      <div class="stat"><div class="stat-val" id="scoreVal">0</div><div class="stat-label">Score</div></div>
      <div class="stat"><div class="stat-val" id="streakVal">0</div><div class="stat-label">Streak</div></div>
    </div>
  </div>

  <div id="bacon">🥓</div>
  <div id="target">
    <span id="targetEmoji"></span>
    <span id="targetName"></span>
    <div id="targetPlatform"></div>
  </div>
  <div id="tapHint">👆 TAP TO FLIP!</div>
  <div id="guideLine"></div>
</div>

<div class="overlay" id="startScreen">
  <div class="emoji">🥓</div>
  <h1>Bacon Flip</h1>
  <p>Tap to flip the bacon onto random objects!</p>
  <p>Land it perfectly for bonus points 🎵</p>
  <p class="hint">Tap / Click / Spacebar to flip</p>
  <button class="play-btn" id="startBtn">🥓 Let's Flip!</button>
</div>

<div class="overlay hidden" id="gameOver">
  <div class="emoji">😵</div>
  <h2>Splat!</h2>
  <p>You missed the landing!</p>
  <p>Score: <span id="finalScore">0</span></p>
  <p>Best Streak: <span id="finalStreak">0</span></p>
  <p>Level: <span id="finalLevel">0</span></p>
  <button class="play-btn" id="restartBtn">🥓 Try Again</button>
</div>

<div id="floatText"></div>
<div id="operaText"></div>

<script>
// === AUDIO ===
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playOpera(perfect) {
  ensureAudio();
  const now = audioCtx.currentTime;
  const dur = perfect ? 2.5 : 1.5;
  const phrases = [
    [523.25, 659.25, 783.99],
    [440, 554.37, 659.25],
    [392, 493.88, 587.33],
    [349.23, 440, 523.25],
    [329.63, 415.30, 523.25],
    [293.66, 369.99, 440],
  ];
  const phrase = phrases[Math.floor(Math.random() * phrases.length)];
  phrase.forEach((freq, i) => {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    const vib = audioCtx.createOscillator();
    const vibG = audioCtx.createGain();
    vib.frequency.value = 5.5; vibG.gain.value = freq * 0.02;
    vib.connect(vibG); vibG.connect(osc.frequency);
    osc.type = 'sine'; osc.frequency.value = freq;
    gain.gain.setValueAtTime(0, now + i*0.15);
    gain.gain.linearRampToValueAtTime(perfect ? 0.15 : 0.1, now + i*0.15 + 0.1);
    gain.gain.exponentialRampToValueAtTime(0.001, now + dur);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(now + i*0.15); vib.start(now + i*0.15);
    osc.stop(now + dur + 0.1); vib.stop(now + dur + 0.1);
  });
  if (perfect) {
    const b = audioCtx.createOscillator(), bg = audioCtx.createGain();
    b.type='sine'; b.frequency.value=phrase[0]/2;
    bg.gain.setValueAtTime(0,now); bg.gain.linearRampToValueAtTime(0.12,now+0.2);
    bg.gain.exponentialRampToValueAtTime(0.001,now+dur+0.5);
    b.connect(bg); bg.connect(audioCtx.destination);
    b.start(now); b.stop(now+dur+0.6);
  }
}

function playFlip() {
  ensureAudio();
  const now = audioCtx.currentTime;
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.type='sine'; o.frequency.setValueAtTime(400,now);
  o.frequency.linearRampToValueAtTime(200,now+0.15);
  g.gain.setValueAtTime(0.06,now); g.gain.exponentialRampToValueAtTime(0.001,now+0.15);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(now); o.stop(now+0.2);
}

function playMiss() {
  ensureAudio();
  const now = audioCtx.currentTime;
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.type='sawtooth'; o.frequency.setValueAtTime(200,now);
  o.frequency.linearRampToValueAtTime(80,now+0.5);
  g.gain.setValueAtTime(0.08,now); g.gain.exponentialRampToValueAtTime(0.001,now+0.5);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(now); o.stop(now+0.6);
}

// === GAME ===
const baconEl = document.getElementById('bacon');
const targetEl = document.getElementById('target');
const targetEmoji = document.getElementById('targetEmoji');
const targetNameEl = document.getElementById('targetName');
const targetPlatform = document.getElementById('targetPlatform');
const tapHint = document.getElementById('tapHint');
const guideLine = document.getElementById('guideLine');
const floatText = document.getElementById('floatText');
const operaText = document.getElementById('operaText');
const gameArea = document.getElementById('gameArea');

const objects = [
  { emoji: '🍳', name: 'Frying Pan' },
  { emoji: '🐱', name: 'Cat' },
  { emoji: '🚽', name: 'Toilet' },
  { emoji: '🐕', name: 'Dog' },
  { emoji: '🌵', name: 'Cactus' },
  { emoji: '🎹', name: 'Piano' },
  { emoji: '🌋', name: 'Volcano' },
  { emoji: '🛸', name: 'UFO' },
  { emoji: '🚀', name: 'Rocket' },
  { emoji: '🍦', name: 'Ice Cream' },
  { emoji: '👑', name: 'Crown' },
  { emoji: '👟', name: 'Shoe' },
  { emoji: '📚', name: 'Book' },
  { emoji: '🌍', name: 'Globe' },
  { emoji: '🐢', name: 'Turtle' },
  { emoji: '🍩', name: 'Donut' },
  { emoji: '⏰', name: 'Alarm Clock' },
  { emoji: '🏈', name: 'Football' },
  { emoji: '🐧', name: 'Penguin' },
  { emoji: '🦕', name: 'Dinosaur' },
  { emoji: '🤖', name: 'Robot' },
  { emoji: '🎸', name: 'Guitar' },
  { emoji: '🧲', name: 'Magnet' },
  { emoji: '🪣', name: 'Bucket' },
  { emoji: '🛒', name: 'Shopping Cart' },
  { emoji: '🧸', name: 'Teddy Bear' },
  { emoji: '🎯', name: 'Dartboard' },
  { emoji: '🏀', name: 'Basketball' },
  { emoji: '🪤', name: 'Mouse Trap' },
  { emoji: '🧊', name: 'Ice Cube' },
];

const operaPhrases = [
  "MAGNIFICO!", "BELLISSIMO!", "BRAVO!", "PERFETTO!",
  "STUPENDO!", "FANTASTICO!", "MERAVIGLIOSO!", "ECCELLENTE!",
  "GRANDIOSO!", "DIVINO!", "SUBLIME!", "BRILLANTE!"
];

let state = 'start';
let level = 1, score = 0, streak = 0, bestStreak = 0;
let bx, by, bvx, bvy, brot, brotSpeed;
let tx, ty;
let animFrame;
const GRAVITY = 0.5;
const GROUND_Y = 40; // from bottom

function getW() { return window.innerWidth; }
function getH() { return window.innerHeight; }

function initLevel() {
  const obj = objects[Math.floor(Math.random() * objects.length)];
  const W = getW(), H = getH();
  
  // Target: random x, above ground
  tx = 40 + Math.random() * (W - 80);
  ty = H - GROUND_Y - 80;
  
  targetEmoji.textContent = obj.emoji;
  targetNameEl.textContent = obj.name;
  targetEl.style.left = tx + 'px';
  targetEl.style.top = ty + 'px';
  targetEl.style.transform = 'translate(-50%, -50%)';
  targetEl.style.display = 'block';
  
  // Bacon: top center
  bx = W / 2;
  by = 90;
  bvx = 0; bvy = 0; brot = 0; brotSpeed = 0;
  
  baconEl.style.left = bx + 'px';
  baconEl.style.top = by + 'px';
  baconEl.style.transform = 'translate(-50%, -50%) rotate(0deg)';
  baconEl.style.display = 'block';
  baconEl.style.opacity = '1';
  
  // Tap hint
  tapHint.style.left = bx + 'px';
  tapHint.style.top = (by - 45) + 'px';
  tapHint.style.transform = 'translate(-50%, -50%)';
  tapHint.style.display = 'block';
  
  // Guide line
  guideLine.style.left = (bx + tx) / 2 + 'px';
  guideLine.style.top = by + 25 + 'px';
  guideLine.style.height = (ty - by - 60) + 'px';
  guideLine.style.display = 'block';
  guideLine.style.transformOrigin = 'top center';
  const angle = Math.atan2(tx - bx, ty - by);
  guideLine.style.transform = 'rotate(' + (angle * 180/Math.PI * -1) + 'deg)';
  // actually simpler: just draw from bacon to target
  guideLine.style.left = bx + 'px';
  guideLine.style.top = (by + 30) + 'px';
  const dist = Math.sqrt((tx-bx)**2 + (ty-by-60)**2);
  guideLine.style.height = dist + 'px';
  const lineAngle = Math.atan2(tx - bx, ty - by - 30);
  guideLine.style.transform = 'rotate(' + (-lineAngle * 180/Math.PI) + 'deg)';
  guideLine.style.transformOrigin = 'top center';
  
  state = 'ready';
}

function flip() {
  if (state !== 'ready') return;
  ensureAudio();
  playFlip();
  
  state = 'flipping';
  tapHint.style.display = 'none';
  guideLine.style.display = 'none';
  
  // Flip toward target with some randomness
  const dx = tx - bx;
  const dy = ty - by;
  const dist = Math.sqrt(dx*dx + dy*dy);
  const speed = Math.min(14, 7 + level * 0.2);
  const angle = Math.atan2(dy, dx);
  
  bvx = Math.cos(angle) * speed + (Math.random() - 0.5) * 2.5;
  bvy = -speed * 0.55; // launch upward first
  brotSpeed = (Math.random() - 0.5) * 15 + 8; // degrees per frame
  
  if (!animFrame) gameLoop();
}

function spawnParticles(x, y, colors, count) {
  for (let i = 0; i < count; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = 4 + Math.random() * 8;
    p.style.width = size + 'px';
    p.style.height = size + 'px';
    p.style.background = colors[Math.floor(Math.random() * colors.length)];
    p.style.left = x + 'px';
    p.style.top = y + 'px';
    p.style.opacity = '1';
    gameArea.appendChild(p);
    
    const vx = (Math.random() - 0.5) * 12;
    const vy = -Math.random() * 10 - 2;
    let px = x, py = y, pvy = vy, op = 1;
    
    function animP() {
      px += vx; py += pvy; pvy += 0.3; op -= 0.025;
      if (op <= 0) { p.remove(); return; }
      p.style.left = px + 'px';
      p.style.top = py + 'px';
      p.style.opacity = op;
      requestAnimationFrame(animP);
    }
    requestAnimationFrame(animP);
  }
}

function gameLoop() {
  if (state !== 'flipping') { animFrame = null; return; }
  
  bvy += GRAVITY;
  bx += bvx;
  by += bvy;
  brot += brotSpeed;
  
  const W = getW(), H = getH();
  
  // Bounce off walls
  if (bx < 25) { bx = 25; bvx *= -0.7; }
  if (bx > W - 25) { bx = W - 25; bvx *= -0.7; }
  
  baconEl.style.left = bx + 'px';
  baconEl.style.top = by + 'px';
  baconEl.style.transform = 'translate(-50%,-50%) rotate(' + brot + 'deg)';
  
  // Check landing - is bacon near the target?
  const hitDist = 50; // landing zone radius
  const dx = Math.abs(bx - tx);
  const dy = by - ty;
  
  if (dy > -20 && dy < 40 && dx < hitDist && bvy > 0) {
    // LANDED!
    state = 'landed';
    bvy = 0; bvx = 0;
    by = ty - 30;
    baconEl.style.left = bx + 'px';
    baconEl.style.top = by + 'px';
    baconEl.style.transform = 'translate(-50%,-50%) rotate(0deg)';
    
    const perfect = dx < 20;
    const pts = 10 + (perfect ? 25 : 0) + level * 2;
    score += pts;
    streak++;
    if (streak > bestStreak) bestStreak = streak;
    
    document.getElementById('scoreVal').textContent = score;
    document.getElementById('streakVal').textContent = streak;
    
    // OPERA! 🎵
    playOpera(perfect);
    
    const phrase = perfect
      ? operaPhrases[Math.floor(Math.random() * operaPhrases.length)]
      : '🎵 LANDED! 🎵';
    floatText.textContent = perfect ? '🎵 ' + phrase + ' 🎵' : phrase;
    floatText.classList.add('show');
    
    operaText.textContent = perfect
      ? '♫ The bacon graces the ' + targetNameEl.textContent + '! ♫'
      : '♪ On the ' + targetNameEl.textContent + '! ♪';
    operaText.classList.add('show');
    
    spawnParticles(bx, by, ['#fbbf24','#f97316','#ef4444'], perfect ? 25 : 12);
    
    setTimeout(() => {
      floatText.classList.remove('show');
      operaText.classList.remove('show');
      level++;
      document.getElementById('levelVal').textContent = level;
      initLevel();
    }, perfect ? 2000 : 1400);
    
    animFrame = null;
    return;
  }
  
  // Missed - hit ground or off screen
  if (by > H - GROUND_Y - 10) {
    state = 'gameover';
    playMiss();
    
    spawnParticles(bx, H - GROUND_Y - 10, ['#ef4444','#991b1b'], 15);
    
    baconEl.style.opacity = '0.5';
    baconEl.style.top = (H - GROUND_Y - 20) + 'px';
    
    setTimeout(() => {
      document.getElementById('finalScore').textContent = score;
      document.getElementById('finalStreak').textContent = bestStreak;
      document.getElementById('finalLevel').textContent = level;
      document.getElementById('gameOver').classList.remove('hidden');
    }, 600);
    
    animFrame = null;
    return;
  }
  
  animFrame = requestAnimationFrame(gameLoop);
}

// === INPUT ===
gameArea.addEventListener('pointerdown', (e) => {
  e.preventDefault();
  if (state === 'ready') flip();
});

document.addEventListener('keydown', (e) => {
  if ((e.code === 'Space' || e.key === ' ') && state === 'ready') {
    e.preventDefault();
    flip();
  }
});

// === START / RESTART ===
document.getElementById('startBtn').addEventListener('click', (e) => {
  e.stopPropagation();
  document.getElementById('startScreen').classList.add('hidden');
  level = 1; score = 0; streak = 0; bestStreak = 0;
  document.getElementById('levelVal').textContent = 1;
  document.getElementById('scoreVal').textContent = 0;
  document.getElementById('streakVal').textContent = 0;
  initLevel();
});

document.getElementById('restartBtn').addEventListener('click', (e) => {
  e.stopPropagation();
  document.getElementById('gameOver').classList.add('hidden');
  level = 1; score = 0; streak = 0;
  document.getElementById('levelVal').textContent = 1;
  document.getElementById('scoreVal').textContent = 0;
  document.getElementById('streakVal').textContent = 0;
  initLevel();
});
</script>
</body>
