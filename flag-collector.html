<title>Flag Collector — AJ GameTime</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Lilita+One&family=Nunito:wght@600;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f172a;color:#e2e8f0;font-family:'Nunito',sans-serif;min-height:100vh;overflow-x:hidden;user-select:none;-webkit-user-select:none}
a#back{position:fixed;top:10px;left:10px;color:#64748b;text-decoration:none;font-size:13px;font-weight:700;z-index:100}
header{text-align:center;padding:16px 12px 8px;background:linear-gradient(135deg,#1e293b,#0f172a)}
header h1{font-family:'Lilita One',cursive;font-size:clamp(22px,5vw,36px);background:linear-gradient(135deg,#22d3ee,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
header p{color:#64748b;font-size:12px;margin-top:2px}
#stats{display:flex;justify-content:center;gap:16px;padding:8px;font-size:13px;font-weight:700}
.stat{background:rgba(255,255,255,0.05);border-radius:8px;padding:5px 14px}
.stat span{color:#fbbf24}
nav{display:flex;justify-content:center;gap:6px;padding:8px 12px;flex-wrap:wrap}
.nav-btn{padding:8px 16px;font-size:13px;font-weight:700;border-radius:8px;border:2px solid #334155;background:transparent;color:#94a3b8;cursor:pointer;transition:all 0.2s}
.nav-btn.active{border-color:#22d3ee;color:#22d3ee;background:rgba(34,211,238,0.1)}
.nav-btn:hover{border-color:#64748b;color:#e2e8f0}
#view{padding:12px;max-width:600px;margin:0 auto}
/* Map */
.region-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.region-card{background:linear-gradient(135deg,rgba(255,255,255,0.05),rgba(255,255,255,0.02));border:2px solid #1e293b;border-radius:14px;padding:16px;text-align:center;cursor:pointer;transition:all 0.2s}
.region-card:hover{border-color:#3b82f6;transform:translateY(-2px)}
.region-card .emoji{font-size:36px;display:block;margin-bottom:6px}
.region-card h3{font-size:15px;color:#e2e8f0;margin-bottom:2px}
.region-card .prog{font-size:11px;color:#64748b}
.prog-bar{height:4px;background:#1e293b;border-radius:4px;margin-top:6px;overflow:hidden}
.prog-fill{height:100%;border-radius:4px;transition:width 0.3s}
/* Flag list */
.flag-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px}
.flag-item{background:rgba(255,255,255,0.04);border:2px solid #1e293b;border-radius:10px;padding:10px;text-align:center;cursor:pointer;transition:all 0.2s;position:relative}
.flag-item:hover{border-color:#3b82f6}
.flag-item.collected{border-color:#22c55e;background:rgba(34,197,94,0.05)}
.flag-item.locked{opacity:0.5}
.flag-item .flag-emoji{font-size:32px;display:block}
.flag-item .flag-name{font-size:11px;margin-top:4px;color:#94a3b8;font-weight:700}
.flag-item .rarity{font-size:9px;font-weight:800;border-radius:4px;padding:1px 6px;display:inline-block;margin-top:3px}
.r-common .rarity{background:rgba(148,163,184,0.2);color:#94a3b8}
.r-rare .rarity{background:rgba(59,130,246,0.2);color:#3b82f6}
.r-epic .rarity{background:rgba(168,85,247,0.2);color:#a855f7}
.r-legendary .rarity{background:rgba(251,191,36,0.2);color:#fbbf24}
.lock-icon{position:absolute;top:4px;right:6px;font-size:12px}
/* Quiz modal */
#quiz-modal{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:200;background:rgba(0,0,0,0.92);padding:20px}
#quiz-box{background:#1e293b;border-radius:16px;padding:24px;max-width:380px;width:100%;text-align:center}
#quiz-flag{font-size:64px;margin-bottom:8px}
#quiz-country{font-family:'Lilita One',cursive;font-size:22px;color:#22d3ee;margin-bottom:4px}
#quiz-rarity{font-size:12px;margin-bottom:14px}
#quiz-q{font-size:15px;color:#e2e8f0;margin-bottom:14px;line-height:1.5}
.quiz-opts{display:flex;flex-direction:column;gap:8px}
.quiz-opt{padding:12px;font-size:14px;font-weight:700;border-radius:10px;border:2px solid #334155;background:transparent;color:#e2e8f0;cursor:pointer;transition:all 0.15s}
.quiz-opt:hover{border-color:#3b82f6}
.quiz-opt.correct{border-color:#22c55e;background:rgba(34,197,94,0.15);color:#22c55e}
.quiz-opt.wrong{border-color:#ef4444;background:rgba(239,68,68,0.1);color:#ef4444}
#quiz-result{margin-top:14px;font-size:16px;font-weight:800;min-height:24px}
#quiz-close{margin-top:12px;padding:10px 28px;font-family:'Lilita One',cursive;font-size:16px;color:#fff;background:linear-gradient(135deg,#3b82f6,#22d3ee);border:none;border-radius:10px;cursor:pointer;display:none}
#quiz-fact{margin-top:10px;font-size:12px;color:#64748b;font-style:italic;display:none}
/* Album */
.album-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(70px,1fr));gap:8px}
.album-flag{font-size:36px;text-align:center;padding:10px;background:rgba(255,255,255,0.03);border-radius:10px;cursor:pointer;transition:transform 0.15s}
.album-flag:hover{transform:scale(1.15)}
.album-empty{color:#334155;font-size:12px;text-align:center;padding:20px}
/* Detail modal */
#detail-modal{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:200;background:rgba(0,0,0,0.9);padding:20px}
#detail-box{background:#1e293b;border-radius:16px;padding:24px;max-width:340px;width:100%;text-align:center}
#detail-flag{font-size:72px}
#detail-name{font-family:'Lilita One',cursive;font-size:24px;color:#22d3ee;margin:6px 0}
#detail-fact{font-size:13px;color:#94a3b8;line-height:1.5;margin-bottom:8px}
#detail-date{font-size:11px;color:#64748b}
#detail-close{margin-top:12px;padding:8px 24px;font-size:14px;font-weight:700;color:#fff;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:8px;cursor:pointer}
/* Achievements */
.ach-list{display:flex;flex-direction:column;gap:8px}
.ach-item{display:flex;align-items:center;gap:12px;padding:12px;background:rgba(255,255,255,0.03);border:2px solid #1e293b;border-radius:10px}
.ach-item.unlocked{border-color:#fbbf24;background:rgba(251,191,36,0.05)}
.ach-icon{font-size:28px;width:40px;text-align:center}
.ach-info h4{font-size:14px;color:#e2e8f0}.ach-info p{font-size:11px;color:#64748b}
.ach-item.unlocked .ach-info h4{color:#fbbf24}
/* Leaderboard */
#lb-section .lb-row{display:flex;justify-content:space-between;padding:8px 14px;border-bottom:1px solid rgba(255,255,255,0.06);font-size:14px;font-weight:600}
.lb-rank{width:30px;color:#64748b}.lb-name{flex:1;margin:0 8px;color:#e2e8f0}.lb-score{color:#22d3ee}
.lb-row:nth-child(1) .lb-rank{color:#fbbf24}.lb-row:nth-child(2) .lb-rank{color:#94a3b8}.lb-row:nth-child(3) .lb-rank{color:#b45309}
#lb-submit-area{text-align:center;margin-top:12px}
#lb-submit-area input{width:160px;padding:8px;font-size:14px;font-weight:700;border:2px solid #334155;border-radius:8px;background:#0f172a;color:#fff;text-align:center;outline:none;margin-right:6px}
#lb-submit-area button{padding:8px 16px;font-size:13px;font-weight:700;color:#fff;background:linear-gradient(135deg,#f59e0b,#ef4444);border:none;border-radius:8px;cursor:pointer}

#lb-overlay{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:100;background:rgba(0,0,0,0.92)}
#lb-overlay h2{font-size:28px;color:#f59e0b;margin-bottom:12px;font-weight:900}
#lb-list{width:min(340px,90vw);max-height:50vh;overflow-y:auto}
.lb-row{display:flex;justify-content:space-between;padding:8px 14px;border-bottom:1px solid rgba(255,255,255,0.08);color:#e2e8f0;font-size:14px;font-weight:600}
.lb-row:nth-child(1) .lb-rank{color:#fbbf24}.lb-row:nth-child(2) .lb-rank{color:#94a3b8}.lb-row:nth-child(3) .lb-rank{color:#b45309}
.lb-rank{width:30px;color:#64748b}.lb-name{flex:1;margin:0 8px}.lb-score{color:#22d3ee}
#lb-close-btn{pointer-events:auto;margin-top:16px;padding:10px 30px;font-size:16px;font-weight:700;color:#fff;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:10px;cursor:pointer}






#death-screen{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:200;background:rgba(0,0,0,0.92)}
#death-screen h1{font-family:'Lilita One',sans-serif;font-size:30px;color:#ef4444;margin-bottom:6px}
#death-score{color:#fbbf24;font-size:18px;font-weight:900;margin-bottom:14px}
#death-name{width:200px;padding:10px;font-size:16px;font-weight:700;border:2px solid #a855f7;border-radius:10px;background:#0a0a2e;color:#fff;text-align:center;outline:none;margin-bottom:10px}
.death-btn{padding:12px 28px;font-size:16px;font-weight:900;color:#fff;border:none;border-radius:12px;cursor:pointer;margin:4px;-webkit-tap-highlight-color:transparent}
#death-submit{background:linear-gradient(135deg,#a855f7,#ec4899)}
#death-retry{background:linear-gradient(135deg,#f97316,#ef4444)}
#death-lb{background:linear-gradient(135deg,#f59e0b,#ef4444)}
</style>
</head>

// State
let collected = JSON.parse(localStorage.getItem('fc_collected') || '[]');
let currentView = 'map';
let currentRegion = null;

function save() {
  localStorage.setItem('fc_collected', JSON.stringify(collected));
}

function getPoints() {
  return collected.reduce((sum, id) => {
    const f = FLAGS.find(x => x.id === id);
    return sum + (f ? f.pts : 0);
  }, 0);
}

function getRegionsComplete() {
  return REGIONS.filter(r => {
    const regionFlags = FLAGS.filter(f => f.region === r.id);
    return regionFlags.some(f => collected.includes(f.id));
  }).length;
}

function updateStats() {
  document.getElementById('s-flags').textContent = collected.length;
  document.getElementById('s-points').textContent = getPoints();
  document.getElementById('s-regions').textContent = getRegionsComplete();
}

// Nav
document.querySelectorAll('.nav-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentView = btn.dataset.view;
    currentRegion = null;
    render();
  });
});

function render() {
  updateStats();
  const view = document.getElementById('view');
  if (currentView === 'map' && !currentRegion) renderMap(view);
  else if (currentView === 'map' && currentRegion) renderRegion(view);
  else if (currentView === 'album') renderAlbum(view);
  else if (currentView === 'achievements') renderAchievements(view);
  else if (currentView === 'leaderboard') renderLeaderboard(view);
}

function renderMap(el) {
  let html = '<div class="region-grid">';
  REGIONS.forEach(r => {
    const total = FLAGS.filter(f => f.region === r.id).length;
    const got = FLAGS.filter(f => f.region === r.id && collected.includes(f.id)).length;
    const pct = Math.round(got / total * 100);
    html += `<div class="region-card" onclick="openRegion('${r.id}')">
      <span class="emoji">${r.emoji}</span>
      <h3>${r.name}</h3>
      <div class="prog">${got}/${total} flags</div>
      <div class="prog-bar"><div class="prog-fill" style="width:${pct}%;background:${r.color}"></div></div>
    </div>`;
  });
  html += '</div>';
  el.innerHTML = html;
}

function openRegion(id) {
  currentRegion = id;
  render();
}

function renderRegion(el) {
  const reg = REGIONS.find(r => r.id === currentRegion);
  const flags = FLAGS.filter(f => f.region === currentRegion);
  let html = `<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;cursor:pointer" onclick="currentRegion=null;render()">
    <span style="color:#64748b;font-size:18px">←</span>
    <span style="font-size:24px">${reg.emoji}</span>
    <h2 style="font-size:18px">${reg.name}</h2>
  </div>`;
  html += '<div class="flag-list">';
  flags.forEach(f => {
    const got = collected.includes(f.id);
    const rClass = 'r-' + f.rarity;
    html += `<div class="flag-item ${got ? 'collected' : 'locked'} ${rClass}" onclick="${got ? `showDetail('${f.id}')` : `startQuiz('${f.id}')`}">
      ${got ? '' : '<span class="lock-icon">🔒</span>'}
      <span class="flag-emoji">${f.flag}</span>
      <div class="flag-name">${f.name}</div>
      <span class="rarity">${f.rarity.toUpperCase()}</span>
    </div>`;
  });
  html += '</div>';
  el.innerHTML = html;
}

function renderAlbum(el) {
  if (collected.length === 0) {
    el.innerHTML = '<div class="album-empty"><p style="font-size:40px;margin-bottom:12px">📖</p><p>Your flag album is empty!</p><p style="margin-top:6px">Go to the 🗺️ Map to collect flags.</p></div>';
    return;
  }
  let html = '<h3 style="text-align:center;margin-bottom:12px;font-size:16px;color:#94a3b8">Your Flags (' + collected.length + '/' + FLAGS.length + ')</h3>';
  html += '<div class="album-grid">';
  collected.forEach(id => {
    const f = FLAGS.find(x => x.id === id);
    if (f) html += `<div class="album-flag" onclick="showDetail('${f.id}')" title="${f.name}">${f.flag}</div>`;
  });
  html += '</div>';
  el.innerHTML = html;
}

function renderAchievements(el) {
  let html = '<div class="ach-list">';
  ACHIEVEMENTS.forEach(a => {
    const unlocked = a.check(collected);
    html += `<div class="ach-item ${unlocked ? 'unlocked' : ''}">
      <div class="ach-icon">${unlocked ? a.icon : '🔒'}</div>
      <div class="ach-info"><h4>${a.name}</h4><p>${a.desc}</p></div>
    </div>`;
  });
  html += '</div>';
  el.innerHTML = html;
}

async function renderLeaderboard(el) {
  let html = '<div id="lb-section">';
  html += '<h3 style="text-align:center;margin-bottom:12px;font-size:16px;color:#f59e0b">🏆 Top Collectors</h3>';
  html += '<div id="lb-rows"><div style="color:#64748b;text-align:center;padding:20px">Loading...</div></div>';
  html += '<div id="lb-submit-area"><input type="text" id="lb-name" placeholder="Your name" maxlength="16" value="' + (localStorage.getItem('ajgt_name') || '') + '"><button onclick="submitLB()">Submit Score</button></div>';
  html += '</div>';
  el.innerHTML = html;
  // Fetch
  try {
    const r = await fetch(_LB_URL + '/rest/v1/ajgametime_leaderboard?game=eq.flag-collector&order=score.desc&limit=10', {
      headers: { 'apikey': _LB_KEY, 'Authorization': 'Bearer ' + _LB_KEY }
    });
    const data = await r.json();
    const rows = document.getElementById('lb-rows');
    if (!data.length) { rows.innerHTML = '<div style="color:#64748b;text-align:center;padding:20px">No scores yet! Be the first!</div>'; return; }
    rows.innerHTML = data.map((d, i) => `<div class="lb-row"><span class="lb-rank">#${i + 1}</span><span class="lb-name">${d.player_name}</span><span class="lb-score">${d.score} pts</span></div>`).join('');
  } catch (e) {
    document.getElementById('lb-rows').innerHTML = '<div style="color:#ef4444;text-align:center;padding:20px">Could not load leaderboard</div>';
  }
}

async function submitLB() {
  const name = document.getElementById('lb-name').value.trim() || 'Anonymous';
  localStorage.setItem('ajgt_name', name);
  const pts = getPoints();
  try {
    await fetch(_LB_URL + '/rest/v1/ajgametime_leaderboard', {
      method: 'POST',
      headers: { 'apikey': _LB_KEY, 'Authorization': 'Bearer ' + _LB_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
      body: JSON.stringify({ game: 'flag-collector', player_name: name, score: pts, wave: collected.length })
    });
    renderLeaderboard(document.getElementById('view'));
  } catch (e) {}
}

// Quiz
function startQuiz(id) {
  const f = FLAGS.find(x => x.id === id);
  if (!f || collected.includes(f.id)) return;

  const modal = document.getElementById('quiz-modal');
  document.getElementById('quiz-flag').textContent = f.flag;
  document.getElementById('quiz-country').textContent = f.name;
  document.getElementById('quiz-rarity').innerHTML = `<span class="rarity" style="background:${rarityBg(f.rarity)};color:${rarityColor(f.rarity)};padding:3px 10px;border-radius:6px;font-size:12px;font-weight:800">${f.rarity.toUpperCase()} · ${f.pts} pts</span>`;
  document.getElementById('quiz-q').textContent = f.q;
  document.getElementById('quiz-result').textContent = '';
  document.getElementById('quiz-fact').style.display = 'none';
  document.getElementById('quiz-close').style.display = 'none';

  const optsEl = document.getElementById('quiz-opts');
  optsEl.innerHTML = '';
  f.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'quiz-opt';
    btn.textContent = opt;
    btn.onclick = () => answerQuiz(f, i, btn);
    optsEl.appendChild(btn);
  });

  modal.style.display = 'flex';
}

function answerQuiz(f, chosen, btn) {
  const opts = document.querySelectorAll('.quiz-opt');
  opts.forEach((o, i) => {
    o.style.pointerEvents = 'none';
    if (i === f.ans) o.classList.add('correct');
    if (i === chosen && chosen !== f.ans) o.classList.add('wrong');
  });

  const result = document.getElementById('quiz-result');
  if (chosen === f.ans) {
    result.textContent = '✅ Correct! +' + f.pts + ' pts';
    result.style.color = '#22c55e';
    collected.push(f.id);
    save();
    updateStats();
    document.getElementById('quiz-fact').textContent = '💡 ' + f.fact;
    document.getElementById('quiz-fact').style.display = 'block';
    checkNewAchievements();
  } else {
    result.textContent = '❌ Wrong! The answer was: ' + f.opts[f.ans];
    result.style.color = '#ef4444';
  }
  document.getElementById('quiz-close').style.display = 'inline-block';
}

document.getElementById('quiz-close').addEventListener('click', () => {
  document.getElementById('quiz-modal').style.display = 'none';
  render();
});

// Detail modal
function showDetail(id) {
  const f = FLAGS.find(x => x.id === id);
  if (!f) return;
  document.getElementById('detail-flag').textContent = f.flag;
  document.getElementById('detail-name').textContent = f.name;
  document.getElementById('detail-fact').textContent = '💡 ' + f.fact;
  document.getElementById('detail-date').textContent = '⭐ ' + f.rarity.toUpperCase() + ' · ' + f.pts + ' points';
  document.getElementById('detail-modal').style.display = 'flex';
}
document.getElementById('detail-close').addEventListener('click', () => {
  document.getElementById('detail-modal').style.display = 'none';
});

function checkNewAchievements() {
  ACHIEVEMENTS.forEach(a => {
    const key = 'fc_ach_' + a.id;
    if (!localStorage.getItem(key) && a.check(collected)) {
      localStorage.setItem(key, '1');
      // Show toast
      const toast = document.createElement('div');
      toast.style.cssText = 'position:fixed;top:60px;left:50%;transform:translateX(-50%);background:#1e293b;border:2px solid #fbbf24;border-radius:12px;padding:12px 20px;z-index:300;display:flex;align-items:center;gap:10px;animation:slideDown 0.3s;font-weight:700;';
      toast.innerHTML = `<span style="font-size:24px">${a.icon}</span><div><div style="color:#fbbf24;font-size:14px">Achievement Unlocked!</div><div style="color:#e2e8f0;font-size:12px">${a.name}</div></div>`;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }
  });
}
