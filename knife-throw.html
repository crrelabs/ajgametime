<script>
var canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d');
var W,H,CX,CY;
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;CX=W/2;CY=H*0.35}
window.addEventListener('resize',resize);resize();

// === AUDIO ===
var audioCtx,musicGain,sfxGain,musicNode;
function initAudio(){
  if(audioCtx)return;audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  musicGain=audioCtx.createGain();sfxGain=audioCtx.createGain();
  musicGain.connect(audioCtx.destination);sfxGain.connect(audioCtx.destination);
  musicGain.gain.value=parseFloat(localStorage.getItem('kt_musicVol')||'0.5');
  sfxGain.gain.value=parseFloat(localStorage.getItem('kt_sfxVol')||'0.7');
  document.getElementById('musicVol').value=Math.round(musicGain.gain.value*100);
  document.getElementById('musicVolVal').textContent=Math.round(musicGain.gain.value*100);
  document.getElementById('sfxVol').value=Math.round(sfxGain.gain.value*100);
  document.getElementById('sfxVolVal').textContent=Math.round(sfxGain.gain.value*100);
}
function setMusicVol(v){if(!audioCtx)initAudio();musicGain.gain.value=v/100;localStorage.setItem('kt_musicVol',v/100);document.getElementById('musicVolVal').textContent=v}
function setSfxVol(v){if(!audioCtx)initAudio();sfxGain.gain.value=v/100;localStorage.setItem('kt_sfxVol',v/100);document.getElementById('sfxVolVal').textContent=v}
var musicOn=true;
function toggleMusic(){musicOn=!musicOn;document.getElementById('musicBtn').textContent=musicOn?'🔊':'🔇';if(musicOn)startMusic();else stopMusic()}
function toggleSettings(){var o=document.getElementById('settingsOverlay');o.style.display=o.style.display==='flex'?'none':'flex'}
function playNote(f,d,t,v){if(!audioCtx)return;var o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type=t||'sine';o.frequency.value=f;g.gain.value=v||0.1;o.connect(g);g.connect(sfxGain);o.start();g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+d);o.stop(audioCtx.currentTime+d)}
function sfxThrow(){playNote(300,0.08,'triangle',0.12);playNote(500,0.06,'triangle',0.08)}
function sfxStick(){playNote(800,0.06,'sine',0.1);setTimeout(function(){playNote(1000,0.08,'sine',0.08)},30)}
function sfxFail(){playNote(200,0.3,'sine',0.15);playNote(150,0.4,'sine',0.12)}
function sfxLevelUp(){playNote(523,0.1,'sine',0.1);setTimeout(function(){playNote(659,0.1,'sine',0.1)},80);setTimeout(function(){playNote(784,0.15,'sine',0.12)},160)}
function sfxApple(){playNote(880,0.08,'sine',0.12);setTimeout(function(){playNote(1100,0.1,'sine',0.1)},40)}
var musicPlaying=false;
function startMusic(){
  if(!audioCtx||!musicOn||musicPlaying)return;musicPlaying=true;var bc=0;
  function beat(){
    if(!musicPlaying||!musicOn)return;var t=audioCtx.currentTime;
    var notes=[196,220,261,220,196,174,196,220];var bn=notes[bc%notes.length];
    var o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type='triangle';o.frequency.value=bn;g.gain.value=0.04;
    o.connect(g);g.connect(musicGain);o.start(t);g.gain.exponentialRampToValueAtTime(0.001,t+0.35);o.stop(t+0.4);
    // Bass
    var ob=audioCtx.createOscillator(),gb=audioCtx.createGain();ob.type='sine';ob.frequency.value=bn/2;gb.gain.value=0.06;
    ob.connect(gb);gb.connect(musicGain);ob.start(t);gb.gain.exponentialRampToValueAtTime(0.001,t+0.3);ob.stop(t+0.35);
    // Kick every 2
    if(bc%2===0){var ok=audioCtx.createOscillator(),gk=audioCtx.createGain();ok.type='sine';ok.frequency.value=80;gk.gain.value=0.1;ok.connect(gk);gk.connect(musicGain);ok.start(t);ok.frequency.exponentialRampToValueAtTime(30,t+0.1);gk.gain.exponentialRampToValueAtTime(0.001,t+0.15);ok.stop(t+0.2)}
    bc++;musicNode=setTimeout(beat,400);
  }
  beat();
}
function stopMusic(){musicPlaying=false;if(musicNode)clearTimeout(musicNode)}

var owned={knives:JSON.parse(localStorage.getItem('kt_knives')||'["steel"]'),wheels:JSON.parse(localStorage.getItem('kt_wheels')||'["wood"]'),trails:JSON.parse(localStorage.getItem('kt_trails')||'["none"]'),hits:JSON.parse(localStorage.getItem('kt_hits')||'["sparks"]'),bgs:JSON.parse(localStorage.getItem('kt_bgs')||'["dark"]')};
var active={knife:localStorage.getItem('kt_a_knife')||'steel',wheel:localStorage.getItem('kt_a_wheel')||'wood',trail:localStorage.getItem('kt_a_trail')||'none',hit:localStorage.getItem('kt_a_hit')||'sparks',bg:localStorage.getItem('kt_a_bg')||'dark'};
function saveShop(){localStorage.setItem('kt_coins',totalCoins);localStorage.setItem('kt_knives',JSON.stringify(owned.knives));localStorage.setItem('kt_wheels',JSON.stringify(owned.wheels));localStorage.setItem('kt_trails',JSON.stringify(owned.trails));localStorage.setItem('kt_hits',JSON.stringify(owned.hits));localStorage.setItem('kt_bgs',JSON.stringify(owned.bgs));localStorage.setItem('kt_a_knife',active.knife);localStorage.setItem('kt_a_wheel',active.wheel);localStorage.setItem('kt_a_trail',active.trail);localStorage.setItem('kt_a_hit',active.hit);localStorage.setItem('kt_a_bg',active.bg)}
function updateCoinDisplays(){document.getElementById('coinsVal').textContent=totalCoins;document.getElementById('shop-coins').textContent='🪙 '+totalCoins}
function getKnife(){return KNIVES.find(function(k){return k.id===active.knife})||KNIVES[0]}
function getWheel(){return WHEELS.find(function(w){return w.id===active.wheel})||WHEELS[0]}
function getTrail(){return TRAILS.find(function(t){return t.id===active.trail})||TRAILS[0]}
function getHitFx(){return HIT_FX.find(function(h){return h.id===active.hit})||HIT_FX[0]}
function getStage(){return STAGES.find(function(s){return s.id===active.bg})||STAGES[0]}

var currentShopTab='knives';
function openShop(){document.getElementById('shop-screen').style.display='flex';shopTab('knives');updateCoinDisplays()}
function closeShop(){document.getElementById('shop-screen').style.display='none'}
function shopTab(tab){currentShopTab=tab;document.querySelectorAll('.shop-tab').forEach(function(t){t.classList.remove('active')});document.querySelectorAll('.shop-tab').forEach(function(t){if(t.textContent.toLowerCase().includes(tab.slice(0,4)))t.classList.add('active')});renderShop()}
function renderShop(){
  var grid=document.getElementById('shop-grid');grid.innerHTML='';
  var items,ownArr,activeId,ownKey,activeKey;
  if(currentShopTab==='knives'){items=KNIVES;ownArr=owned.knives;activeId=active.knife;ownKey='knives';activeKey='knife'}
  else if(currentShopTab==='wheels'){items=WHEELS;ownArr=owned.wheels;activeId=active.wheel;ownKey='wheels';activeKey='wheel'}
  else if(currentShopTab==='trails'){items=TRAILS;ownArr=owned.trails;activeId=active.trail;ownKey='trails';activeKey='trail'}
  else if(currentShopTab==='hits'){items=HIT_FX;ownArr=owned.hits;activeId=active.hit;ownKey='hits';activeKey='hit'}
  else{items=STAGES;ownArr=owned.bgs;activeId=active.bg;ownKey='bgs';activeKey='bg'}
  items.forEach(function(item){
    var own=ownArr.includes(item.id),sel=activeId===item.id,canBuy=totalCoins>=item.cost;
    var card=document.createElement('div');card.className='skin-card'+(sel?' selected':'')+(!own&&!canBuy?' locked':'');
    var em=document.createElement('div');em.style.fontSize='28px';em.textContent=item.emoji;card.appendChild(em);
    var nm=document.createElement('div');nm.className='skin-name';nm.textContent=item.name;card.appendChild(nm);
    if(sel){var t=document.createElement('div');t.className='skin-owned';t.textContent='✅ Active';card.appendChild(t)}
    else if(own){var t=document.createElement('div');t.className='skin-owned';t.textContent='✓ Owned';card.appendChild(t)}
    else{var t=document.createElement('div');t.className='skin-cost';t.textContent='🪙 '+item.cost;card.appendChild(t)}
    card.addEventListener('click',function(){
      if(own){active[activeKey]=item.id;saveShop();renderShop()}
      else if(canBuy&&totalCoins>=item.cost){totalCoins-=item.cost;ownArr.push(item.id);active[activeKey]=item.id;owned[ownKey]=ownArr;saveShop();updateCoinDisplays();renderShop()}
    });
    grid.appendChild(card);
  });
}

// === GAME ===
var WHEEL_R;// set in resize based on screen
var score,sessionCoins,level,knivesLeft,gameRunning,frame;
var wheelAngle,wheelSpeed,wheelDir;
var stuckKnives=[],flyingKnife,particles=[],textPops=[];
var apples=[],shields=[];
var isBoss;
var highScore=parseInt(localStorage.getItem('kt_high')||'0');
document.getElementById('bestVal').textContent=highScore;

function init(){
  WHEEL_R=Math.min(W,H)*0.18;
  score=0;sessionCoins=0;level=1;frame=0;gameRunning=true;
  flyingKnife=null;
  setupLevel();updateHUD();
}
function setupLevel(){
  isBoss=level%5===0;
  wheelAngle=0;
  wheelSpeed=(0.015+level*0.003)*(Math.random()<0.5?1:-1);
  if(isBoss)wheelSpeed*=1.5;
  knivesLeft=isBoss?8:5+Math.min(level,10);
  stuckKnives=[];apples=[];shields=[];
  // Pre-placed knives on boss
  if(isBoss){
    var preKnives=2+Math.floor(level/10);
    for(var i=0;i<preKnives;i++)stuckKnives.push({angle:i*(Math.PI*2/preKnives)});
  }
  // Apples (collectible coins on the wheel)
  var appleCount=1+Math.floor(Math.random()*2);
  for(var ai=0;ai<appleCount;ai++){apples.push({angle:Math.random()*Math.PI*2,collected:false})}
  // Shields on boss (rotating blockers)
  if(isBoss){var sc=1+Math.floor(level/10);for(var si=0;si<sc;si++)shields.push({angle:si*(Math.PI*2/sc),arcLen:0.4+Math.random()*0.3})}
  updateHUD();
}
function updateHUD(){
  document.getElementById('scoreVal').textContent=score;
  document.getElementById('levelVal').textContent=level;
}

function startGame(){initAudio();startMusic();document.getElementById('startScreen').classList.add('hidden');document.getElementById('death-screen').style.display='none';canvas.style.pointerEvents='auto';init()}
function retry(){startGame()}

function throwKnife(){
  if(!gameRunning||flyingKnife||knivesLeft<=0)return;
  flyingKnife={x:CX,y:H-80,vy:-12-level*0.3};
  sfxThrow();
}

function update(){
  for(var pi=particles.length-1;pi>=0;pi--){var p=particles[pi];p.x+=p.vx;p.y+=p.vy;p.life--;if(p.life<=0)particles.splice(pi,1)}
  for(var xi=textPops.length-1;xi>=0;xi--){textPops[xi].y-=1;textPops[xi].life--;if(textPops[xi].life<=0)textPops.splice(xi,1)}
  if(!gameRunning)return;
  frame++;

  // Spin wheel (can change direction on boss)
  wheelAngle+=wheelSpeed;
  if(isBoss&&frame%180===0&&Math.random()<0.4)wheelSpeed=-wheelSpeed;

  // Flying knife
  if(flyingKnife){
    flyingKnife.y+=flyingKnife.vy;
    // Trail
    var trail=getTrail();
    if(trail.colors){
      particles.push({x:flyingKnife.x+Math.random()*6-3,y:flyingKnife.y+15,vx:(Math.random()-0.5)*1,vy:1+Math.random(),life:15,color:trail.colors[Math.floor(Math.random()*trail.colors.length)],size:2+Math.random()*2});
    }
    // Check if reached wheel
    var dx=flyingKnife.x-CX,dy=flyingKnife.y-CY;
    var dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<=WHEEL_R+20){
      // Check shield collision
      var knifeAngle=Math.atan2(dy,dx)-wheelAngle;
      knifeAngle=((knifeAngle%( Math.PI*2))+(Math.PI*2))%(Math.PI*2);
      var hitShield=false;
      for(var si=0;si<shields.length;si++){
        var sa=((shields[si].angle%(Math.PI*2))+(Math.PI*2))%(Math.PI*2);
        var diff=Math.abs(knifeAngle-sa);if(diff>Math.PI)diff=Math.PI*2-diff;
        if(diff<shields[si].arcLen/2){hitShield=true;break}
      }
      if(hitShield){
        // Bounced off shield!
        sfxFail();flyingKnife=null;
        textPops.push({x:CX,y:CY-WHEEL_R-30,text:'🛡️ Blocked!',color:'#60a5fa',size:22,life:35});
        knivesLeft--;
        if(knivesLeft<=0)die();
        return;
      }
      // Check collision with existing knives
      var stickAngle=Math.atan2(flyingKnife.y-CY,flyingKnife.x-CX)-wheelAngle;
      for(var ki=0;ki<stuckKnives.length;ki++){
        var diff2=Math.abs(stickAngle-stuckKnives[ki].angle);
        if(diff2>Math.PI)diff2=Math.PI*2-diff2;
        if(diff2<0.15){
          // HIT OWN KNIFE — game over
          die();return;
        }
      }
      // Stick it!
      stuckKnives.push({angle:stickAngle});
      knivesLeft--;sfxStick();
      score+=10*(isBoss?3:1);
      totalCoins++;sessionCoins++;saveShop();updateCoinDisplays();
      // Hit particles
      var hfx=getHitFx();var hx=CX+Math.cos(stickAngle+wheelAngle)*(WHEEL_R+10),hy=CY+Math.sin(stickAngle+wheelAngle)*(WHEEL_R+10);
      for(var hp=0;hp<8;hp++){var ang=Math.random()*Math.PI*2,spd=2+Math.random()*3;particles.push({x:hx,y:hy,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,life:20,color:hfx.colors[hp%hfx.colors.length],size:2+Math.random()*2})}
      // Check apple collection
      for(var ai=0;ai<apples.length;ai++){
        if(apples[ai].collected)continue;
        var adiff=Math.abs(stickAngle-apples[ai].angle);if(adiff>Math.PI)adiff=Math.PI*2-adiff;
        if(adiff<0.25){apples[ai].collected=true;score+=25;totalCoins+=3;sessionCoins+=3;saveShop();updateCoinDisplays();sfxApple();
          textPops.push({x:hx,y:hy-20,text:'🍎 +25!',color:'#22c55e',size:22,life:35})}
      }
      flyingKnife=null;
      if(score>highScore){highScore=score;localStorage.setItem('kt_high',highScore.toString());document.getElementById('bestVal').textContent=highScore}
      updateHUD();
      // Level complete?
      if(knivesLeft<=0){
        level++;score+=level*5;
        if(isBoss){score+=50;totalCoins+=5;sessionCoins+=5;saveShop();updateCoinDisplays();
          textPops.push({x:CX,y:CY,text:'👑 BOSS CLEARED! +50',color:'#fbbf24',size:26,life:50})}
        sfxLevelUp();
        textPops.push({x:CX,y:CY+WHEEL_R+40,text:'Level '+level+'!',color:'#06b6d4',size:24,life:40});
        setTimeout(function(){if(gameRunning)setupLevel()},500);
      }
    }
  }
}

function die(){
  gameRunning=false;sfxFail();stopMusic();canvas.style.pointerEvents='none';
  // Explosion
  var hfx=getHitFx();
  for(var i=0;i<20;i++){var ang=Math.random()*Math.PI*2,spd=3+Math.random()*5;
    particles.push({x:CX,y:CY,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,life:30,color:hfx.colors[i%hfx.colors.length],size:3+Math.random()*3})}
  flyingKnife=null;
  setTimeout(function(){
    document.getElementById('death-score').textContent=score;
    document.getElementById('death-level').textContent='Level '+level;
    document.getElementById('death-coins').textContent='+'+sessionCoins+' 🪙';
    document.getElementById('death-name').value=localStorage.getItem('ajgt_name')||'';
    document.getElementById('death-screen').style.display='flex';
  },500);
}

function draw(){
  var stage=getStage(),wheel=getWheel(),knife=getKnife();
  // BG
  var bg=ctx.createLinearGradient(0,0,0,H);bg.addColorStop(0,stage.bg1);bg.addColorStop(1,stage.bg2);ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);

  // Wheel
  ctx.save();ctx.translate(CX,CY);ctx.rotate(wheelAngle);
  // Outer ring
  ctx.beginPath();ctx.arc(0,0,WHEEL_R+8,0,Math.PI*2);ctx.fillStyle=wheel.ring;ctx.fill();
  // Inner
  ctx.beginPath();ctx.arc(0,0,WHEEL_R,0,Math.PI*2);ctx.fillStyle=wheel.color1;ctx.fill();
  // Pattern
  for(var wi=0;wi<8;wi++){
    ctx.beginPath();ctx.moveTo(0,0);ctx.arc(0,0,WHEEL_R,wi*Math.PI/4,(wi+0.5)*Math.PI/4);ctx.closePath();
    ctx.fillStyle=wi%2===0?wheel.color2:wheel.color1;ctx.fill();
  }
  // Center
  ctx.beginPath();ctx.arc(0,0,12,0,Math.PI*2);ctx.fillStyle=wheel.ring;ctx.fill();
  ctx.beginPath();ctx.arc(0,0,6,0,Math.PI*2);ctx.fillStyle='#1f2937';ctx.fill();

  // Apples
  ctx.font='22px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
  for(var ai=0;ai<apples.length;ai++){
    if(apples[ai].collected)continue;
    var ax=Math.cos(apples[ai].angle)*(WHEEL_R*0.65),ay=Math.sin(apples[ai].angle)*(WHEEL_R*0.65);
    ctx.fillText('🍎',ax,ay);
  }

  // Stuck knives
  for(var ki=0;ki<stuckKnives.length;ki++){
    var ka=stuckKnives[ki].angle;
    var kx=Math.cos(ka)*(WHEEL_R+18),ky=Math.sin(ka)*(WHEEL_R+18);
    ctx.save();ctx.translate(kx,ky);ctx.rotate(ka+Math.PI/2);
    // Blade
    ctx.fillStyle=knife.blade;ctx.fillRect(-2,-18,4,18);
    // Handle
    ctx.fillStyle=knife.color==='rainbow'?'#ef4444':knife.color;ctx.fillRect(-3,0,6,10);
    ctx.restore();
  }

  // Shields
  ctx.lineWidth=8;
  for(var si=0;si<shields.length;si++){
    ctx.strokeStyle='rgba(96,165,250,0.7)';
    ctx.beginPath();ctx.arc(0,0,WHEEL_R+30,shields[si].angle-shields[si].arcLen/2,shields[si].angle+shields[si].arcLen/2);ctx.stroke();
  }

  ctx.restore();

  // Boss indicator
  if(isBoss){ctx.fillStyle='#ef4444';ctx.font='bold 16px sans-serif';ctx.textAlign='center';ctx.fillText('⚠️ BOSS WHEEL ⚠️',CX,50)}

  // Knives left indicator
  ctx.fillStyle='#64748b';ctx.font='14px sans-serif';ctx.textAlign='center';
  ctx.fillText('🔪 x '+knivesLeft,CX,H-30);

  // Flying knife
  if(flyingKnife){
    ctx.save();ctx.translate(flyingKnife.x,flyingKnife.y);
    ctx.fillStyle=knife.blade;ctx.fillRect(-2,-20,4,20);
    ctx.fillStyle=knife.color==='rainbow'?'hsl('+(frame*5%360)+',80%,60%)':knife.color;
    ctx.fillRect(-3,0,6,12);
    ctx.restore();
  }

  // Particles
  for(var pi=0;pi<particles.length;pi++){var p=particles[pi];ctx.globalAlpha=p.life/20;ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill()}
  ctx.globalAlpha=1;
  // Text pops
  for(var xi=0;xi<textPops.length;xi++){var tp=textPops[xi];ctx.globalAlpha=tp.life/40;ctx.fillStyle=tp.color;ctx.font='bold '+tp.size+'px sans-serif';ctx.textAlign='center';ctx.fillText(tp.text,tp.x,tp.y)}
  ctx.globalAlpha=1;
}

function loop(){update();draw();requestAnimationFrame(loop)}

// Input
document.addEventListener('keydown',function(e){if(e.key===' '||e.key==='ArrowUp'){e.preventDefault();throwKnife()}});
canvas.addEventListener('click',function(){throwKnife()});
canvas.addEventListener('touchstart',function(e){e.preventDefault();throwKnife()},{passive:false});

updateCoinDisplays();document.getElementById('bestVal').textContent=highScore;
loop();
</script>
