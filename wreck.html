<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Wrecking Ball — AJ GameTime</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Lilita+One&family=Nunito:wght@600;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;overflow:hidden;touch-action:none;font-family:'Nunito',sans-serif;user-select:none;-webkit-user-select:none}
canvas{display:block}
#hud{position:absolute;top:0;left:0;width:100%;padding:8px 12px;display:flex;justify-content:space-between;align-items:center;pointer-events:none;z-index:10}
.hud-box{background:rgba(0,0,0,0.5);border-radius:8px;padding:4px 12px;color:#fff;font-weight:700;font-size:14px}
#score-hud{color:#fbbf24;font-family:'Lilita One',cursive;font-size:20px}
#level-hud{color:#22d3ee}
#coin-hud{color:#fbbf24;font-size:13px}
#combo-hud{color:#a855f7;font-size:12px;margin-top:2px;min-height:16px}
#msg{position:fixed;top:30%;left:50%;transform:translate(-50%,-50%);font-family:'Lilita One',cursive;font-size:clamp(24px,6vw,42px);color:#fff;text-shadow:0 2px 12px rgba(0,0,0,0.8);z-index:15;pointer-events:none;opacity:0;transition:opacity 0.3s;text-align:center}
#overlay{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20;background:rgba(0,0,0,0.92)}
#overlay h1{font-family:'Lilita One',cursive;font-size:clamp(30px,8vw,54px);background:linear-gradient(135deg,#f97316,#ef4444,#fbbf24);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px}
#overlay h2{color:#22d3ee;font-family:'Lilita One',cursive;font-size:clamp(14px,3.5vw,20px);margin-bottom:8px}
#overlay p{color:#94a3b8;font-size:14px;max-width:320px;text-align:center;line-height:1.5;margin-bottom:10px}
.menu-btn{padding:12px 40px;font-family:'Lilita One',cursive;font-size:20px;color:#fff;border:none;border-radius:14px;cursor:pointer;pointer-events:auto;margin:4px}
#play-btn{background:linear-gradient(135deg,#f97316,#ef4444)}
#shop-btn{background:linear-gradient(135deg,#8b5cf6,#3b82f6)}
#lb-show-btn{padding:8px 22px;font-size:14px;font-weight:700;color:#fff;background:linear-gradient(135deg,#f59e0b,#ef4444);border:none;border-radius:8px;cursor:pointer;margin-top:4px;pointer-events:auto}
#back{position:absolute;top:8px;left:8px;color:rgba(255,255,255,0.35);text-decoration:none;font-size:12px;font-weight:700;z-index:30}
#lb-overlay{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:100;background:rgba(0,0,0,0.92)}
#lb-overlay h2{font-size:26px;color:#f59e0b;margin-bottom:10px;font-weight:900}
#lb-list{width:min(320px,88vw);max-height:50vh;overflow-y:auto}
.lb-row{display:flex;justify-content:space-between;padding:7px 12px;border-bottom:1px solid rgba(255,255,255,0.06);color:#e2e8f0;font-size:13px;font-weight:600}
.lb-row:nth-child(1) .lb-rank{color:#fbbf24}.lb-row:nth-child(2) .lb-rank{color:#94a3b8}.lb-row:nth-child(3) .lb-rank{color:#b45309}
.lb-rank{width:28px;color:#64748b}.lb-name{flex:1;margin:0 6px}.lb-score{color:#22d3ee}
#lb-close-btn{margin-top:14px;padding:10px 28px;font-size:15px;font-weight:700;color:#fff;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:10px;cursor:pointer;pointer-events:auto}
#death-screen{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:200;background:rgba(0,0,0,0.92)}
#death-screen h1{font-family:'Lilita One',cursive;font-size:32px;color:#ef4444;margin-bottom:6px}
#death-score{color:#fbbf24;font-size:18px;font-weight:900;margin-bottom:2px}
#death-coins{color:#fbbf24;font-size:14px;font-weight:700;margin-bottom:4px}
#death-stats{color:#22d3ee;font-size:14px;font-weight:700;margin-bottom:14px}
#death-name{width:200px;padding:10px;font-size:16px;font-weight:700;border:2px solid #ef4444;border-radius:10px;background:#1a1a2e;color:#fff;text-align:center;outline:none;margin-bottom:10px}
.death-btn{padding:10px 26px;font-family:'Lilita One',cursive;font-size:16px;color:#fff;border:none;border-radius:10px;cursor:pointer;margin:4px;pointer-events:auto}
#death-submit{background:linear-gradient(135deg,#ef4444,#f59e0b)}
#death-retry{background:linear-gradient(135deg,#22c55e,#3b82f6)}
#death-lb{background:linear-gradient(135deg,#f59e0b,#ef4444)}
#tap-hint{position:fixed;bottom:15%;left:50%;transform:translateX(-50%);color:rgba(255,255,255,0.4);font-size:16px;font-weight:700;z-index:5;pointer-events:none;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:0.4}50%{opacity:0.8}}
/* Shop */
#shop-overlay{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;z-index:150;background:rgba(0,0,0,0.95);overflow-y:auto;padding:20px 10px}
#shop-overlay h2{font-family:'Lilita One',cursive;font-size:28px;color:#8b5cf6;margin-bottom:4px}
#shop-coins{color:#fbbf24;font-weight:800;font-size:16px;margin-bottom:12px}
.shop-section{color:#94a3b8;font-weight:700;font-size:13px;margin:10px 0 6px;text-transform:uppercase;letter-spacing:1px}
.shop-grid{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;max-width:400px;margin-bottom:8px}
.shop-card{background:rgba(255,255,255,0.06);border:2px solid rgba(255,255,255,0.1);border-radius:12px;padding:10px;width:90px;text-align:center;cursor:pointer;pointer-events:auto;transition:border-color 0.2s}
.shop-card.owned{border-color:rgba(34,197,94,0.4)}
.shop-card.equipped{border-color:#22c55e;background:rgba(34,197,94,0.1)}
.shop-card .item-emoji{font-size:28px;margin-bottom:4px}
.shop-card .item-name{color:#e2e8f0;font-size:11px;font-weight:700}
.shop-card .item-cost{color:#fbbf24;font-size:11px;font-weight:600}
.shop-card .item-status{color:#22c55e;font-size:10px;font-weight:700}
#shop-close{margin:14px 0;padding:10px 30px;font-size:16px;font-weight:700;color:#fff;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:10px;cursor:pointer;pointer-events:auto}
</style>
</head>
<body>
<a id="back" href="index.html">← Back</a>
<canvas id="c"></canvas>
<div id="hud">
  <div><div class="hud-box" id="score-hud">💥 0</div><div class="hud-box" id="combo-hud"></div></div>
  <div><div class="hud-box" id="level-hud">Level 1</div><div class="hud-box" id="coin-hud" style="margin-top:2px">🪙 0</div></div>
  <div class="hud-box" id="balls-hud">🔴🔴🔴</div>
</div>
<div id="msg"></div>
<div id="tap-hint" style="display:none">👆 TAP to release!</div>
<div id="overlay">
  <h1>🏗️ Wrecking Ball</h1>
  <h2>Demolish the buildings!</h2>
  <p>Tap at the right moment to release the wrecking ball! Earn coins to buy skins and effects! 💥</p>
  <p id="menu-coins" style="color:#fbbf24;font-weight:700;font-size:14px">🪙 0</p>
  <button class="menu-btn" id="play-btn">💥 Demolish!</button>
  <button class="menu-btn" id="shop-btn">🛒 Shop</button>
  <button id="lb-show-btn" onclick="_lbShow()">🏆 Leaderboard</button>
</div>
<div id="shop-overlay">
  <h2>🛒 Shop</h2>
  <div id="shop-coins">🪙 0</div>
  <div class="shop-section">⚫ Ball Skins</div>
  <div class="shop-grid" id="skin-grid"></div>
  <div class="shop-section">✨ Effects</div>
  <div class="shop-grid" id="effect-grid"></div>
  <div class="shop-section">🔨 Upgrades</div>
  <div class="shop-grid" id="upgrade-grid"></div>
  <button id="shop-close">Close</button>
</div>
<div id="lb-overlay"><h2>🏆 Leaderboard</h2><div id="lb-list"></div><button id="lb-close-btn">Close</button></div>
<div id="death-screen">
  <h1>🏗️ Game Over!</h1>
  <div id="death-score">Score: 0</div>
  <div id="death-coins">+0 🪙</div>
  <div id="death-stats">Level 1 · Blocks: 0</div>
  <input type="text" id="death-name" placeholder="Your name" maxlength="16" autocomplete="off">
  <button class="death-btn" id="death-submit">📤 Submit Score</button>
  <button class="death-btn" id="death-retry">💥 Play Again</button>
  <button class="death-btn" id="death-lb">🏆 Leaderboard</button>
</div>
<script>
var cv=document.getElementById('c'),cx=cv.getContext('2d');
var W,H,ground;
function resize(){W=cv.width=window.innerWidth;H=cv.height=window.innerHeight;ground=H*0.85;}
resize();window.addEventListener('resize',resize);

// === SHOP DATA ===
var SKINS=[
  {id:'default',name:'Classic',cost:0,emoji:'⚫',color1:'#6b7280',color2:'#1f2937'},
  {id:'gold',name:'Gold',cost:50,emoji:'🟡',color1:'#fbbf24',color2:'#92400e'},
  {id:'fire',name:'Fire Ball',cost:100,emoji:'🔥',color1:'#ef4444',color2:'#7f1d1d',effect:'fire'},
  {id:'ice',name:'Ice Ball',cost:100,emoji:'🧊',color1:'#7dd3fc',color2:'#0c4a6e',effect:'ice'},
  {id:'electric',name:'Electric',cost:125,emoji:'⚡',color1:'#fbbf24',color2:'#4338ca',effect:'electric'},
  {id:'toxic',name:'Toxic',cost:125,emoji:'☠️',color1:'#22c55e',color2:'#14532d',effect:'toxic'},
  {id:'shadow',name:'Shadow',cost:150,emoji:'🌑',color1:'#6b21a8',color2:'#1e1b4b',effect:'shadow'},
  {id:'rainbow',name:'Rainbow',cost:200,emoji:'🌈',color1:'rainbow',color2:'#374151',effect:'rainbow'},
  {id:'galaxy',name:'Galaxy',cost:300,emoji:'🌌',color1:'#818cf8',color2:'#1e1b4b',effect:'galaxy'},
  {id:'diamond',name:'Diamond',cost:500,emoji:'💎',color1:'#67e8f9',color2:'#155e75',effect:'diamond'}
];
var EFFECTS=[
  {id:'none',name:'None',cost:0,emoji:'❌'},
  {id:'trail_fire',name:'Fire Trail',cost:75,emoji:'🔥',trail:'#ef4444'},
  {id:'trail_ice',name:'Ice Trail',cost:75,emoji:'❄️',trail:'#7dd3fc'},
  {id:'trail_electric',name:'Zap Trail',cost:100,emoji:'⚡',trail:'#fbbf24'},
  {id:'trail_toxic',name:'Toxic Trail',cost:100,emoji:'💚',trail:'#22c55e'},
  {id:'explosion_big',name:'Big Boom',cost:150,emoji:'💥',boom:true},
  {id:'confetti',name:'Confetti',cost:75,emoji:'🎉',confetti:true},
  {id:'shockwave',name:'Shockwave',cost:200,emoji:'🌊',shockwave:true}
];
var UPGRADES=[
  {id:'extra_ball',name:'+1 Ball',cost:100,emoji:'🔴',desc:'Start with 4 balls',maxOwn:3},
  {id:'big_ball',name:'Big Ball',cost:150,emoji:'🔵',desc:'+25% ball size'},
  {id:'heavy_ball',name:'Heavy Ball',cost:200,emoji:'🏋️',desc:'More damage & knockback'},
  {id:'magnet',name:'Coin Magnet',cost:125,emoji:'🧲',desc:'+50% coins earned'}
];

// Save/load
var coins=parseInt(localStorage.getItem('wb_coins')||'0');
var ownedSkins=JSON.parse(localStorage.getItem('wb_skins')||'["default"]');
var ownedEffects=JSON.parse(localStorage.getItem('wb_effects')||'["none"]');
var ownedUpgrades=JSON.parse(localStorage.getItem('wb_upgrades')||'[]');
var equippedSkin=localStorage.getItem('wb_eskin')||'default';
var equippedEffect=localStorage.getItem('wb_eeffect')||'none';

function saveSave(){
  localStorage.setItem('wb_coins',coins);
  localStorage.setItem('wb_skins',JSON.stringify(ownedSkins));
  localStorage.setItem('wb_effects',JSON.stringify(ownedEffects));
  localStorage.setItem('wb_upgrades',JSON.stringify(ownedUpgrades));
  localStorage.setItem('wb_eskin',equippedSkin);
  localStorage.setItem('wb_eeffect',equippedEffect);
}

function getSkin(){
  for(var i=0;i<SKINS.length;i++){if(SKINS[i].id===equippedSkin)return SKINS[i];}
  return SKINS[0];
}
function getEffect(){
  for(var i=0;i<EFFECTS.length;i++){if(EFFECTS[i].id===equippedEffect)return EFFECTS[i];}
  return EFFECTS[0];
}
function hasUpgrade(id){return ownedUpgrades.indexOf(id)>=0;}
function upgradeCount(id){var c=0;for(var i=0;i<ownedUpgrades.length;i++){if(ownedUpgrades[i]===id)c++;}return c;}

var playing=false,score=0,level=1,ballsLeft=3,totalBlocks=0,combo=0,sessionCoins=0;
var swingAngle=0,swingSpeed=0.04,swingDir=1;
var released=false,ballX=0,ballY=0,ballVX=0,ballVY=0;
var BALL_R,CHAIN_LEN,CRANE_X,CRANE_Y;
var blocks=[],debris=[],particles=[],trailParticles=[];
var shakeTimer=0,shakeX=0,shakeY=0;
var waitingForReset=false;
var shockwaves=[];

var BLOCK_COLORS=['#ef4444','#f97316','#eab308','#22c55e','#3b82f6','#8b5cf6','#ec4899','#06b6d4','#a855f7','#f43f5e'];

function initSizes(){
  BALL_R=Math.min(W,H)*0.035;
  if(hasUpgrade('big_ball'))BALL_R*=1.25;
  CHAIN_LEN=H*0.3;
  CRANE_X=W*0.15;
  CRANE_Y=H*0.08;
}

function buildLevel(){
  blocks=[];debris=[];
  initSizes();
  var cols=Math.min(3+Math.floor(level/2),8);
  var rows=Math.min(3+level,12);
  var bw=Math.min(40,W*0.08);
  var bh=Math.min(25,H*0.035);
  var gap=2;
  var totalW=cols*(bw+gap)-gap;
  var startX=W*0.55+((W*0.4-totalW)/2);
  var startY=ground-rows*(bh+gap);
  for(var r=0;r<rows;r++){
    for(var c=0;c<cols;c++){
      var hp=1;
      if(level>3&&r<2&&Math.random()>0.6)hp=2;
      if(level>6&&r<1&&Math.random()>0.7)hp=3;
      blocks.push({x:startX+c*(bw+gap),y:startY+r*(bh+gap),w:bw,h:bh,hp:hp,maxHp:hp,color:BLOCK_COLORS[r%BLOCK_COLORS.length],alive:true});
    }
  }
}

function resetSwing(){
  released=false;waitingForReset=false;
  swingAngle=-Math.PI/3;swingDir=1;
  swingSpeed=0.03+level*0.003;
  initSizes();
  document.getElementById('tap-hint').style.display='block';
}

function releaseBall(){
  if(released||!playing||waitingForReset)return;
  released=true;
  document.getElementById('tap-hint').style.display='none';
  var endX=CRANE_X+Math.sin(swingAngle)*CHAIN_LEN;
  var endY=CRANE_Y+Math.cos(swingAngle)*CHAIN_LEN;
  ballX=endX;ballY=endY;
  var speed=swingSpeed*CHAIN_LEN*1.2;
  ballVX=Math.cos(swingAngle)*speed*swingDir;
  ballVY=-Math.sin(swingAngle)*speed*swingDir;
  ballVX+=3+level*0.3;
  if(hasUpgrade('heavy_ball')){ballVX*=1.3;ballVY*=0.8;}
}

function addParticles(x,y,color,count){
  for(var i=0;i<count;i++){
    particles.push({x:x,y:y,vx:(Math.random()-0.5)*8,vy:(Math.random()-1)*6,life:15+Math.random()*15,maxLife:30,color:color,size:2+Math.random()*4});
  }
}
function addDebris(x,y,w,h,color){
  for(var i=0;i<3;i++){
    debris.push({x:x+Math.random()*w,y:y+Math.random()*h,w:w*0.4+Math.random()*w*0.3,h:h*0.4+Math.random()*h*0.3,vx:(Math.random()-0.5)*6,vy:-2-Math.random()*4,vy2:0,color:color,life:40+Math.random()*20,rot:Math.random()*Math.PI*2,rotV:(Math.random()-0.5)*0.2});
  }
}
function showMsg(t,d){
  var el=document.getElementById('msg');el.textContent=t;el.style.opacity='1';
  clearTimeout(el._t);el._t=setTimeout(function(){el.style.opacity='0';},d||1200);
}
function updateHUD(){
  document.getElementById('score-hud').textContent='💥 '+score;
  document.getElementById('level-hud').textContent='Level '+level;
  document.getElementById('coin-hud').textContent='🪙 '+coins;
  var h='';for(var i=0;i<ballsLeft;i++)h+='🔴';
  document.getElementById('balls-hud').textContent=h||'💀';
  document.getElementById('combo-hud').textContent=combo>1?'🔥 x'+combo+' combo!':'';
}

cv.addEventListener('touchstart',function(e){e.preventDefault();releaseBall();},{passive:false});
cv.addEventListener('touchmove',function(e){e.preventDefault();},{passive:false});
cv.addEventListener('touchend',function(e){e.preventDefault();},{passive:false});
cv.addEventListener('touchcancel',function(e){e.preventDefault();},{passive:false});
cv.addEventListener('click',function(){releaseBall();});

function update(){
  if(!playing)return;
  if(!released&&!waitingForReset){
    swingAngle+=swingSpeed*swingDir;
    if(swingAngle>Math.PI/3){swingAngle=Math.PI/3;swingDir=-1;}
    if(swingAngle<-Math.PI/3){swingAngle=-Math.PI/3;swingDir=1;}
  }
  if(released){
    // Slower gravity for more hang time
    ballVY+=0.28;
    ballX+=ballVX;
    ballY+=ballVY;
    
    // Trail particles
    var eff=getEffect();
    var skin=getSkin();
    if(eff.trail){
      trailParticles.push({x:ballX+(Math.random()-0.5)*BALL_R,y:ballY+(Math.random()-0.5)*BALL_R,vx:(Math.random()-0.5)*1.5,vy:(Math.random()-0.5)*1.5,life:12+Math.random()*8,maxLife:20,color:eff.trail,size:2+Math.random()*3});
    }
    if(skin.effect==='fire'){
      trailParticles.push({x:ballX+(Math.random()-0.5)*BALL_R,y:ballY+BALL_R*0.5,vx:(Math.random()-0.5)*2,vy:-1-Math.random()*2,life:8+Math.random()*6,maxLife:14,color:['#ef4444','#f97316','#fbbf24'][Math.floor(Math.random()*3)],size:2+Math.random()*4});
    }
    if(skin.effect==='ice'){
      if(Math.random()>0.5)trailParticles.push({x:ballX+(Math.random()-0.5)*BALL_R*2,y:ballY+(Math.random()-0.5)*BALL_R*2,vx:0,vy:-0.5,life:10+Math.random()*8,maxLife:18,color:'#bae6fd',size:1+Math.random()*2});
    }
    if(skin.effect==='electric'){
      if(Math.random()>0.6)trailParticles.push({x:ballX+(Math.random()-0.5)*BALL_R*3,y:ballY+(Math.random()-0.5)*BALL_R*3,vx:(Math.random()-0.5)*4,vy:(Math.random()-0.5)*4,life:4+Math.random()*4,maxLife:8,color:'#fbbf24',size:1+Math.random()*2});
    }
    if(skin.effect==='toxic'){
      trailParticles.push({x:ballX+(Math.random()-0.5)*BALL_R,y:ballY+BALL_R*0.3,vx:(Math.random()-0.5),vy:-0.5-Math.random(),life:10+Math.random()*8,maxLife:18,color:['#22c55e','#4ade80','#166534'][Math.floor(Math.random()*3)],size:2+Math.random()*3});
    }
    if(skin.effect==='galaxy'){
      trailParticles.push({x:ballX+(Math.random()-0.5)*BALL_R*2,y:ballY+(Math.random()-0.5)*BALL_R*2,vx:(Math.random()-0.5)*2,vy:(Math.random()-0.5)*2,life:12+Math.random()*8,maxLife:20,color:['#818cf8','#c084fc','#f472b6','#67e8f9'][Math.floor(Math.random()*4)],size:1+Math.random()*2});
    }
    if(skin.effect==='shadow'){
      if(Math.random()>0.6)trailParticles.push({x:ballX+(Math.random()-0.5)*BALL_R*2,y:ballY+(Math.random()-0.5)*BALL_R*2,vx:0,vy:0,life:15+Math.random()*10,maxLife:25,color:'rgba(107,33,168,0.5)',size:3+Math.random()*4});
    }
    if(skin.effect==='diamond'){
      if(Math.random()>0.5)trailParticles.push({x:ballX+(Math.random()-0.5)*BALL_R*2,y:ballY+(Math.random()-0.5)*BALL_R*2,vx:(Math.random()-0.5)*2,vy:(Math.random()-0.5)*2,life:8+Math.random()*8,maxLife:16,color:'#fff',size:1+Math.random()*1.5});
    }
    if(skin.effect==='rainbow'){
      var rc=['#ef4444','#f97316','#fbbf24','#22c55e','#3b82f6','#8b5cf6'];
      trailParticles.push({x:ballX+(Math.random()-0.5)*BALL_R,y:ballY+(Math.random()-0.5)*BALL_R,vx:(Math.random()-0.5)*2,vy:(Math.random()-0.5)*2,life:10+Math.random()*8,maxLife:18,color:rc[Math.floor(Math.random()*rc.length)],size:2+Math.random()*3});
    }
    
    // Block collisions
    var dmgMult=hasUpgrade('heavy_ball')?1.5:1;
    for(var i=0;i<blocks.length;i++){
      var b=blocks[i];
      if(!b.alive)continue;
      if(ballX+BALL_R>b.x&&ballX-BALL_R<b.x+b.w&&ballY+BALL_R>b.y&&ballY-BALL_R<b.y+b.h){
        var dmg=Math.ceil(dmgMult);
        b.hp-=dmg;
        if(b.hp<=0){
          b.alive=false;combo++;
          var pts=(10+level*5)*(combo>1?combo:1);
          var coinEarn=1+(combo>3?1:0);
          if(hasUpgrade('magnet'))coinEarn=Math.ceil(coinEarn*1.5);
          score+=pts;coins+=coinEarn;sessionCoins+=coinEarn;
          totalBlocks++;
          addParticles(b.x+b.w/2,b.y+b.h/2,b.color,eff.boom?16:8);
          addDebris(b.x,b.y,b.w,b.h,b.color);
          if(eff.confetti){
            var cc=['#ef4444','#f97316','#fbbf24','#22c55e','#3b82f6','#8b5cf6'];
            for(var ci=0;ci<12;ci++){particles.push({x:b.x+b.w/2,y:b.y+b.h/2,vx:(Math.random()-0.5)*10,vy:-3-Math.random()*6,life:20+Math.random()*15,maxLife:35,color:cc[ci%cc.length],size:2+Math.random()*3});}
          }
          if(eff.shockwave){shockwaves.push({x:b.x+b.w/2,y:b.y+b.h/2,r:0,maxR:80,life:10});}
          shakeTimer=eff.boom?12:8;
          // Splash damage for fire/electric/toxic
          if(skin.effect==='fire'||skin.effect==='electric'||skin.effect==='toxic'){
            for(var j=0;j<blocks.length;j++){
              var b2=blocks[j];if(!b2.alive||j===i)continue;
              var dx=b2.x+b2.w/2-(b.x+b.w/2),dy=b2.y+b2.h/2-(b.y+b.h/2);
              if(Math.sqrt(dx*dx+dy*dy)<60){
                b2.hp--;
                if(b2.hp<=0){
                  b2.alive=false;combo++;score+=(5+level*3)*(combo>1?combo:1);totalBlocks++;
                  var ce2=1;if(hasUpgrade('magnet'))ce2=2;coins+=ce2;sessionCoins+=ce2;
                  addParticles(b2.x+b2.w/2,b2.y+b2.h/2,b2.color,6);
                  addDebris(b2.x,b2.y,b2.w,b2.h,b2.color);
                }else{addParticles(b2.x+b2.w/2,b2.y+b2.h/2,'#fff',3);}
              }
            }
          }
        } else {
          addParticles(b.x+b.w/2,b.y+b.h/2,'#fff',4);
          shakeTimer=4;
        }
        var overlapL=ballX+BALL_R-b.x,overlapR=b.x+b.w-(ballX-BALL_R);
        var overlapT=ballY+BALL_R-b.y,overlapB=b.y+b.h-(ballY-BALL_R);
        var minO=Math.min(overlapL,overlapR,overlapT,overlapB);
        if(minO===overlapT||minO===overlapB){ballVY=-ballVY*0.6;}
        else{ballVX=-ballVX*0.4;}
        if(ballVX<1)ballVX=1+Math.random()*2;
      }
    }
    
    // Ground bounce — more bounces for more destruction time
    if(ballY+BALL_R>ground){
      ballY=ground-BALL_R;
      ballVY=-ballVY*0.5;
      ballVX*=0.85;
      if(Math.abs(ballVY)<0.8)ballVY=0;
    }
    
    // Ball stopped or off screen — more lenient threshold
    if(!waitingForReset&&(ballX>W+80||ballX<-80||(ballY>=ground-BALL_R-2&&Math.abs(ballVY)<0.8&&Math.abs(ballVX)<0.3))){
      waitingForReset=true;
      combo=0;
      var allDead=true;
      for(var j2=0;j2<blocks.length;j2++){if(blocks[j2].alive){allDead=false;break;}}
      if(allDead){
        level++;score+=level*100;
        var lvlCoins=5+level*2;if(hasUpgrade('magnet'))lvlCoins=Math.ceil(lvlCoins*1.5);
        coins+=lvlCoins;sessionCoins+=lvlCoins;
        ballsLeft=Math.min(ballsLeft+1,5+upgradeCount('extra_ball'));
        showMsg('⭐ Level '+level+'! +'+lvlCoins+'🪙',1800);
        buildLevel();waitingForReset=true;
        setTimeout(function(){resetSwing();},1000);
      } else {
        ballsLeft--;
        if(ballsLeft<=0){saveSave();setTimeout(gameOver,800);return;}
        waitingForReset=true;
        setTimeout(function(){resetSwing();},600);
      }
    }
  }
  
  if(shakeTimer>0){shakeX=(Math.random()-0.5)*shakeTimer;shakeY=(Math.random()-0.5)*shakeTimer;shakeTimer--;}
  else{shakeX=0;shakeY=0;}
  
  particles=particles.filter(function(p){p.x+=p.vx;p.y+=p.vy;p.vy+=0.2;p.life--;return p.life>0;});
  trailParticles=trailParticles.filter(function(p){p.x+=p.vx;p.y+=p.vy;p.life--;return p.life>0;});
  debris=debris.filter(function(d){d.x+=d.vx;d.vy2+=0.3;d.y+=d.vy+d.vy2;d.rot+=d.rotV;d.vx*=0.98;d.life--;return d.life>0&&d.y<H+50;});
  shockwaves=shockwaves.filter(function(s){s.r+=8;s.life--;return s.life>0;});
  
  updateHUD();
}

function draw(){
  cx.save();cx.translate(shakeX,shakeY);
  
  var skyGrad=cx.createLinearGradient(0,0,0,H);
  skyGrad.addColorStop(0,'#0f172a');skyGrad.addColorStop(0.6,'#1e293b');skyGrad.addColorStop(1,'#334155');
  cx.fillStyle=skyGrad;cx.fillRect(0,0,W,H);
  
  cx.fillStyle='rgba(255,255,255,0.2)';
  for(var si=0;si<40;si++){cx.fillRect((si*137+53)%W,(si*97+17)%(H*0.5),1.5,1.5);}
  
  cx.fillStyle='#4a3728';cx.fillRect(0,ground,W,H-ground);
  cx.fillStyle='#5c4a3a';cx.fillRect(0,ground,W,4);
  
  // Crane
  cx.strokeStyle='#fbbf24';cx.lineWidth=4;
  cx.beginPath();cx.moveTo(CRANE_X,ground);cx.lineTo(CRANE_X,CRANE_Y-20);cx.stroke();
  cx.beginPath();cx.moveTo(CRANE_X-20,CRANE_Y-20);cx.lineTo(CRANE_X+40,CRANE_Y-20);cx.stroke();
  cx.lineWidth=2;cx.strokeStyle='#d97706';
  cx.beginPath();cx.moveTo(CRANE_X,ground);cx.lineTo(CRANE_X-25,ground);cx.lineTo(CRANE_X,ground-60);cx.stroke();
  cx.beginPath();cx.moveTo(CRANE_X,ground);cx.lineTo(CRANE_X+25,ground);cx.lineTo(CRANE_X,ground-60);cx.stroke();
  cx.lineWidth=1.5;cx.strokeStyle='rgba(217,119,6,0.5)';
  for(var bi=0;bi<5;bi++){
    var by1=CRANE_Y+(ground-CRANE_Y)*bi/5,by2=CRANE_Y+(ground-CRANE_Y)*(bi+1)/5;
    cx.beginPath();cx.moveTo(CRANE_X-8,by1);cx.lineTo(CRANE_X+8,by2);cx.stroke();
    cx.beginPath();cx.moveTo(CRANE_X+8,by1);cx.lineTo(CRANE_X-8,by2);cx.stroke();
  }
  
  // Trail particles (behind ball)
  for(var tpi=0;tpi<trailParticles.length;tpi++){
    var tp=trailParticles[tpi];
    cx.globalAlpha=tp.life/tp.maxLife;
    cx.fillStyle=tp.color;
    cx.beginPath();cx.arc(tp.x,tp.y,tp.size,0,Math.PI*2);cx.fill();
  }
  cx.globalAlpha=1;
  
  // Shockwaves
  for(var swi=0;swi<shockwaves.length;swi++){
    var sw=shockwaves[swi];
    cx.globalAlpha=sw.life/10*0.4;
    cx.strokeStyle='#fff';cx.lineWidth=3;
    cx.beginPath();cx.arc(sw.x,sw.y,sw.r,0,Math.PI*2);cx.stroke();
    cx.globalAlpha=1;
  }
  
  // Ball
  var skin=getSkin();
  function drawBall(bx,by){
    var c1=skin.color1,c2=skin.color2;
    if(c1==='rainbow'){
      var rc=['#ef4444','#f97316','#fbbf24','#22c55e','#3b82f6','#8b5cf6'];
      c1=rc[Math.floor(Date.now()/100)%rc.length];
    }
    // Glow for special skins
    if(skin.effect){
      cx.shadowColor=c1;cx.shadowBlur=15;
    }
    cx.beginPath();cx.arc(bx,by,BALL_R,0,Math.PI*2);
    var bg=cx.createRadialGradient(bx-BALL_R*0.3,by-BALL_R*0.3,BALL_R*0.1,bx,by,BALL_R);
    bg.addColorStop(0,c1);bg.addColorStop(1,c2);
    cx.fillStyle=bg;cx.fill();
    cx.strokeStyle=c2;cx.lineWidth=2;cx.stroke();
    cx.shadowBlur=0;
    // Shine
    cx.beginPath();cx.arc(bx-BALL_R*0.25,by-BALL_R*0.25,BALL_R*0.25,0,Math.PI*2);
    cx.fillStyle='rgba(255,255,255,0.25)';cx.fill();
  }
  
  if(!released){
    var endX=CRANE_X+Math.sin(swingAngle)*CHAIN_LEN;
    var endY=CRANE_Y+Math.cos(swingAngle)*CHAIN_LEN;
    cx.strokeStyle='#94a3b8';cx.lineWidth=3;
    cx.setLineDash([6,4]);
    cx.beginPath();cx.moveTo(CRANE_X,CRANE_Y);cx.lineTo(endX,endY);cx.stroke();
    cx.setLineDash([]);
    drawBall(endX,endY);
  } else {
    drawBall(ballX,ballY);
    // Motion blur trail
    cx.globalAlpha=0.2;
    cx.beginPath();cx.arc(ballX-ballVX*2,ballY-ballVY*2,BALL_R*0.6,0,Math.PI*2);
    cx.fillStyle=skin.color1==='rainbow'?'#8b5cf6':skin.color2;cx.fill();
    cx.globalAlpha=1;
  }
  
  // Blocks
  for(var i=0;i<blocks.length;i++){
    var b=blocks[i];if(!b.alive)continue;
    cx.fillStyle=b.color;cx.fillRect(b.x,b.y,b.w,b.h);
    cx.fillStyle='rgba(255,255,255,0.2)';cx.fillRect(b.x,b.y,b.w,3);cx.fillRect(b.x,b.y,2,b.h);
    cx.fillStyle='rgba(0,0,0,0.2)';cx.fillRect(b.x,b.y+b.h-2,b.w,2);cx.fillRect(b.x+b.w-2,b.y,2,b.h);
    if(b.hp>=2){cx.fillStyle='rgba(255,255,255,0.6)';cx.font='bold '+(b.h-6)+'px sans-serif';cx.textAlign='center';cx.fillText(b.hp,b.x+b.w/2,b.y+b.h-5);cx.textAlign='start';}
  }
  
  // Debris
  for(var di2=0;di2<debris.length;di2++){
    var d=debris[di2];cx.save();cx.translate(d.x,d.y);cx.rotate(d.rot);
    cx.globalAlpha=d.life/40;cx.fillStyle=d.color;cx.fillRect(-d.w/2,-d.h/2,d.w,d.h);cx.restore();
  }
  cx.globalAlpha=1;
  
  // Particles
  for(var pi=0;pi<particles.length;pi++){
    var p=particles[pi];cx.globalAlpha=p.life/p.maxLife;
    cx.fillStyle=p.color;cx.beginPath();cx.arc(p.x,p.y,p.size,0,Math.PI*2);cx.fill();
  }
  cx.globalAlpha=1;cx.restore();
}

function gameOver(){
  playing=false;saveSave();
  document.getElementById('tap-hint').style.display='none';
  document.getElementById('death-score').textContent='Score: '+score;
  document.getElementById('death-coins').textContent='+'+sessionCoins+' 🪙';
  document.getElementById('death-stats').textContent='Level '+level+' · Blocks: '+totalBlocks;
  document.getElementById('death-name').value=localStorage.getItem('ajgt_name')||'';
  document.getElementById('death-screen').style.display='flex';
}

function startGame(){
  score=0;level=1;totalBlocks=0;combo=0;sessionCoins=0;
  ballsLeft=3+upgradeCount('extra_ball');
  particles=[];debris=[];trailParticles=[];shockwaves=[];
  initSizes();buildLevel();resetSwing();playing=true;
}

document.getElementById('play-btn').addEventListener('click',function(){
  document.getElementById('overlay').style.display='none';startGame();
});

setInterval(function(){update();draw();},1000/30);

// === SHOP ===
function renderShop(){
  document.getElementById('shop-coins').textContent='🪙 '+coins;
  var sg=document.getElementById('skin-grid');sg.innerHTML='';
  SKINS.forEach(function(s){
    var owned=ownedSkins.indexOf(s.id)>=0;
    var equipped=equippedSkin===s.id;
    var card=document.createElement('div');
    card.className='shop-card'+(owned?' owned':'')+(equipped?' equipped':'');
    card.innerHTML='<div class="item-emoji">'+s.emoji+'</div><div class="item-name">'+s.name+'</div>'+(equipped?'<div class="item-status">✅ Equipped</div>':owned?'<div class="item-status">Owned</div>':'<div class="item-cost">🪙 '+s.cost+'</div>');
    card.onclick=function(){
      if(equipped)return;
      if(owned){equippedSkin=s.id;saveSave();renderShop();return;}
      if(coins>=s.cost){coins-=s.cost;ownedSkins.push(s.id);equippedSkin=s.id;saveSave();renderShop();showMsg('🎉 '+s.name+'!');} else {showMsg('❌ Need '+s.cost+' coins!');}
    };
    sg.appendChild(card);
  });
  var eg=document.getElementById('effect-grid');eg.innerHTML='';
  EFFECTS.forEach(function(e){
    var owned=ownedEffects.indexOf(e.id)>=0;
    var equipped=equippedEffect===e.id;
    var card=document.createElement('div');
    card.className='shop-card'+(owned?' owned':'')+(equipped?' equipped':'');
    card.innerHTML='<div class="item-emoji">'+e.emoji+'</div><div class="item-name">'+e.name+'</div>'+(equipped?'<div class="item-status">✅ Equipped</div>':owned?'<div class="item-status">Owned</div>':'<div class="item-cost">🪙 '+e.cost+'</div>');
    card.onclick=function(){
      if(equipped)return;
      if(owned){equippedEffect=e.id;saveSave();renderShop();return;}
      if(coins>=e.cost){coins-=e.cost;ownedEffects.push(e.id);equippedEffect=e.id;saveSave();renderShop();showMsg('🎉 '+e.name+'!');} else {showMsg('❌ Need '+e.cost+' coins!');}
    };
    eg.appendChild(card);
  });
  var ug=document.getElementById('upgrade-grid');ug.innerHTML='';
  UPGRADES.forEach(function(u){
    var owned=hasUpgrade(u.id);
    var count=upgradeCount(u.id);
    var maxed=u.maxOwn&&count>=u.maxOwn;
    var card=document.createElement('div');
    card.className='shop-card'+(owned?' owned':'');
    card.innerHTML='<div class="item-emoji">'+u.emoji+'</div><div class="item-name">'+u.name+'</div><div style="color:#94a3b8;font-size:9px">'+u.desc+'</div>'+(maxed?'<div class="item-status">MAX</div>':owned&&u.maxOwn?'<div class="item-cost">🪙 '+u.cost+' ('+count+'/'+u.maxOwn+')</div>':'<div class="item-cost">🪙 '+u.cost+'</div>');
    card.onclick=function(){
      if(maxed)return;
      if(coins>=u.cost){coins-=u.cost;ownedUpgrades.push(u.id);saveSave();renderShop();showMsg('🎉 '+u.name+'!');} else {showMsg('❌ Need '+u.cost+' coins!');}
    };
    ug.appendChild(card);
  });
}
document.getElementById('shop-btn').addEventListener('click',function(){renderShop();document.getElementById('shop-overlay').style.display='flex';});
document.getElementById('shop-close').addEventListener('click',function(){document.getElementById('shop-overlay').style.display='none';document.getElementById('menu-coins').textContent='🪙 '+coins;});
