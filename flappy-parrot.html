<style>

<body>
<a id="back" href="index.html">← Back</a>
<button id="music-btn">🔊</button>
<canvas id="game"></canvas>
<div id="score-display">0</div>
<div id="coin-hud" style="position:absolute;top:10px;right:12px;font-family:'Lilita One',cursive;font-size:16px;color:#22d3ee;text-shadow:1px 2px 0 #000;z-index:10;pointer-events:none">🪙 0</div>

<div id="overlay">
  <h1>🦜 Flappy Parrot</h1>
  <h2>Tap to Fly!</h2>
  <p>Tap anywhere or press Space to flap! Fly through the pipes and don't crash. How far can you go?</p>
  <button id="play-btn">▶ Play</button>
  <button id="lb-show-btn" onclick="_lbShow()">🏆 Leaderboard</button>

</div>

<div id="lb-overlay"><h2>🏆 Leaderboard</h2><div id="lb-list"></div><button id="lb-close-btn">Close</button></div>

</div>

<div id="shop-screen">
  <h1>🛍️ Skins Shop</h1>
  <div id="shop-coins">🪙 0 coins</div>
  <div class="skin-grid" id="skin-grid"></div>
  <button id="shop-close">← Back</button>
</div>

<script>
const C = document.getElementById('game');
const X = C.getContext('2d');
let W, H;
function resize() { W = C.width = window.innerWidth; H = C.height = window.innerHeight; }
resize(); window.addEventListener('resize', resize);

// Game
let playing = false, dead = false, started = false;
let score = 0, best = parseInt(localStorage.getItem('fp_best') || '0');
let frame = 0;

// Bird
const GRAVITY = 0.45;
const FLAP = -7.5;
const bird = { x: 0, y: 0, vy: 0, rotation: 0, wingFrame: 0, size: 18 };

// Pipes
const PIPE_W = 52;
const GAP = 140;
let pipeSpeed = 2.5;
let pipes = [];
let pipeTimer = 0;
const PIPE_INTERVAL = 90;

// Pipe types with colors and points
const PIPE_TYPES = [
  { name:'Green',    pts:1,  bodyLight:'#4CAF50', bodyDark:'#2E7D32', rimLight:'#43A047', rimDark:'#1B5E20', weight:40 },
  { name:'Blue',     pts:2,  bodyLight:'#42A5F5', bodyDark:'#1565C0', rimLight:'#2196F3', rimDark:'#0D47A1', weight:25 },
  { name:'Red',      pts:3,  bodyLight:'#EF5350', bodyDark:'#C62828', rimLight:'#E53935', rimDark:'#B71C1C', weight:15 },
  { name:'Gold',     pts:5,  bodyLight:'#FFD54F', bodyDark:'#F9A825', rimLight:'#FFC107', rimDark:'#FF8F00', weight:8 },
  { name:'Purple',   pts:4,  bodyLight:'#AB47BC', bodyDark:'#6A1B9A', rimLight:'#9C27B0', rimDark:'#4A148C', weight:8 },
  { name:'Rainbow',  pts:10, bodyLight:'#FF6F00', bodyDark:'#E91E63', rimLight:'#9C27B0', rimDark:'#3F51B5', weight:3, rainbow:true },
  { name:'Diamond',  pts:7,  bodyLight:'#80DEEA', bodyDark:'#00838F', rimLight:'#4DD0E1', rimDark:'#006064', weight:4, sparkle:true },
];
function pickPipeType(){
  var total=0;for(var i=0;i<PIPE_TYPES.length;i++)total+=PIPE_TYPES[i].weight;
  var r=Math.random()*total;
  for(var i=0;i<PIPE_TYPES.length;i++){r-=PIPE_TYPES[i].weight;if(r<=0)return PIPE_TYPES[i];}
  return PIPE_TYPES[0];
}

// Ground
const GROUND_H = 70;
let groundX = 0;

// Clouds
let clouds = [];
for (let i = 0; i < 5; i++) {
  clouds.push({ x: Math.random() * 500, y: 30 + Math.random() * 150, w: 60 + Math.random() * 80, speed: 0.3 + Math.random() * 0.3 });
}

// Particles
let particles = [];

// === SKINS SYSTEM ===
const SKINS = [
  { id:'default', name:'Parrot', cost:0, body:'#4CAF50', belly:'#81C784', wing:'#388E3C', tail:'#2E7D32', beak:'#FF9800' },
  { id:'blue', name:'Blue Jay', cost:50, body:'#42A5F5', belly:'#90CAF9', wing:'#1E88E5', tail:'#1565C0', beak:'#FFB300' },
  { id:'red', name:'Cardinal', cost:75, body:'#EF5350', belly:'#EF9A9A', wing:'#C62828', tail:'#B71C1C', beak:'#FF6F00' },
  { id:'gold', name:'Golden', cost:150, body:'#FFD54F', belly:'#FFF176', wing:'#F9A825', tail:'#F57F17', beak:'#E65100' },
  { id:'purple', name:'Royal', cost:200, body:'#AB47BC', belly:'#CE93D8', wing:'#7B1FA2', tail:'#6A1B9A', beak:'#FFD600' },
  { id:'pink', name:'Flamingo', cost:100, body:'#F48FB1', belly:'#FCE4EC', wing:'#EC407A', tail:'#C2185B', beak:'#FF6F00' },
  { id:'ice', name:'Ice Bird', cost:250, body:'#80DEEA', belly:'#E0F7FA', wing:'#00ACC1', tail:'#00838F', beak:'#B0BEC5' },
  { id:'fire', name:'Phoenix', cost:300, body:'#FF7043', belly:'#FFAB91', wing:'#F4511E', tail:'#BF360C', beak:'#FFD600' },
  { id:'shadow', name:'Shadow', cost:400, body:'#424242', belly:'#616161', wing:'#212121', tail:'#000', beak:'#9E9E9E' },
  { id:'rainbow', name:'Rainbow', cost:500, body:'rainbow', belly:'#fff', wing:'rainbow', tail:'rainbow', beak:'#FF9800' },
  { id:'galaxy', name:'Galaxy', cost:750, body:'#1A237E', belly:'#311B92', wing:'#4A148C', tail:'#0D47A1', beak:'#7C4DFF', eye:'#E040FB' },
  { id:'diamond', name:'Diamond', cost:1000, body:'#B2EBF2', belly:'#E0F7FA', wing:'#4DD0E1', tail:'#00BCD4', beak:'#FFD600', sparkle:true },
];

let totalCoins = parseInt(localStorage.getItem('fp_coins') || '0');
let ownedSkins = JSON.parse(localStorage.getItem('fp_skins') || '["default"]');
let activeSkin = localStorage.getItem('fp_active_skin') || 'default';
function getSkin() { return SKINS.find(s => s.id === activeSkin) || SKINS[0]; }
function saveShop() {
  localStorage.setItem('fp_coins', totalCoins);
  localStorage.setItem('fp_skins', JSON.stringify(ownedSkins));
  localStorage.setItem('fp_active_skin', activeSkin);
}
function updateCoinDisplays() {
  document.getElementById('coin-display').textContent = '🪙 ' + totalCoins + ' coins';
  document.getElementById('shop-coins').textContent = '🪙 ' + totalCoins + ' coins';
  document.getElementById('coin-hud').textContent = '🪙 ' + totalCoins;
  var dc = document.getElementById('death-coins');
  if (dc) dc.textContent = '🪙 ' + totalCoins + ' coins';
}
function renderShop() {
  const grid = document.getElementById('skin-grid');
  grid.innerHTML = '';
  SKINS.forEach(s => {
    const owned = ownedSkins.includes(s.id);
    const selected = activeSkin === s.id;
    const canBuy = totalCoins >= s.cost;
    const card = document.createElement('div');
    card.className = 'skin-card' + (selected ? ' selected' : '') + (!owned && !canBuy ? ' locked' : '');
    // Preview canvas
    const pc = document.createElement('canvas');
    pc.width = 48; pc.height = 48; pc.className = 'skin-preview';
    drawSkinPreview(pc, s);
    card.appendChild(pc);
    const nm = document.createElement('div'); nm.className = 'skin-name'; nm.textContent = s.name; card.appendChild(nm);
    if (selected) {
      const tag = document.createElement('div'); tag.className = 'skin-owned'; tag.textContent = '✅ Equipped'; card.appendChild(tag);
    } else if (owned) {
      const tag = document.createElement('div'); tag.className = 'skin-owned'; tag.textContent = '✓ Owned'; card.appendChild(tag);
    } else {
      const tag = document.createElement('div'); tag.className = 'skin-cost'; tag.textContent = '🪙 ' + s.cost; card.appendChild(tag);
    }
    card.addEventListener('click', () => {
      if (owned) { activeSkin = s.id; saveShop(); renderShop(); }
      else if (canBuy) { totalCoins -= s.cost; ownedSkins.push(s.id); activeSkin = s.id; saveShop(); updateCoinDisplays(); renderShop(); }
    });
    grid.appendChild(card);
  });
}
function drawSkinPreview(canvas, skin) {
  const cx = canvas.getContext('2d');
  const sz = 16, px = 24, py = 24;
  // Body
  if (skin.body === 'rainbow') {
    const g = cx.createLinearGradient(px-sz,py-sz,px+sz,py+sz);
    g.addColorStop(0,'#f44336');g.addColorStop(0.2,'#ff9800');g.addColorStop(0.4,'#ffeb3b');g.addColorStop(0.6,'#4caf50');g.addColorStop(0.8,'#2196f3');g.addColorStop(1,'#9c27b0');
    cx.fillStyle = g;
  } else { cx.fillStyle = skin.body; }
  cx.beginPath(); cx.arc(px, py, sz, 0, Math.PI*2); cx.fill();
  // Belly
  cx.fillStyle = skin.belly; cx.beginPath(); cx.arc(px+3, py+3, sz*0.55, 0, Math.PI*2); cx.fill();
  // Eye
  cx.fillStyle = '#fff'; cx.beginPath(); cx.arc(px+6, py-5, 5, 0, Math.PI*2); cx.fill();
  cx.fillStyle = skin.eye || '#000'; cx.beginPath(); cx.arc(px+7, py-4, 2.5, 0, Math.PI*2); cx.fill();
  // Beak
  cx.fillStyle = skin.beak; cx.beginPath(); cx.moveTo(px+sz-2, py-1); cx.lineTo(px+sz+7, py+2); cx.lineTo(px+sz-2, py+4); cx.closePath(); cx.fill();
  // Sparkle
  if (skin.sparkle) {
    cx.fillStyle = '#fff'; cx.globalAlpha = 0.7;
    cx.beginPath(); cx.arc(px-8, py-10, 2, 0, Math.PI*2); cx.fill();
    cx.beginPath(); cx.arc(px+12, py-12, 1.5, 0, Math.PI*2); cx.fill();
    cx.globalAlpha = 1;
  }
}
document.getElementById('shop-btn').addEventListener('click', () => {
  updateCoinDisplays(); renderShop();
  document.getElementById('shop-screen').style.display = 'flex';
});
let shopOpenedFromDeath = false;
document.getElementById('shop-close').addEventListener('click', () => {
  document.getElementById('shop-screen').style.display = 'none';
  if (shopOpenedFromDeath) {
    shopOpenedFromDeath = false;
    document.getElementById('death-screen').style.display = 'flex';
  }
});
updateCoinDisplays();

function resetGame() {
  bird.x = W * 0.25;
  bird.y = H * 0.4;
  bird.vy = 0;
  bird.rotation = 0;
  bird.wingFrame = 0;
  pipes = [];
  pipeTimer = PIPE_INTERVAL - 30;
  score = 0;
  dead = false;
  started = false;
  pipeSpeed = 2.5;
  particles = [];
  frame = 0;
  document.getElementById('score-display').textContent = '0';
}

function flap() {
  if (dead) return;
  if (!playing) return;
  if (!started) started = true;
  bird.vy = FLAP;
  bird.wingFrame = 0;
  // Flap particles
  for (let i = 0; i < 4; i++) {
    particles.push({
      x: bird.x - 8, y: bird.y + 5,
      vx: -1 - Math.random() * 2, vy: 1 + Math.random() * 2,
      life: 12 + Math.random() * 8, maxLife: 20,
      color: 'rgba(255,255,255,0.5)', size: 2 + Math.random() * 2
    });
  }
}

// Input — tap anywhere
function onTap(e) {
  e.preventDefault();
  flap();
}
C.addEventListener('touchstart', onTap, { passive: false });
C.addEventListener('mousedown', onTap);
document.addEventListener('keydown', e => {
  if (e.key === ' ' || e.key === 'ArrowUp') { e.preventDefault(); flap(); }
});

function spawnPipe() {
  var minY = 80;
  var maxY = H - GROUND_H - GAP - 80;
  var gapY = minY + Math.random() * (maxY - minY);
  var type = pickPipeType();
  pipes.push({
    x: W + 10,
    gapY: gapY,
    scored: false,
    type: type
  });
}

function update() {
  if (!playing || dead) return;
  frame++;

  if (!started) {
    // Idle bobbing
    bird.y = H * 0.4 + Math.sin(frame * 0.06) * 10;
    bird.wingFrame += 0.15;
    return;
  }

  // Physics
  bird.vy += GRAVITY;
  bird.y += bird.vy;

  // Rotation based on velocity
  bird.rotation = Math.max(-0.5, Math.min(Math.PI / 2, bird.vy * 0.08));
  bird.wingFrame += 0.3;

  // Pipes
  pipeTimer++;
  if (pipeTimer >= PIPE_INTERVAL) {
    pipeTimer = 0;
    spawnPipe();
  }

  for (let i = pipes.length - 1; i >= 0; i--) {
    const p = pipes[i];
    p.x -= pipeSpeed;

    // Score
    if (!p.scored && p.x + PIPE_W < bird.x) {
      p.scored = true;
      var pts = p.type ? p.type.pts : 1;
      score += pts;
      totalCoins += pts;
      saveShop();
      if (pts >= 5) {
        for (var pi=0;pi<8;pi++) particles.push({x:bird.x,y:bird.y,vx:(Math.random()-0.5)*4,vy:(Math.random()-0.5)*4,life:15,maxLife:15,color:'#fbbf24',size:2+Math.random()*2});
      }
      document.getElementById('score-display').textContent = score;
      // Speed up slightly
      if (score % 10 === 0) pipeSpeed += 0.15;
    }

    // Remove off-screen
    if (p.x + PIPE_W < -10) {
      pipes.splice(i, 1);
    }

    // Collision
    if (bird.x + bird.size - 6 > p.x && bird.x - bird.size + 6 < p.x + PIPE_W) {
      if (bird.y - bird.size + 6 < p.gapY || bird.y + bird.size - 6 > p.gapY + GAP) {
        die();
        return;
      }
    }
  }

  // Ground/ceiling collision
  if (bird.y + bird.size > H - GROUND_H) {
    bird.y = H - GROUND_H - bird.size;
    die();
    return;
  }
  if (bird.y - bird.size < 0) {
    bird.y = bird.size;
    bird.vy = 0;
  }

  // Ground scroll
  groundX = (groundX + pipeSpeed) % 24;

  // Clouds
  clouds.forEach(c => { c.x -= c.speed; if (c.x + c.w < 0) { c.x = W + 20; c.y = 30 + Math.random() * 150; } });

  // Particles
  particles = particles.filter(p => { p.x += p.vx; p.y += p.vy; p.life--; return p.life > 0; });
}

function die() {
  dead = true;
  // Explosion particles
  for (let i = 0; i < 15; i++) {
    particles.push({
      x: bird.x, y: bird.y,
      vx: (Math.random()-0.5)*8, vy: (Math.random()-0.5)*8,
      life: 20+Math.random()*15, maxLife: 35,
      color: ['#fbbf24','#ef4444','#22c55e','#fff'][Math.floor(Math.random()*4)],
      size: 3+Math.random()*4
    });
  }
  if (score > best) {
    best = score;
    localStorage.setItem('fp_best', best);
  }
  updateCoinDisplays();
  setTimeout(gameOver, 600);
}

function draw() {
  // Sky gradient
  const sky = X.createLinearGradient(0, 0, 0, H - GROUND_H);
  sky.addColorStop(0, '#4dc9f6');
  sky.addColorStop(0.5, '#70d6ff');
  sky.addColorStop(1, '#a0e4ff');
  X.fillStyle = sky;
  X.fillRect(0, 0, W, H - GROUND_H);

  // Clouds
  clouds.forEach(c => {
    X.fillStyle = 'rgba(255,255,255,0.7)';
    X.beginPath();
    X.arc(c.x, c.y, c.w * 0.25, 0, Math.PI * 2);
    X.arc(c.x + c.w * 0.3, c.y - c.w * 0.1, c.w * 0.3, 0, Math.PI * 2);
    X.arc(c.x + c.w * 0.6, c.y, c.w * 0.22, 0, Math.PI * 2);
    X.fill();
  });

  // Pipes
  pipes.forEach(p => {
    var t = p.type || PIPE_TYPES[0];
    // Top pipe
    drawPipe(p.x, 0, PIPE_W, p.gapY, true, t);
    // Bottom pipe
    drawPipe(p.x, p.gapY + GAP, PIPE_W, H - GROUND_H - p.gapY - GAP, false, t);
    // Points label in the gap
    if (t.pts > 1) {
      X.font = 'bold 14px Lilita One, cursive';
      X.textAlign = 'center';
      X.fillStyle = t.pts >= 5 ? '#fbbf24' : '#fff';
      X.globalAlpha = 0.8;
      X.fillText('+' + t.pts, p.x + PIPE_W / 2, p.gapY + GAP / 2 + 5);
      X.globalAlpha = 1;
      X.textAlign = 'start';
    }
    // Sparkle effect for diamond pipes
    if (t.sparkle && !p.scored) {
      X.fillStyle = '#fff';
      for (var si = 0; si < 3; si++) {
        var sy = p.gapY + 20 + si * (GAP - 40) / 2;
        var sx = p.x + PIPE_W / 2 + Math.sin(frame * 0.1 + si * 2) * 8;
        X.globalAlpha = 0.5 + Math.sin(frame * 0.15 + si) * 0.3;
        X.beginPath(); X.arc(sx, sy, 2, 0, Math.PI * 2); X.fill();
      }
      X.globalAlpha = 1;
    }
  });

  // Ground
  X.fillStyle = '#8BC34A';
  X.fillRect(0, H - GROUND_H, W, 8);
  X.fillStyle = '#795548';
  X.fillRect(0, H - GROUND_H + 8, W, GROUND_H - 8);
  // Ground texture
  X.fillStyle = '#6D4C41';
  for (let gx = -groundX; gx < W + 24; gx += 24) {
    X.fillRect(gx, H - GROUND_H + 10, 12, 3);
    X.fillRect(gx + 10, H - GROUND_H + 20, 8, 3);
  }
  // Grass tufts
  X.fillStyle = '#7CB342';
  for (let gx = -groundX; gx < W + 24; gx += 16) {
    X.fillRect(gx, H - GROUND_H - 2, 3, 6);
    X.fillRect(gx + 8, H - GROUND_H - 1, 2, 4);
  }

  // Bird
  if (!dead || frame % 4 < 3) {
    X.save();
    X.translate(bird.x, bird.y);
    X.rotate(bird.rotation);

    // Body
    var sk = getSkin();
    if (sk.body === 'rainbow') {
      var rg = X.createLinearGradient(-bird.size,-bird.size,bird.size,bird.size);
      rg.addColorStop(0,'#f44336');rg.addColorStop(0.2,'#ff9800');rg.addColorStop(0.4,'#ffeb3b');rg.addColorStop(0.6,'#4caf50');rg.addColorStop(0.8,'#2196f3');rg.addColorStop(1,'#9c27b0');
      X.fillStyle = rg;
    } else { X.fillStyle = sk.body; }
    X.beginPath();
    X.arc(0, 0, bird.size, 0, Math.PI * 2);
    X.fill();

    // Belly
    X.fillStyle = sk.belly;
    X.beginPath();
    X.arc(4, 4, bird.size * 0.6, 0, Math.PI * 2);
    X.fill();
    // Sparkle
    if (sk.sparkle) {
      X.fillStyle = '#fff'; X.globalAlpha = 0.5 + Math.sin(frame*0.15)*0.3;
      X.beginPath(); X.arc(-6, -12, 2, 0, Math.PI*2); X.fill();
      X.beginPath(); X.arc(10, -14, 1.5, 0, Math.PI*2); X.fill();
      X.globalAlpha = 1;
    }

    // Wing
    const wingY = Math.sin(bird.wingFrame * 3) * 6;
    if (sk.wing === 'rainbow') {
      var wg = X.createLinearGradient(-18,-4,0,8);
      wg.addColorStop(0,'#f44336');wg.addColorStop(0.5,'#ffeb3b');wg.addColorStop(1,'#2196f3');
      X.fillStyle = wg;
    } else { X.fillStyle = sk.wing; }
    X.beginPath();
    X.moveTo(-6, 0);
    X.quadraticCurveTo(-18, -4 + wingY, -14, 8 + wingY);
    X.quadraticCurveTo(-8, 6, -6, 2);
    X.fill();

    // Eye
    X.fillStyle = '#fff';
    X.beginPath();
    X.arc(8, -6, 7, 0, Math.PI * 2);
    X.fill();
    X.fillStyle = sk.eye || '#000';
    X.beginPath();
    X.arc(10, -5, 3.5, 0, Math.PI * 2);
    X.fill();
    X.fillStyle = '#fff';
    X.beginPath();
    X.arc(11, -6, 1.5, 0, Math.PI * 2);
    X.fill();

    // Beak
    X.fillStyle = sk.beak;
    X.beginPath();
    X.moveTo(bird.size - 2, -2);
    X.lineTo(bird.size + 10, 2);
    X.lineTo(bird.size - 2, 5);
    X.closePath();
    X.fill();

    // Tail feathers
    if (sk.tail === 'rainbow') {
      var tg = X.createLinearGradient(-bird.size-10,-6,-bird.size+2,4);
      tg.addColorStop(0,'#9c27b0');tg.addColorStop(0.5,'#e91e63');tg.addColorStop(1,'#ff5722');
      X.fillStyle = tg;
    } else { X.fillStyle = sk.tail; }
    X.beginPath();
    X.moveTo(-bird.size + 2, -2);
    X.lineTo(-bird.size - 8, -6);
    X.lineTo(-bird.size - 6, 0);
    X.lineTo(-bird.size - 10, 4);
    X.lineTo(-bird.size + 2, 2);
    X.fill();

    X.restore();
  }

  // Particles
  particles.forEach(p => {
    X.globalAlpha = p.life / p.maxLife;
    X.fillStyle = p.color;
    X.beginPath();
    X.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    X.fill();
  });
  X.globalAlpha = 1;

  // "Tap to start" hint
  if (playing && !started && !dead) {
    X.fillStyle = 'rgba(255,255,255,0.8)';
    X.font = "bold 18px 'Lilita One', cursive";
    X.textAlign = 'center';
    X.fillText('Tap to Flap!', W / 2, H * 0.6);
    X.textAlign = 'start';
  }
}

function drawPipe(x, y, w, h, isTop, type) {
  if (h <= 0) return;
  var t = type || PIPE_TYPES[0];
  // Pipe body
  var grad = X.createLinearGradient(x, 0, x + w, 0);
  if (t.rainbow) {
    grad.addColorStop(0, '#FF6F00');
    grad.addColorStop(0.2, '#F44336');
    grad.addColorStop(0.4, '#E91E63');
    grad.addColorStop(0.6, '#9C27B0');
    grad.addColorStop(0.8, '#3F51B5');
    grad.addColorStop(1, '#2196F3');
  } else {
    grad.addColorStop(0, t.bodyDark);
    grad.addColorStop(0.3, t.bodyLight);
    grad.addColorStop(0.7, t.bodyLight);
    grad.addColorStop(1, t.bodyDark);
  }
  X.fillStyle = grad;
  X.fillRect(x, y, w, h);

  // Pipe rim
  var rimH = 26;
  var rimW = w + 8;
  var rimX = x - 4;
  var rimGrad = X.createLinearGradient(rimX, 0, rimX + rimW, 0);
  rimGrad.addColorStop(0, t.rimDark);
  rimGrad.addColorStop(0.3, t.rimLight);
  rimGrad.addColorStop(0.7, t.rimLight);
  rimGrad.addColorStop(1, t.rimDark);
  X.fillStyle = rimGrad;
  if (isTop) {
    X.fillRect(rimX, y + h - rimH, rimW, rimH);
  } else {
    X.fillRect(rimX, y, rimW, rimH);
  }

  // Highlight
  X.fillStyle = 'rgba(255,255,255,0.15)';
  X.fillRect(x + 6, y, 8, h);

  // Gold pipes get extra shine
  if (t.pts >= 5 && !t.rainbow) {
    X.fillStyle = 'rgba(255,255,255,0.08)';
    X.fillRect(x + 2, y, w - 4, h);
  }
}

// === AUDIO SYSTEM ===
let audioCtx = null;
let musicOn = true;
let musicNodes = [];
let musicTimer = null;

function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

// Sound effects
function sfxFlap() {
  try {
    const ctx = getAudioCtx();
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.type = 'sine';
    o.frequency.setValueAtTime(600, ctx.currentTime);
    o.frequency.exponentialRampToValueAtTime(900, ctx.currentTime + 0.08);
    o.frequency.exponentialRampToValueAtTime(500, ctx.currentTime + 0.15);
    g.gain.setValueAtTime(0.15, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
    o.connect(g); g.connect(ctx.destination);
    o.start(); o.stop(ctx.currentTime + 0.15);
  } catch(e){}
}

function sfxScore(pts) {
  try {
    const ctx = getAudioCtx();
    const notes = pts >= 5 ? [523, 659, 784, 1047] : pts >= 3 ? [523, 659, 784] : [523, 659];
    notes.forEach((f, i) => {
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.type = 'triangle';
      o.frequency.value = f;
      g.gain.setValueAtTime(0.12, ctx.currentTime + i * 0.08);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.08 + 0.2);
      o.connect(g); g.connect(ctx.destination);
      o.start(ctx.currentTime + i * 0.08);
      o.stop(ctx.currentTime + i * 0.08 + 0.2);
    });
  } catch(e){}
}

function sfxCrash() {
  try {
    const ctx = getAudioCtx();
    // Noise burst
    const buf = ctx.createBuffer(1, ctx.sampleRate * 0.3, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (ctx.sampleRate * 0.08));
    const src = ctx.createBufferSource();
    src.buffer = buf;
    const g = ctx.createGain();
    g.gain.setValueAtTime(0.2, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
    src.connect(g); g.connect(ctx.destination);
    src.start();
    // Low thud
    const o = ctx.createOscillator();
    const g2 = ctx.createGain();
    o.type = 'sine';
    o.frequency.setValueAtTime(150, ctx.currentTime);
    o.frequency.exponentialRampToValueAtTime(40, ctx.currentTime + 0.2);
    g2.gain.setValueAtTime(0.25, ctx.currentTime);
    g2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.25);
    o.connect(g2); g2.connect(ctx.destination);
    o.start(); o.stop(ctx.currentTime + 0.25);
  } catch(e){}
}

// Tropical background music — calypso/island vibe
function startMusic() {
  if (!musicOn) return;
  try {
    const ctx = getAudioCtx();
    stopMusic();
    const masterGain = ctx.createGain();
    masterGain.gain.value = 0.18;
    masterGain.connect(ctx.destination);
    musicNodes.push(masterGain);

    // Steel drum melody — tropical pentatonic (C E G A C5)
    const scale = [523.25, 659.25, 783.99, 880, 1046.5, 783.99, 659.25, 523.25, 440, 523.25, 659.25, 783.99, 880, 783.99, 659.25, 523.25];
    let noteIdx = 0;
    const tempo = 200; // ms per note

    function playNote() {
      if (!musicOn) return;
      const freq = scale[noteIdx % scale.length];
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      // Steel drum timbre: triangle + quick decay
      o.type = 'triangle';
      o.frequency.value = freq;
      g.gain.setValueAtTime(0.6, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.18);
      o.connect(g); g.connect(masterGain);
      o.start(); o.stop(ctx.currentTime + 0.2);
      noteIdx++;

      // Add harmony on every other note
      if (noteIdx % 2 === 0) {
        const o2 = ctx.createOscillator();
        const g2 = ctx.createGain();
        o2.type = 'sine';
        o2.frequency.value = freq * 0.5; // octave below
        g2.gain.setValueAtTime(0.3, ctx.currentTime);
        g2.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.15);
        o2.connect(g2); g2.connect(masterGain);
        o2.start(); o2.stop(ctx.currentTime + 0.18);
      }

      // Rhythm variation
      const nextDelay = noteIdx % 4 === 0 ? tempo * 1.5 : noteIdx % 3 === 0 ? tempo * 0.75 : tempo;
      musicTimer = setTimeout(playNote, nextDelay);
    }

    // Gentle wave/ocean pad
    const pad = ctx.createOscillator();
    const padG = ctx.createGain();
    pad.type = 'sine';
    pad.frequency.value = 130.81; // C3
    padG.gain.value = 0.15;
    pad.connect(padG); padG.connect(masterGain);
    pad.start();
    musicNodes.push(pad, padG);

    // Second pad note for fullness
    const pad2 = ctx.createOscillator();
    const padG2 = ctx.createGain();
    pad2.type = 'sine';
    pad2.frequency.value = 196; // G3
    padG2.gain.value = 0.1;
    pad2.connect(padG2); padG2.connect(masterGain);
    pad2.start();
    musicNodes.push(pad2, padG2);

    playNote();
  } catch(e){}
}

function stopMusic() {
  if (musicTimer) { clearTimeout(musicTimer); musicTimer = null; }
  musicNodes.forEach(n => { try { n.stop ? n.stop() : null; } catch(e){} try { n.disconnect(); } catch(e){} });
  musicNodes = [];
}

document.getElementById('music-btn').addEventListener('click', () => {
  musicOn = !musicOn;
  document.getElementById('music-btn').textContent = musicOn ? '🔊' : '🔇';
  if (musicOn && playing) startMusic();
  else stopMusic();
});
