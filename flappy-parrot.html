function drawSkinPreview(canvas, skin) {
  const cx = canvas.getContext('2d');
  const sz = 16, px = 24, py = 24;

  if (skin.body === 'rainbow') {
    const g = cx.createLinearGradient(px-sz,py-sz,px+sz,py+sz);
    g.addColorStop(0,'#f44336');g.addColorStop(0.2,'#ff9800');g.addColorStop(0.4,'#ffeb3b');g.addColorStop(0.6,'#4caf50');g.addColorStop(0.8,'#2196f3');g.addColorStop(1,'#9c27b0');
    cx.fillStyle = g;
  } else { cx.fillStyle = skin.body; }
  cx.beginPath(); cx.arc(px, py, sz, 0, Math.PI*2); cx.fill();
  // Belly
  cx.fillStyle = skin.belly; cx.beginPath(); cx.arc(px+3, py+3, sz*0.55, 0, Math.PI*2); cx.fill();
  // Eye
  cx.fillStyle = '#fff'; cx.beginPath(); cx.arc(px+6, py-5, 5, 0, Math.PI*2); cx.fill();
  cx.fillStyle = skin.eye || '#000'; cx.beginPath(); cx.arc(px+7, py-4, 2.5, 0, Math.PI*2); cx.fill();
  // Beak
  cx.fillStyle = skin.beak; cx.beginPath(); cx.moveTo(px+sz-2, py-1); cx.lineTo(px+sz+7, py+2); cx.lineTo(px+sz-2, py+4); cx.closePath(); cx.fill();
  // Sparkle
  if (skin.sparkle) {
    cx.fillStyle = '#fff'; cx.globalAlpha = 0.7;
    cx.beginPath(); cx.arc(px-8, py-10, 2, 0, Math.PI*2); cx.fill();
    cx.beginPath(); cx.arc(px+12, py-12, 1.5, 0, Math.PI*2); cx.fill();
    cx.globalAlpha = 1;
  }
}

function flap() {
  if (dead) return;
  if (!playing) return;
  if (!started) started = true;
  bird.vy = FLAP;
  bird.wingFrame = 0;
  // Flap particles
  for (let i = 0; i < 4; i++) {
    particles.push({
      x: bird.x - 8, y: bird.y + 5,
      vx: -1 - Math.random() * 2, vy: 1 + Math.random() * 2,
      life: 12 + Math.random() * 8, maxLife: 20,
      color: 'rgba(255,255,255,0.5)', size: 2 + Math.random() * 2
    });
  }
}

function spawnPipe() {
  var minY = 80;
  var maxY = H - GROUND_H - GAP - 80;
  var gapY = minY + Math.random() * (maxY - minY);
  var type = pickPipeType();
  pipes.push({
    x: W + 10,
    gapY: gapY,
    scored: false,
    type: type
  });
}

function update() {
  // Always update particles (for death explosions)
  particles = particles.filter(function(p) { p.x += p.vx; p.y += p.vy; p.vy += 0.1; p.life--; return p.life > 0; });
  if (!playing || dead) return;
  frame++;

  if (!started) {
    // Idle bobbing
    bird.y = H * 0.4 + Math.sin(frame * 0.06) * 10;
    bird.wingFrame += 0.15;
    return;
  }

  // Physics
  bird.vy += GRAVITY;
  bird.y += bird.vy;

  // Rotation based on velocity
  bird.rotation = Math.max(-0.5, Math.min(Math.PI / 2, bird.vy * 0.08));
  bird.wingFrame += 0.3;

  // Trail effect particles
  var efx = getEfx();
  if (efx.id !== 'none' && frame % 2 === 0) {
    var tc1 = efx.color, tc2 = efx.color2;
    if (efx.id === 'rainbow' || efx.id === 'confetti') {
      var hues = ['#ff0000','#ff9800','#ffeb3b','#4caf50','#2196f3','#9c27b0','#e91e63'];
      tc1 = hues[Math.floor(Math.random()*hues.length)];
      tc2 = hues[Math.floor(Math.random()*hues.length)];
    }
    for (var ti = 0; ti < (efx.id === 'confetti' ? 3 : 2); ti++) {
      trailParticles.push({
        x: bird.x - bird.size + Math.random()*6 - 3,
        y: bird.y + Math.random()*10 - 5,
        vx: -1.5 - Math.random()*2,
        vy: (Math.random()-0.5)*2 + (efx.id === 'bubble' ? -1 : efx.id === 'snow' ? 0.5 : 0),
        life: 1,
        decay: 0.03 + Math.random()*0.02,
        size: efx.id === 'bubble' ? 3+Math.random()*4 : efx.id === 'confetti' ? 2+Math.random()*3 : 2+Math.random()*3,
        color: Math.random()>0.5 ? tc1 : tc2,
        shape: efx.id === 'hearts' ? 'heart' : efx.id === 'stars' ? 'star' : efx.id === 'snow' ? 'snow' : efx.id === 'confetti' ? 'rect' : 'circle'
      });
    }
  }
  for (var ti = trailParticles.length - 1; ti >= 0; ti--) {
    var tp = trailParticles[ti];
    tp.x += tp.vx; tp.y += tp.vy; tp.life -= tp.decay;
    if (tp.life <= 0) trailParticles.splice(ti, 1);
  }

  // Pipes
  pipeTimer++;
  if (pipeTimer >= PIPE_INTERVAL) {
    pipeTimer = 0;
    spawnPipe();
  }

  for (let i = pipes.length - 1; i >= 0; i--) {
    const p = pipes[i];
    p.x -= pipeSpeed;

    // Score
    if (!p.scored && p.x + PIPE_W < bird.x) {
      p.scored = true;
      var pts = p.type ? p.type.pts : 1;
      score += pts;
      totalCoins += pts;
      saveShop();
      if (pts >= 5) {
        for (var pi=0;pi<8;pi++) particles.push({x:bird.x,y:bird.y,vx:(Math.random()-0.5)*4,vy:(Math.random()-0.5)*4,life:15,maxLife:15,color:'#fbbf24',size:2+Math.random()*2});
      }
      document.getElementById('score-display').textContent = score;
      // Speed up slightly
      if (score % 10 === 0) pipeSpeed += 0.15;
    }

    // Remove off-screen
    if (p.x + PIPE_W < -10) {
      pipes.splice(i, 1);
    }

    // Collision
    if (bird.x + bird.size - 6 > p.x && bird.x - bird.size + 6 < p.x + PIPE_W) {
      if (bird.y - bird.size + 6 < p.gapY || bird.y + bird.size - 6 > p.gapY + GAP) {
        die();
        return;
      }
    }
  }

  // Ground/ceiling collision
  if (bird.y + bird.size > H - GROUND_H) {
    bird.y = H - GROUND_H - bird.size;
    die();
    return;
  }
  if (bird.y - bird.size < 0) {
    bird.y = bird.size;
    bird.vy = 0;
  }

  // Ground scroll
  groundX = (groundX + pipeSpeed) % 24;

  // Clouds
  clouds.forEach(c => { c.x -= c.speed; if (c.x + c.w < 0) { c.x = W + 20; c.y = 30 + Math.random() * 150; } });

  // Particles updated at top of update()
}

function spawnDeathParticles() {
  var ex = getExplo().id;
  var count = ex === 'nuke' ? 80 : ex === 'portal' ? 30 : 20;
  if (ex === 'nuke') { nukeFlash = 30; }
  for (var i = 0; i < count; i++) {
    var ang = (i / count) * Math.PI * 2;
    var spd = 2 + Math.random() * 6;
    var p = { x: bird.x, y: bird.y, life: 25 + Math.random() * 20, maxLife: 45, size: 3 + Math.random() * 4 };

    if (ex === 'fireworks') {
      p.vx = Math.cos(ang) * spd * 1.5; p.vy = Math.sin(ang) * spd * 1.5;
      p.color = ['#ff0000','#ffd700','#00ff00','#00bfff','#ff00ff','#ff8c00'][i % 6];
      p.size = 2 + Math.random() * 3;
    } else if (ex === 'confetti') {
      p.vx = (Math.random()-0.5) * 8; p.vy = -2 - Math.random() * 4;
      p.color = ['#ff0000','#ff9800','#ffeb3b','#4caf50','#2196f3','#9c27b0','#e91e63'][i % 7];
      p.size = 3 + Math.random() * 4; p.life = 40 + Math.random() * 20; p.maxLife = 60;
    } else if (ex === 'hearts') {
      p.vx = (Math.random()-0.5) * 6; p.vy = -1 - Math.random() * 5;
      p.color = ['#ff69b4','#ff1493','#ff4081','#e91e63'][i % 4];
    } else if (ex === 'skull') {
      p.vx = Math.cos(ang) * spd; p.vy = Math.sin(ang) * spd;
      p.color = ['#1a1a1a','#4a4a4a','#9e9e9e','#fff'][i % 4];
      p.size = 4 + Math.random() * 3;
    } else if (ex === 'nuke') {
      var ring = i < 30; var mid = i >= 30 && i < 55;
      p.vx = ring ? Math.cos(ang) * 15 : mid ? Math.cos(ang) * 10 + (Math.random()-0.5)*4 : (Math.random()-0.5) * 20;
      p.vy = ring ? Math.sin(ang) * 15 : mid ? Math.sin(ang) * 10 + (Math.random()-0.5)*4 : (Math.random()-0.5) * 20;
      p.color = ['#ff4500','#ff8c00','#ffd700','#fff','#ff0000'][i % 5];
      p.size = ring ? 8 + Math.random() * 6 : mid ? 5 + Math.random() * 8 : 3 + Math.random() * 10;
      p.life = 60; p.maxLife = 60;
    } else if (ex === 'glitch') {
      p.vx = (Math.random()-0.5) * 10; p.vy = (Math.random()-0.5) * 10;
      p.color = ['#00ff00','#ff00ff','#00ffff','#ffff00'][i % 4];
      p.size = 4 + Math.random() * 6;
    } else if (ex === 'feathers') {
      p.vx = (Math.random()-0.5) * 4; p.vy = -1 + Math.random() * 2;
      p.color = ['#fff','#e0e0e0','#a5d6a7','#c8e6c9'][i % 4];
      p.size = 2 + Math.random() * 3; p.life = 40; p.maxLife = 40;
    } else if (ex === 'ice') {
      p.vx = Math.cos(ang) * spd * 1.2; p.vy = Math.sin(ang) * spd * 1.2;
      p.color = ['#e0f7fa','#b2ebf2','#80deea','#4dd0e1','#fff'][i % 5];
      p.size = 2 + Math.random() * 5;
    } else if (ex === 'lava') {
      p.vx = (Math.random()-0.5) * 6; p.vy = -3 - Math.random() * 5;
      p.color = ['#ff4500','#ff6600','#ff8c00','#ffd600'][i % 4];
      p.size = 3 + Math.random() * 5; p.life = 35; p.maxLife = 35;
    } else if (ex === 'portal') {
      p.vx = Math.cos(ang + i*0.3) * (2 + i*0.2); p.vy = Math.sin(ang + i*0.3) * (2 + i*0.2);
      p.color = ['#7c4dff','#e040fb','#536dfe','#448aff'][i % 4];
      p.size = 2 + Math.random() * 4;
    } else if (ex === 'pixel') {
      p.vx = Math.cos(ang) * spd; p.vy = Math.sin(ang) * spd;
      p.color = ['#4caf50','#8bc34a','#388e3c','#fff','#ff9800'][i % 5];
      p.size = 5 + Math.random() * 3;
    } else {
      p.vx = (Math.random()-0.5) * 8; p.vy = (Math.random()-0.5) * 8;
      p.color = ['#fbbf24','#ef4444','#22c55e','#fff'][i % 4];
    }
    particles.push(p);
  }
}

function die() {
  dead = true;
  spawnDeathParticles();
  if (score > best) {
    best = score;
    localStorage.setItem('fp_best', best);
  }
  updateCoinDisplays();
  setTimeout(gameOver, 1200);
}

function draw() {
  // Sky gradient (uses active background)
  var bg = getBG();
  const sky = X.createLinearGradient(0, 0, 0, H - GROUND_H);
  sky.addColorStop(0, bg.sky1);
  sky.addColorStop(1, bg.sky2);
  X.fillStyle = sky;
  X.fillRect(0, 0, W, H - GROUND_H);

  // Background-specific decorations
  if (bg.stars) {
    X.fillStyle = '#fff';
    for (var si = 0; si < 40; si++) {
      var sx = (si * 137 + frame * 0.1) % W;
      var sy = (si * 97) % (H - GROUND_H - 40) + 10;
      X.globalAlpha = 0.3 + Math.sin(frame * 0.05 + si) * 0.3;
      X.beginPath(); X.arc(sx, sy, si % 3 === 0 ? 2 : 1, 0, Math.PI * 2); X.fill();
    }
    X.globalAlpha = 1;
  }
  if (bg.lava) {
    X.fillStyle = '#ff4400';
    for (var li = 0; li < 8; li++) {
      var lx = (li * 80 + frame * 0.5) % (W + 40) - 20;
      var ly = H - GROUND_H - 15 + Math.sin(frame * 0.03 + li) * 5;
      X.globalAlpha = 0.4 + Math.sin(frame * 0.05 + li) * 0.2;
      X.beginPath(); X.arc(lx, ly, 8 + Math.sin(frame * 0.08 + li) * 3, 0, Math.PI * 2); X.fill();
    }
    X.globalAlpha = 1;
  }
  if (bg.halos) {
    X.fillStyle = 'rgba(255,215,0,0.15)';
    for (var hi = 0; hi < 5; hi++) {
      var hx = (hi * 120 + 40) % W;
      var hy = 40 + Math.sin(frame * 0.02 + hi) * 10;
      X.beginPath(); X.arc(hx, hy, 20 + Math.sin(frame * 0.03 + hi) * 5, 0, Math.PI * 2); X.fill();
    }
  }
  if (bg.waves) {
    X.strokeStyle = 'rgba(0,150,255,0.3)'; X.lineWidth = 2;
    for (var wi = 0; wi < 3; wi++) {
      var wy = H - GROUND_H - 10 - wi * 15;
      X.beginPath();
      for (var wx = 0; wx < W; wx += 4) {
        var wvy = wy + Math.sin((wx + frame * 2) * 0.02 + wi) * 5;
        wx === 0 ? X.moveTo(wx, wvy) : X.lineTo(wx, wvy);
      }
      X.stroke();
    }
  }
  if (bg.gears) {
    X.strokeStyle = 'rgba(200,200,200,0.15)'; X.lineWidth = 3;
    for (var gi = 0; gi < 4; gi++) {
      var gx = (gi * 150 + 60) % W;
      var gy = 60 + gi * 50;
      var gr = 25 + gi * 5;
      X.beginPath(); X.arc(gx, gy, gr, frame * 0.01 + gi, frame * 0.01 + gi + Math.PI * 1.8); X.stroke();
    }
  }
  if (bg.dinos) {
    // Big dinosaur pairs hugging close together
    var dinoPairs = [['🦕','🦖'],['🦖','🦕'],['🦕','🦖'],['🦖','🦕']];
    X.font = '120px serif'; X.globalAlpha = 0.9;
    for (var di = 0; di < dinoPairs.length; di++) {
      var dx = (di * 220 + frame * 0.35) % (W + 160) - 80;
      var dy = H - GROUND_H - 60 + Math.sin(frame * 0.025 + di * 2) * 4;
      X.fillText(dinoPairs[di][0], dx, dy);
      X.fillText(dinoPairs[di][1], dx + 75, dy);
    }
    // Small flying pterodactyls in the sky
    X.font = '32px serif'; X.globalAlpha = 0.5;
    for (var pi = 0; pi < 4; pi++) {
      var px = (pi * 200 + frame * 0.8) % (W + 80) - 40;
      var py = 60 + pi * 40 + Math.sin(frame * 0.05 + pi * 3) * 25;
      X.fillText('🦅', px, py);
    }
    // Plants and trees
    X.font = '36px serif'; X.globalAlpha = 0.5;
    var plants = ['🌿','🌴','🪨','🌿','🌴','🪨','🌿','🌴'];
    for (var pli = 0; pli < plants.length; pli++) {
      var plx = (pli * 120 + frame * 0.15) % (W + 60) - 30;
      var ply = H - GROUND_H - 10;
      X.fillText(plants[pli], plx, ply);
    }
    // Eggs scattered
    X.font = '18px serif'; X.globalAlpha = 0.4;
    for (var ei = 0; ei < 5; ei++) {
      var ex = (ei * 170 + 50) % W;
      var ey = H - GROUND_H - 5;
      X.fillText('🥚', ex, ey);
    }
    X.globalAlpha = 1;
  }
  if (bg.ghosts) {
    X.font = '20px serif';
    for (var ghi = 0; ghi < 6; ghi++) {
      var ghx = (ghi * 110 + frame * 0.3) % (W + 40) - 20;
      var ghy = 40 + ghi * 30 + Math.sin(frame * 0.04 + ghi) * 15;
      X.globalAlpha = 0.15 + Math.sin(frame * 0.06 + ghi) * 0.1;
      X.fillText('👻', ghx, ghy);
    }
    X.globalAlpha = 1;
  }

  // Clouds
  clouds.forEach(c => {
    X.fillStyle = bg.cloudColor;
    X.beginPath();
    X.arc(c.x, c.y, c.w * 0.25, 0, Math.PI * 2);
    X.arc(c.x + c.w * 0.3, c.y - c.w * 0.1, c.w * 0.3, 0, Math.PI * 2);
    X.arc(c.x + c.w * 0.6, c.y, c.w * 0.22, 0, Math.PI * 2);
    X.fill();
  });

  // Pipes
  pipes.forEach(p => {
    var t = p.type || PIPE_TYPES[0];
    // Top pipe
    drawPipe(p.x, 0, PIPE_W, p.gapY, true, t);
    // Bottom pipe
    drawPipe(p.x, p.gapY + GAP, PIPE_W, H - GROUND_H - p.gapY - GAP, false, t);
    // Points label in the gap
    if (t.pts > 1) {
      X.font = 'bold 14px Lilita One, cursive';
      X.textAlign = 'center';
      X.fillStyle = t.pts >= 5 ? '#fbbf24' : '#fff';
      X.globalAlpha = 0.8;
      X.fillText('+' + t.pts, p.x + PIPE_W / 2, p.gapY + GAP / 2 + 5);
      X.globalAlpha = 1;
      X.textAlign = 'start';
    }
    // Sparkle effect for diamond pipes
    if (t.sparkle && !p.scored) {
      X.fillStyle = '#fff';
      for (var si = 0; si < 3; si++) {
        var sy = p.gapY + 20 + si * (GAP - 40) / 2;
        var sx = p.x + PIPE_W / 2 + Math.sin(frame * 0.1 + si * 2) * 8;
        X.globalAlpha = 0.5 + Math.sin(frame * 0.15 + si) * 0.3;
        X.beginPath(); X.arc(sx, sy, 2, 0, Math.PI * 2); X.fill();
      }
      X.globalAlpha = 1;
    }
  });

  // Ground
  X.fillStyle = bg.ground1;
  X.fillRect(0, H - GROUND_H, W, 8);
  X.fillStyle = bg.ground2;
  X.fillRect(0, H - GROUND_H + 8, W, GROUND_H - 8);
  // Ground texture
  X.fillStyle = bg.ground2;
  X.globalAlpha = 0.5;
  for (let gx = -groundX; gx < W + 24; gx += 24) {
    X.fillRect(gx, H - GROUND_H + 10, 12, 3);
    X.fillRect(gx + 10, H - GROUND_H + 20, 8, 3);
  }
  X.globalAlpha = 1;
  // Grass tufts (only for non-industrial backgrounds)
  if (!bg.gears && !bg.stars && !bg.lava) {
    X.fillStyle = bg.ground1;
    for (let gx = -groundX; gx < W + 24; gx += 16) {
      X.fillRect(gx, H - GROUND_H - 2, 3, 6);
      X.fillRect(gx + 8, H - GROUND_H - 1, 2, 4);
    }
  }

  // Trail effect particles
  trailParticles.forEach(tp => {
    X.globalAlpha = tp.life;
    X.fillStyle = tp.color;
    if (tp.shape === 'heart') {
      X.font = (tp.size*3)+'px serif'; X.fillText('❤', tp.x, tp.y);
    } else if (tp.shape === 'star') {
      X.font = (tp.size*3)+'px serif'; X.fillText('⭐', tp.x, tp.y);
    } else if (tp.shape === 'snow') {
      X.font = (tp.size*3)+'px serif'; X.fillText('❄', tp.x, tp.y);
    } else if (tp.shape === 'rect') {
      X.save(); X.translate(tp.x, tp.y); X.rotate(tp.life*4);
      X.fillRect(-tp.size/2, -tp.size/2, tp.size, tp.size*2); X.restore();
    } else {
      X.beginPath(); X.arc(tp.x, tp.y, tp.size * tp.life, 0, Math.PI*2); X.fill();
    }
  });
  X.globalAlpha = 1;

  // Bird
  if (!dead || frame % 4 < 3) {
    X.save();
    X.translate(bird.x, bird.y);
    X.rotate(bird.rotation);

    // Body
    var sk = getSkin();
    if (sk.body === 'rainbow') {
      var rg = X.createLinearGradient(-bird.size,-bird.size,bird.size,bird.size);
      rg.addColorStop(0,'#f44336');rg.addColorStop(0.2,'#ff9800');rg.addColorStop(0.4,'#ffeb3b');rg.addColorStop(0.6,'#4caf50');rg.addColorStop(0.8,'#2196f3');rg.addColorStop(1,'#9c27b0');
      X.fillStyle = rg;
    } else { X.fillStyle = sk.body; }
    X.beginPath();
    X.arc(0, 0, bird.size, 0, Math.PI * 2);
    X.fill();

    // Belly
    X.fillStyle = sk.belly;
    X.beginPath();
    X.arc(4, 4, bird.size * 0.6, 0, Math.PI * 2);
    X.fill();
    // Sparkle
    if (sk.sparkle) {
      X.fillStyle = '#fff'; X.globalAlpha = 0.5 + Math.sin(frame*0.15)*0.3;
      X.beginPath(); X.arc(-6, -12, 2, 0, Math.PI*2); X.fill();
      X.beginPath(); X.arc(10, -14, 1.5, 0, Math.PI*2); X.fill();
      X.globalAlpha = 1;
    }

    // Wing
    const wingY = Math.sin(bird.wingFrame * 3) * 6;
    if (sk.wing === 'rainbow') {
      var wg = X.createLinearGradient(-18,-4,0,8);
      wg.addColorStop(0,'#f44336');wg.addColorStop(0.5,'#ffeb3b');wg.addColorStop(1,'#2196f3');
      X.fillStyle = wg;
    } else { X.fillStyle = sk.wing; }
    X.beginPath();
    X.moveTo(-6, 0);
    X.quadraticCurveTo(-18, -4 + wingY, -14, 8 + wingY);
    X.quadraticCurveTo(-8, 6, -6, 2);
    X.fill();

    // Eye
    X.fillStyle = '#fff';
    X.beginPath();
    X.arc(8, -6, 7, 0, Math.PI * 2);
    X.fill();
    X.fillStyle = sk.eye || '#000';
    X.beginPath();
    X.arc(10, -5, 3.5, 0, Math.PI * 2);
    X.fill();
    X.fillStyle = '#fff';
    X.beginPath();
    X.arc(11, -6, 1.5, 0, Math.PI * 2);
    X.fill();

    // Beak
    X.fillStyle = sk.beak;
    X.beginPath();
    X.moveTo(bird.size - 2, -2);
    X.lineTo(bird.size + 10, 2);
    X.lineTo(bird.size - 2, 5);
    X.closePath();
    X.fill();

    // Tail feathers
    if (sk.tail === 'rainbow') {
      var tg = X.createLinearGradient(-bird.size-10,-6,-bird.size+2,4);
      tg.addColorStop(0,'#9c27b0');tg.addColorStop(0.5,'#e91e63');tg.addColorStop(1,'#ff5722');
      X.fillStyle = tg;
    } else { X.fillStyle = sk.tail; }
    X.beginPath();
    X.moveTo(-bird.size + 2, -2);
    X.lineTo(-bird.size - 8, -6);
    X.lineTo(-bird.size - 6, 0);
    X.lineTo(-bird.size - 10, 4);
    X.lineTo(-bird.size + 2, 2);
    X.fill();

    // === ACCESSORY DRAWING ===
    var acc = getAcc();
    if (acc.id === 'crown') {
      X.fillStyle = '#ffd700';
      X.beginPath(); X.moveTo(-8, -bird.size-2); X.lineTo(-10, -bird.size-14); X.lineTo(-4, -bird.size-8);
      X.lineTo(0, -bird.size-16); X.lineTo(4, -bird.size-8); X.lineTo(10, -bird.size-14); X.lineTo(8, -bird.size-2); X.closePath(); X.fill();
      X.fillStyle = '#ff0000'; X.beginPath(); X.arc(0, -bird.size-10, 2, 0, Math.PI*2); X.fill();
    } else if (acc.id === 'tophat') {
      X.fillStyle = '#1a1a1a';
      X.fillRect(-10, -bird.size-2, 20, 4);
      X.fillRect(-6, -bird.size-18, 12, 16);
      X.fillStyle = '#c0392b'; X.fillRect(-6, -bird.size-6, 12, 3);
    } else if (acc.id === 'sunglasses') {
      X.fillStyle = '#1a1a1a'; X.lineWidth = 2;
      X.fillRect(2, -8, 10, 6); X.fillRect(-8, -8, 8, 6);
      X.strokeStyle = '#1a1a1a'; X.beginPath(); X.moveTo(-8, -5); X.lineTo(-14, -6); X.stroke();
      X.beginPath(); X.moveTo(0, -5); X.lineTo(2, -5); X.stroke();
    } else if (acc.id === 'headband') {
      X.strokeStyle = '#ff0000'; X.lineWidth = 3;
      X.beginPath(); X.arc(0, 0, bird.size+1, -Math.PI*0.8, -Math.PI*0.2); X.stroke();
      X.fillStyle = '#ff0000'; X.beginPath(); X.arc(-bird.size+2, -bird.size+6, 4, 0, Math.PI*2); X.fill();
    } else if (acc.id === 'bowtie') {
      X.fillStyle = '#e91e63';
      X.beginPath(); X.moveTo(-2, 8); X.lineTo(-10, 4); X.lineTo(-10, 14); X.closePath(); X.fill();
      X.beginPath(); X.moveTo(2, 8); X.lineTo(10, 4); X.lineTo(10, 14); X.closePath(); X.fill();
      X.fillStyle = '#c2185b'; X.beginPath(); X.arc(0, 9, 3, 0, Math.PI*2); X.fill();
    } else if (acc.id === 'pirate') {
      X.fillStyle = '#1a1a1a';
      X.beginPath(); X.arc(0, -4, bird.size+3, Math.PI, 0); X.fill();
      X.fillStyle = '#fff'; X.font = '10px serif'; X.textAlign = 'center'; X.fillText('☠', 0, -bird.size+2);
    } else if (acc.id === 'wizard') {
      X.fillStyle = '#4a148c';
      X.beginPath(); X.moveTo(-12, -bird.size); X.lineTo(0, -bird.size-22); X.lineTo(12, -bird.size); X.closePath(); X.fill();
      X.fillStyle = '#ffd700'; X.font = '8px serif'; X.textAlign = 'center'; X.fillText('⭐', 0, -bird.size-8);
    } else if (acc.id === 'halo') {
      X.strokeStyle = 'rgba(255,215,0,0.8)'; X.lineWidth = 2;
      X.beginPath(); X.ellipse(0, -bird.size-6, 12, 4, 0, 0, Math.PI*2); X.stroke();
      X.strokeStyle = 'rgba(255,215,0,0.3)';
      X.beginPath(); X.ellipse(0, -bird.size-6, 14, 5, 0, 0, Math.PI*2); X.stroke();
    } else if (acc.id === 'santa') {
      X.fillStyle = '#d32f2f';
      X.beginPath(); X.arc(0, -4, bird.size+2, Math.PI, 0); X.fill();
      X.beginPath(); X.moveTo(8, -bird.size); X.quadraticCurveTo(14, -bird.size-14, 16, -bird.size-8); X.lineTo(8, -bird.size+2); X.fill();
      X.fillStyle = '#fff'; X.beginPath(); X.arc(16, -bird.size-8, 4, 0, Math.PI*2); X.fill();
      X.fillRect(-bird.size-2, -bird.size, bird.size*2+4, 4);
    } else if (acc.id === 'viking') {
      X.fillStyle = '#795548';
      X.beginPath(); X.arc(0, -4, bird.size+3, Math.PI, 0); X.fill();
      X.fillStyle = '#e0e0e0';
      X.beginPath(); X.moveTo(-12, -bird.size+2); X.quadraticCurveTo(-16, -bird.size-12, -10, -bird.size-14); X.lineTo(-8, -bird.size+2); X.fill();
      X.beginPath(); X.moveTo(12, -bird.size+2); X.quadraticCurveTo(16, -bird.size-12, 10, -bird.size-14); X.lineTo(8, -bird.size+2); X.fill();
    } else if (acc.id === 'antenna') {
      X.strokeStyle = '#666'; X.lineWidth = 2;
      X.beginPath(); X.moveTo(0, -bird.size); X.lineTo(0, -bird.size-16); X.stroke();
      X.fillStyle = '#ff0000'; X.beginPath(); X.arc(0, -bird.size-16, 4, 0, Math.PI*2); X.fill();
      X.fillStyle = '#ff0000'; X.globalAlpha = 0.3 + Math.sin(frame*0.2)*0.3;
      X.beginPath(); X.arc(0, -bird.size-16, 7, 0, Math.PI*2); X.fill();
      X.globalAlpha = 1;
    }

    X.restore();
  }

  // Particles
  particles.forEach(p => {
    X.globalAlpha = p.life / p.maxLife;
    X.fillStyle = p.color;
    X.beginPath();
    X.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    X.fill();
  });
  X.globalAlpha = 1;

  // Nuke screen flash
  if (nukeFlash > 0) {
    X.globalAlpha = nukeFlash / 30;
    X.fillStyle = nukeFlash > 20 ? '#fff' : nukeFlash > 10 ? '#ffd700' : '#ff4500';
    X.fillRect(0, 0, W, H);
    X.globalAlpha = 1;
    nukeFlash--;
  }

  // "Tap to start" hint
  if (playing && !started && !dead) {
    X.fillStyle = 'rgba(255,255,255,0.8)';
    X.font = "bold 18px 'Lilita One', cursive";
    X.textAlign = 'center';
    X.fillText('Tap to Flap!', W / 2, H * 0.6);
    X.textAlign = 'start';
  }
}

function drawPipe(x, y, w, h, isTop, type) {
  if (h <= 0) return;
  var t = type || PIPE_TYPES[0];
  // Pipe body
  var grad = X.createLinearGradient(x, 0, x + w, 0);
  if (t.rainbow) {
    grad.addColorStop(0, '#FF6F00');
    grad.addColorStop(0.2, '#F44336');
    grad.addColorStop(0.4, '#E91E63');
    grad.addColorStop(0.6, '#9C27B0');
    grad.addColorStop(0.8, '#3F51B5');
    grad.addColorStop(1, '#2196F3');
  } else {
    grad.addColorStop(0, t.bodyDark);
    grad.addColorStop(0.3, t.bodyLight);
    grad.addColorStop(0.7, t.bodyLight);
    grad.addColorStop(1, t.bodyDark);
  }
  X.fillStyle = grad;
  X.fillRect(x, y, w, h);

  // Pipe rim
  var rimH = 26;
  var rimW = w + 8;
  var rimX = x - 4;
  var rimGrad = X.createLinearGradient(rimX, 0, rimX + rimW, 0);
  rimGrad.addColorStop(0, t.rimDark);
  rimGrad.addColorStop(0.3, t.rimLight);
  rimGrad.addColorStop(0.7, t.rimLight);
  rimGrad.addColorStop(1, t.rimDark);
  X.fillStyle = rimGrad;
  if (isTop) {
    X.fillRect(rimX, y + h - rimH, rimW, rimH);
  } else {
    X.fillRect(rimX, y, rimW, rimH);
  }

  // Highlight
  X.fillStyle = 'rgba(255,255,255,0.15)';
  X.fillRect(x + 6, y, 8, h);

  // Gold pipes get extra shine
  if (t.pts >= 5 && !t.rainbow) {
    X.fillStyle = 'rgba(255,255,255,0.08)';
    X.fillRect(x + 2, y, w - 4, h);
  }
}

  document.getElementById('death-score').textContent = 'Score: ' + score;

  document.getElementById('death-screen').style.display = 'flex';
}

// === VOLUME SETTINGS ===
var _fpMusicVol=parseInt(localStorage.getItem('fp_musicVol')||'50')/100;
var _fpSfxVol=parseInt(localStorage.getItem('fp_sfxVol')||'70')/100;
var fpSfxGain=null,fpMusicGainNode=null;

// === AUDIO SYSTEM ===
let audioCtx = null;
let musicOn = true;
let musicNodes = [];
let musicTimer = null;

function getAudioCtx() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    fpSfxGain=audioCtx.createGain();fpSfxGain.gain.value=_fpSfxVol;fpSfxGain.connect(audioCtx.destination);
    fpMusicGainNode=audioCtx.createGain();fpMusicGainNode.gain.value=_fpMusicVol;fpMusicGainNode.connect(audioCtx.destination);
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

// Sound effects
function sfxFlap() {
  try {
    const ctx = getAudioCtx();
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.type = 'sine';
    o.frequency.setValueAtTime(600, ctx.currentTime);
    o.frequency.exponentialRampToValueAtTime(900, ctx.currentTime + 0.08);
    o.frequency.exponentialRampToValueAtTime(500, ctx.currentTime + 0.15);
    g.gain.setValueAtTime(0.15, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
    o.connect(g); g.connect(fpSfxGain||ctx.destination);
    o.start(); o.stop(ctx.currentTime + 0.15);
  } catch(e){}
}

function sfxScore(pts) {
  try {
    const ctx = getAudioCtx();
    const notes = pts >= 5 ? [523, 659, 784, 1047] : pts >= 3 ? [523, 659, 784] : [523, 659];
    notes.forEach((f, i) => {
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.type = 'triangle';
      o.frequency.value = f;
      g.gain.setValueAtTime(0.12, ctx.currentTime + i * 0.08);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.08 + 0.2);
      o.connect(g); g.connect(fpSfxGain||ctx.destination);
      o.start(ctx.currentTime + i * 0.08);
      o.stop(ctx.currentTime + i * 0.08 + 0.2);
    });
  } catch(e){}
}

function sfxCrash() {
  try {
    const ctx = getAudioCtx();
    // Noise burst
    const buf = ctx.createBuffer(1, ctx.sampleRate * 0.3, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (ctx.sampleRate * 0.08));
    const src = ctx.createBufferSource();
    src.buffer = buf;
    const g = ctx.createGain();
    g.gain.setValueAtTime(0.2, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
    src.connect(g); g.connect(fpSfxGain||ctx.destination);
    src.start();
    // Low thud
    const o = ctx.createOscillator();
    const g2 = ctx.createGain();
    o.type = 'sine';
    o.frequency.setValueAtTime(150, ctx.currentTime);
    o.frequency.exponentialRampToValueAtTime(40, ctx.currentTime + 0.2);
    g2.gain.setValueAtTime(0.25, ctx.currentTime);
    g2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.25);
    o.connect(g2); g2.connect(fpSfxGain||ctx.destination);
    o.start(); o.stop(ctx.currentTime + 0.25);
  } catch(e){}
}

// World-specific music themes
const WORLD_MUSIC = {
  default: { scale:[523.25,659.25,783.99,880,1046.5,783.99,659.25,523.25,440,523.25,659.25,783.99,880,783.99,659.25,523.25], tempo:200, type:'triangle', pad1:130.81, pad2:196, padType:'sine', vol:0.18 },
  space: { scale:[220,261.63,329.63,392,440,523.25,440,392,329.63,261.63,220,196,220,261.63,329.63,392], tempo:350, type:'sine', pad1:55, pad2:82.41, padType:'sine', vol:0.15 },
  volcano: { scale:[146.83,174.61,196,233.08,261.63,233.08,196,174.61,146.83,196,233.08,261.63,293.66,261.63,233.08,196], tempo:180, type:'sawtooth', pad1:73.42, pad2:98, padType:'sawtooth', vol:0.12 },
  heaven: { scale:[523.25,587.33,659.25,783.99,880,783.99,659.25,587.33,523.25,659.25,783.99,880,1046.5,880,783.99,659.25], tempo:400, type:'sine', pad1:261.63, pad2:392, padType:'sine', vol:0.14 },
  beach: { scale:[392,440,523.25,587.33,659.25,587.33,523.25,440,392,349.23,392,440,523.25,440,392,349.23], tempo:220, type:'triangle', pad1:130.81, pad2:196, padType:'sine', vol:0.18 },
  factory: { scale:[196,220,261.63,293.66,329.63,293.66,261.63,220,196,174.61,196,220,261.63,220,196,174.61], tempo:150, type:'square', pad1:65.41, pad2:98, padType:'square', vol:0.10 },
  dino: { scale:[261.63,293.66,329.63,392,440,392,329.63,293.66,261.63,220,196,220,261.63,293.66,329.63,392], tempo:250, type:'triangle', pad1:98, pad2:146.83, padType:'triangle', vol:0.16 },
  haunted: { scale:[233.08,246.94,261.63,277.18,293.66,277.18,261.63,246.94,233.08,220,207.65,220,233.08,246.94,261.63,277.18], tempo:320, type:'sine', pad1:58.27, pad2:87.31, padType:'sine', vol:0.13 },
};

function startMusic() {
  if (!musicOn) return;
  try {
    const ctx = getAudioCtx();
    stopMusic();
    const bgId = activeBG || 'default';
    const wm = WORLD_MUSIC[bgId] || WORLD_MUSIC.default;

    const masterGain = ctx.createGain();
    masterGain.gain.value = wm.vol;
    masterGain.connect(fpMusicGainNode||ctx.destination);
    musicNodes.push(masterGain);

    const scale = wm.scale;
    let noteIdx = 0;
    const tempo = wm.tempo;

    function playNote() {
      if (!musicOn) return;
      const freq = scale[noteIdx % scale.length];
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.type = wm.type;
      o.frequency.value = freq;
      g.gain.setValueAtTime(0.6, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.18);
      o.connect(g); g.connect(masterGain);
      o.start(); o.stop(ctx.currentTime + 0.2);
      noteIdx++;

      if (noteIdx % 2 === 0) {
        const o2 = ctx.createOscillator();
        const g2 = ctx.createGain();
        o2.type = 'sine';
        o2.frequency.value = freq * 0.5;
        g2.gain.setValueAtTime(0.3, ctx.currentTime);
        g2.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.15);
        o2.connect(g2); g2.connect(masterGain);
        o2.start(); o2.stop(ctx.currentTime + 0.18);
      }

      // Haunted: add dissonant ghost note
      if (bgId === 'haunted' && noteIdx % 3 === 0) {
        const gh = ctx.createOscillator();
        const gg = ctx.createGain();
        gh.type = 'sine';
        gh.frequency.value = freq * 1.06; // slightly detuned = creepy
        gg.gain.setValueAtTime(0.15, ctx.currentTime);
        gg.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
        gh.connect(gg); gg.connect(masterGain);
        gh.start(); gh.stop(ctx.currentTime + 0.4);
      }

      // Factory: add rhythmic clank
      if (bgId === 'factory' && noteIdx % 4 === 0) {
        const buf = ctx.createBuffer(1, ctx.sampleRate * 0.05, ctx.sampleRate);
        const d = buf.getChannelData(0);
        for (let i = 0; i < d.length; i++) d[i] = (Math.random()*2-1) * Math.exp(-i/(ctx.sampleRate*0.01));
        const src = ctx.createBufferSource(); src.buffer = buf;
        const cg = ctx.createGain(); cg.gain.value = 0.3;
        src.connect(cg); cg.connect(masterGain); src.start();
      }

      // Space: longer delays, more ethereal
      const nextDelay = bgId === 'space' ? tempo + Math.sin(noteIdx*0.3)*100 :
                        bgId === 'haunted' ? tempo + Math.random()*200 :
                        noteIdx % 4 === 0 ? tempo * 1.5 : noteIdx % 3 === 0 ? tempo * 0.75 : tempo;
      musicTimer = setTimeout(playNote, nextDelay);
    }

    // Pad drones
    const pad = ctx.createOscillator();
    const padG = ctx.createGain();
    pad.type = wm.padType;
    pad.frequency.value = wm.pad1;
    padG.gain.value = bgId === 'factory' ? 0.06 : 0.15;
    pad.connect(padG); padG.connect(masterGain);
    pad.start();
    musicNodes.push(pad, padG);

    const pad2 = ctx.createOscillator();
    const padG2 = ctx.createGain();
    pad2.type = wm.padType;
    pad2.frequency.value = wm.pad2;
    padG2.gain.value = bgId === 'haunted' ? 0.12 : 0.1;
    pad2.connect(padG2); padG2.connect(masterGain);
    pad2.start();
    musicNodes.push(pad2, padG2);

    // Volcano: rumble LFO
    if (bgId === 'volcano') {
      const lfo = ctx.createOscillator();
      const lfoG = ctx.createGain();
      lfo.type = 'sine'; lfo.frequency.value = 3;
      lfoG.gain.value = 0.08;
      lfo.connect(lfoG); lfoG.connect(masterGain);
      lfo.start(); musicNodes.push(lfo, lfoG);
    }

    playNote();
  } catch(e){}
}

function stopMusic() {
  if (musicTimer) { clearTimeout(musicTimer); musicTimer = null; }
  musicNodes.forEach(n => { try { n.stop ? n.stop() : null; } catch(e){} try { n.disconnect(); } catch(e){} });
  musicNodes = [];
}

const _origFlap = flap;
flap = function() {
  if (!dead && playing) sfxFlap();

};

const _origDie = die;
die = function() {
  sfxCrash();
  stopMusic();
