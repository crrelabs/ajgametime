<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Flappy Parrot — AJ GameTime</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Lilita+One&family=Nunito:wght@600;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#4dc9f6;overflow:hidden;touch-action:none;font-family:'Nunito',sans-serif;user-select:none;-webkit-user-select:none}
canvas{display:block}
#score-display{position:absolute;top:40px;left:50%;transform:translateX(-50%);font-family:'Lilita One',cursive;font-size:clamp(48px,10vw,72px);color:#fff;text-shadow:2px 3px 0 #000,0 0 10px rgba(0,0,0,0.3);z-index:10;pointer-events:none}
#overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20;background:rgba(0,0,0,0.6)}
#overlay h1{font-family:'Lilita One',cursive;font-size:clamp(30px,8vw,56px);color:#fbbf24;text-shadow:2px 3px 0 #000;margin-bottom:4px}
#overlay h2{color:#fff;font-family:'Lilita One',cursive;font-size:clamp(14px,3vw,20px);margin-bottom:16px;text-shadow:1px 2px 0 #000}
#overlay p{color:rgba(255,255,255,0.8);font-size:14px;max-width:300px;text-align:center;line-height:1.5;margin-bottom:16px}
#play-btn{pointer-events:auto;padding:16px 50px;font-family:'Lilita One',cursive;font-size:24px;color:#fff;background:linear-gradient(135deg,#22c55e,#16a34a);border:none;border-radius:16px;cursor:pointer;box-shadow:0 4px 20px rgba(34,197,94,0.5);text-shadow:1px 2px 0 rgba(0,0,0,0.3)}
#play-btn:active{transform:scale(0.95)}
#back{position:absolute;top:10px;left:10px;color:rgba(255,255,255,0.5);text-decoration:none;font-size:13px;font-weight:700;z-index:30}
#lb-show-btn{pointer-events:auto;padding:8px 20px;font-size:14px;font-weight:700;color:#fff;background:linear-gradient(135deg,#f59e0b,#ef4444);border:none;border-radius:8px;cursor:pointer;margin-top:8px}
#lb-overlay{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:100;background:rgba(0,0,0,0.92)}
#lb-overlay h2{font-size:28px;color:#f59e0b;margin-bottom:12px;font-weight:900}
#lb-list{width:min(340px,90vw);max-height:50vh;overflow-y:auto}
.lb-row{display:flex;justify-content:space-between;padding:8px 14px;border-bottom:1px solid rgba(255,255,255,0.08);color:#e2e8f0;font-size:14px;font-weight:600}
.lb-row:nth-child(1) .lb-rank{color:#fbbf24}.lb-row:nth-child(2) .lb-rank{color:#94a3b8}.lb-row:nth-child(3) .lb-rank{color:#b45309}
.lb-rank{width:30px;color:#64748b}.lb-name{flex:1;margin:0 8px}.lb-score{color:#22d3ee}
#lb-close-btn{pointer-events:auto;margin-top:16px;padding:10px 30px;font-size:16px;font-weight:700;color:#fff;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:10px;cursor:pointer}
#death-screen{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:200;background:rgba(0,0,0,0.85)}
#death-screen h1{font-family:'Lilita One',cursive;font-size:36px;color:#ef4444;margin-bottom:4px;text-shadow:2px 3px 0 #000}
#death-screen h2{font-family:'Lilita One',cursive;font-size:20px;color:#fbbf24;margin-bottom:4px}
#death-best{color:#22d3ee;font-size:14px;font-weight:700;margin-bottom:14px}
#death-name{width:200px;padding:10px;font-size:16px;font-weight:700;border:2px solid #22c55e;border-radius:10px;background:#1a1a2e;color:#fff;text-align:center;outline:none;margin-bottom:10px}
.death-btn{padding:12px 28px;font-family:'Lilita One',cursive;font-size:16px;color:#fff;border:none;border-radius:12px;cursor:pointer;margin:4px;pointer-events:auto}
#death-submit{background:linear-gradient(135deg,#22c55e,#3b82f6)}
#death-retry{background:linear-gradient(135deg,#f97316,#ef4444)}
#death-lb{background:linear-gradient(135deg,#f59e0b,#ef4444)}
</style>
</head>
<body>
<a id="back" href="index.html">← Back</a>
<canvas id="game"></canvas>
<div id="score-display">0</div>

<div id="overlay">
  <h1>🦜 Flappy Parrot</h1>
  <h2>Tap to Fly!</h2>
  <p>Tap anywhere or press Space to flap! Fly through the pipes and don't crash. How far can you go?</p>
  <button id="play-btn">▶ Play</button>
  <button id="lb-show-btn" onclick="_lbShow()">🏆 Leaderboard</button>
</div>

<div id="lb-overlay"><h2>🏆 Leaderboard</h2><div id="lb-list"></div><button id="lb-close-btn">Close</button></div>

<div id="death-screen">
  <h1>💥 Crash!</h1>
  <h2 id="death-score">Score: 0</h2>
  <div id="death-best">Best: 0</div>
  <input type="text" id="death-name" placeholder="Your name" maxlength="16" autocomplete="off">
  <button class="death-btn" id="death-submit">📤 Submit</button>
  <button class="death-btn" id="death-retry">🔄 Retry</button>
  <button class="death-btn" id="death-lb">🏆 Ranks</button>
</div>

<script>
const C = document.getElementById('game');
const X = C.getContext('2d');
let W, H;
function resize() { W = C.width = window.innerWidth; H = C.height = window.innerHeight; }
resize(); window.addEventListener('resize', resize);

// Game
let playing = false, dead = false, started = false;
let score = 0, best = parseInt(localStorage.getItem('fp_best') || '0');
let frame = 0;

// Bird
const GRAVITY = 0.45;
const FLAP = -7.5;
const bird = { x: 0, y: 0, vy: 0, rotation: 0, wingFrame: 0, size: 18 };

// Pipes
const PIPE_W = 52;
const GAP = 140;
let pipeSpeed = 2.5;
let pipes = [];
let pipeTimer = 0;
const PIPE_INTERVAL = 90;

// Ground
const GROUND_H = 70;
let groundX = 0;

// Clouds
let clouds = [];
for (let i = 0; i < 5; i++) {
  clouds.push({ x: Math.random() * 500, y: 30 + Math.random() * 150, w: 60 + Math.random() * 80, speed: 0.3 + Math.random() * 0.3 });
}

// Particles
let particles = [];

function resetGame() {
  bird.x = W * 0.25;
  bird.y = H * 0.4;
  bird.vy = 0;
  bird.rotation = 0;
  bird.wingFrame = 0;
  pipes = [];
  pipeTimer = PIPE_INTERVAL - 30;
  score = 0;
  dead = false;
  started = false;
  pipeSpeed = 2.5;
  particles = [];
  frame = 0;
  document.getElementById('score-display').textContent = '0';
}

function flap() {
  if (dead) return;
  if (!playing) return;
  if (!started) started = true;
  bird.vy = FLAP;
  bird.wingFrame = 0;
  // Flap particles
  for (let i = 0; i < 4; i++) {
    particles.push({
      x: bird.x - 8, y: bird.y + 5,
      vx: -1 - Math.random() * 2, vy: 1 + Math.random() * 2,
      life: 12 + Math.random() * 8, maxLife: 20,
      color: 'rgba(255,255,255,0.5)', size: 2 + Math.random() * 2
    });
  }
}

// Input — tap anywhere
function onTap(e) {
  e.preventDefault();
  flap();
}
C.addEventListener('touchstart', onTap, { passive: false });
C.addEventListener('mousedown', onTap);
document.addEventListener('keydown', e => {
  if (e.key === ' ' || e.key === 'ArrowUp') { e.preventDefault(); flap(); }
});

function spawnPipe() {
  const minY = 80;
  const maxY = H - GROUND_H - GAP - 80;
  const gapY = minY + Math.random() * (maxY - minY);
  pipes.push({
    x: W + 10,
    gapY: gapY,
    scored: false
  });
}

function update() {
  if (!playing || dead) return;
  frame++;

  if (!started) {
    // Idle bobbing
    bird.y = H * 0.4 + Math.sin(frame * 0.06) * 10;
    bird.wingFrame += 0.15;
    return;
  }

  // Physics
  bird.vy += GRAVITY;
  bird.y += bird.vy;

  // Rotation based on velocity
  bird.rotation = Math.max(-0.5, Math.min(Math.PI / 2, bird.vy * 0.08));
  bird.wingFrame += 0.3;

  // Pipes
  pipeTimer++;
  if (pipeTimer >= PIPE_INTERVAL) {
    pipeTimer = 0;
    spawnPipe();
  }

  for (let i = pipes.length - 1; i >= 0; i--) {
    const p = pipes[i];
    p.x -= pipeSpeed;

    // Score
    if (!p.scored && p.x + PIPE_W < bird.x) {
      p.scored = true;
      score++;
      document.getElementById('score-display').textContent = score;
      // Speed up slightly
      if (score % 10 === 0) pipeSpeed += 0.2;
    }

    // Remove off-screen
    if (p.x + PIPE_W < -10) {
      pipes.splice(i, 1);
    }

    // Collision
    if (bird.x + bird.size > p.x && bird.x - bird.size < p.x + PIPE_W) {
      if (bird.y - bird.size < p.gapY || bird.y + bird.size > p.gapY + GAP) {
        die();
        return;
      }
    }
  }

  // Ground/ceiling collision
  if (bird.y + bird.size > H - GROUND_H) {
    bird.y = H - GROUND_H - bird.size;
    die();
    return;
  }
  if (bird.y - bird.size < 0) {
    bird.y = bird.size;
    bird.vy = 0;
  }

  // Ground scroll
  groundX = (groundX + pipeSpeed) % 24;

  // Clouds
  clouds.forEach(c => { c.x -= c.speed; if (c.x + c.w < 0) { c.x = W + 20; c.y = 30 + Math.random() * 150; } });

  // Particles
  particles = particles.filter(p => { p.x += p.vx; p.y += p.vy; p.life--; return p.life > 0; });
}

function die() {
  dead = true;
  // Explosion particles
  for (let i = 0; i < 15; i++) {
    particles.push({
      x: bird.x, y: bird.y,
      vx: (Math.random()-0.5)*8, vy: (Math.random()-0.5)*8,
      life: 20+Math.random()*15, maxLife: 35,
      color: ['#fbbf24','#ef4444','#22c55e','#fff'][Math.floor(Math.random()*4)],
      size: 3+Math.random()*4
    });
  }
  if (score > best) {
    best = score;
    localStorage.setItem('fp_best', best);
  }
  setTimeout(gameOver, 600);
}

function draw() {
  // Sky gradient
  const sky = X.createLinearGradient(0, 0, 0, H - GROUND_H);
  sky.addColorStop(0, '#4dc9f6');
  sky.addColorStop(0.5, '#70d6ff');
  sky.addColorStop(1, '#a0e4ff');
  X.fillStyle = sky;
  X.fillRect(0, 0, W, H - GROUND_H);

  // Clouds
  clouds.forEach(c => {
    X.fillStyle = 'rgba(255,255,255,0.7)';
    X.beginPath();
    X.arc(c.x, c.y, c.w * 0.25, 0, Math.PI * 2);
    X.arc(c.x + c.w * 0.3, c.y - c.w * 0.1, c.w * 0.3, 0, Math.PI * 2);
    X.arc(c.x + c.w * 0.6, c.y, c.w * 0.22, 0, Math.PI * 2);
    X.fill();
  });

  // Pipes
  pipes.forEach(p => {
    // Top pipe
    drawPipe(p.x, 0, PIPE_W, p.gapY, true);
    // Bottom pipe
    drawPipe(p.x, p.gapY + GAP, PIPE_W, H - GROUND_H - p.gapY - GAP, false);
  });

  // Ground
  X.fillStyle = '#8BC34A';
  X.fillRect(0, H - GROUND_H, W, 8);
  X.fillStyle = '#795548';
  X.fillRect(0, H - GROUND_H + 8, W, GROUND_H - 8);
  // Ground texture
  X.fillStyle = '#6D4C41';
  for (let gx = -groundX; gx < W + 24; gx += 24) {
    X.fillRect(gx, H - GROUND_H + 10, 12, 3);
    X.fillRect(gx + 10, H - GROUND_H + 20, 8, 3);
  }
  // Grass tufts
  X.fillStyle = '#7CB342';
  for (let gx = -groundX; gx < W + 24; gx += 16) {
    X.fillRect(gx, H - GROUND_H - 2, 3, 6);
    X.fillRect(gx + 8, H - GROUND_H - 1, 2, 4);
  }

  // Bird
  if (!dead || frame % 4 < 3) {
    X.save();
    X.translate(bird.x, bird.y);
    X.rotate(bird.rotation);

    // Body
    X.fillStyle = '#4CAF50';
    X.beginPath();
    X.arc(0, 0, bird.size, 0, Math.PI * 2);
    X.fill();

    // Belly
    X.fillStyle = '#81C784';
    X.beginPath();
    X.arc(4, 4, bird.size * 0.6, 0, Math.PI * 2);
    X.fill();

    // Wing
    const wingY = Math.sin(bird.wingFrame * 3) * 6;
    X.fillStyle = '#388E3C';
    X.beginPath();
    X.moveTo(-6, 0);
    X.quadraticCurveTo(-18, -4 + wingY, -14, 8 + wingY);
    X.quadraticCurveTo(-8, 6, -6, 2);
    X.fill();

    // Eye
    X.fillStyle = '#fff';
    X.beginPath();
    X.arc(8, -6, 7, 0, Math.PI * 2);
    X.fill();
    X.fillStyle = '#000';
    X.beginPath();
    X.arc(10, -5, 3.5, 0, Math.PI * 2);
    X.fill();
    X.fillStyle = '#fff';
    X.beginPath();
    X.arc(11, -6, 1.5, 0, Math.PI * 2);
    X.fill();

    // Beak
    X.fillStyle = '#FF9800';
    X.beginPath();
    X.moveTo(bird.size - 2, -2);
    X.lineTo(bird.size + 10, 2);
    X.lineTo(bird.size - 2, 5);
    X.closePath();
    X.fill();

    // Tail feathers
    X.fillStyle = '#2E7D32';
    X.beginPath();
    X.moveTo(-bird.size + 2, -2);
    X.lineTo(-bird.size - 8, -6);
    X.lineTo(-bird.size - 6, 0);
    X.lineTo(-bird.size - 10, 4);
    X.lineTo(-bird.size + 2, 2);
    X.fill();

    X.restore();
  }

  // Particles
  particles.forEach(p => {
    X.globalAlpha = p.life / p.maxLife;
    X.fillStyle = p.color;
    X.beginPath();
    X.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    X.fill();
  });
  X.globalAlpha = 1;

  // "Tap to start" hint
  if (playing && !started && !dead) {
    X.fillStyle = 'rgba(255,255,255,0.8)';
    X.font = "bold 18px 'Lilita One', cursive";
    X.textAlign = 'center';
    X.fillText('Tap to Flap!', W / 2, H * 0.6);
    X.textAlign = 'start';
  }
}

function drawPipe(x, y, w, h, isTop) {
  if (h <= 0) return;
  // Pipe body
  const grad = X.createLinearGradient(x, 0, x + w, 0);
  grad.addColorStop(0, '#388E3C');
  grad.addColorStop(0.3, '#4CAF50');
  grad.addColorStop(0.7, '#4CAF50');
  grad.addColorStop(1, '#2E7D32');
  X.fillStyle = grad;
  X.fillRect(x, y, w, h);

  // Pipe rim
  const rimH = 26;
  const rimW = w + 8;
  const rimX = x - 4;
  const rimGrad = X.createLinearGradient(rimX, 0, rimX + rimW, 0);
  rimGrad.addColorStop(0, '#2E7D32');
  rimGrad.addColorStop(0.3, '#43A047');
  rimGrad.addColorStop(0.7, '#43A047');
  rimGrad.addColorStop(1, '#1B5E20');
  X.fillStyle = rimGrad;
  if (isTop) {
    X.fillRect(rimX, y + h - rimH, rimW, rimH);
  } else {
    X.fillRect(rimX, y, rimW, rimH);
  }

  // Highlight
  X.fillStyle = 'rgba(255,255,255,0.1)';
  X.fillRect(x + 6, y, 8, h);
}

function gameOver() {
  document.getElementById('death-score').textContent = 'Score: ' + score;
  document.getElementById('death-best').textContent = '🏅 Best: ' + best;
  document.getElementById('death-name').value = localStorage.getItem('ajgt_name') || '';
  document.getElementById('death-screen').style.display = 'flex';
}

document.getElementById('play-btn').addEventListener('click', () => {
  document.getElementById('overlay').style.display = 'none';
  playing = true;
  resetGame();
});

function loop() { update(); draw(); requestAnimationFrame(loop); }
loop();

// === LEADERBOARD ===
const _LB_URL='https://adudgrfxwildzwpcvyil.supabase.co';
const _LB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFkdWRncmZ4d2lsZHp3cGN2eWlsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyOTkzODUsImV4cCI6MjA4Nzg3NTM4NX0.-JYXn5r9QUjxbpwckwDMSvCm8w1xRXOp5lP2TWNOC_E';
const _LB_GAME='flappy-parrot';
async function _lbFetch(){try{const r=await fetch(_LB_URL+'/rest/v1/ajgametime_leaderboard?game=eq.'+_LB_GAME+'&order=score.desc&limit=10',{headers:{'apikey':_LB_KEY,'Authorization':'Bearer '+_LB_KEY}});return await r.json();}catch(e){return[];}}
async function _lbSubmit(name,sc){try{await fetch(_LB_URL+'/rest/v1/ajgametime_leaderboard',{method:'POST',headers:{'apikey':_LB_KEY,'Authorization':'Bearer '+_LB_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify({game:_LB_GAME,player_name:name,score:sc,wave:1})});}catch(e){}}
async function _lbShow(){const lb=document.getElementById('lb-overlay');const list=document.getElementById('lb-list');list.innerHTML='<div style="color:#64748b;text-align:center;padding:20px">Loading...</div>';lb.style.display='flex';const data=await _lbFetch();if(!data.length){list.innerHTML='<div style="color:#64748b;text-align:center;padding:20px">No scores yet!</div>';return;}list.innerHTML=data.map((d,i)=>'<div class="lb-row"><span class="lb-rank">#'+(i+1)+'</span><span class="lb-name">'+d.player_name+'</span><span class="lb-score">'+d.score+'</span></div>').join('');}
document.getElementById('lb-close-btn').addEventListener('click',()=>{document.getElementById('lb-overlay').style.display='none';});
document.getElementById('death-submit').addEventListener('click', async function(){
  var n = document.getElementById('death-name').value.trim() || 'Anonymous';
  localStorage.setItem('ajgt_name', n);
  await _lbSubmit(n, score);
  this.textContent = '✅ Done!';
  this.disabled = true;
});
document.getElementById('death-retry').addEventListener('click', function(){
  document.getElementById('death-screen').style.display = 'none';
  document.getElementById('death-submit').textContent = '📤 Submit';
  document.getElementById('death-submit').disabled = false;
  playing = true;
  resetGame();
});
document.getElementById('death-lb').addEventListener('click', function(){ _lbShow(); });
document.getElementById('death-name').addEventListener('keydown', function(e){ if(e.key==='Enter') document.getElementById('death-submit').click(); });
</script>
</body>
