<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic Tac Toe</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: -apple-system, sans-serif; background: #0f172a; color: #e2e8f0; }
h1 { font-size: 2rem; margin-bottom: 0.5rem; }
#status { font-size: 1.1rem; margin-bottom: 1.5rem; color: #94a3b8; min-height: 1.5em; }
#board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 1.5rem; }
.cell { width: 100px; height: 100px; background: #1e293b; border: 2px solid #334155; border-radius: 12px; font-size: 2.5rem; font-weight: 700; cursor: pointer; transition: all 0.15s; display: flex; align-items: center; justify-content: center; }
.cell:hover { background: #334155; }
.cell.x { color: #38bdf8; }
.cell.o { color: #f472b6; }
.cell.win { background: #1e3a5f; border-color: #38bdf8; animation: pulse 0.5s; }
button { padding: 0.75rem 2rem; font-size: 1rem; font-weight: 600; background: #38bdf8; color: #0f172a; border: none; border-radius: 8px; cursor: pointer; transition: background 0.2s; }
button:hover { background: #7dd3fc; }
#score { margin-bottom: 1rem; font-size: 0.9rem; color: #64748b; }
#score span { font-weight: 700; color: #e2e8f0; }
@keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.05); } }
</style>
</head>
<body>
<h1>Tic Tac Toe</h1>
<div id="score">X: <span id="sx">0</span> &nbsp;|&nbsp; O: <span id="so">0</span> &nbsp;|&nbsp; Draws: <span id="sd">0</span></div>
<div id="status">X goes first</div>
<div id="board"></div>
<button onclick="reset()">New Game</button>

<script>
const board = document.getElementById('board');
const status = document.getElementById('status');
let cells = Array(9).fill('');
let turn = 'X';
let over = false;
let score = { X: 0, O: 0, D: 0 };
const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

function render() {
  board.innerHTML = '';
  cells.forEach((v, i) => {
    const d = document.createElement('div');
    d.className = 'cell' + (v === 'X' ? ' x' : v === 'O' ? ' o' : '');
    d.textContent = v;
    d.onclick = () => play(i);
    board.appendChild(d);
  });
}

function play(i) {
  if (cells[i] || over) return;
  cells[i] = turn;
  const w = checkWin();
  if (w) {
    over = true;
    status.textContent = turn + ' wins!';
    score[turn]++;
    updateScore();
    render();
    w.forEach(i => board.children[i].classList.add('win'));
    return;
  }
  if (!cells.includes('')) {
    over = true;
    status.textContent = "It's a draw!";
    score.D++;
    updateScore();
    render();
    return;
  }
  turn = turn === 'X' ? 'O' : 'X';
  status.textContent = turn + "'s turn";
  render();
}

function checkWin() {
  for (const [a,b,c] of wins) {
    if (cells[a] && cells[a] === cells[b] && cells[b] === cells[c]) return [a,b,c];
  }
  return null;
}

function updateScore() {
  document.getElementById('sx').textContent = score.X;
  document.getElementById('so').textContent = score.O;
  document.getElementById('sd').textContent = score.D;
}

function reset() {
  cells = Array(9).fill('');
  turn = 'X';
  over = false;
  status.textContent = "X goes first";
  render();
}

render();
</script>
</body>
</html>
